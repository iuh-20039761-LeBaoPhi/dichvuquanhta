<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân - Thợ Nhà</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #11998e;
            --primary-light: #38ef7d;
            --sidebar-w: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; min-height: 100vh; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-w); min-height: 100vh; position: fixed; top: 0; left: 0; z-index: 100;
            background: linear-gradient(180deg, #0f2027 0%, #203a43 60%, #2c5364 100%);
            display: flex; flex-direction: column;
        }
        .sidebar-brand {
            padding: 1.4rem 1.5rem; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-brand img { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.1); padding: 4px; }
        .sidebar-brand span { font-size: 1.1rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-user { padding: 1.2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-user .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1rem; margin-bottom: 8px; }
        .sidebar-user .user-name { font-size: 0.9rem; font-weight: 600; color: #fff; }
        .sidebar-user .user-role { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
        .sidebar-nav { flex: 1; padding: 1rem 0; }
        .nav-item { list-style: none; }
        .nav-link-item {
            display: flex; align-items: center; gap: 10px; padding: 0.75rem 1.5rem;
            color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.9rem; font-weight: 500;
            border-radius: 8px; margin: 2px 10px; transition: all 0.2s;
        }
        .nav-link-item:hover, .nav-link-item.active { color: #fff; background: rgba(17,153,142,0.25); }
        .nav-link-item.active { border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; margin-left: 10px; }
        .nav-link-item i { width: 18px; text-align: center; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.08); }
        .btn-logout {
            display: flex; align-items: center; gap: 8px; width: 100%;
            padding: 0.65rem 1rem; background: rgba(239,68,68,0.15); color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; font-size: 0.88rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.3); color: #fca5a5; }

        /* ===== MAIN ===== */
        .main-content { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
        .topbar {
            background: white; padding: 1rem 2rem; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid #e2e8f0;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar h5 { font-size: 1rem; font-weight: 700; color: #1e293b; margin: 0; }
        .topbar-actions { display: flex; align-items: center; gap: 12px; }
        .btn-new-booking {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; border: none; padding: 8px 18px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        .btn-new-booking:hover { color: white; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(17,153,142,0.4); }
        .page-content { padding: 2rem; flex: 1; }

        /* ===== WELCOME ===== */
        .welcome-card {
            background: linear-gradient(135deg, var(--primary) 0%, #0f766e 60%, #065f46 100%);
            border-radius: 16px; padding: 1.75rem 2rem; color: white; margin-bottom: 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .welcome-card h4 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
        .welcome-card p { font-size: 0.88rem; opacity: 0.85; margin: 0; }
        .welcome-card .icon { font-size: 3rem; opacity: 0.3; }

        /* ===== STATS ===== */
        .stat-card { background: white; border-radius: 14px; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; border: 1px solid #e2e8f0; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .stat-icon.green { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: var(--primary); }
        .stat-icon.yellow { background: linear-gradient(135deg, #fef9c3, #fef08a); color: #ca8a04; }
        .stat-icon.blue  { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #2563eb; }
        .stat-icon.red   { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #dc2626; }
        .stat-value { font-size: 1.6rem; font-weight: 800; color: #1e293b; line-height: 1; }
        .stat-label { font-size: 0.8rem; color: #64748b; margin-top: 2px; }

        /* ===== TABLE ===== */
        .section-card { background: white; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
        .section-header { padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .section-header h6 { font-size: 0.95rem; font-weight: 700; color: #1e293b; margin: 0; }
        .table { margin: 0; }
        .table th { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #64748b; background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 0.85rem 1rem; }
        .table td { font-size: 0.88rem; color: #334155; padding: 0.9rem 1rem; vertical-align: middle; border-color: #f1f5f9; }
        .table tbody tr:hover { background: #f8fafc; }

        /* STATUS BADGES */
        .badge-status { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .badge-new       { background: #dbeafe; color: #1d4ed8; }
        .badge-confirmed { background: #fef3c7; color: #d97706; }
        .badge-doing     { background: #e0e7ff; color: #4338ca; }
        .badge-done      { background: #dcfce7; color: #15803d; }
        .badge-cancel    { background: #fee2e2; color: #dc2626; }

        .empty-state { padding: 3rem 1rem; text-align: center; color: #94a3b8; }
        .empty-state i { font-size: 2.5rem; margin-bottom: 12px; }
        .spinner-wrap { padding: 3rem; text-align: center; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            body.sidebar-open .sidebar { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .welcome-card .icon { display: none; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <img src="image/logo.png" alt="Thợ Nhà">
        <span>Thợ Nhà</span>
    </div>
    <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">K</div>
        <div class="user-name" id="sidebarName">Khách hàng</div>
        <div class="user-role"><i class="fas fa-circle text-success me-1" style="font-size:8px;"></i>Khách hàng</div>
    </div>
    <nav class="sidebar-nav">
        <ul class="nav-item p-0" id="navList">
            <li class="nav-item">
                <a href="#" class="nav-link-item active" onclick="showTab('orders')">
                    <i class="fas fa-list-alt"></i> Đơn của tôi
                </a>
            </li>
            <li class="nav-item">
                <a href="index.html" class="nav-link-item">
                    <i class="fas fa-home"></i> Trang chủ
                </a>
            </li>
        </ul>
    </nav>
    <div class="sidebar-footer">
        <a href="#" class="btn-logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </a>
    </div>
</aside>

<!-- MAIN -->
<div class="main-content">
    <div class="topbar">
        <h5><i class="fas fa-list-alt me-2 text-success"></i>Đơn của tôi</h5>
        <div class="topbar-actions">
            <a href="index.html" class="btn-new-booking">
                <i class="fas fa-plus"></i> Đặt lịch mới
            </a>
        </div>
    </div>

    <div class="page-content">
        <!-- Welcome -->
        <div class="welcome-card">
            <div>
                <h4>Xin chào, <span id="welcomeName">bạn</span>!</h4>
                <p>Theo dõi và quản lý các đơn đặt lịch dịch vụ của bạn tại đây.</p>
            </div>
            <i class="fas fa-user-circle icon"></i>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-receipt"></i></div>
                    <div>
                        <div class="stat-value" id="statTotal">—</div>
                        <div class="stat-label">Tổng đơn</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
                    <div>
                        <div class="stat-value" id="statPending">—</div>
                        <div class="stat-label">Chờ xử lý</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <div class="stat-value" id="statDone">—</div>
                        <div class="stat-label">Hoàn thành</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
                    <div>
                        <div class="stat-value" id="statCancel">—</div>
                        <div class="stat-label">Đã hủy</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="section-card">
            <div class="section-header">
                <h6><i class="fas fa-list me-2"></i>Danh sách đơn hàng</h6>
            </div>
            <div id="tableWrap">
                <div class="spinner-wrap"><div class="spinner-border text-success"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
const STATUS_MAP = {
    new:       { label: 'Chờ xác nhận',   cls: 'badge-new',       icon: 'fa-clock' },
    confirmed: { label: 'Đã xác nhận',    cls: 'badge-confirmed', icon: 'fa-check' },
    doing:     { label: 'Đang thực hiện', cls: 'badge-doing',     icon: 'fa-wrench' },
    done:      { label: 'Hoàn thành',     cls: 'badge-done',      icon: 'fa-check-circle' },
    cancel:    { label: 'Đã hủy',         cls: 'badge-cancel',    icon: 'fa-times-circle' }
};

function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
}

// Auth check
fetch('api/customer/check-login.php')
    .then(r => r.json())
    .then(res => {
        if (res.status !== 'logged_in') { window.location.href = 'customer-login.html'; return; }
        document.getElementById('welcomeName').textContent = res.name;
        document.getElementById('sidebarName').textContent = res.name;
        document.getElementById('sidebarAvatar').textContent = res.name.charAt(0).toUpperCase();
        loadOrders();
    })
    .catch(() => { window.location.href = 'customer-login.html'; });

function loadOrders() {
    fetch('api/customer/get-orders.php')
        .then(r => r.json())
        .then(res => {
            const orders = res.data || [];
            // Stats
            document.getElementById('statTotal').textContent = orders.length;
            document.getElementById('statPending').textContent = orders.filter(o => ['new','confirmed','doing'].includes(o.status)).length;
            document.getElementById('statDone').textContent   = orders.filter(o => o.status === 'done').length;
            document.getElementById('statCancel').textContent = orders.filter(o => o.status === 'cancel').length;

            if (orders.length === 0) {
                document.getElementById('tableWrap').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox d-block"></i>
                        <p class="mb-3">Bạn chưa có đơn hàng nào</p>
                        <a href="index.html" class="btn-new-booking" style="text-decoration:none;padding:10px 24px;">
                            <i class="fas fa-plus me-1"></i>Đặt lịch ngay
                        </a>
                    </div>`;
                return;
            }

            let rows = orders.map(o => {
                const s = STATUS_MAP[o.status] || { label: o.status, cls: 'badge-new', icon: 'fa-circle' };
                return `<tr>
                    <td><span class="fw-600" style="font-family:monospace;">${o.order_code || '—'}</span></td>
                    <td>${o.service_name}</td>
                    <td>${o.address || '—'}</td>
                    <td>${fmtDate(o.created_at)}</td>
                    <td><span class="badge-status ${s.cls}"><i class="fas ${s.icon}"></i>${s.label}</span></td>
                </tr>`;
            }).join('');

            document.getElementById('tableWrap').innerHTML = `
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Mã đơn</th>
                                <th>Dịch vụ</th>
                                <th>Địa chỉ</th>
                                <th>Ngày đặt</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        })
        .catch(() => {
            document.getElementById('tableWrap').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle d-block"></i><p>Không tải được dữ liệu</p></div>`;
        });
}

function logout() {
    fetch('api/customer/logout.php')
        .then(() => { window.location.href = 'customer-login.html'; });
}
</script>
</body>
</html>
