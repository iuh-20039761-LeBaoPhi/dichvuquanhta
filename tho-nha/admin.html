<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Thợ Nhà</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <a class="sidebar-brand" href="admin.html">
            <div class="brand-logo">
                <img src="image/tho-nha-logo-thuong-hieu.png" alt="Thợ Nhà">
            </div>
            <div>
                <span class="brand-text">Thợ Nhà</span>
                <span class="brand-sub">Admin Panel</span>
            </div>
        </a>

        <div class="sidebar-nav">
            <span class="nav-section-label">Menu chính</span>
            <ul class="nav-menu">
                <li>
                    <a href="#" class="active" id="dashboardLink">
                        <i class="fas fa-chart-line"></i>
                        <span>Tổng quan</span>
                    </a>
                </li>
                <li>
                    <a href="#" id="ordersLink">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Quản lý đơn hàng</span>
                    </a>
                </li>
                <li>
                    <a href="#" id="cancelRequestsLink">
                        <i class="fas fa-ban"></i>
                        <span>Yêu cầu hủy đơn</span>
                        <span class="nav-badge hide" id="cancelBadge">0</span>
                    </a>
                </li>
            </ul>

            <span class="nav-section-label">Quản lý</span>
            <ul class="nav-menu">
                <li>
                    <a href="#" id="servicesLink">
                        <i class="fas fa-wrench"></i>
                        <span>Quản lý dịch vụ</span>
                    </a>
                </li>
                <li>
                    <a href="#" id="providersLink">
                        <i class="fas fa-user-hard-hat"></i>
                        <span>Nhà cung cấp</span>
                        <span class="nav-badge hide" id="providerBadge">0</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <a href="#" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Đăng xuất</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title" id="pageTitle">Tổng Quan</h1>
            </div>
            <div class="top-bar-right">
                <a href="index.html" target="_blank" class="topbar-icon-btn" title="Xem trang web">
                    <i class="fas fa-external-link-alt"></i>
                </a>
                <div class="user-chip">
                    <div class="user-avatar" id="userAvatar">Trang chủ</div>
                    <span class="user-name" id="adminUsername">Trang chủ</span>
                </div>
            </div>
        </div>

        <!-- Page Content -->
        <div class="page-content">
            <div id="pageContent"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalsContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin-main.js"></script>

    <script>
        // Show username from localStorage
        const storedUser = localStorage.getItem('admin_username') || 'Admin';
        document.getElementById('adminUsername').textContent = storedUser;
        document.getElementById('userAvatar').textContent = storedUser.charAt(0).toUpperCase();

        // Mobile sidebar toggle
        const toggle   = document.getElementById('sidebarToggle');
        const overlay  = document.getElementById('sidebarOverlay');

        function openSidebar()  { document.body.classList.add('sidebar-open'); }
        function closeSidebar() { document.body.classList.remove('sidebar-open'); }

        toggle.addEventListener('click', () => {
            document.body.classList.contains('sidebar-open') ? closeSidebar() : openSidebar();
        });
        overlay.addEventListener('click', closeSidebar);

        // Close sidebar on nav link click (mobile)
        document.querySelectorAll('.nav-menu a, .sidebar-footer a').forEach(a => {
            a.addEventListener('click', () => {
                if (window.innerWidth < 992) closeSidebar();
            });
        });
    </script>
</body>
</html>
