<div class="row mb-3">
    <div class="col-md-6">
        <button class="btn btn-gradient" id="addCategoryBtn">
            <i class="fas fa-plus"></i> Thêm Danh Mục
        </button>
        <button class="btn btn-gradient ms-2" id="addServiceBtn">
            <i class="fas fa-plus"></i> Thêm Dịch Vụ
        </button>
    </div>
</div>

<div id="servicesContainer"></div>

<!-- Modal Thêm/Sửa Danh Mục -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" >
            <div class="modal-header">
                <h5 class="modal-title " id="categoryModalTitle">Thêm Danh Mục</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label">Tên danh mục *</label>
                        <input type="text" class="form-control" id="categoryName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" id="categoryDescription" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-gradient w-100">Lưu</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa Dịch Vụ -->
<div class="modal fade" id="serviceModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" >
            <div class="modal-header">
                <h5 class="modal-title " id="serviceModalTitle">Thêm Dịch Vụ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="serviceForm">
                    <input type="hidden" id="serviceId">
                    <div class="mb-3">
                        <label class="form-label">Danh mục *</label>
                        <select class="form-select" id="serviceCategoryId" required>
                            <option value="">-- Chọn danh mục --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên dịch vụ *</label>
                        <input type="text" class="form-control" id="serviceName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá tổng (VNĐ) *</label>
                        <input type="number" class="form-control" id="servicePrice" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Tiền công (VNĐ)</label>
                            <input type="number" class="form-control" id="serviceLaborCost" placeholder="VD: 200000">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Giá vật liệu/linh kiện (VNĐ)</label>
                            <input type="number" class="form-control" id="serviceMaterialCost" placeholder="VD: 100000">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hãng / Thương hiệu</label>
                        <input type="text" class="form-control" id="serviceBrand" placeholder="VD: Daikin / LG / Sika">
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Bảo hành</label>
                            <input type="text" class="form-control" id="serviceWarranty" placeholder="VD: 6 tháng">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Thời gian thực hiện</label>
                            <input type="text" class="form-control" id="serviceDuration" placeholder="VD: 1–2 giờ">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" id="serviceDescription" rows="3"></textarea>
                    </div>

                    <hr>
                    <p class="text-muted small mb-2"><i class="fas fa-info-circle me-1"></i>Phí di chuyển &amp; khảo sát (để trống nếu không áp dụng)</p>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phí Di Chuyển</label>
                        <div class="row g-2">
                            <div class="col-4">
                                <label class="form-label small text-muted">Cố định (VNĐ)</label>
                                <input type="number" class="form-control form-control-sm" id="serviceTravelFee" placeholder="VD: 30000" min="0">
                            </div>
                            <div class="col-4">
                                <label class="form-label small text-muted">Tối thiểu</label>
                                <input type="number" class="form-control form-control-sm" id="serviceTravelMin" placeholder="VD: 20000" min="0">
                            </div>
                            <div class="col-4">
                                <label class="form-label small text-muted">Tối đa</label>
                                <input type="number" class="form-control form-control-sm" id="serviceTravelMax" placeholder="VD: 50000" min="0">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phí Khảo Sát</label>
                        <div class="row g-2 align-items-start">
                            <div class="col-5">
                                <label class="form-label small text-muted">Số tiền (VNĐ)</label>
                                <input type="number" class="form-control form-control-sm" id="serviceSurveyFee" placeholder="VD: 100000" min="0">
                            </div>
                            <div class="col-7">
                                <label class="form-label small text-muted">Tùy chọn</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="serviceSurveyRequired">
                                    <label class="form-check-label small" for="serviceSurveyRequired">Bắt buộc khảo sát trước</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="serviceSurveyWaive" checked>
                                    <label class="form-check-label small" for="serviceSurveyWaive">Miễn phí nếu đặt lịch</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="serviceSurveyDeduct">
                                    <label class="form-check-label small" for="serviceSurveyDeduct">Trừ vào tổng tiền cuối</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-gradient w-100">Lưu</button>
                </form>
            </div>
        </div>
    </div>
</div>
