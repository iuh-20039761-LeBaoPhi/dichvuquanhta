<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provider Dashboard - Thợ Nhà</title>
    <!-- CSS Standard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../../assets/css/admin-dashboard.css?v=1.4" />
    <link rel="stylesheet" href="../../assets/css/order-panel.css?v=1.4" />
    <link rel="stylesheet" href="../../assets/css/order-detail-custom.css?v=1.4" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      :root {
          /* Premium Neutral Palette (Slate/Blue) - Thợ Nhà Partner */
          --admin-bg: #f8fafc; 
          --admin-border: #e2e8f0;
          --admin-panel: #ffffff;
          --admin-text: #0f172a;
          --admin-muted: #64748b;
          --admin-primary: #2563eb; /* Branding Partner Blue */
          --admin-primary-2: #3b82f6;
          --admin-dark: #0f172a; /* Deep Navy Sidebar */
          --admin-dark-2: #1e293b;
      }
      .admin-shell { display: flex; width: 100%; min-height: 100vh; background: var(--admin-bg); }
      .sidebar-shell { width: 280px !important; flex-shrink: 0; }
      .content-shell { flex: 1; min-width: 0; }
      .nav-item { cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <!-- Sidebar Partial Placeholder -->
      <div id="sidebarMount"></div>

      <main class="content-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button class="btn btn-sm sidebar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
              <i class="fas fa-bars"></i>
            </button>
            <h2 id="pageTitleDisplay">Đối tác Thợ Nhà</h2>
          </div>

          <div class="topbar-actions">
            <a href="../../index.html" class="btn btn-sm top-icon-btn" title="Về trang chủ">
                <i class="fas fa-home"></i>
            </a>
            <div class="admin-chip">
              <span class="admin-avatar" id="userAvatar">D</span>
              <span class="admin-email" id="adminUsernameDisplay">Đối tác</span>
            </div>
          </div>
        </header>

        <section class="container-fluid py-4">
           <div id="pageContent">
              <!-- Content will be injected here -->
           </div>
        </section>
      </main>
    </div>

    <!-- Modals placeholder -->
    <div id="modalsContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../public/asset/js/dvqt-app.js"></script>
    <script src="../../assets/js/shared/order-store.js"></script>
    <script src="../../assets/js/shared/order-view-utils.js"></script>
    <script src="../../assets/js/shared/order-service.js"></script>
    <script src="../../assets/js/shared/order-detail-renderer.js"></script>
    <script src="../../assets/js/shared/order-ui-composer.js"></script>
    <script src="../../assets/js/provider/shell.js"></script>

    <script>
      // Injection for Sidebar
      fetch('partials/aside.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('sidebarMount').innerHTML = html;
          if(typeof setupNavigation === 'function') setupNavigation();
          
          // Mark active path
          const currentPath = window.location.pathname.split('/').pop() || 'trang-ca-nhan.html';
          document.querySelectorAll('.nav-item').forEach(item => {
             if(item.getAttribute('href') === currentPath) item.classList.add('active');
          });
        });
    </script>
  </body>
</html>
