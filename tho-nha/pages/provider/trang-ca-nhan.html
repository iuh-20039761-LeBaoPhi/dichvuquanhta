<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thợ Nhà - Quản lý Đối Tác</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/provider-order-management.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #2563eb;
            --sidebar-bg: #ffffff;
            --content-bg: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--content-bg); color: #1e293b; }
        
        /* Desktop Sidebar */
        .desktop-sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid #e2e8f0;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
        }

        .main-wrapper {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            transition: all 0.3s;
        }

        .sidebar-brand {
            padding: 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .sidebar-brand img { height: 36px; border-radius: 8px; margin-right: 10px; }

        .nav-custom { padding: 1rem; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1rem;
            color: #64748b;
            font-weight: 500;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .nav-link i { width: 20px; font-size: 1.1rem; }
        .nav-link:hover { background: #f1f5f9; color: var(--primary-color); }
        .nav-link.active { background: #eff6ff; color: var(--primary-color); font-weight: 600; }
        .nav-link.text-danger:hover { background: #fef2f2; }

        /* Mobile Header */
        .mobile-header {
            display: none;
            background: #fff;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1010;
        }

        @media (max-width: 991.98px) {
            .desktop-sidebar { display: none; }
            .main-wrapper { margin-left: 0; }
            .mobile-header { display: flex; align-items: center; justify-content: space-between; }
        }

        .main-content { padding: 1.5rem; }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <header class="mobile-header">
        <a href="../../index.html" class="d-flex align-items-center text-decoration-none">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Logo" height="32" class="rounded me-2 shadow-sm brand-logo">
            <span class="fw-bold text-primary">Thợ Nhà Partner</span>
        </a>
        <button class="btn btn-light border" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <!-- Desktop Sidebar -->
    <aside class="desktop-sidebar">
        <a href="../../index.html" class="sidebar-brand d-flex align-items-center text-decoration-none">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Logo" class="shadow-sm brand-logo">
            <span class="fw-bold text-primary fs-5">Thợ Nhà Partner</span>
        </a>
        <nav class="nav-custom" id="sidebarNav">
            <button class="nav-link active" data-page="quan-ly-don"><i class="fa-solid fa-briefcase"></i> Quản lý đơn hàng</button>
            <button class="nav-link" data-page="tai-khoan"><i class="fa-solid fa-id-card"></i> Hồ sơ cửa hàng</button>
            <hr class="my-3 opacity-10">
            <button class="nav-link text-danger mt-2" onclick="logoutProvider()"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</button>
        </nav>
    </aside>

    <!-- Mobile Offcanvas Sidebar -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar" style="width: 280px;">
        <div class="offcanvas-header border-bottom">
            <a href="../../index.html" class="d-flex align-items-center text-decoration-none">
                <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Logo" height="32" class="rounded me-2 brand-logo">
                <span class="fw-bold text-primary">Thợ Nhà</span>
            </a>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <nav class="nav-custom" id="sidebarNavMobile">
                <button class="nav-link active" data-page="quan-ly-don" data-bs-dismiss="offcanvas"><i class="fa-solid fa-briefcase"></i> Quản lý đơn hàng</button>
                <button class="nav-link" data-page="tai-khoan" data-bs-dismiss="offcanvas"><i class="fa-solid fa-id-card"></i> Hồ sơ cửa hàng</button>
                <hr class="my-3 opacity-10">
                <button class="nav-link text-danger mt-2" onclick="logoutProvider()"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</button>
            </nav>
        </div>
    </div>

    <div class="main-wrapper">
        <main class="main-content" id="pageContent">
             <!-- Nội dung động nạp ở đây -->
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Libraries -->
    <script src="../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../public/asset/js/dvqt-app.js"></script>

    <!-- Local Features -->
    <script src="../../assets/js/shared/order-store.js"></script>
    <script src="../../assets/js/shared/order-view-utils.js"></script>
    <script src="../../assets/js/shared/order-service.js"></script>
    <script src="../../assets/js/shared/order-ui-composer.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../../../public/asset/js/dvqt-map.js"></script>
    <script src="../../assets/js/provider/shell.js"></script>

    <script>
        // Đồng bộ hành động giữa 2 thanh nav (Desktop & Mobile)
        document.addEventListener('DOMContentLoaded', function() {
            const mobileBtns = document.querySelectorAll('#sidebarNavMobile .nav-link[data-page]');
            mobileBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const page = this.dataset.page;
                    // Kích hoạt click ở sidebar desktop để shell.js xử lý logic loadPage
                    const desktopBtn = document.querySelector(`#sidebarNav .nav-link[data-page="${page}"]`);
                    if (desktopBtn) desktopBtn.click();
                });
            });
        });
    </script>
</body>
</html>
