<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Nhập Nhà Cung Cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="brand-name">Thợ Nhà</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-tools"></i> Nhà cung cấp</span>
        </div>
        <p class="auth-subtitle">Đăng nhập để nhận và quản lý đơn dịch vụ</p>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>Tài khoản nhà cung cấp cần được admin xét duyệt trước khi đăng nhập.
        </div>

        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="tel" id="sodienthoai" class="form-control" placeholder="0901234567" autocomplete="tel">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-submit" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Chưa có tài khoản? <a href="dang-ky.html">Đăng ký làm nhà cung cấp</a>
            <br style="margin-top:6px;">
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>

        <div class="other-roles">
            <p>Bạn là khách hàng?</p>
            <a href="../customer/dang-nhap.html" class="role-link"><i class="fas fa-user"></i> Đăng nhập khách hàng</a>
            <a href="../admin/dang-nhap.html" class="role-link"><i class="fas fa-shield-alt"></i> Đăng nhập admin</a>
        </div>
    </div>

    <script src="../../assets/js/shared/krud-helper.js"></script>
    <script src="../../assets/js/shared/app-helper.js"></script>
    <script>
        const btn = document.getElementById('loginBtn');
        const msg = document.getElementById('msg');

        // Check if already logged in
        (async function checkAlreadyLoggedIn() {
            try {
                const session = await ThoNhaApp.checkSession();
                if (session && session.logged_in && session.role === 'provider') {
                    window.location.href = 'trang-ca-nhan.html';
                }
            } catch (e) {}
        })();

        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        async function login() {
            const phone = document.getElementById('sodienthoai').value.trim();
            const password = document.getElementById('password').value;

            if (!phone || !password) {
                msg.innerHTML = '<span class="text-danger small">Vui lòng nhập đủ SĐT và mật khẩu</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
            msg.innerHTML = '';

            try {
                // Tóm gọn quy trình đăng nhập nhà cung cấp
                await ThoNhaApp.login('provider', phone, password);
                
                msg.innerHTML = '<span class="text-success small">Đăng nhập thành công!</span>';
                setTimeout(() => window.location.href = 'trang-ca-nhan.html', 700);
            } catch (err) {
                msg.innerHTML = '<span class="text-danger small">' + (err.message || 'Đăng nhập thất bại') + '</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
            }
        }

        btn.addEventListener('click', login);
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>
    </script>
</body>
</html>
