<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Nhập Nhà Cung Cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="brand-name">Thợ Nhà</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-tools"></i> Nhà cung cấp</span>
        </div>
        <p class="auth-subtitle">Đăng nhập để nhận và quản lý đơn dịch vụ</p>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>Tài khoản nhà cung cấp cần được admin xét duyệt trước khi đăng nhập.
        </div>

        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="tel" id="sodienthoai" class="form-control" placeholder="0901234567" autocomplete="tel">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-submit" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Chưa có tài khoản? <a href="dang-ky.html">Đăng ký làm nhà cung cấp</a>
            <br style="margin-top:6px;">
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>

        <div class="other-roles">
            <p>Bạn là khách hàng?</p>
            <a href="../customer/dang-nhap.html" class="role-link"><i class="fas fa-user"></i> Đăng nhập khách hàng</a>
            <a href="../admin/dang-nhap.html" class="role-link"><i class="fas fa-shield-alt"></i> Đăng nhập admin</a>
        </div>
    </div>

    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script>
        /**
         * ═══════════════════════════════════════════════════════════
         * ĐĂNG NHẬP NHÀ CUNG CẤP — Luồng xử lý:
         * ═══════════════════════════════════════════════════════════
         *
         * 1. User nhập SĐT + mật khẩu
         * 2. JS gọi krudList() → lấy danh sách NCC từ bảng KRUD
         * 3. Tìm NCC theo SĐT → kiểm tra trạng thái xét duyệt + mật khẩu
         * 4. Nếu hợp lệ (trạng thái = active):
         *    a) Lưu profile vào localStorage (cho offline + client nhanh)
         *    b) Gọi PHP endpoint tạo session server-side (bảo mật)
         * 5. Chuyển hướng sang trang cá nhân NCC
         *
         * Bảng KRUD:  "nhacungcap_thonha"
         * PHP session: api/provider/auth/login.php
         * ═══════════════════════════════════════════════════════════
         */

        /** @const {string} Tên bảng KRUD chứa tài khoản nhà cung cấp */
        const BANG_DANG_NHAP_NHA_CUNG_CAP = 'nhacungcap_thonha';

        /** @const {string} URL endpoint PHP để tạo session server-side */
        const PHP_LOGIN_URL = '../../api/provider/auth/login.php';

        // ── Sự kiện UI cơ bản ──────────────────────────────────
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('sodienthoai').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('loginBtn').addEventListener('click', login);

        /**
         * Chuẩn hoá SĐT: chỉ giữ lại chữ số.
         * @param {string} value - SĐT gốc
         * @returns {string} SĐT chỉ gồm chữ số
         */
        function normalizePhone(value) {
            return String(value || '').replace(/\D/g, '');
        }

        /**
         * Chuẩn hoá response từ KRUD API thành mảng rows.
         * @param {*} res - Response gốc từ krudList()
         * @returns {Array} Mảng các bản ghi
         */
        function normalizeRows(res) {
            if (Array.isArray(res)) return res;
            if (!res || typeof res !== 'object') return [];
            if (res.error) throw new Error(res.error);
            if (res.success === false) throw new Error(res.message || 'Không lấy được dữ liệu tài khoản');
            if (Array.isArray(res.data)) return res.data;
            if (Array.isArray(res.rows)) return res.rows;
            if (Array.isArray(res.items)) return res.items;
            return [];
        }

        /**
         * Hash SHA-256 phía client (Web Crypto API).
         * @param {string} text - Chuỗi cần hash
         * @returns {Promise<string>} Chuỗi hex SHA-256
         */
        async function sha256(text) {
            if (!(window.crypto && window.crypto.subtle && window.TextEncoder)) {
                return String(text || '');
            }
            const encoded = new TextEncoder().encode(String(text || ''));
            const buffer = await window.crypto.subtle.digest('SHA-256', encoded);
            return Array.from(new Uint8Array(buffer))
                .map((b) => b.toString(16).padStart(2, '0'))
                .join('');
        }

        /**
         * So khớp mật khẩu: hỗ trợ format "sha256$..." hoặc plaintext.
         * @param {string} inputPassword  - Mật khẩu user nhập
         * @param {string} storedPassword - Mật khẩu lưu trong DB
         * @returns {Promise<boolean>} true nếu khớp
         */
        async function matchPassword(inputPassword, storedPassword) {
            const stored = String(storedPassword || '');
            if (!stored) return false;
            if (stored.startsWith('sha256$')) {
                return stored === ('sha256$' + await sha256(inputPassword));
            }
            return stored === inputPassword;
        }

        /**
         * Kiểm tra trạng thái xét duyệt NCC.
         * NCC cần admin duyệt trước khi đăng nhập (pending → active).
         * @param {string} status - Trạng thái: active|pending|blocked|rejected
         * @returns {string} Chuỗi rỗng nếu OK, hoặc thông báo lỗi
         */
        function statusMessage(status) {
            const s = String(status || '').toLowerCase();
            if (!s || s === 'active') return '';
            if (s === 'pending') return 'Tài khoản đang chờ admin xét duyệt';
            if (s === 'blocked') return 'Tài khoản đã bị khóa';
            if (s === 'rejected') return 'Tài khoản đã bị từ chối';
            return 'Tài khoản hiện không thể đăng nhập';
        }

        /**
         * Gọi PHP endpoint để tạo session server-side.
         * Fire-and-forget: lỗi thì bỏ qua, localStorage vẫn hoạt động.
         * @param {Object} profile - { name, phone, company, id }
         */
        function syncPhpSession(profile) {
            fetch(PHP_LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profile),
            }).catch(() => {
                console.warn('[login] Không tạo được PHP session, fallback localStorage');
            });
        }

        /**
         * Hàm chính: xử lý đăng nhập nhà cung cấp.
         *
         * Bước 1: Validate input
         * Bước 2: Gọi KRUD lấy danh sách NCC → tìm theo SĐT
         * Bước 3: Kiểm tra trạng thái xét duyệt + mật khẩu
         * Bước 4: Lưu localStorage + tạo PHP session
         * Bước 5: Redirect sang trang cá nhân NCC
         */
        async function login() {
            const phone    = document.getElementById('sodienthoai').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            // ── Bước 1: Validate input ──────────────────────────
            if (!phone || !password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng nhập đầy đủ thông tin</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
            msg.innerHTML = '';

            try {
                if (typeof krudList !== 'function') {
                    throw new Error('Không tải được hàm krudList');
                }

                // ── Bước 2: Tìm tài khoản NCC theo SĐT ────────
                const rows = normalizeRows(await krudList({ table: BANG_DANG_NHAP_NHA_CUNG_CAP }));
                const phoneDigits = normalizePhone(phone);
                const account = rows.find((item) => normalizePhone(item.sodienthoai || item.so_dien_thoai || item.phone || '') === phoneDigits);

                if (!account) {
                    throw new Error('Không tìm thấy tài khoản với số điện thoại này');
                }

                // ── Bước 3: Kiểm tra trạng thái + mật khẩu ────
                const blockMessage = statusMessage(account.trangthai || account.trang_thai || account.status);
                if (blockMessage) {
                    throw new Error(blockMessage);
                }

                const ok = await matchPassword(password, account.matkhau || account.mat_khau || account.password);
                if (!ok) {
                    throw new Error('Sai mật khẩu');
                }

                // ── Bước 4: Lưu localStorage + PHP session ─────
                const name       = account.hovaten || account.ho_ten || account.name || 'Nhà cung cấp';
                const company    = account.tencua_hang || account.ten_cua_hang || account.company || 'Đối tác Thợ Nhà';
                const phoneValue = account.sodienthoai || account.so_dien_thoai || account.phone || phone;
                const providerId = String(account.id || phoneDigits || Date.now());

                localStorage.setItem('provider_logged_in', 'true');
                localStorage.setItem('provider_name', name);
                localStorage.setItem('provider_company', company);
                localStorage.setItem('thonha_provider_profile_v1', JSON.stringify({
                    id: providerId,
                    name: name,
                    phone: phoneValue,
                    company: company
                }));

                // Tạo PHP session phía server (fire-and-forget)
                syncPhpSession({ name, phone: phoneValue, company, id: providerId });

                // ── Bước 5: Redirect ────────────────────────────
                msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng nhập thành công!</span>';
                setTimeout(() => window.location.href = 'trang-ca-nhan.html', 700);
            } catch (err) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (err && err.message ? err.message : 'Đăng nhập thất bại') + '</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
            }
        }
    </script>
</body>
</html>
