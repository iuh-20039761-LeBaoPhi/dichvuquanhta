<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thợ Nhà - Quản lý Khách Hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/customer-order-management.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .sidebar {
            background-color: #fff;
            border-right: 1px solid #dee2e6;
            min-height: 100vh;
        }

        .sidebar-brand img {
            height: 40px;
            border-radius: 8px;
        }

        .nav-link {
            color: #495057;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            background: transparent;
        }

        .nav-link:hover {
            background-color: #f1f3f5;
            color: #0d6efd;
        }

        .nav-link.active {
            background-color: #e7f1ff;
            color: #0d6efd;
        }

        .nav-link.text-danger:hover {
            background-color: #ffe6e6;
        }

        .main-content {
            padding: 2rem;
            overflow-y: auto;
            max-height: 100vh;
        }

        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
                border-right: none;
                border-bottom: 1px solid #dee2e6;
            }

            .nav {
                flex-direction: row;
                overflow-x: auto;
                flex-wrap: nowrap;
            }

            .nav-link {
                min-width: max-content;
                margin-bottom: 0;
                margin-right: 0.5rem;
            }

            .main-content {
                max-height: none;
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="d-flex flex-column flex-md-row min-vh-100 overflow-hidden text-break">
        <!-- Sidebar -->
        <aside class="sidebar col-12 col-md-3 col-lg-2 px-3 py-4">
            <div class="sidebar-brand d-flex align-items-center mb-4 px-2">
                <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Logo" class="me-2 shadow-sm">
                <strong class="text-success fs-5">Quản lý KH</strong>
            </div>
            <nav class="nav flex-md-column" id="sidebarNav">
                <button class="nav-link active border-0 text-start d-flex align-items-center gap-2"
                    data-page="quan-ly-don"><i class="fa-solid fa-receipt text-center" style="width:20px;"></i> Quản lý
                    đơn hàng</button>
                <button class="nav-link border-0 text-start d-flex align-items-center gap-2" data-page="tai-khoan"><i
                        class="fa-solid fa-user text-center" style="width:20px;"></i> Tài khoản cá nhân</button>
                <a href="../../index.html" class="nav-link text-decoration-none d-flex align-items-center gap-2"><i
                        class="fa-solid fa-house text-center" style="width:20px;"></i> Về trang chủ</a>
                <a href="../public/dich-vu.html"
                    class="nav-link text-decoration-none d-flex align-items-center gap-2"><i
                        class="fa-solid fa-calendar-plus text-center" style="width:20px;"></i> Đặt lịch mới</a>
                <button class="nav-link text-danger border-0 text-start d-flex align-items-center gap-2 mt-md-auto"
                    onclick="logoutCustomer()"><i class="fa-solid fa-right-from-bracket text-center"
                        style="width:20px;"></i> Đăng xuất</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex-grow-1" id="pageContent">
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/shared/order-store.js"></script>
    <script src="../../assets/js/shared/krud-helper.js"></script>
    <script src="../../assets/js/shared/order-view-utils.js"></script>
    <script src="../../assets/js/customer/order-management.js"></script>
    <script src="../../assets/js/customer/shell.js"></script>
</body>

</html>
