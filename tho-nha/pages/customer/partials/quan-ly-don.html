<!-- Tho Nha Customer Order Management (Premium v4.1) -->
<div class="invoice-page-container">
    <section class="invoice-sidebar" aria-label="Bộ lọc nhanh">
        <header class="sidebar-head">
            <h3><i class="fa-solid fa-filter"></i> Phân loại</h3>
        </header>
        <div class="sidebar-body">
            <button class="sidebar-item active" id="filter-all">
                <div class="sidebar-item-info"><span>Tất cả đơn hàng</span><b id="stat-all-count">0</b></div>
            </button>
            <button class="sidebar-item" id="filter-new">
                <div class="sidebar-item-info"><span>Chờ xác nhận</span><b id="stat-new-count">0</b></div>
            </button>
            <button class="sidebar-item" id="filter-doing">
                <div class="sidebar-item-info"><span>Đang thực hiện</span><b id="stat-doing-count">0</b></div>
            </button>
            <button class="sidebar-item" id="filter-done">
                <div class="sidebar-item-info"><span>Đã hoàn thành</span><b id="stat-done-count">0</b></div>
            </button>
        </div>
    </section>

    <section class="invoice-main">
        <section class="invoice-toolbar">
            <label class="search-wrap" for="searchInput">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="searchInput" type="text" placeholder="Tìm theo mã đơn, dịch vụ...">
            </label>
        </section>

        <!-- Order List Section (Default) -->
        <div id="orderListSection">
            <div class="dash-header">
                <h2><i class="fa-solid fa-file-invoice"></i> Lịch sử đặt lịch cá nhân</h2>
                <button id="refreshCustomerBtn" class="btn-refresh"><i class="fa-solid fa-rotate"></i> Làm mới đơn</button>
            </div>

            <div class="invoice-page-shell" style="margin:0; width:100%;">
                <section class="invoice-card">
                    <header class="board-header">
                        <div><h3>Danh sách đơn hàng Thợ Nhà</h3></div>
                    </header>
                    <div class="desktop-table-wrap">
                        <table class="invoice-table">
                            <thead><tr><th>Mã đơn</th><th>Dịch vụ</th><th>Địa chỉ</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                            <tbody id="customerOrderBody"><tr><td colspan="5" class="table-loading">Đang tải đơn hàng...</td></tr></tbody>
                        </table>
                    </div>
                    <div class="mobile-list" id="customerMobileList"></div>
                    <div id="customerEmptyState" class="empty-state" hidden><i class="fa-regular fa-face-smile"></i><h4>Chưa có đơn hàng nào</h4></div>
                </section>
            </div>
        </div>

        <!-- Order Detail Section (Hidden by Default) -->
        <div id="orderDetailSection" hidden>
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <button class="back-btn btn btn-outline-secondary px-3 py-2 fw-bold" data-action="back-to-list" style="border-radius:12px; border: 2px solid #e2e8f0; color: #4b5563; background: #fff;">
                    <i class="fas fa-arrow-left me-2"></i> Quay lại danh sách
                </button>
                <div class="text-muted small">Xem chi tiết đơn hàng #ThoNha</div>
            </div>
            <!-- ThoNhaOrderUI.renderDetails will inject content here -->
        </div>
    </section>
</div>

<!-- Modal Nhập Phí (Giữ lại nếu cần) -->
<div id="costInputModal" class="order-detail-modal" hidden>
    <button class="order-detail-backdrop" type="button" data-action="close-cost"></button>
    <section class="order-detail-dialog" role="dialog" aria-modal="true" style="max-width: 400px; padding: 20px;">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h3 style="margin:0; font-size: 1.2rem; color: #111827;">Nhập chi phí thực tế</h3>
            <button type="button" style="background:none; border:none; font-size:1.5rem; cursor:pointer;" data-action="close-cost">&times;</button>
        </header>
        <div style="margin-bottom: 20px;">
            <input type="number" id="actualCostInput" placeholder="VD: 500000" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>
        <div style="display:flex; justify-content:flex-end; gap: 10px;">
            <button type="button" id="submitCostBtn" class="btn btn-success">Xác nhận gửi</button>
        </div>
    </section>
</div>
