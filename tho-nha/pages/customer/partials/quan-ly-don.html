
<div class="dash-header">
    <h2><i class="fa-solid fa-receipt"></i> Theo dõi đơn đã đặt</h2>
    <button id="refreshOrdersBtn" class="btn-refresh"><i class="fa-solid fa-rotate"></i> Làm mới</button>
</div>
<div class="invoice-page-shell" style="margin:0; width:100%;">
    <section class="invoice-card">
        <section class="stats-grid" aria-label="Thống kê đơn hàng">
            <article class="stat-card">
                <span class="stat-icon blue"><i class="fa-solid fa-receipt"></i></span>
                <div><p class="stat-label">Tổng đơn</p><h2 id="statTotal">0</h2></div>
            </article>
            <article class="stat-card">
                <span class="stat-icon amber"><i class="fa-solid fa-hourglass-half"></i></span>
                <div><p class="stat-label">Chờ xử lý</p><h2 id="statNew">0</h2></div>
            </article>
            <article class="stat-card">
                <span class="stat-icon violet"><i class="fa-solid fa-screwdriver-wrench"></i></span>
                <div><p class="stat-label">Đang xử lý</p><h2 id="statProgress">0</h2></div>
            </article>
            <article class="stat-card">
                <span class="stat-icon green"><i class="fa-solid fa-circle-check"></i></span>
                <div><p class="stat-label">Hoàn thành</p><h2 id="statDone">0</h2></div>
            </article>
        </section>

        <section class="invoice-toolbar" aria-label="Bộ lọc đơn hàng">
            <label class="search-wrap" for="searchInput">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="searchInput" type="text" placeholder="Tìm theo mã đơn, dịch vụ...">
            </label>
            <div class="filter-wrap" role="tablist" aria-label="Lọc trạng thái đơn">
                <button class="filter-btn active" type="button" data-filter="all">Tất cả</button>
                <button class="filter-btn" type="button" data-filter="new">Mới tạo</button>
                <button class="filter-btn" type="button" data-filter="confirmed">Đã nhận</button>
                <button class="filter-btn" type="button" data-filter="doing">Đang làm</button>
                <button class="filter-btn" type="button" data-filter="done">Hoàn thành</button>
                <button class="filter-btn" type="button" data-filter="cancel">Đã hủy</button>
            </div>
        </section>

        <section class="invoice-content" aria-label="Danh sách đơn">
            <div class="desktop-table-wrap">
                <table class="invoice-table">
                    <thead><tr><th>Mã đơn</th><th>Dịch vụ</th><th>Ngày đặt</th><th>Trạng thái</th><th>Quản lý</th></tr></thead>
                    <tbody id="customerOrderBody"><tr><td colspan="5" class="table-loading">Đang tải dữ liệu...</td></tr></tbody>
                </table>
            </div>
            <div class="mobile-list" id="customerMobileList"></div>
            <div id="customerEmptyState" class="empty-state" hidden><i class="fa-regular fa-folder-open"></i><h4>Chưa có đơn phù hợp</h4></div>
        </section>
    </section>
</div>

<!-- Modals -->
<div id="orderDetailModal" class="order-detail-modal" hidden>
    <button class="order-detail-backdrop" type="button" data-action="close-detail"></button>
    <section class="order-detail-dialog" role="dialog" aria-modal="true">
        <header class="order-detail-head">
            <div><h3 id="orderDetailTitle">Chi tiết đơn đã đặt</h3><p id="orderDetailCode" class="order-detail-code"></p></div>
            <button class="detail-close-btn" type="button" data-action="close-detail">×</button>
        </header>
        <div id="orderDetailBody" class="order-detail-body"></div>
    </section>
</div>

<div id="costInputModal" class="order-detail-modal" hidden>
    <button class="order-detail-backdrop" type="button" data-action="close-cost"></button>
    <section class="order-detail-dialog" role="dialog" aria-modal="true" style="max-width: 400px; padding: 20px;">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h3 style="margin:0; font-size: 1.2rem; color: #111827;">Nhập chi phí thực tế</h3>
            <button type="button" style="background:none; border:none; font-size:1.5rem; cursor:pointer;" data-action="close-cost">&times;</button>
        </header>
        <div style="margin-bottom: 20px;">
            <p style="font-size: 0.9rem; color: #4b5563; margin-bottom: 10px;">Nhập số tiền thợ đã thu để hệ thống tính trợ giá 5%.</p>
            <input type="number" id="actualCostInput" placeholder="VD: 500000" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem;">
        </div>
        <div style="display:flex; justify-content:flex-end; gap: 10px;">
            <button type="button" data-action="close-cost" style="padding: 8px 16px; border-radius: 6px; background: #e5e7eb; border: none; cursor: pointer; font-weight: 500;">Hủy</button>
            <button type="button" id="submitCostBtn" style="padding: 8px 16px; border-radius: 6px; background: #10b981; color: #fff; border: none; font-weight: 600; cursor: pointer;">Xác nhận gửi</button>
        </div>
    </section>
</div>
