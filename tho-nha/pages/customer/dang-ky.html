<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Ký Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="brand-name">Thợ Nhà</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-user-plus"></i> Khách hàng</span>
        </div>
        <p class="auth-subtitle">Tạo tài khoản để đặt dịch vụ nhanh hơn</p>

        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="full_name" class="form-control" placeholder="Nhập tên">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="Nhập email">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" id="sodienthoai" class="form-control" placeholder="Nhập số điện thoại">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
                    <button class="btn toggle-pwd border" type="button" id="togglePwd">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>

            <div class="col-12">
                <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
                </div>
            </div>
        </div>

        <button class="btn-submit mt-3" id="registerBtn">
            <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a>
            <span class="divider">|</span>
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>
    </div>

    <script src="../../assets/js/shared/krud-helper.js"></script>
    <script src="../../assets/js/shared/app-helper.js"></script>
    <script>
        const btn = document.getElementById('registerBtn');
        const msg = document.getElementById('msg');

        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        async function register() {
            const data = {
                hovaten: document.getElementById('full_name').value.trim(),
                email: document.getElementById('email').value.trim(),
                sodienthoai: document.getElementById('sodienthoai').value.replace(/\s+/g, ''),
                matkhau: document.getElementById('password').value
            };

            if (!data.hovaten || !data.sodienthoai || !data.matkhau) {
                msg.innerHTML = '<span class="text-danger small">Vui lòng điền đủ các trường bắt buộc</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang tạo tài khoản...';

            try {
                // Tóm gọn Insert -> Tự động đăng nhập
                await ThoNhaApp.register('customer', data);
                await ThoNhaApp.login('customer', data.sodienthoai, data.matkhau);
                
                msg.innerHTML = '<span class="text-success small">Đăng ký thành công! Đang chuyển hướng...</span>';
                setTimeout(() => window.location.href = '../../index.html', 1000);
            } catch (err) {
                msg.innerHTML = '<span class="text-danger small">' + (err.message || 'Đăng ký thất bại') + '</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
            }
        }

        btn.addEventListener('click', register);
    </script>
    </script>
</body>
</html>
