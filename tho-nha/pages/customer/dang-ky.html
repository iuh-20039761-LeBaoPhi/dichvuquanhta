<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Ký Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="brand-name">Thợ Nhà</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-user-plus"></i> Khách hàng</span>
        </div>
        <p class="auth-subtitle">Tạo tài khoản để đặt dịch vụ nhanh hơn</p>

        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="full_name" class="form-control" placeholder="Nguyễn Văn A">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" id="sodienthoai" class="form-control" placeholder="0912 345 678">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
                    <button class="btn toggle-pwd border" type="button" id="togglePwd">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>

            <div class="col-12">
                <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
                </div>
            </div>
        </div>

        <button class="btn-submit mt-3" id="registerBtn">
            <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a>
            <span class="divider">|</span>
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const fill = document.getElementById('strengthFill');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            const colors = ['', '#e53e3e', '#ed8936', '#48bb78', '#11998e'];
            const widths = ['0%', '25%', '50%', '75%', '100%'];
            fill.style.width = widths[strength];
            fill.style.background = colors[strength] || 'transparent';
        });

        document.getElementById('registerBtn').addEventListener('click', register);

        function register() {
            const full_name        = document.getElementById('full_name').value.trim();
            const email            = document.getElementById('email').value.trim();
            const phone            = document.getElementById('sodienthoai').value.trim();
            const password         = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('msg');

            if (!full_name || !email || !phone || !password || !confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng điền đầy đủ thông tin</span>';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu phải có ít nhất 6 ký tự</span>';
                return;
            }
            if (password !== confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu xác nhận không khớp</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang tạo tài khoản...';
            msg.innerHTML = '';

            fetch('../../api/customer/auth/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name, email, phone, password })
            })
            .then(r => r.json())
            .then(res => {
                if (res.status === 'success') {
                    localStorage.setItem('customer_logged_in', 'true');
                    localStorage.setItem('customer_name', res.name);
                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng ký thành công! Đang chuyển hướng...</span>';
                    setTimeout(() => window.location.href = '../../index.html', 1000);
                } else {
                    msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (res.message || 'Đăng ký thất bại') + '</span>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
                }
            })
            .catch(() => {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-wifi me-1"></i>Không kết nối được server</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
            });
        }
    </script>
</body>
</html>
