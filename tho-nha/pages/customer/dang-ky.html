<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Ký Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="brand-name">Thợ Nhà</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-user-plus"></i> Khách hàng</span>
        </div>
        <p class="auth-subtitle">Tạo tài khoản để đặt dịch vụ nhanh hơn</p>

        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="full_name" class="form-control" placeholder="Nhập tên">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="Nhập email">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" id="sodienthoai" class="form-control" placeholder="Nhập số điện thoại">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
                    <button class="btn toggle-pwd border" type="button" id="togglePwd">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>

            <div class="col-12">
                <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
                </div>
            </div>
        </div>

        <button class="btn-submit mt-3" id="registerBtn">
            <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a>
            <span class="divider">|</span>
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>
    </div>

    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script>
        /**
         * ═══════════════════════════════════════════════════════════
         * ĐĂNG KÝ KHÁCH HÀNG — Luồng xử lý:
         * ═══════════════════════════════════════════════════════════
         *
         * 1. User nhập: họ tên, email, SĐT, mật khẩu, xác nhận MK
         * 2. JS validate: trường bắt buộc, SĐT hợp lệ, MK ≥ 6 ký tự, MK khớp
         * 3. Gọi krud('insert') → tạo bản ghi mới trong bảng KRUD
         * 4. Nếu thành công:
         *    a) Lưu profile vào localStorage → tự động đăng nhập
         *    b) Gọi PHP endpoint tạo session server-side
         * 5. Redirect về trang chủ
         *
         * Bảng KRUD:  "khachhang"
         * PHP session: api/customer/auth/login.php
         * ═══════════════════════════════════════════════════════════
         */

        // ── Toggle hiển thị mật khẩu ────────────────────────────
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        // ── Thanh đo độ mạnh mật khẩu ──────────────────────────
        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const fill = document.getElementById('strengthFill');
            let strength = 0;
            if (val.length >= 6) strength++;   // Đủ dài
            if (val.length >= 10) strength++;  // Rất dài
            if (/[A-Z]/.test(val)) strength++; // Có chữ hoa
            if (/[0-9]/.test(val)) strength++; // Có số
            const colors = ['', '#e53e3e', '#ed8936', '#48bb78', '#11998e'];
            const widths = ['0%', '25%', '50%', '75%', '100%'];
            fill.style.width = widths[strength];
            fill.style.background = colors[strength] || 'transparent';
        });

        /** @const {string} Tên bảng KRUD lưu tài khoản khách hàng */
        const BANG_DANG_KY_KHACH_HANG = 'khachhang';

        /** @const {string} URL endpoint PHP để tạo session server-side */
        const PHP_LOGIN_URL = '../../api/customer/auth/login.php';

        document.getElementById('registerBtn').addEventListener('click', register);

        /**
         * Trả về thời điểm hiện tại theo format SQL: "YYYY-MM-DD HH:mm:ss"
         * @returns {string}
         */
        function nowSql() {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        /**
         * Chuẩn hoá SĐT: bỏ khoảng trắng để validate.
         * @param {string} value
         * @returns {string}
         */
        function normalizePhone(value) {
            return String(value || '').replace(/\s+/g, '');
        }

        /**
         * Kiểm tra SĐT Việt Nam hợp lệ (bắt đầu 0 hoặc +84, 10 hoặc 12 số).
         * @param {string} phone
         * @returns {boolean}
         */
        function isValidPhone(phone) {
            return /^(0|\+84)[0-9]{9}$/.test(phone);
        }

        /**
         * Kiểm tra KRUD response có thành công không.
         * @param {*} res - Response từ krud()
         * @returns {boolean}
         */
        function isKrudSuccess(res) {
            return !!res && !res.error && res.success !== false;
        }

        /**
         * Gọi PHP endpoint để tạo session server-side (tự động đăng nhập sau đăng ký).
         * @param {Object} profile - { name, phone, address }
         */
        function syncPhpSession(profile) {
            fetch(PHP_LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profile),
            }).catch(() => {
                console.warn('[register] Không tạo được PHP session');
            });
        }

        /**
         * Hàm chính: xử lý đăng ký tài khoản khách hàng.
         *
         * Bước 1: Lấy giá trị form
         * Bước 2: Validate (trường bắt buộc, SĐT, mật khẩu)
         * Bước 3: Gọi krud('insert') tạo bản ghi mới
         * Bước 4: Lưu localStorage + PHP session (tự đăng nhập)
         * Bước 5: Redirect về trang chủ
         */
        function register() {
            // ── Bước 1: Lấy giá trị form ────────────────────────
            const full_name        = document.getElementById('full_name').value.trim();
            const email            = document.getElementById('email').value.trim();
            const phone            = normalizePhone(document.getElementById('sodienthoai').value);
            const password         = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('msg');

            // ── Bước 2: Validate ────────────────────────────────
            if (!full_name || !email || !phone || !password || !confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng điền đầy đủ thông tin</span>';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu phải có ít nhất 6 ký tự</span>';
                return;
            }
            if (password !== confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu xác nhận không khớp</span>';
                return;
            }
            if (!isValidPhone(phone)) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Số điện thoại không hợp lệ</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang tạo tài khoản...';
            msg.innerHTML = '';

            if (typeof krud !== 'function') {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Không tải được hàm KRUD</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
                return;
            }

            // ── Bước 3: Gọi KRUD insert ─────────────────────────
            const payload = {
                hovaten:      full_name,
                email:        email.toLowerCase(),
                sodienthoai:  phone,
                matkhau:      password,
                created_date: nowSql()
            };

            krud('insert', BANG_DANG_KY_KHACH_HANG, payload)
                .then((res) => {
                    console.log(res);
                    if (!isKrudSuccess(res)) {
                        throw new Error(res && (res.message || res.error) ? (res.message || res.error) : 'Đăng ký thất bại');
                    }

                    // ── Bước 4: Lưu localStorage + PHP session ──
                    localStorage.setItem('customer_logged_in', 'true');
                    localStorage.setItem('customer_name', full_name);
                    localStorage.setItem('thonha_customer_profile_v1', JSON.stringify({
                        name: full_name,
                        phone: phone,
                        address: ''
                    }));

                    // Tạo PHP session (fire-and-forget)
                    syncPhpSession({ name: full_name, phone, address: '' });

                    // ── Bước 5: Redirect ─────────────────────────
                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng ký thành công! Đang chuyển hướng...</span>';
                    setTimeout(() => window.location.href = '../../index.html', 1000);
                })
                .catch((err) => {
                    msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (err && err.message ? err.message : 'Không kết nối được server') + '</span>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
                });
        }
    </script>
</body>
</html>
