<div class="filter-section d-flex align-items-center gap-3 mb-4 flex-wrap">
    <button class="btn btn-sm btn-outline-secondary px-3 provider-filter-btn active" data-role="all">Tất cả tài khoản</button>
    <button class="btn btn-sm btn-outline-primary px-3 provider-filter-btn" data-role="provider">Nhà cung cấp</button>
    <button class="btn btn-sm btn-outline-info px-3 provider-filter-btn" data-role="customer">Khách hàng</button>
    <span class="vr mx-2"></span>
    <button class="btn btn-sm px-3 provider-filter-btn" data-status="active" style="background:#dcfce7;color:#15803d;border-color:#bbf7d0;">Đang hoạt động</button>
    <button class="btn btn-sm px-3 provider-filter-btn" data-status="blocked" style="background:#f1f5f9;color:#475569;border-color:#e2e8f0;">Đã khóa</button>
</div>

<div class="table-container">
    <div class="table-responsive">
        <table class="table table-hover" id="providersTable">
            <thead>
                <tr>
                    <th>Người dùng</th>
                    <th>Vai trò</th>
                    <th>Công ty / Đội thợ</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="providersBody">
                <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-success"></div></td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Provider Detail / Action Modal -->
<div class="modal fade" id="providerActionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="providerModalTitle">Chi tiết nhà cung cấp</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="providerModalBody"></div>
            <div class="modal-footer" id="providerModalFooter"></div>
        </div>
    </div>
</div>

<!-- Reason Modal -->
<div class="modal fade" id="reasonModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="reasonModalTitle">Nhập lý do</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="reasonAlert"></div>
                <label class="form-label fw-semibold">Lý do <span class="text-danger">*</span></label>
                <textarea class="form-control" id="reasonInput" rows="3" placeholder="Nhập lý do..."></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-danger fw-semibold" id="confirmReasonBtn">Xác nhận</button>
            </div>
        </div>
    </div>
</div>
