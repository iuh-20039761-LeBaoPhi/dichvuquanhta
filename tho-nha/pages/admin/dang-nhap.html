<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Nhập Quản Trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="login-brand-text">Thợ Nhà</span>
        </div>
        <p class="login-subtitle">Quản trị viên · Đăng nhập để tiếp tục</p>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" id="username" class="form-control"
                       placeholder="Nhập email" autocomplete="email">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control"
                       placeholder="Nhập mật khẩu" autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="auth-links" style="margin-top:12px;">
            Chưa có tài khoản? <a href="dang-ky.html">Đăng ký admin</a>
        </div>

        <div class="back-link">
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Quay về trang chủ</a>
        </div>
    </div>

    <script src="../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../public/asset/js/dvqt-app.js"></script>
    <script>
        // Check if already logged in (Server session)
        (async function checkAlreadyLoggedIn() {
            if (window.DVQTApp && window.DVQTApp.checkSession) {
                const data = await window.DVQTApp.checkSession();
                if (data && data.logged_in && data.role === 'admin') {
                    window.location.href = 'quan-tri.html';
                }
            }
        })();

        // UI Events
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('loginBtn').addEventListener('click', login);

        async function login() {
            const email    = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            if (!email || !password) {
                msg.innerHTML = '<span class="text-danger small"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng nhập đầy đủ thông tin</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';
            msg.innerHTML = '';

            try {
                // Sử dụng hàm đăng nhập dùng chung của DVQT cho role 'admin'
                await window.DVQTApp.login('admin', email, password, 'admin');

                msg.innerHTML = '<span class="text-success small"><i class="fas fa-check-circle me-1"></i>Đăng nhập thành công!</span>';
                setTimeout(() => window.location.href = 'quan-tri.html', 800);
            } catch (err) {
                msg.innerHTML = '<span class="text-danger small"><i class="fas fa-times-circle me-1"></i>' + (err.message || 'Đăng nhập thất bại') + '</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
            }
        }
    </script>
</body>
</html>
