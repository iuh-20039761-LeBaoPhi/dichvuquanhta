<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Nhập Quản Trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="login-brand-text">Thợ Nhà</span>
        </div>
        <p class="login-subtitle">Quản trị viên · Đăng nhập để tiếp tục</p>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" id="username" class="form-control"
                       placeholder="Nhập email" autocomplete="email">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control"
                       placeholder="Nhập mật khẩu" autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="auth-links" style="margin-top:12px;">
            Chưa có tài khoản? <a href="dang-ky.html">Đăng ký admin</a>
        </div>

        <div class="back-link">
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Quay về trang chủ</a>
        </div>
    </div>

    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script>
        /**
         * ═══════════════════════════════════════════════════════════
         * ĐĂNG NHẬP ADMIN — Luồng xử lý:
         * ═══════════════════════════════════════════════════════════
         *
         * 1. Admin nhập email + mật khẩu
         * 2. JS gọi krudList() → lấy danh sách admin từ bảng KRUD
         * 3. Tìm admin theo email → kiểm tra mật khẩu
         * 4. Nếu hợp lệ:
         *    a) Lưu vào localStorage (dùng nhanh cho UI)
         *    b) Gọi PHP endpoint tạo session server-side
         * 5. Chuyển hướng sang trang quản trị
         *
         * Bảng KRUD:  "admin"
         * PHP session: api/admin/auth/login.php
         * ═══════════════════════════════════════════════════════════
         */

        /** @const {string} Tên bảng KRUD chứa tài khoản admin */
        const BANG_DANG_NHAP_ADMIN = 'admin';

        /** @const {string} URL endpoint PHP để tạo session server-side */
        const PHP_LOGIN_URL = '../../api/admin/auth/login.php';

        // ── Sự kiện UI cơ bản ──────────────────────────────────
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('loginBtn').addEventListener('click', login);

        /**
         * Chuẩn hoá response từ KRUD API thành mảng rows.
         * @param {*} res - Response gốc từ krudList()
         * @returns {Array} Mảng các bản ghi admin
         */
        function normalizeRows(res) {
            if (Array.isArray(res)) return res;
            if (!res || typeof res !== 'object') return [];
            if (res.error) throw new Error(res.error);
            if (res.success === false) throw new Error(res.message || 'Không lấy được dữ liệu tài khoản admin');
            if (Array.isArray(res.data)) return res.data;
            if (Array.isArray(res.rows)) return res.rows;
            if (Array.isArray(res.items)) return res.items;
            return [];
        }

        /**
         * Hash SHA-256 phía client (Web Crypto API).
         * @param {string} text - Chuỗi cần hash
         * @returns {Promise<string>} Chuỗi hex SHA-256
         */
        async function sha256(text) {
            if (!(window.crypto && window.crypto.subtle && window.TextEncoder)) {
                return String(text || '');
            }
            const encoded = new TextEncoder().encode(String(text || ''));
            const buffer = await window.crypto.subtle.digest('SHA-256', encoded);
            return Array.from(new Uint8Array(buffer))
                .map((b) => b.toString(16).padStart(2, '0'))
                .join('');
        }

        /**
         * So khớp mật khẩu: hỗ trợ format "sha256$..." hoặc plaintext.
         * @param {string} inputPassword  - Mật khẩu user nhập
         * @param {string} storedPassword - Mật khẩu lưu trong DB
         * @returns {Promise<boolean>} true nếu khớp
         */
        async function matchPassword(inputPassword, storedPassword) {
            const stored = String(storedPassword || '');
            if (!stored) return false;
            if (stored.startsWith('sha256$')) {
                return stored === ('sha256$' + await sha256(inputPassword));
            }
            return stored === inputPassword;
        }

        /**
         * Gọi PHP endpoint để tạo session server-side.
         * Fire-and-forget: lỗi thì bỏ qua, localStorage vẫn hoạt động.
         * @param {Object} profile - { email, name }
         */
        function syncPhpSession(profile) {
            fetch(PHP_LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profile),
            }).catch(() => {
                console.warn('[login] Không tạo được PHP session, fallback localStorage');
            });
        }

        /**
         * Hàm chính: xử lý đăng nhập admin.
         *
         * Bước 1: Validate input
         * Bước 2: Gọi KRUD lấy danh sách admin → tìm theo email
         * Bước 3: Kiểm tra mật khẩu
         * Bước 4: Lưu localStorage + tạo PHP session
         * Bước 5: Redirect sang trang quản trị
         */
        async function login() {
            const email    = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            // ── Bước 1: Validate input ──────────────────────────
            if (!email || !password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng nhập đầy đủ thông tin</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
            msg.innerHTML = '';

            try {
                /**
                 * Bổ sung cơ chế gọi API linh hoạt
                 */
                async function fetchAdmins() {
                    if (typeof krudList === 'function') {
                        return await krudList({ table: BANG_DANG_NHAP_ADMIN });
                    }
                    // Fallback to fetch
                    const res = await fetch('https://api.dvqt.vn/list/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: BANG_DANG_NHAP_ADMIN })
                    });
                    return await res.json();
                }

                // ── Bước 2: Tìm admin theo email ───────────────
                const result = await fetchAdmins();
                const rows = normalizeRows(result);
                const account = rows.find((item) => String(item.email || '').trim().toLowerCase() === email);

                if (!account) {
                    throw new Error('Không tìm thấy tài khoản admin với email này');
                }

                // ── Bước 3: Kiểm tra mật khẩu ──────────────────
                const ok = await matchPassword(password, account.matkhau || account.mat_khau || account.password);
                if (!ok) {
                    throw new Error('Sai mật khẩu');
                }

                // ── Bước 4: Lưu localStorage + PHP session ─────
                const name = String(account.email || email);

                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_username', name);

                // Tạo PHP session phía server (fire-and-forget)
                syncPhpSession({ email, name });

                // ── Bước 5: Redirect ────────────────────────────
                msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng nhập thành công!</span>';
                setTimeout(() => window.location.href = 'quan-tri.html', 700);
            } catch (err) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (err && err.message ? err.message : 'Đăng nhập thất bại') + '</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
            }
        }
    </script>
</body>
</html>
