<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Quanh Ta - Thợ Nhà - Đăng Nhập Quản Trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(150deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .login-brand img {
            width: 48px; height: 48px; border-radius: 12px;
            object-fit: contain; background: #f0faf5; padding: 4px;
        }
        .login-brand-text {
            font-size: 1.6rem; font-weight: 800;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-subtitle {
            text-align: center; font-size: 0.88rem;
            color: #718096; margin-bottom: 32px;
        }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #4a5568; margin-bottom: 7px; }
        .input-group-text {
            background: #f0faf5; border-right: none;
            color: #11998e; border-color: #e2e8f0;
        }
        .input-icon .form-control { border-left: none; border-color: #e2e8f0; padding: 11px 14px; font-size: 0.95rem; }
        .input-icon .form-control:focus { border-color: #11998e; box-shadow: none; }
        .input-icon:focus-within .input-group-text,
        .input-icon:focus-within .toggle-pwd { border-color: #11998e; }
        .toggle-pwd {
            border-left: none; border-color: #e2e8f0;
            background: white; color: #a0aec0; cursor: pointer; transition: color 0.2s;
        }
        .toggle-pwd:hover, .toggle-pwd:focus { color: #11998e; box-shadow: none; }
        .btn-login {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white; border: none; padding: 13px; border-radius: 50px;
            font-weight: 700; font-size: 1rem; transition: all 0.3s;
            width: 100%; margin-top: 6px; cursor: pointer;
        }
        .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(17,153,142,0.45); color: white; }
        .btn-login:disabled { opacity: 0.8; }
        #msg { font-size: 0.88rem; min-height: 22px; text-align: center; margin-top: 12px; }
        .back-link { text-align: center; margin-top: 22px; font-size: 0.85rem; }
        .back-link a { color: #11998e; text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <img src="../../assets/images/tho-nha-logo-thuong-hieu-cropped.jpg" alt="Thợ Nhà">
            <span class="login-brand-text">Thợ Nhà</span>
        </div>
        <p class="login-subtitle">Quản trị viên · Đăng nhập để tiếp tục</p>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" id="username" class="form-control"
                       placeholder="Nhập email" autocomplete="email">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control"
                       placeholder="Nhập mật khẩu" autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="back-link">
            <a href="../../index.html"><i class="fas fa-arrow-left me-1"></i>Quay về trang chủ</a>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('loginBtn').addEventListener('click', login);

        function login() {
            const email    = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            if (!email || !password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng nhập đầy đủ thông tin</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
            msg.innerHTML = '';

            fetch('../../api/admin/auth/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(res => {
                if (res.status === 'success') {
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_username', res.username);
                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng nhập thành công!</span>';
                    setTimeout(() => window.location.href = 'quan-tri.html', 600);
                } else {
                    msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (res.message || 'Sai tên đăng nhập hoặc mật khẩu') + '</span>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
                }
            })
            .catch(() => {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-wifi me-1"></i>Không kết nối được server</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
            });
        }
    </script>
</body>
</html>
