<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API khachhang</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --line: #d9e2ec;
            --text: #102a43;
            --muted: #486581;
            --primary: #0b7285;
            --danger: #b42318;
            --ok: #027a48;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            margin: 6px 0;
            color: var(--muted);
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .row input {
            flex: 1;
            min-width: 260px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .row button {
            border: 0;
            background: var(--primary);
            color: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        .row button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status {
            font-size: 14px;
            margin-top: 10px;
        }

        .status.ok {
            color: var(--ok);
        }

        .status.err {
            color: var(--danger);
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
            background: #fff;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 10px;
            text-align: left;
            vertical-align: top;
            font-size: 13px;
        }

        th {
            background: #f8fafc;
            white-space: nowrap;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        pre {
            margin: 0;
            max-height: 260px;
            overflow: auto;
            background: #0b1f33;
            color: #d9e2ec;
            border-radius: 10px;
            padding: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Test API bang khachhang</h1>
            <p>Trang nay goi API dvqt de doc du lieu bang khachhang va hien thi nhanh de kiem tra.</p>
            <div class="row">
                <input id="tableName" type="text" value="khachhang" aria-label="Ten bang">
                <button id="loadBtn" type="button">Tai du lieu</button>
            </div>
            <div id="status" class="status"></div>
        </div>

        <div class="card">
            <div class="muted" id="summary">Chua co du lieu.</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ho va ten</th>
                            <th>Email</th>
                            <th>So dien thoai</th>
                            <th>Mat khau</th>
                            <th>Created date</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td colspan="6" class="muted">Nhan "Tai du lieu" de bat dau.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <p class="muted">Raw response:</p>
            <pre id="raw">{}</pre>
        </div>
    </div>

    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script>
        const btn = document.getElementById('loadBtn');
        const tableInput = document.getElementById('tableName');
        const statusEl = document.getElementById('status');
        const summaryEl = document.getElementById('summary');
        const tbody = document.getElementById('tbody');
        const raw = document.getElementById('raw');

        function setStatus(text, isError) {
            statusEl.textContent = text;
            statusEl.className = 'status ' + (isError ? 'err' : 'ok');
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeRows(res) {
            if (Array.isArray(res)) return res;
            if (!res || typeof res !== 'object') return [];
            if (res.error) throw new Error(res.error);
            if (res.success === false) throw new Error(res.message || 'API tra ve loi');
            if (Array.isArray(res.data)) return res.data;
            if (Array.isArray(res.rows)) return res.rows;
            if (Array.isArray(res.items)) return res.items;
            if (Array.isArray(res.result)) return res.result;
            return [];
        }

        function renderRows(rows) {
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="muted">Khong co du lieu trong bang.</td></tr>';
                return;
            }

            tbody.innerHTML = rows.map((r) => {
                return '' +
                    '<tr>' +
                        '<td>' + escapeHtml(r.id) + '</td>' +
                        '<td>' + escapeHtml(r.hovaten || r.ho_ten || r.name) + '</td>' +
                        '<td>' + escapeHtml(r.email) + '</td>' +
                        '<td>' + escapeHtml(r.sodienthoai || r.so_dien_thoai || r.phone) + '</td>' +
                        '<td>' + escapeHtml(r.matkhau || r.mat_khau || '') + '</td>' +
                        '<td>' + escapeHtml(r.created_date || r.ngay_tao || r.created_at) + '</td>' +
                    '</tr>';
            }).join('');
        }

        async function fetchRows(table) {
            if (typeof krudList === 'function') {
                return await krudList({ table: table });
            }

            const res = await fetch('https://api.dvqt.vn/list/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table: table })
            });
            return await res.json();
        }

        async function loadData() {
            const table = (tableInput.value || '').trim();
            if (!table) {
                setStatus('Vui long nhap ten bang.', true);
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Dang tai...';
            setStatus('Dang goi API...', false);

            try {
                const result = await fetchRows(table);
                raw.textContent = JSON.stringify(result, null, 2);
                const rows = normalizeRows(result);
                renderRows(rows);
                summaryEl.textContent = 'Tong so dong: ' + rows.length;
                setStatus('Tai du lieu thanh cong.', false);
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" class="muted">Khong tai duoc du lieu.</td></tr>';
                summaryEl.textContent = 'Khong co du lieu.';
                setStatus('Loi: ' + (err && err.message ? err.message : 'Khong xac dinh'), true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Tai du lieu';
            }
        }

        btn.addEventListener('click', loadData);
    </script>
</body>
</html>
