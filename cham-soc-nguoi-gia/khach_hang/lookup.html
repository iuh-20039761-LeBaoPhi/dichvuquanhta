<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Hóa Đơn - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-body-tertiary">
    <div class="modal fade" id="lookupModal" tabindex="-1" aria-labelledby="lookupModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
            <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
                <div class="modal-header border-0 bg-success-subtle px-3 px-md-4 py-3">
                    <div class="w-100 pe-2">
                        <h4 class="mb-1 fw-bold text-success-emphasis" id="lookupModalLabel">Tra Cứu Hóa Đơn</h4>
                        <p class="text-secondary small mb-0">Nhập số điện thoại để tra cứu thông tin hóa đơn</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-3 p-md-4 bg-success-subtle">
                    <div class="card border-0 shadow-sm rounded-4 mb-3">
                        <div class="card-body p-3 p-md-4">
                            <form id="lookupForm">
                                <div class="row g-3">
                                    <div class="col-md-8">
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-white border-end-0 text-success"><i class="bi bi-telephone-fill"></i></span>
                                            <input type="tel" class="form-control border-start-0" id="phone" placeholder="Nhập số điện thoại (VD: 0123456789)" required>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <button type="submit" class="btn btn-success btn-lg w-100 rounded-3 fw-semibold">
                                            <i class="bi bi-search me-1"></i>Tra cứu
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div id="resultContainer">
                        <div class="d-none d-md-block">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body p-2 p-md-3">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0 table-sm" style="font-size: 14px;">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Tên khách hàng</th>
                                                    <th>Gói dịch vụ</th>
                                                    <th>Ngày bắt đầu</th>
                                                    <th>Tổng tiền</th>
                                                    <th>Trạng thái</th>
                                                    <th>Tên nhân viên</th>
                                                    <th>Hành động</th>
                                                </tr>
                                            </thead>
                                            <tbody id="lookupInvoicesTable">
                                                <tr><td colspan="7" class="text-center text-muted py-4">Nhập số điện thoại để tra cứu hóa đơn</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-md-none">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body text-center text-muted py-4">
                                    Nhập số điện thoại để tra cứu hóa đơn
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-0 pt-0 px-3 px-md-4 pb-3 pb-md-4 bg-success-subtle justify-content-between">
                    <!-- <a href="dshoadon.html" class="text-success text-decoration-none fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i>Quay lại trang chủ
                    </a> -->
                    <button type="button" class="btn btn-outline-success rounded-pill px-4" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade lookup-detail-modal" id="lookupEmployeeDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable lookup-modal-dialog-employee">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-success-subtle border-0">
                    <h5 class="modal-title text-success-emphasis"><i class="bi bi-person-badge-fill me-2"></i>Thông Tin Nhân Viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body-tertiary" id="lookupEmployeeDetailContent"></div>
            </div>
        </div>
    </div>

    <div class="modal fade lookup-detail-modal" id="lookupInvoiceDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable lookup-modal-dialog-invoice">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-success-subtle border-0">
                    <h5 class="modal-title text-success-emphasis"><i class="bi bi-file-text-fill me-2"></i>Chi Tiết Hóa Đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body-tertiary" id="lookupInvoiceDetailContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/lookup-modal-core.js"></script>
</body>
</html>
