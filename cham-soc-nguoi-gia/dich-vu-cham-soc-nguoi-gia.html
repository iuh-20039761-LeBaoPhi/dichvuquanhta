    <script>
      $(document).ready(async function () {
        var SERVICES = [];
        var bookingModalEl = document.getElementById('bookingFlowModal');
        var bookingFrame = document.getElementById('bookingFlowFrame');
        var bookingModal = bookingModalEl ? new bootstrap.Modal(bookingModalEl) : null;
        var bookingSuccessModalEl = document.getElementById('bookingSuccessModal');
        var bookingSuccessTextEl = document.getElementById('bookingSuccessText');
        var bookingSuccessModal = bookingSuccessModalEl ? new bootstrap.Modal(bookingSuccessModalEl) : null;

        function buildBookingUrl(serviceId) {
          var params = new URLSearchParams();
          params.set('embedded', '1');
          if (serviceId !== undefined && serviceId !== null && serviceId !== '') {
            params.set('serviceId', String(serviceId));
          }
          return 'dat-lich.html?' + params.toString();
        }

        function openBookingModal(serviceId) {
          if (!bookingModal || !bookingFrame) return;
          bookingFrame.src = buildBookingUrl(serviceId);
          bookingModal.show();
        }

        function renderServiceCards(list) {
          $('#servicesContainer').empty();
          list.forEach(function (service, index) {
            var reverse = index % 2 ? 'flex-lg-row-reverse' : '';
            var serviceAlt = (service.alt || service.name || 'Dich vu cham soc me va be').replace(/"/g, '&quot;');
            var includesHTML = service.includes
              .map(function (item) {
                return '<li class="py-2" style="color:#555"><i class="fas fa-check me-2" style="color:#2e7d32"></i>' + item + '</li>';
              })
              .join('');

            $('#servicesContainer').append(
              '<div class="row align-items-center mb-5 g-5 ' +
                reverse +
                '">' +
                '<div class="col-lg-6">' +
                '<img src="' +
                service.image +
                '" alt="' +
                serviceAlt +
                '" class="img-fluid rounded-4 shadow-lg">' +
                '</div>' +
                '<div class="col-lg-6">' +
                '<h2 class="fw-bold display-6 mb-3" style="color:#2e7d32">' +
                service.name +
                '</h2>' +
                '<p class="text-secondary lh-lg mb-4">' +
                service.description +
                '</p>' +
                '<h4 class="fw-bold mb-3">Bao gồm</h4>' +
                '<ul class="list-unstyled mb-4">' +
                includesHTML +
                '</ul>' +
                '<button type="button" class="btn-book btn text-white rounded-pill px-4 py-2 shadow-sm fw-bold" style="background:#2e7d32;border:none" data-id="' +
                service.id +
                '">' +
                '<i class="fas fa-calendar-check me-1"></i>Đặt Lịch Ngay' +
                '</button>' +
                '</div>' +
                '</div>'
            );
          });
        }

        try {
          var response = await fetch('services.json');
          SERVICES = await response.json();
          renderServiceCards(SERVICES);
        } catch (error) {
          console.error('Lỗi load services.json:', error);
          alert('Không thể tải danh sách dịch vụ. Vui lòng thử lại sau.');
        }

        $(document).on('click', '.btn-book', function () {
          openBookingModal($(this).data('id'));
        });

        $('#openBookingFromCta').on('click', function () {
          var serviceId = SERVICES.length ? SERVICES[0].id : '';
          openBookingModal(serviceId);
        });

        if (bookingModalEl) {
          bookingModalEl.addEventListener('hidden.bs.modal', function () {
            if (bookingFrame) {
              bookingFrame.src = 'about:blank';
            }
          });
        }

        window.addEventListener('message', function (event) {
          if (!event || !event.data || !event.data.type) return;

          if (event.data.type === 'booking:success') {
            if (bookingSuccessTextEl) {
              bookingSuccessTextEl.textContent = event.data.message || 'Chúng tôi sẽ liên hệ với bạn sớm nhất.';
            }
            if (bookingSuccessModal) {
              bookingSuccessModal.show();
            }
            return;
          }

          if (event.data.type === 'booking:close' && bookingModal) {
            bookingModal.hide();
          }
        });
      });
    </script>
