<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <main class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-3 p-md-4 p-lg-5">
                        <h1 class="h3 fw-bold text-center mb-2">Đăng Ký Tài Khoản</h1>
                        <p class="text-secondary text-center mb-4">Vui lòng điền đầy đủ thông tin để tạo tài khoản.</p>

                        <form id="registerForm" novalidate>
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="full_name" class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                    <input type="text" id="full_name" class="form-control" required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                    <input type="email" id="email" class="form-control" required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="sodienthoai" class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                    <input type="tel" id="sodienthoai" class="form-control" required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="birth_date" class="form-label">Ngày tháng năm sinh <span class="text-danger">*</span></label>
                                    <input type="date" id="birth_date" class="form-control" required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="account_type" class="form-label">Loại tài khoản <span class="text-danger">*</span></label>
                                    <select id="account_type" class="form-select" required>
                                        <option value="khachhang" selected>Khách hàng</option>
                                        <option value="nhanvien">Nhân viên</option>
                                    </select>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="password" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                                    <input type="password" id="password" class="form-control" minlength="6" required>
                                </div>

                                <div class="col-12">
                                    <label for="address" class="form-label">Địa chỉ <span class="text-danger">*</span></label>
                                    <input type="text" id="address" class="form-control" required>
                                </div>

                                <div class="col-12">
                                    <label for="experience" class="form-label">Mô tả kinh nghiệm <span class="text-danger">*</span></label>
                                    <textarea id="experience" class="form-control" rows="3" required></textarea>
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="anh_dai_dien" class="form-label">Ảnh đại diện <span class="text-danger">*</span></label>
                                    <input type="file" id="anh_dai_dien" class="form-control" accept="image/*" required>
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="cccd_mat_truoc" class="form-label">Ảnh CCCD mặt trước <span class="text-danger">*</span></label>
                                    <input type="file" id="cccd_mat_truoc" class="form-control" accept="image/*" required>
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="cccd_mat_sau" class="form-label">Ảnh CCCD mặt sau <span class="text-danger">*</span></label>
                                    <input type="file" id="cccd_mat_sau" class="form-control" accept="image/*" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-4" id="registerBtn">
                                <i class="bi bi-person-plus me-2"></i>Tạo tài khoản
                            </button>
                        </form>

                        <div id="msg" class="mt-3"></div>

                        <div class="text-center mt-3">
                            <a href="login.html" class="link-primary text-decoration-none fw-semibold">Đã có tài khoản? Đăng nhập</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script>
        const BANG_DANG_KY_KHACH_HANG = 'khachhang';
        const BANG_DANG_KY_NHAN_VIEN = 'nhacungcap_nguoibenh';

        const form = document.getElementById('registerForm');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('registerBtn');

        // Hien thi thong bao trang thai cho nguoi dung.
        function showMsg(type, text) {
            msg.innerHTML = `<div class="alert alert-${type} py-2 mb-0">${text}</div>`;
        }

        // Tao chuoi thoi gian theo dinh dang SQL.
        function nowSql() {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        // Chuan hoa va kiem tra so dien thoai.
        function normalizePhone(value) {
            return String(value || '').replace(/\s+/g, '');
        }

        // Kiem tra ket qua tra ve tu KRUD.
        function isKrudSuccess(res) {
            return !!res && !res.error && res.success !== false;
        }

        // Upload 3 anh va nhan ve duong dan de luu vao DB.
        async function uploadImages(accountType, avatarFile, frontFile, backFile) {
            const formData = new FormData();
            formData.append('account_type', accountType);
            formData.append('anh_dai_dien', avatarFile);
            formData.append('cccd_mat_truoc', frontFile);
            formData.append('cccd_mat_sau', backFile);

            const response = await fetch('upload-register-images.php', {
                method: 'POST',
                body: formData,
            });

            const result = await response.json();
            if (!response.ok || !result.success || !result.data) {
                throw new Error(result && result.message ? result.message : 'Upload anh that bai.');
            }

            return result.data;
        }

        // Lay du lieu form, upload anh, goi KRUD insert vao bang tuong ung.
        async function registerHandler(event) {
            event.preventDefault();

            if (!form.checkValidity()) {
                form.reportValidity();
                showMsg('danger', 'Vui lòng điền đầy đủ tất cả thông tin bắt buộc.');
                return;
            }

            const fullName = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = normalizePhone(document.getElementById('sodienthoai').value);
            const birthDate = document.getElementById('birth_date').value;
            const accountType = document.getElementById('account_type').value;
            const password = document.getElementById('password').value;
            const address = document.getElementById('address').value.trim();
            const experience = document.getElementById('experience').value.trim();

            const avatarFile = document.getElementById('anh_dai_dien').files[0];
            const frontFile = document.getElementById('cccd_mat_truoc').files[0];
            const backFile = document.getElementById('cccd_mat_sau').files[0];

            if (!/^(0|\+84)[0-9]{9}$/.test(phone)) {
                showMsg('danger', 'Số điện thoại không hợp lệ.');
                return;
            }

            if (password.length < 6) {
                showMsg('danger', 'Mật khẩu phải có ít nhất 6 ký tự.');
                return;
            }

            if (!avatarFile || !frontFile || !backFile) {
                showMsg('danger', 'Vui lòng chọn đầy đủ 3 ảnh bắt buộc.');
                return;
            }

            if (typeof krud !== 'function') {
                showMsg('danger', 'Không tải được hàm KRUD từ API.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';
            msg.innerHTML = '';

            try {
                const imagePaths = await uploadImages(accountType, avatarFile, frontFile, backFile);

                const payload = {
                    hovaten: fullName,
                    email,
                    sodienthoai: phone,
                    matkhau: password,
                    diachi: address,
                    kinh_nghiem: experience,
                    ngaysinh: birthDate,
                    anh_dai_dien: imagePaths.anh_dai_dien,
                    cccd_mat_truoc: imagePaths.cccd_mat_truoc,
                    cccd_mat_sau: imagePaths.cccd_mat_sau,
                    created_date: nowSql(),
                };

                if (accountType === 'nhanvien') {
                    payload.trangthai = 'pending';
                }

                const table = accountType === 'nhanvien' ? BANG_DANG_KY_NHAN_VIEN : BANG_DANG_KY_KHACH_HANG;
                const insertResult = await krud('insert', table, payload);

                if (!isKrudSuccess(insertResult)) {
                    throw new Error(insertResult && (insertResult.message || insertResult.error)
                        ? (insertResult.message || insertResult.error)
                        : 'Đăng ký thất bại.');
                }

                showMsg('success', 'Đăng ký thành công, đang chuyển hướng sang đăng nhập...');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);
            } catch (error) {
                showMsg('danger', error && error.message ? error.message : 'Không thể kết nối server.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Tạo tài khoản';
            }
        }

        form.addEventListener('submit', registerHandler);
    </script>
</body>
</html>
