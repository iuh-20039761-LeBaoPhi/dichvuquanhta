<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Khách Hàng - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-danger-subtle">
    <div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 rounded-4 shadow bg-white">
                <div class="modal-header border-0 bg-danger-subtle px-3 py-3">
                    <h4 class="mb-0 text-danger-emphasis fw-semibold" id="profileModalLabel">Cập Nhật Hồ Sơ</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-3">
                            <p class="text-secondary small mb-3">Cập nhật thông tin cá nhân và hình ảnh hồ sơ của bạn.</p>

                            <div id="alertContainer"></div>

                            <form id="profileForm" enctype="multipart/form-data">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="name" name="name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                        <input type="tel" class="form-control" id="phone" name="phone" required>
                                    </div>
                                </div>

                                <div class="row g-3 mt-0">
                                    <div class="col-md-6">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" name="email">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="username" name="username" required>
                                    </div>
                                </div>

                                <div class="mt-3">
                                    <label class="form-label">Địa chỉ</label>
                                    <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                                </div>

                                <div class="mt-3">
                                    <label class="form-label">Mật khẩu mới (để trống nếu không đổi)</label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu mới nếu muốn thay đổi">
                                </div>

                                <div class="bg-danger-subtle rounded-3 p-3 mt-3 border border-danger-subtle">
                                    <h5 class="mb-3 text-danger-emphasis">Cập nhật ảnh</h5>
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Ảnh chân dung (Avatar)</label>
                                            <div id="currentAvatarContainer"></div>
                                            <input type="file" class="form-control" id="avatar" name="avatar" accept="image/*">
                                            <img id="avatarPreview" class="img-fluid rounded mt-2 d-none" style="max-width:200px; max-height:200px;">
                                            <small class="text-muted d-block mt-1">Chỉ upload nếu muốn thay đổi ảnh</small>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Ảnh CCCD</label>
                                            <div id="currentCccdContainer"></div>
                                            <input type="file" class="form-control" id="cccd_image" name="cccd_image" accept="image/*">
                                            <img id="cccdPreview" class="img-fluid rounded mt-2 d-none" style="max-width:200px; max-height:200px;">
                                            <small class="text-muted d-block mt-1">Chỉ upload nếu muốn thay đổi ảnh</small>
                                        </div>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-danger w-100 mt-3 py-2 rounded-3">
                                    <i class="bi bi-check-circle me-2"></i>Cập nhật thông tin
                                </button>
                            </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/profile-modal-core.js"></script>
</body>
</html>
