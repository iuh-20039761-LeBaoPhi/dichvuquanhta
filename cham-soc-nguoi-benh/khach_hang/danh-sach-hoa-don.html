<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách Hàng Dashboard - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .invoice-page .page-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px 12px 32px;
        }

        .invoice-page .page-card {
            border: 0;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(220, 53, 69, 0.08);
            overflow: hidden;
        }

        .invoice-page .page-header {
            background: #f8d7da;
            padding: 16px;
        }

        .invoice-page .table th,
        .invoice-page .table td {
            vertical-align: middle;
        }

        .invoice-page .mobile-invoice-card {
            border: 1px solid #f3d3d8;
            border-radius: 12px;
            background: #fff;
        }

        .invoice-page .mobile-invoice-card .label {
            color: #6c757d;
            min-width: 98px;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-danger-subtle">
    <div id="site-header"></div>

    <main class="invoice-page">
        <div class="page-shell">
            <div class="page-card bg-white">
                <div class="page-header d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
                    <h4 class="mb-0 text-danger-emphasis fw-semibold"><i class="bi bi-card-list me-2"></i>Danh Sách Hóa Đơn Đã Đặt</h4>
                    <a href="../dat-lich.html" class="btn btn-danger btn-sm"><i class="bi bi-calendar-plus me-2"></i>Đặt Lịch Dịch Vụ</a>
                </div>

                <div class="p-3">
                    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
                        <h5 class="mb-0">Hóa Đơn Của Tôi</h5>
                    </div>

                    <div class="card border-danger-subtle shadow-sm d-none d-md-block">
                        <div class="card-body p-2 p-md-3">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0" style="font-size: 14px;">
                                    <thead>
                                        <tr>
                                            <th>Dịch vụ</th>
                                            <th class="d-none d-md-table-cell">Ngày bắt đầu</th>
                                            <th>Trạng thái</th>
                                            <th class="d-none d-md-table-cell">Nhân viên</th>
                                            <th>Hành động</th>
                                        </tr>
                                    </thead>
                                    <tbody id="invoicesTable">
                                        <tr><td colspan="5" class="text-center">Đang tải...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="d-md-none" id="mobileInvoicesList">
                        <div class="text-center py-3">Đang tải...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="employeeDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-person-badge-fill me-2"></i>Thông Tin Nhân Viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="employeeDetailContent"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadMediaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-cloud-upload me-2"></i>Upload Hình Ảnh / Video</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadMediaForm">
                        <input type="hidden" id="uploadInvoiceId" name="hoa_don_id"> <div class="mb-3">
                            <label class="form-label">Chọn file (Hình ảnh hoặc Video)</label>
                            <input type="file" class="form-control" name="file" accept="image/*,video/*" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" name="mo_ta" rows="3" placeholder="Mô tả về hình ảnh/video..."></textarea> </div>
                        <button type="submit" class="btn btn-danger w-100">Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="invoiceDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-file-text-fill me-2"></i>Chi Tiết Hóa Đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="invoiceDetailContent"></div>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="../JS/shared-layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/user-nav-menu.js"></script>
    <script src="../JS/profile-modal-loader.js"></script>
    <script>
        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getStatusBadge(status) {
            var map = {
                cho_duyet: '<span class="badge text-bg-warning">Chờ duyệt</span>',
                da_duyet: '<span class="badge text-bg-info">Đã duyệt</span>',
                dang_thuc_hien: '<span class="badge text-bg-primary">Đang thực hiện</span>',
                hoan_thanh: '<span class="badge text-bg-success">Hoàn thành</span>',
                da_huy: '<span class="badge text-bg-danger">Đã hủy</span>'
            };
            return map[status] || '<span class="badge text-bg-secondary">' + escapeHtml(status || 'N/A') + '</span>';
        }

        function renderInvoices(invoices) {
            var table = document.getElementById('invoicesTable');
            var mobileList = document.getElementById('mobileInvoicesList');

            if (!Array.isArray(invoices) || invoices.length === 0) {
                table.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Bạn chưa có hóa đơn nào.</td></tr>';
                mobileList.innerHTML = '<div class="text-center text-muted py-3">Bạn chưa có hóa đơn nào.</div>';
                return;
            }

            table.innerHTML = invoices.map(function (invoice) {
                var service = invoice.goi_dich_vu || invoice.dich_vu || 'N/A';
                var employee = invoice.employee_name
                    ? escapeHtml(invoice.employee_name) + '<button class="btn btn-sm btn-outline-danger ms-2" onclick="viewEmployeeDetail(' + Number(invoice.nhan_vien_id || 0) + ', ' + Number(invoice.id) + ')"><i class="bi bi-eye"></i></button>'
                    : '<span class="text-muted">Chưa có</span>';

                return '' +
                    '<tr>' +
                    '  <td>' + escapeHtml(service) + '</td>' +
                    '  <td class="d-none d-md-table-cell">' + escapeHtml(invoice.ngay_bat_dau || 'N/A') + '</td>' +
                    '  <td>' + getStatusBadge(invoice.trang_thai) + '</td>' +
                    '  <td class="d-none d-md-table-cell">' + employee + '</td>' +
                    '  <td>' +
                    '    <div class="d-flex flex-wrap gap-2">' +
                    '      <button class="btn btn-sm btn-outline-primary" onclick="viewInvoiceDetail(' + Number(invoice.id) + ')"><i class="bi bi-file-text me-1"></i>Chi tiết</button>' +
                    '      <button class="btn btn-sm btn-outline-success" onclick="openUploadModal(' + Number(invoice.id) + ')"><i class="bi bi-cloud-upload me-1"></i>Upload</button>' +
                    '    </div>' +
                    '  </td>' +
                    '</tr>';
            }).join('');

            mobileList.innerHTML = invoices.map(function (invoice) {
                var service = invoice.goi_dich_vu || invoice.dich_vu || 'N/A';
                var employeeMobile = invoice.employee_name
                    ? escapeHtml(invoice.employee_name) + ' <button class="btn btn-sm btn-outline-danger ms-2" onclick="viewEmployeeDetail(' + Number(invoice.nhan_vien_id || 0) + ', ' + Number(invoice.id) + ')"><i class="bi bi-eye"></i></button>'
                    : 'Chưa có';

                return '' +
                    '<div class="mobile-invoice-card p-3 mb-2">' +
                    '  <div class="mb-2"><span class="label">Dịch vụ</span><span class="fw-semibold">' + escapeHtml(service) + '</span></div>' +
                    '  <div class="mb-2"><span class="label">Ngày bắt đầu</span><span>' + escapeHtml(invoice.ngay_bat_dau || 'N/A') + '</span></div>' +
                    '  <div class="mb-2"><span class="label">Trạng thái</span><span>' + getStatusBadge(invoice.trang_thai) + '</span></div>' +
                    '  <div class="mb-2"><span class="label">Nhân viên</span><span>' + employeeMobile + '</span></div>' +
                    '  <div class="d-flex flex-wrap gap-2 mt-3">' +
                    '    <button class="btn btn-sm btn-outline-primary" onclick="viewInvoiceDetail(' + Number(invoice.id) + ')"><i class="bi bi-file-text me-1"></i>Chi tiết</button>' +
                    '    <button class="btn btn-sm btn-outline-success" onclick="openUploadModal(' + Number(invoice.id) + ')"><i class="bi bi-cloud-upload me-1"></i>Upload</button>' +
                    '  </div>' +
                    '</div>';
            }).join('');
        }

        async function loadInvoices() {
            try {
                var response = await fetch('../api/get_invoices.php');
                var data = await response.json();

                if (!data.success) {
                    if (data.message === 'Unauthorized') {
                        window.location.href = '../login.html';
                        return;
                    }
                    renderInvoices([]);
                    return;
                }

                renderInvoices(data.invoices || []);
            } catch (error) {
                document.getElementById('invoicesTable').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Không thể tải dữ liệu. Vui lòng thử lại.</td></tr>';
                document.getElementById('mobileInvoicesList').innerHTML = '<div class="text-center text-danger py-3">Không thể tải dữ liệu. Vui lòng thử lại.</div>';
            }
        }

        function openUploadModal(invoiceId) {
            document.getElementById('uploadInvoiceId').value = Number(invoiceId);
            bootstrap.Modal.getOrCreateInstance(document.getElementById('uploadMediaModal')).show();
        }

        async function viewEmployeeDetail(employeeId, invoiceId) {
            if (!employeeId) {
                document.getElementById('employeeDetailContent').innerHTML = '<div class="alert alert-warning mb-0">Hóa đơn chưa có nhân viên phụ trách.</div>';
                bootstrap.Modal.getOrCreateInstance(document.getElementById('employeeDetailModal')).show();
                return;
            }

            var content = document.getElementById('employeeDetailContent');
            content.innerHTML = '<div class="text-center p-4"><div class="spinner-border text-danger" role="status"></div></div>';
            bootstrap.Modal.getOrCreateInstance(document.getElementById('employeeDetailModal')).show();

            try {
                var response = await fetch('../api/get_employee_detail.php?id=' + Number(employeeId) + '&hoa_don_id=' + Number(invoiceId));
                var data = await response.json();

                if (!data.success) {
                    content.innerHTML = '<div class="alert alert-warning mb-0">' + escapeHtml(data.message || 'Không thể tải thông tin nhân viên.') + '</div>';
                    return;
                }

                var emp = data.nhan_vien || {};
                var media = Array.isArray(data.media) ? data.media : [];
                content.innerHTML = '' +
                    '<div class="row g-3">' +
                    '  <div class="col-md-4 text-center">' +
                    '    <img src="../' + escapeHtml(emp.anh_dai_dien || 'assets/logomvb.png') + '" class="rounded-circle border" style="width:120px;height:120px;object-fit:cover;">' +
                    '    <h6 class="mt-2 mb-0">' + escapeHtml(emp.ten || 'N/A') + '</h6>' +
                    '  </div>' +
                    '  <div class="col-md-8">' +
                    '    <p class="mb-1"><strong>SĐT:</strong> ' + escapeHtml(emp.dien_thoai || 'N/A') + '</p>' +
                    '    <p class="mb-1"><strong>Email:</strong> ' + escapeHtml(emp.email || 'N/A') + '</p>' +
                    '    <p class="mb-1"><strong>Kinh nghiệm:</strong> ' + escapeHtml(emp.kinh_nghiem || 'N/A') + '</p>' +
                    '    <p class="mb-0"><strong>Đánh giá:</strong> ' + escapeHtml(emp.danh_gia || 'N/A') + '</p>' +
                    '  </div>' +
                    '</div>' +
                    '<hr>' +
                    '<h6 class="mb-2 text-danger-emphasis">Media của nhân viên</h6>' +
                    '<div class="row g-2">' +
                    (media.length > 0
                        ? media.map(function (m) {
                            var filePath = '../' + escapeHtml(m.duong_dan_file || '');
                            var isImage = String(m.loai_file || '').indexOf('hinh_anh') >= 0 || String(m.loai_file || '').indexOf('image') >= 0;
                            return '<div class="col-6 col-md-4">' +
                                (isImage
                                    ? '<img src="' + filePath + '" class="img-fluid rounded border" alt="media">'
                                    : '<video src="' + filePath + '" class="w-100 rounded border" controls></video>') +
                                '</div>';
                        }).join('')
                        : '<div class="text-muted">Chưa có media từ nhân viên cho hóa đơn này.</div>') +
                    '</div>';
            } catch (error) {
                content.innerHTML = '<div class="alert alert-danger mb-0">Không thể tải thông tin nhân viên. Vui lòng thử lại.</div>';
            }
        }

        async function viewInvoiceDetail(invoiceId) {
            var content = document.getElementById('invoiceDetailContent');
            content.innerHTML = '<div class="text-center p-4"><div class="spinner-border text-danger" role="status"></div></div>';
            bootstrap.Modal.getOrCreateInstance(document.getElementById('invoiceDetailModal')).show();

            try {
                var response = await fetch('../api/get_invoice_detail.php?hoa_don_id=' + Number(invoiceId));
                var data = await response.json();

                if (!data.success) {
                    content.innerHTML = '<div class="alert alert-warning mb-0">' + escapeHtml(data.message || 'Không thể tải chi tiết hóa đơn.') + '</div>';
                    return;
                }

                var invoice = data.invoice || {};
                var customer = data.khach_hang || null;
                var employee = data.nhan_vien || null;
                var media = Array.isArray(data.media) ? data.media : [];

                content.innerHTML = '' +
                    '<div class="row g-3 mb-3">' +
                    '  <div class="col-md-6">' +
                    '    <div class="card h-100 border-danger-subtle">' +
                    '      <div class="card-header bg-danger-subtle">Thông Tin Hóa Đơn</div>' +
                    '      <div class="card-body">' +
                    '        <p class="mb-1"><strong>Mã hóa đơn:</strong> #' + escapeHtml(invoice.id || '') + '</p>' +
                    '        <p class="mb-1"><strong>Dịch vụ:</strong> ' + escapeHtml(invoice.dich_vu || 'N/A') + '</p>' +
                    '        <p class="mb-1"><strong>Gói:</strong> ' + escapeHtml(invoice.goi_dich_vu || 'N/A') + '</p>' +
                    '        <p class="mb-1"><strong>Ngày bắt đầu:</strong> ' + escapeHtml(invoice.ngay_bat_dau || 'N/A') + '</p>' +
                    '        <p class="mb-1"><strong>Ngày kết thúc:</strong> ' + escapeHtml(invoice.ngay_ket_thuc || 'N/A') + '</p>' +
                    '        <p class="mb-0"><strong>Trạng thái:</strong> ' + getStatusBadge(invoice.trang_thai) + '</p>' +
                    '      </div>' +
                    '    </div>' +
                    '  </div>' +
                    '  <div class="col-md-6">' +
                    '    <div class="card h-100 border-danger-subtle">' +
                    '      <div class="card-header bg-danger-subtle">Thông Tin Liên Quan</div>' +
                    '      <div class="card-body">' +
                    '        <p class="mb-1"><strong>Tổng tiền:</strong> <span class="text-danger fw-semibold">' + Number(invoice.gia_tien || 0).toLocaleString('vi-VN') + ' VNĐ</span></p>' +
                    '        <p class="mb-1"><strong>Ghi chú:</strong> ' + escapeHtml(invoice.ghi_chu || 'Không có') + '</p>' +
                    '        <p class="mb-2"><strong>Yêu cầu thêm:</strong> ' + escapeHtml(invoice.yeu_cau_them || 'Không có') + '</p>' +
                    (customer ?
                        '        <p class="mb-1"><strong>Khách hàng:</strong> ' + escapeHtml(customer.ten || 'N/A') + '</p>' +
                        '        <p class="mb-1"><strong>SĐT KH:</strong> ' + escapeHtml(customer.dien_thoai || 'N/A') + '</p>'
                        : '') +
                    (employee ?
                        '        <p class="mb-1"><strong>Nhân viên:</strong> ' + escapeHtml(employee.ten || 'N/A') + '</p>' +
                        '        <p class="mb-0"><strong>SĐT NV:</strong> ' + escapeHtml(employee.dien_thoai || 'N/A') + '</p>'
                        : '<p class="mb-0 text-muted">Chưa có nhân viên phụ trách</p>') +
                    '      </div>' +
                    '    </div>' +
                    '  </div>' +
                    '</div>' +
                    '<div class="card border-danger-subtle">' +
                    '  <div class="card-header bg-danger-subtle">Hình Ảnh / Video</div>' +
                    '  <div class="card-body">' +
                    '    <div class="row g-2">' +
                    (media.length > 0
                        ? media.map(function (m) {
                            var mediaPath = '../' + escapeHtml(m.duong_dan_file || '');
                            var mediaType = String(m.loai_file || '');
                            var isImage = mediaType.indexOf('hinh_anh') >= 0 || mediaType.indexOf('image') >= 0;
                            return '<div class="col-6 col-md-4">' +
                                (isImage
                                    ? '<img src="' + mediaPath + '" class="img-fluid rounded border" alt="media">'
                                    : '<video src="' + mediaPath + '" controls class="w-100 rounded border"></video>') +
                                '<div class="small text-muted mt-1">' + escapeHtml(m.uploader_name || 'N/A') + '</div>' +
                                '</div>';
                        }).join('')
                        : '<div class="text-muted">Chưa có dữ liệu media cho hóa đơn này.</div>') +
                    '    </div>' +
                    '  </div>' +
                    '</div>';
            } catch (error) {
                content.innerHTML = '<div class="alert alert-danger mb-0">Không thể tải chi tiết hóa đơn. Vui lòng thử lại.</div>';
            }
        }

        document.getElementById('uploadMediaForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var formData = new FormData(e.target);
            try {
                var response = await fetch('../api/upload_media.php', {
                    method: 'POST',
                    body: formData
                });
                var data = await response.json();
                alert(data.message || 'Đã xử lý yêu cầu');

                if (data.success) {
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('uploadMediaModal')).hide();
                    e.target.reset();
                    loadInvoices();
                }
            } catch (error) {
                alert('Không thể upload lúc này. Vui lòng thử lại.');
            }
        });

        loadInvoices();
    </script>
</body>
</html>
