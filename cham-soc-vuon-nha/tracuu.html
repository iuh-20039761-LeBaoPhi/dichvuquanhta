<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ quanh ta | Chăm Sóc Vườn Nhà</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
     <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <style>
        :root {
            --primary: #12372a; /* Deep Emerald */
            --primary-light: #1a4d3b;
            --accent: #ad8b73; /* Earthy Gold */
            --bg: #f8f9f4;
            --white: #ffffff;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --shadow: 0 20px 40px rgba(0,0,0,0.04);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 60px 20px;
            color: var(--text-dark);
            background-image: url("https://www.transparenttextures.com/patterns/pinstriped-suit.png");
            line-height: 1.6;
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* BACK HOME LINK */
        .back-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            transition: var(--transition);
        }
        .back-link i { margin-right: 8px; font-size: 14px; }
        .back-link:hover { color: var(--primary); transform: translateX(-5px); }

        .page-header { text-align: center; margin-bottom: 50px; }
        .page-header h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 42px; 
            color: var(--primary); 
            margin: 0;
            font-weight: 700;
        }
        .page-header::after {
            content: '';
            display: block;
            width: 50px;
            height: 2px;
            background: var(--accent);
            margin: 20px auto 0;
        }

        /* SEARCH SECTION REFINED */
        .search-section {
            background: var(--white);
            padding: 10px;
            border-radius: 50px; /* Bo tròn hoàn toàn dạng pill */
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 50px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .search-group {
            position: relative;
            flex-grow: 1;
        }

        .search-group i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 18px;
        }

        .search-group input {
            width: 100%;
            padding: 18px 20px 18px 60px;
            border: none;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 400;
            color: var(--text-dark);
            outline: none;
        }

        .btn-search {
            padding: 15px 35px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(18, 55, 42, 0.2);
        }

        .btn-search:hover { 
            background: var(--accent); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(173, 139, 115, 0.3);
        }

        /* RESULT CARD REFINED */
        .booking-card {
            background: var(--white);
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.02);
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-body { padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        
        .info-item { margin-bottom: 10px; }
        .info-label { 
            font-size: 10px; 
            color: var(--accent); 
            font-weight: 700; 
            text-transform: uppercase; 
            display: block; 
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .info-value { 
            font-size: 15px; 
            font-weight: 600; 
            color: var(--text-dark); 
        }
        
        .full-width { 
            grid-column: span 2; 
            padding-top: 15px;
            border-top: 1px solid #f0f0f0; 
        }

        .price-tag {
            background: #fcfcfc;
            padding: 25px 40px;
            border-top: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label { font-size: 12px; font-weight: 700; color: var(--text-light); letter-spacing: 1px; }
        .total-amount { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 28px; 
            font-weight: 700; 
            color: var(--primary); 
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px;
            background: var(--white);
            border-radius: 15px;
            color: var(--text-light);
            font-style: italic;
            box-shadow: var(--shadow);
        }

        @media (max-width: 600px) {
            body { padding: 40px 15px; }
            .search-section { border-radius: 15px; flex-direction: column; padding: 10px; }
            .btn-search { width: 100%; padding: 18px; border-radius: 10px; }
            .card-body { padding: 25px; grid-template-columns: 1fr; }
            .price-tag { padding: 20px 25px; }
            .page-header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="page-header">
        <a href="trangchu.html" class="back-link">
            <i class="fa-solid fa-house"></i> Quay lại trang chủ
        </a>
        <h1>Tra Cứu Lịch Đã Đặt</h1>
    </header>

    <div class="search-section">
        <div class="search-group">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Nhập số điện thoại để tra cứu đơn hàng...">
        </div>
        <button class="btn-search" onclick="searchBooking()">TRA CỨU NGAY</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    // GIỮ NGUYÊN TOÀN BỘ LOGIC CỦA BẠN
    function searchBooking() {
        const keyword = document.getElementById('searchInput').value.trim();
        const resultsArea = document.getElementById('resultsArea');
        const bookings = JSON.parse(localStorage.getItem('myBookings')) || [];

        if (!keyword) {
            alert("Vui lòng nhập số điện thoại!");
            return;
        }

        const filtered = bookings.filter(item => item.phone.includes(keyword));

        if (filtered.length === 0) {
            resultsArea.innerHTML = '<div class="empty-state">Không tìm thấy thông tin lịch hẹn nào khớp với số điện thoại này.</div>';
            return;
        }

        resultsArea.innerHTML = filtered.reverse().map(item => `
            <div class="booking-card">
                <div class="card-body">
                    <div class="info-item">
                        <span class="info-label">Mã đơn hàng</span>
                        <div class="info-value" style="color:var(--accent)">#${item.id}</div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Thời điểm đặt</span>
                        <div class="info-value">${item.timestamp}</div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Khách hàng</span>
                        <div class="info-value">${item.name}</div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Số điện thoại</span>
                        <div class="info-value">${item.phone}</div>
                    </div>
                    <div class="info-item full-width">
                        <span class="info-label">Dịch vụ đã chọn</span>
                        <div class="info-value" style="color:var(--primary)">${item.services}</div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Diện tích</span>
                        <div class="info-value">${item.area} m²</div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Lịch hẹn</span>
                        <div class="info-value">${item.appointment}</div>
                    </div>
                    <div class="info-item full-width">
                        <span class="info-label">Địa chỉ</span>
                        <div class="info-value">${item.address}</div>
                    </div>
                </div>
                <div class="price-tag">
                    <span class="total-label">TỔNG GIÁ TRỊ</span>
                    <span class="total-amount">${item.total}</span>
                </div>
            </div>
        `).join('');
    }

    // Thêm tính năng nhấn Enter để tìm kiếm
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            searchBooking();
        }
    });
</script>
</body>
</html>
