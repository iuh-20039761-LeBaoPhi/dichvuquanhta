<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ quanh ta | Chăm Sóc Vườn Nhà</title>
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1a11;
            --text-gold: #c5a059;
            --text-light: #e0eadd;
            --primary: #2d5a27;
            --glass: rgba(255, 255, 255, 0.03);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text-light); 
            font-family: var(--font-sans); 
            overflow: hidden; /* Chỉ cuộn phần bên phải */
        }

        /* ===== LAYOUT CHÍNH ===== */
        .nd-split-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* CỘT TRÁI: VISUAL (Cố định) */
        .nd-visual-side {
            flex: 1.2;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 60px;
        }
        .nd-visual-side img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; filter: brightness(0.6);
            transition: transform 10s ease-out;
        }
        .nd-visual-side:hover img { transform: scale(1.1); }
        
        .nd-visual-content { position: relative; z-index: 2; border-left: 2px solid var(--text-gold); padding-left: 30px; }
        .nd-visual-cat { font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-gold); margin-bottom: 10px; display: block; }
        .nd-visual-title { font-family: var(--font-serif); font-size: 4rem; font-style: italic; line-height: 1.1; }

        /* CỘT PHẢI: CONTENT (Cuộn) */
        .nd-content-side {
            flex: 1;
            background: #152518;
            overflow-y: auto;
            padding: 80px 60px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .nd-content-side::-webkit-scrollbar { width: 4px; }
        .nd-content-side::-webkit-scrollbar-thumb { background: var(--text-gold); }

        .nd-meta-info { display: flex; gap: 30px; margin-bottom: 40px; font-size: 0.7rem; color: #7a8c7c; text-transform: uppercase; letter-spacing: 1px; }

        .nd-article-body { font-size: 1.1rem; line-height: 1.9; font-weight: 300; color: #c9d6c8; }
        .nd-article-body h3 { font-family: var(--font-serif); font-size: 2.2rem; color: var(--text-gold); margin: 40px 0 20px; font-style: italic; }
        .nd-article-body p { margin-bottom: 25px; }

        /* KEYWORDS - STYLE LẠ */
        .nd-keyword-section { margin-top: 60px; }
        .nd-keyword-label { font-size: 0.7rem; color: var(--text-gold); margin-bottom: 20px; display: block; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 10px; }
        .nd-keyword-cloud { display: flex; flex-wrap: wrap; gap: 10px; }
        .nd-tag {
            border: 1px solid rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 0px; 
            font-size: 0.8rem; color: #fff; text-decoration: none; transition: 0.4s;
        }
        .nd-tag:hover { background: var(--text-gold); color: #000; border-color: var(--text-gold); }

        /* RELATED - HORIZONTAL CARD */
        .nd-related-row { margin-top: 80px; }
        .related-item {
            display: flex; gap: 20px; margin-bottom: 30px; text-decoration: none; color: inherit;
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 4px; transition: 0.3s;
        }
        .related-item:hover { background: rgba(255,255,255,0.05); transform: translateX(10px); }
        .related-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 2px; }
        .related-item h4 { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 8px; }

        /* FLOATING MENU */
        .nd-menu-btn {
            position: fixed; top: 40px; right: 40px; z-index: 100;
            background: var(--text-gold); color: #000; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; text-decoration: none;
        }

        /* MOBILE */
        @media (max-width: 900px) {
            body { overflow-y: auto; }
            .nd-split-container { flex-direction: column; height: auto; }
            .nd-visual-side { height: 60vh; padding: 30px; }
            .nd-visual-title { font-size: 2.5rem; }
            .nd-content-side { height: auto; padding: 40px 20px; }
        }
    </style>
</head>
<body>

<a href="tintuc.html" class="nd-menu-btn" title="Về danh sách">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
</a>

<div class="nd-split-container" id="app">
    <div class="nd-visual-side" id="visual-part">
        </div>

    <div class="nd-content-side">
        <div class="nd-meta-info" id="meta-part">
            </div>

        <div class="nd-article-body" id="body-part">
            </div>

        <div class="nd-keyword-section">
            <span class="nd-keyword-label">Dòng thời gian & Từ khóa chủ đề</span>
            <div class="nd-keyword-cloud" id="tag-part">
                </div>
        </div>

        <div class="nd-related-row">
            <h3 style="font-family: var(--font-serif); color: var(--text-gold); margin-bottom: 30px;">Bài viết liên quan</h3>
            <div id="related-part">
                </div>
        </div>

        <div style="margin-top: 60px; border: 1px solid var(--text-gold); padding: 30px; text-align: center;">
            <p style="font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px;">LIÊN HỆ CHUYÊN GIA</p>
            <h2 style="font-family: var(--font-serif); font-size: 2rem; margin-bottom: 20px;">0901 234 567</h2>
            <a href="tel:0901234567" style="background: var(--text-gold); color: #000; padding: 12px 30px; text-decoration: none; font-weight: 600; font-size: 0.8rem;">TƯ VẤN NGAY</a>
        </div>
    </div>
</div>

<script>
    const slug = new URLSearchParams(location.search).get("slug");

    fetch("tintuc.json?v=" + Date.now())
    .then(r => r.json())
    .then(data => {
        const news = data.news || [];
        const post = news.find(n => n.slug === slug) || news[0];

        // SEO
        document.title = post.title + " | Editorial";

        // Render Cột Trái (Visual)
        document.getElementById("visual-part").innerHTML = `
            <img src="assets/images/${post.image}" alt="${post.title}">
            <div class="nd-visual-content">
                <span class="nd-visual-cat">${post.category}</span>
                <h1 class="nd-visual-title">${post.title}</h1>
            </div>
        `;

        // Render Meta
        document.getElementById("meta-part").innerHTML = `
            <span>Xuất bản: ${post.date}</span>
            <span>Tương tác: ${post.views}</span>
            <span>Chủ đề: ${post.category}</span>
        `;

        // Render Content
        const contentLines = post.content.split("\n").map(line => {
            if(line.startsWith("##")) return `<h3>${line.replace("##","").trim()}</h3>`;
            if(line.trim() !== "") return `<p>${line}</p>`;
            return "";
        }).join("");
        document.getElementById("body-part").innerHTML = contentLines;

        // Render Keywords (Từ khóa)
        const tags = [post.category, "Làm vườn", "Cảnh quan", "Thiên nhiên", "Nghệ thuật"];
        document.getElementById("tag-part").innerHTML = tags.map(t => `<a href="#" class="nd-tag">#${t}</a>`).join("");

        // Render Related (Bài viết khác)
        document.getElementById("related-part").innerHTML = news
            .filter(n => n.slug !== post.slug)
            .slice(0, 3)
            .map(n => `
                <a href="?slug=${n.slug}" class="related-item">
                    <img src="assets/images/${n.image}">
                    <div>
                        <h4>${n.title}</h4>
                        <span style="font-size: 0.7rem; color: var(--text-gold);">ĐỌC TIẾP &rarr;</span>
                    </div>
                </a>
            `).join("");
    });
</script>
</body>
</html>
