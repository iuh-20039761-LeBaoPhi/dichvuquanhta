<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lịch Dịch Vụ | Keri Garden Service</title>
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #12372a;    /* Deep Forest Green */
            --accent: #ad8b73;     /* Muted Gold/Wood */
            --bg: #fbf9f1;         /* Off-white Silk */
            --white: #ffffff;
            --text-dark: #2d2d2d;
            --text-light: #717171;
            --border: #e8e2d6;
            --shadow-premium: 0 20px 50px rgba(18, 55, 42, 0.1);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0; line-height: 1.6;
            background-image: url("https://www.transparenttextures.com/patterns/pinstriped-suit.png");
        }

        .main-wrapper { padding: 40px 15px; }

        .container {
            max-width: 1000px; margin: 0 auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-premium);
            overflow: hidden;
            display: flex; flex-direction: column;
            border: 1px solid var(--border);
        }

        /* Top Header Section */
        .form-header {
            background: var(--primary);
            padding: 40px; color: var(--white);
            text-align: center;
            background-image: linear-gradient(rgba(18,55,42,0.85), rgba(18,55,42,0.95)), 
                              url('https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?q=80&w=2000');
            background-size: cover; background-position: center;
        }

        .header-brand {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 15px;
        }

        .header-brand img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); padding: 2px; background: #fff; }

        .form-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px; margin: 0; color: var(--accent); letter-spacing: 1px;
        }

        /* Form Content Layout */
        .form-content { padding: 50px 60px; }

        .section-title {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 30px; margin-top: 10px;
        }

        .section-title span {
            font-size: 12px; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 3px;
        }

        .section-title .line { flex: 1; height: 1px; background: var(--border); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        .full-width { grid-column: span 2; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; }

        input, textarea, select {
            padding: 14px 15px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 14px; font-family: inherit;
            transition: var(--transition);
            background: #fff;
        }

        input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(173, 139, 115, 0.1); }

        /* Helper Buttons for Location & Photos */
        .helper-btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-helper {
            flex: 1; padding: 12px; border: 1.2px solid var(--border); border-radius: 6px;
            background: #fff; color: var(--primary); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-helper:hover { border-color: var(--accent); color: var(--accent); background: #fdfcf9; }
        
        .upload-area {
            margin-top: 15px; border: 1.5px dashed var(--accent); border-radius: 8px;
            padding: 20px; text-align: center; background: #fdfcf9; cursor: pointer;
            transition: var(--transition);
        }
        .upload-area:hover { background: #f8f4ed; }

        /* Custom Service Select */
        .custom-select-wrapper { position: relative; }
        #serviceDisplay { cursor: pointer; background: #fff; padding-right: 40px; }
        .custom-select-wrapper::after {
            content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: var(--accent); pointer-events: none;
        }

        #serviceDropdown {
            display: none; position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background: #fff; z-index: 100; border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); border: 1px solid var(--border);
            max-height: 250px; overflow-y: auto; padding: 10px;
        }

        #serviceDropdown label {
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            cursor: pointer; border-radius: 5px; text-transform: none;
            color: var(--text-dark); font-size: 14px; font-weight: 500;
        }

        #serviceDropdown label:hover { background: var(--bg); color: var(--accent); }

        /* Price Box Premium */
        .price-summary {
            background: #f8f6f0; border-radius: 12px; padding: 30px;
            margin-top: 20px; border: 1px solid var(--border);
        }

        .price-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: var(--text-light); }
        
        .price-total {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; padding-top: 20px; border-top: 1.5px dashed var(--border);
        }

        .price-total .label { font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
        .price-total .value { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; color: var(--primary); }

        /* Buttons */
        .action-area { display: flex; gap: 20px; margin-top: 40px; }
        
        .btn-submit {
            flex: 2; padding: 20px; border: none; border-radius: 8px;
            background: var(--primary); color: white;
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: var(--transition);
        }

        .btn-submit:hover:not(:disabled) { background: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(173, 139, 115, 0.3); }
        .btn-submit:disabled { background: #d1d1d1; cursor: not-allowed; }

        .btn-back {
            flex: 1; padding: 20px; background: transparent; border: 1.5px solid var(--border);
            border-radius: 8px; font-weight: 600; text-transform: uppercase;
            cursor: pointer; transition: var(--transition);
        }

        /* Modal Redesign */
        #confirmModal {
            display: none; position: fixed; inset: 0; background: rgba(18, 55, 42, 0.85);
            backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }

        .modal-card {
            background: white; width: 100%; max-width: 500px; border-radius: 15px;
            overflow: hidden; animation: slideUp 0.5s ease;
        }

        .modal-header { background: var(--primary); color: var(--accent); padding: 30px; text-align: center; }
        .modal-body { padding: 30px; }

        .info-row { margin-bottom: 18px; display: flex; flex-direction: column; gap: 4px; }
        .info-row label { color: var(--accent); font-size: 10px; margin: 0; }
        .info-row div { font-weight: 600; font-size: 14px; color: var(--primary); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .form-content { padding: 30px 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="form-header">
            <div class="header-brand">
                <img src="assets/images/logo2.jpg" alt="Keri Logo">
                <div style="text-align: left;">
                    <small style="text-transform: uppercase; letter-spacing: 3px; font-weight: 600; opacity: 0.8;">Premium Service</small>
                    <h2>Đặt Lịch Chăm Sóc</h2>
                </div>
            </div>
        </div>

        <div class="form-content">
            <div class="section-title">
                <span>01. Thông tin liên hệ</span>
                <div class="line"></div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Họ và tên khách hàng *</label>
                    <input type="text" id="name" placeholder="Nhập tên của bạn">
                </div>
                <div class="form-group">
                    <label>Số điện thoại *</label>
                    <input type="tel" id="phone" placeholder="090x xxx xxx">
                </div>
                <div class="form-group full-width">
                    <label>Địa chỉ Email *</label>
                    <input type="email" id="email" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="section-title">
                <span>02. Chi tiết yêu cầu</span>
                <div class="line"></div>
            </div>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Dịch vụ mong muốn</label>
                    <div class="custom-select-wrapper">
                        <input type="text" id="serviceDisplay" readonly placeholder="-- Chọn một hoặc nhiều dịch vụ --">
                        <div id="serviceDropdown"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Diện tích sân vườn (m²)</label>
                    <input type="number" id="area" placeholder="Ví dụ: 50">
                </div>
                <div class="form-group">
                    <label>Ngày làm việc dự kiến</label>
                    <input type="date" id="date">
                </div>
                <div class="form-group">
                    <label>Giờ hẹn</label>
                    <input type="time" id="time">
                </div>
                <div class="form-group full-width">
                    <label>Địa chỉ thi công</label>
                    <textarea id="address" rows="2" placeholder="Số nhà, tên đường..."></textarea>
                    
                    <div class="helper-btn-group">
                        <button type="button" class="btn-helper" onclick="getLocation()">
                            <i class="fa-solid fa-location-crosshairs"></i> Vị trí hiện tại
                        </button>
                        <button type="button" class="btn-helper" onclick="window.open('https://maps.google.com', '_blank')">
                            <i class="fa-solid fa-map-location-dot"></i> Bản đồ
                        </button>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Hình ảnh/Video hiện trạng vườn</label>
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 24px; color: var(--accent); margin-bottom: 10px;"></i>
                        <p style="margin: 0; font-size: 13px; font-weight: 600; color: var(--primary);">Bấm để chụp ảnh hoặc tải lên tài liệu</p>
                        <small style="color: var(--text-light);">Hỗ trợ: JPG, PNG, MP4</small>
                    </div>
                    <input type="file" id="fileInput" hidden accept="image/*,video/*" onchange="handleFile(this)">
                    <div id="filePreview" style="margin-top: 10px; font-size: 12px; color: var(--accent); font-weight: 600; display: none;"></div>
                </div>
            </div>

            <div class="price-summary">
                <div class="price-item">
                    <span>Phí dịch vụ cơ bản:</span>
                    <span id="price">0 VNĐ</span>
                </div>
                <div class="price-item">
                    <span>VAT & Phí quản lý (10%):</span>
                    <span id="commission">0 VNĐ</span>
                </div>
                <div class="price-total">
                    <span class="label">Tổng chi phí dự kiến</span>
                    <span class="value" id="total">0 VNĐ</span>
                </div>
            </div>

            <div class="action-area">
                <button type="button" class="btn-submit" id="submitBtn" onclick="openConfirmModal()" disabled>Tiến hành đặt lịch</button>
                <button type="button" class="btn-back" onclick="goHome()">Quay lại</button>
            </div>
        </div>
    </div>
</div>

<div id="confirmModal">
    <div class="modal-card">
        <div class="modal-header">
            <i class="fa-solid fa-leaf" style="font-size: 24px; margin-bottom: 10px;"></i>
            <h3 style="margin: 0; font-family: 'Cormorant Garamond', serif; font-size: 24px;">Xác Nhận Thông Tin</h3>
        </div>
        <div class="modal-body">
            <div id="modalData"></div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button onclick="confirmBooking()" id="finalConfirmBtn" style="flex: 2; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer;">XÁC NHẬN ĐẶT</button>
                <button onclick="closeModal()" style="flex: 1; padding: 15px; background: #f0f0f0; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">HỦY</button>
            </div>
        </div>
    </div>
</div>

<div id="footer-container"></div>

<script>
    // 1. Tải linh kiện (GIỮ NGUYÊN)
    const loadComp = (id, file, callback) => {
        fetch(file).then(res => res.text()).then(data => {
            document.getElementById(id).innerHTML = data;
            if(callback) callback();
        });
    };

    document.addEventListener("DOMContentLoaded", function() {
        const serviceDisplay = document.getElementById('serviceDisplay');
        const serviceDropdown = document.getElementById('serviceDropdown');
        const areaInput = document.getElementById('area');
        const submitBtn = document.getElementById('submitBtn');
        let selectedServices = [];

        // Tải dịch vụ
        fetch('dichvu.json').then(res => res.json()).then(data => {
            const services = data.services || data;
            services.forEach(s => {
                const item = document.createElement('label');
                item.innerHTML = `<input type="checkbox" value="${s.id}"> ${s.name}`;
                item.querySelector('input').onchange = (e) => {
                    if(e.target.checked) selectedServices.push(s);
                    else selectedServices = selectedServices.filter(x => x.id !== s.id);
                    serviceDisplay.value = selectedServices.map(x => x.name).join(', ');
                    calculatePrice();
                    validate();
                };
                serviceDropdown.appendChild(item);
            });
        });

        serviceDisplay.onclick = (e) => {
            e.stopPropagation();
            serviceDropdown.style.display = serviceDropdown.style.display === 'block' ? 'none' : 'block';
        };

        document.addEventListener('click', () => serviceDropdown.style.display = 'none');

        // Hàm lấy vị trí GPS
        window.getLocation = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('address').value = `Tọa độ: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                    validate();
                }, () => alert("Vui lòng cho phép truy cập vị trí."));
            }
        };

        // Hàm xử lý file
        window.handleFile = (input) => {
            if(input.files[0]) {
                const prev = document.getElementById('filePreview');
                prev.style.display = 'block';
                prev.innerText = "📎 Đính kèm: " + input.files[0].name;
            }
        };

        window.calculatePrice = () => {
            const area = parseFloat(areaInput.value) || 0;
            let basePrice = selectedServices.reduce((sum, s) => sum + (s.price_m2_min * area), 0);
            document.getElementById('price').innerText = basePrice.toLocaleString() + ' VNĐ';
            document.getElementById('commission').innerText = (basePrice * 0.1).toLocaleString() + ' VNĐ';
            document.getElementById('total').innerText = (basePrice * 1.1).toLocaleString() + ' VNĐ';
        };

        window.validate = () => {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const addr = document.getElementById('address').value.trim();
            submitBtn.disabled = !(name && phone && addr && selectedServices.length > 0);
        };

        document.querySelectorAll('input, textarea').forEach(el => el.oninput = validate);
        areaInput.oninput = () => { calculatePrice(); validate(); };

        window.openConfirmModal = () => {
            document.getElementById('modalData').innerHTML = `
                <div class="info-row"><label>Khách hàng</label><div>${document.getElementById('name').value}</div></div>
                <div class="info-row"><label>Dịch vụ</label><div>${serviceDisplay.value}</div></div>
                <div class="info-row"><label>Tổng tiền</label><div style="font-size:20px; color:var(--primary)">${document.getElementById('total').innerText}</div></div>
            `;
            document.getElementById('confirmModal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('confirmModal').style.display = 'none';

        window.confirmBooking = () => {
            const orderData = {
                id: "CS-" + Date.now().toString().slice(-5),
                customer: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                service: serviceDisplay.value,
                total: document.getElementById('total').innerText,
                status: "Chờ xử lý",
                dateCreated: new Date().toLocaleString()
            };
            let all = JSON.parse(localStorage.getItem('allOrders')) || [];
            all.unshift(orderData);
            localStorage.setItem('allOrders', JSON.stringify(all));
            alert("Đặt lịch thành công!");
            window.location.href = 'lichsu.html';
        };

        window.goHome = () => window.location.href = 'trangchu.html';

        loadComp("header-container", "header.html");
        loadComp("footer-container", "footer.html");
    });
</script>

</body>
</html>
