<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tin tức làm vườn | Chăm Sóc Vườn Nhà</title>

<meta name="description" content="Tin tức làm vườn, kỹ thuật chăm sóc cây và cải tạo khu vườn xanh.">

<link rel="icon" href="assets/images/logo.jpg">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7f6;
color:#333;
margin-top:90px;
}

/* HERO */

.hero{

height:360px;
background:url("assets/images/vesinhvacaitao.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;

}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.hero-content{
position:relative;
}

.hero h1{
font-size:46px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

/* CONTAINER */

.container{
max-width:1300px;
margin:auto;
padding:50px 20px;
}

/* SEARCH */

.search-box{

max-width:600px;
margin:0 auto 50px;
display:flex;
background:white;
border-radius:40px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);

}

.search-box input{

flex:1;
padding:14px 18px;
border:none;
font-size:15px;
outline:none;

}

.search-box button{

padding:14px 28px;
border:none;
background:#1f6f43;
color:white;
cursor:pointer;
font-weight:600;

}

/* LAYOUT */

.blog-container{

display:grid;
grid-template-columns:3fr 1fr;
gap:45px;

}

/* POSTS GRID */

.posts{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;

}

/* POST CARD */

.post{

background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;

}

.post:hover{
transform:translateY(-6px);
}

.post img{

width:100%;
height:210px;
object-fit:cover;

}

.post-content{
padding:20px;
}

.post h3{
font-size:20px;
margin-bottom:10px;
}

.post h3 a{
text-decoration:none;
color:#1f6f43;
}

.meta{

font-size:13px;
color:#888;
margin-bottom:10px;

}

.desc{

font-size:14px;
color:#555;
line-height:1.6;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;

}

/* TAGS */

.tags{
margin-top:12px;
}

.tag{

display:inline-block;
background:#e8f5ef;
color:#1f6f43;
padding:5px 12px;
border-radius:20px;
font-size:12px;
margin:3px;

}

/* SIDEBAR */

.sidebar{

display:flex;
flex-direction:column;
gap:25px;

}

.side-card{

background:white;
padding:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);

}

.side-card h3{
margin-bottom:15px;
color:#1f6f43;
}

/* LATEST */

.latest-post{

display:flex;
gap:12px;
margin-bottom:15px;

}

.latest-post img{

width:75px;
height:60px;
object-fit:cover;
border-radius:6px;

}

.latest-post a{

text-decoration:none;
font-size:14px;
color:#333;
font-weight:600;

}

.latest-post span{

font-size:12px;
color:#888;

}

/* PAGINATION */

.pagination{

margin-top:40px;
text-align:center;

}

.pagination button{

width:40px;
height:40px;
margin:5px;
border:none;
background:#eee;
border-radius:8px;
cursor:pointer;

}

.pagination .active{
background:#1f6f43;
color:white;
}

/* MOBILE */

@media(max-width:900px){

.blog-container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="header"></div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>Tin Tức Làm Vườn</h1>

<p>Chia sẻ kinh nghiệm chăm sóc cây và cải tạo khu vườn</p>

</div>

</section>

<div class="container">

<!-- SEARCH -->

<div class="search-box">

<input type="text" id="search" placeholder="Tìm kiếm bài viết...">

<button onclick="searchPost()">Tìm</button>

</div>

<section class="blog-container">

<div>

<div class="posts" id="posts"></div>

<div class="pagination" id="pagination"></div>

</div>

<aside class="sidebar">

<div class="side-card">

<h3>Bài viết mới</h3>

<div id="latest"></div>

</div>

</aside>

</section>

</div>

<div id="footer"></div>

<script>

/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>document.getElementById("header").innerHTML=data)

/* LOAD FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>document.getElementById("footer").innerHTML=data)

let news=[]
let filtered=[]
let postsPerPage=6
let currentPage=1

fetch("news.json")
.then(res=>res.json())
.then(data=>{

news=data.news
filtered=[...news]

render()

})

/* RENDER POSTS */

function render(){

let start=(currentPage-1)*postsPerPage
let end=start+postsPerPage
let pagePosts=filtered.slice(start,end)

let container=document.getElementById("posts")

container.innerHTML=""

pagePosts.forEach(post=>{

let tags=[post.category,"làm vườn","chăm sóc cây"]

container.innerHTML+=`

<article class="post">

<img src="assets/images/${post.image}">

<div class="post-content">

<h3>
<a href="news_detail.html?slug=${post.slug}">
${post.title}
</a>
</h3>

<div class="meta">

📅 ${new Date(post.date).toLocaleDateString('vi-VN')}
 • ⏱ ${post.readingTime} phút
 • 👁 ${post.views}

</div>

<p class="desc">
${post.content.substring(0,120)}...
</p>

<div class="tags">
${tags.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>

</div>

</article>

`

})

renderPagination()
renderLatest()

}

/* PAGINATION */

function renderPagination(){

let total=Math.ceil(filtered.length/postsPerPage)

let p=document.getElementById("pagination")

p.innerHTML=""

for(let i=1;i<=total;i++){

p.innerHTML+=`<button class="${i==currentPage?'active':''}" onclick="go(${i})">${i}</button>`

}

}

function go(page){

currentPage=page
window.scrollTo({top:0,behavior:"smooth"})
render()

}

/* SEARCH */

function searchPost(){

let keyword=document.getElementById("search").value.toLowerCase()

filtered=news.filter(n=>

n.title.toLowerCase().includes(keyword) ||

n.category.toLowerCase().includes(keyword)

)

currentPage=1
render()

}

/* LATEST POSTS */

function renderLatest(){

let latest=news.slice(0,5)

let box=document.getElementById("latest")

box.innerHTML=""

latest.forEach(p=>{

box.innerHTML+=`

<div class="latest-post">

<img src="assets/images/${p.image}">

<div>

<a href="news_detail.html?slug=${p.slug}">
${p.title}
</a>

<br>

<span>⏱ ${p.readingTime} phút</span>

</div>

</div>

`

})

}

</script>

</body>
</html>
