<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đơn hàng | Keri Admin Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <style>
        :root {
            --primary: #116954;
            --primary-soft: #e8f3f0;
            --accent: #c5a059;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text-main: #1a1c1e;
            --text-sub: #636e72;
            --border: #edf2f7;
            --radius-lg: 24px;
            --radius-md: 12px;
            --shadow: 0 10px 40px rgba(0,0,0,0.04);
        }

        /* --- CẤU TRÚC CHUNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Mulish', sans-serif; background: var(--bg); color: var(--text-main); display: flex; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 280px; height: 100vh; background: var(--primary); 
            color: white; padding: 40px 24px; position: fixed; 
        }
        
        .sidebar h2 { 
            font-family: 'Lora', serif; font-size: 24px; margin-bottom: 48px; 
            text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;
        }

        .nav-link { 
            display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.6); 
            text-decoration: none; padding: 16px 20px; border-radius: var(--radius-md); 
            transition: 0.3s; margin-bottom: 8px; font-weight: 500;
        }
        .nav-link.active { background: rgba(255,255,255,0.12); color: white; }
        .nav-link:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: 280px; flex: 1; padding: 48px; }
        
        .header-box { 
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 40px; 
        }
        .header-box h1 { font-family: 'Lora', serif; color: var(--primary); font-size: 32px; }
        .header-box p { color: var(--text-sub); margin-top: 5px; }

        .btn-report {
            background: var(--primary); color: white; padding: 12px 24px; border-radius: 10px;
            border: none; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-report:hover { background: #0a4d3d; transform: translateY(-2px); }

        /* --- ĐƠN HÀNG GRID --- */
        .orders-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 24px; 
        }

        .booking-card {
            background: var(--white); border-radius: var(--radius-lg); overflow: hidden;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            transition: 0.3s; position: relative;
        }
        .booking-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }

        .card-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; background: #fafbfc;
        }
        .card-header .order-id { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }

        .status-badge { 
            font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 50px; text-transform: uppercase;
        }

        .card-body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-item.full { grid-column: span 2; }
        
        .info-label { font-size: 10px; font-weight: 700; color: #b2bec3; text-transform: uppercase; }
        .info-value { font-size: 14px; font-weight: 600; color: var(--text-main); }

        .price-row {
            padding: 20px 24px; background: var(--primary-soft);
            display: flex; justify-content: space-between; align-items: center;
        }
        .price-row .label { font-size: 12px; font-weight: 700; color: var(--primary); }
        .price-row .amount { font-size: 20px; font-weight: 700; color: var(--primary); font-family: 'Lora', serif; }

        .card-actions { padding: 16px 24px; display: flex; gap: 10px; background: white; align-items: center;}
        .btn-btn { 
            flex: 1; padding: 10px; border-radius: 8px; border: none; 
            font-weight: 700; font-size: 11px; cursor: pointer; transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-del { background: #fff5f5; color: #e03131; }
        .btn-del:hover { background: #e03131; color: white; }
        .btn-done { background: var(--primary); color: white; }

        /* MODAL STYLE */
        #supplierModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background:white; padding:32px; border-radius:24px; width:450px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from {transform: translateY(20px); opacity:0;} to {transform: translateY(0); opacity:1;} }
        
        .sup-item {
            padding:14px; border:1px solid var(--border); margin-bottom:10px; 
            border-radius:12px; cursor:pointer; transition:0.2s; display:flex; justify-content:space-between; align-items:center;
        }
        .sup-item:hover { background: var(--primary-soft); border-color: var(--primary); }

        .logout-link { color: #ff7675 !important; border: 1px solid rgba(255,118,117,0.3); margin-top: auto; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Chăm Sóc Vườn Nhà Admin</h2>
        <nav style="display: flex; flex-direction: column; height: calc(100% - 100px);">
            <a href="index_admin.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Tổng quan</a>
            <a href="admin_orders.html" class="nav-link active"><i class="fa-solid fa-receipt"></i> Quản lý đơn hàng</a>
            <a href="admin_suppliers.html" class="nav-link"><i class="fa-solid fa-users"></i> Nhà cung cấp</a>
            <a href="javascript:void(0)" onclick="handleLogout()" class="nav-link logout-link">
                <i class="fa-solid fa-power-off"></i> Đăng xuất
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header-box">
            <div>
                <h1>Quản lý Đơn hàng</h1>
                <p id="stats-text">Đang cập nhật dữ liệu...</p>
            </div>
            <button class="btn-report" onclick="window.print()">
                <i class="fa-solid fa-download"></i> Xuất báo cáo
            </button>
        </div>

        <div class="orders-grid" id="ordersContainer"></div>
    </main>

    <div id="supplierModal">
        <div class="modal-content">
            <h3 style="font-family:'Lora', serif; margin-bottom:20px; color:var(--primary)">Chọn đối tác thực hiện</h3>
            <div id="supplierOptions" style="max-height:350px; overflow-y:auto;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border:none; background:#f1f3f5; border-radius:10px; font-weight:700; cursor:pointer;">ĐÓNG</button>
        </div>
    </div>

<script>
    let currentOrderId = null;

    function renderOrders() {
        const ordersContainer = document.getElementById('ordersContainer');
        const statsText = document.getElementById('stats-text');
        
        let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
        // Lọc bỏ đơn rác nhưng vẫn giữ đơn có SĐT (theo ảnh Sheets của Lộc)
        allOrders = allOrders.filter(order => order.id && (order.phone || order.name));

        statsText.innerText = `Hiện có ${allOrders.length} đơn hàng trên hệ thống`;

        if (allOrders.length === 0) {
            ordersContainer.innerHTML = '<div class="empty-state">Hiện chưa có đơn hàng nào hợp lệ.</div>';
            return;
        }

        ordersContainer.innerHTML = [...allOrders].reverse().map((order) => {
            // KHỚP DỮ LIỆU: Ưu tiên các trường có khả năng từ Google Sheets đổ về
            const displayCustomer = order.name || order.fullName || order.customerName || "Khách chưa nhập tên";
            const displayService = order.services || order.service || "Dịch vụ vườn";
            const displayAddress = order.address || order.diaChi || "Liên hệ trực tiếp";
            
            // Theo ảnh Sheets của Lộc, ngày đặt nằm ở cột timestamp
            const orderDate = order.timestamp || order.time || "N/A";
            
            const isDone = order.status === "Hoàn thành";
            let displayStatus = order.status || "Chờ xử lý";
            let statusColor = "#d4a017"; 

            if (order.assignedSupplier) {
                if (!isDone) displayStatus = "Đã xác nhận";
                statusColor = isDone ? "#7b1fa2" : "#2e7d32";
            }

            return `
                <div class="booking-card" style="${isDone ? 'border-left: 5px solid #7b1fa2' : ''}">
                    <div class="card-header">
                        <span class="order-id">MÃ ĐƠN: #${order.id}</span>
                        <span class="status-badge" style="background: ${statusColor}20; color: ${statusColor}">
                            ${displayStatus}
                        </span>
                    </div>
                    
                    <div class="card-body">
                        <div class="info-item">
                            <span class="info-label">Khách hàng</span>
                            <div class="info-value"><b>${displayCustomer}</b></div>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Số điện thoại</span>
                            <div class="info-value">${order.phone || 'N/A'}</div>
                        </div>
                        <div class="info-item full">
                            <span class="info-label">Dịch vụ</span>
                            <div class="info-value" style="color: var(--primary)">${displayService}</div>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Lịch hẹn làm</span>
                            <div class="info-value">${order.appointment || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Ngày khách đặt</span>
                            <div class="info-value" style="color: var(--text-sub)">${orderDate}</div>
                        </div>
                        <div class="info-item full">
                            <span class="info-label">Địa chỉ</span>
                            <div class="info-value">${displayAddress}</div>
                        </div>
                        
                        <div class="info-item full" style="background: #fdfaf3; padding: 12px; border-radius: 8px; border: 1px dashed ${order.assignedSupplier ? '#2e7d32' : '#d4a017'};">
                            <span class="info-label" style="color: var(--accent)">Nhà cung cấp phụ trách</span>
                            <div class="info-value">
                                <i class="fa-solid fa-user-check"></i> ${order.assignedSupplier || "Chưa phân thợ"}
                            </div>
                        </div>
                    </div>

                    <div class="price-row">
                        <span class="label">TỔNG GIÁ TRỊ</span>
                        <span class="amount">${order.total || '0 VNĐ'}</span>
                    </div>

                    <div class="card-actions">
                        ${isDone ? 
                            `<p style="color:#7b1fa2; font-weight:700; font-size:11px; width:100%; text-align:center;">
                                <i class="fa-solid fa-lock"></i> ĐƠN ĐÃ HOÀN THÀNH - KHÔNG THỂ CHỈNH SỬA
                            </p>` : 
                            `
                            <button class="btn-btn btn-del" onclick="deleteOrder('${order.id}')">Xóa</button>
                            <button class="btn-btn" style="background: var(--accent); color: white;" onclick="openModal('${order.id}')">
                                Phân Thợ
                            </button>
                            <button class="btn-btn btn-done" onclick="markDone('${order.id}')">Hoàn thành</button>
                            `
                        }
                    </div>
                </div>
            `;
        }).join('');
    }

    // --- LOGIC MODAL ---
    function openModal(orderId) {
        currentOrderId = orderId;
        const listNCC = JSON.parse(localStorage.getItem('suppliers')) || [];
        const optionsContainer = document.getElementById('supplierOptions');

        if (listNCC.length === 0) {
            alert("Vui lòng thêm Nhà cung cấp trước!");
            return;
        }

        optionsContainer.innerHTML = listNCC.map((sup, index) => `
            <div class="sup-item" onclick="confirmSelect('${sup.name}')">
                <div>
                    <strong>${sup.name}</strong><br>
                    <small style="color:#666">${sup.service}</small>
                </div>
                <i class="fa-solid fa-chevron-right" style="color:var(--accent)"></i>
            </div>
        `).join('');

        document.getElementById('supplierModal').style.display = 'flex';
    }

    function confirmSelect(supplierName) {
        let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
        const idx = allOrders.findIndex(o => o.id === currentOrderId);

        if (idx !== -1) {
            allOrders[idx].assignedSupplier = supplierName;
            allOrders[idx].status = "Đã xác nhận";
            localStorage.setItem('allOrders', JSON.stringify(allOrders));
            closeModal();
            renderOrders();
        }
    }

    function closeModal() {
        document.getElementById('supplierModal').style.display = 'none';
        currentOrderId = null;
    }

    // --- CÁC HÀM KHÁC ---
    function deleteOrder(id) {
        if(confirm("Xác nhận xóa đơn hàng này?")) {
            let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
            localStorage.setItem('allOrders', JSON.stringify(allOrders.filter(o => o.id !== id)));
            renderOrders();
        }
    }

    function markDone(id) {
        let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
        const idx = allOrders.findIndex(o => o.id === id);
        if(idx !== -1) {
            if (!allOrders[idx].assignedSupplier) return alert("Vui lòng phân thợ trước khi hoàn thành!");
            if(confirm("Khi bấm Hoàn thành, bạn sẽ không thể đổi thợ nữa. Đồng ý?")) {
                allOrders[idx].status = "Hoàn thành";
                localStorage.setItem('allOrders', JSON.stringify(allOrders));
                renderOrders();
            }
        }
    }

    function handleLogout() {
        if(confirm("Bạn có chắc chắn muốn đăng xuất khỏi hệ thống quản trị?")) {
            localStorage.removeItem('userRole');
            localStorage.removeItem('currentUser');
            window.location.href = 'trangchu.html';
        }
    }

    window.onload = renderOrders;
</script>
</body>
</html>
