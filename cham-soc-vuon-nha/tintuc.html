<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ quanh ta | Chăm Sóc Vườn Nhà</title>
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone: #242724;
            --leaf: #1b5e20;
            --clay: #d4a373;
            --mist: #f8f9fa;
            --glass-border: rgba(255, 255, 255, 0.15);
            --ease: cubic-bezier(0.2, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #fff; 
            color: var(--stone);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== SUPREME HEADER ===== */
        .header-section {
            position: relative;
            padding: 160px 5% 100px;
            background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
            text-align: center;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .header-section h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            color: #fff;
            line-height: 0.9;
            margin-bottom: 20px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* ===== FLOATING CONTROL PANEL ===== */
        .control-panel {
            position: sticky; top: 80px; /* Đặt sau Header cố định */
            z-index: 100;
            max-width: 900px; margin: -50px auto 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 10px; border-radius: 100px;
            display: flex; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .category-scroll {
            display: flex; gap: 10px; overflow-x: auto;
            scrollbar-width: none; padding: 0 10px;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-btn {
            white-space: nowrap; padding: 12px 24px;
            border-radius: 50px; cursor: pointer; border: none;
            background: transparent; font-weight: 600; font-size: 0.85rem;
            transition: var(--ease); color: var(--stone);
        }
        .cat-btn.active { background: var(--leaf); color: #fff; }

        .search-trigger {
            margin-left: auto; background: var(--mist);
            border: none; width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s;
        }
        .search-trigger:hover { background: #e0e0e0; }

        /* ===== THE ART GRID (MOSAIC) ===== */
        .mosaic-grid {
            max-width: 1400px; margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 250px;
            gap: 20px; padding: 0 5% 100px;
        }

        .art-card {
            position: relative; border-radius: 24px; overflow: hidden;
            background: var(--mist); transition: var(--ease);
            display: flex; flex-direction: column;
            text-decoration: none; color: inherit;
        }

        .art-card:nth-child(6n+1) { grid-column: span 2; grid-row: span 2; }
        .art-card:nth-child(6n+2) { grid-column: span 2; grid-row: span 1; }
        .art-card:nth-child(6n+3) { grid-column: span 1; grid-row: span 1; }
        .art-card:nth-child(6n+4) { grid-column: span 1; grid-row: span 2; }
        .art-card:nth-child(6n+5) { grid-column: span 2; grid-row: span 1; }

        .art-img {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; transition: transform 0.8s var(--ease);
        }

        .art-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.85));
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 30px; color: #fff;
            z-index: 2;
        }

        .art-card:hover .art-img { transform: scale(1.1); }
        .art-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.15); }

        .art-cat {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; color: var(--clay); margin-bottom: 10px;
        }
        .art-title {
            font-family: 'Fraunces', serif; font-size: 1.5rem;
            line-height: 1.2; margin-bottom: 10px;
            font-style: italic;
        }

        /* ===== PAGINATION ===== */
        .pagin-wrap { display: flex; justify-content: center; gap: 15px; margin-bottom: 80px; }
        .pagin-btn {
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1);
            background: #fff; cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .pagin-btn:hover { border-color: var(--leaf); color: var(--leaf); }
        .pagin-btn.active { background: var(--leaf); color: #fff; border-color: var(--leaf); }

        /* ===== SEARCH OVERLAY ===== */
        #search-modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98);
            z-index: 100003; display: none; align-items: center; justify-content: center;
        }
        .search-inner-modal { width: 90%; max-width: 800px; text-align: center; }
        .search-inner-modal input {
            width: 100%; border: none; border-bottom: 3px solid var(--leaf);
            background: transparent; font-size: 3rem; font-family: 'Fraunces', serif;
            padding: 20px; outline: none; color: var(--leaf);
            font-style: italic;
        }

        @media (max-width: 1000px) {
            .mosaic-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 300px; }
            .art-card, .art-card:nth-child(n) { grid-column: span 2; grid-row: span 1; }
            .header-section { padding-top: 100px; padding-bottom: 80px; }
        }
    </style>
</head>
<body>

<div id="header-container"></div>

<header class="header-section">
    <div class="header-content">
        <p style="text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; margin-bottom: 15px; color: rgba(255,255,255,0.8); font-weight: 600;">Tạp chí kiến trúc xanh</p>
        <h1>Cảm hứng<br>từ Đất Mẹ</h1>
    </div>
</header>

<div class="control-panel">
    <div class="category-scroll" id="cat-list"></div>
    <button class="search-trigger" onclick="toggleSearch(true)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
</div>

<main class="mosaic-grid" id="news-container"></main>

<div class="pagin-wrap" id="pagination"></div>

<div id="search-modal">
    <div class="search-inner-modal">
        <input type="text" id="search-input" placeholder="Nhập từ khóa..." onkeyup="if(event.key==='Enter') searchNow()">
        <p style="margin-top:20px; opacity:0.5; color: var(--stone);">Nhấn ESC để thoát hoặc Enter để tìm kiếm</p>
    </div>
</div>

<div id="footer-container"></div>

<script>
    let news = [], filtered = [], postsPerPage = 8, currentPage = 1, currentCategory = "";

    // 1. KẾT NỐI VÀ KHỞI TẠO HEADER (Mobile Menu + Overlay)
    fetch("header.html").then(r => r.text()).then(d => {
        const headerBox = document.getElementById("header-container");
        headerBox.innerHTML = d;
        
        // Kích hoạt logic Mobile Menu sau khi header load xong
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const overlay = document.getElementById('overlay');
        const loginBtn = document.getElementById('loginBtn');
        const loginMenu = document.getElementById('loginMenu');

        if (menuBtn && mobileMenu && overlay) {
            menuBtn.onclick = () => {
                menuBtn.classList.toggle('active');
                mobileMenu.classList.toggle('show');
                overlay.classList.toggle('show');
            };
            overlay.onclick = () => {
                menuBtn.classList.remove('active');
                mobileMenu.classList.remove('show');
                overlay.classList.remove('show');
            };
        }

        if (loginBtn && loginMenu) {
            loginBtn.onclick = (e) => {
                e.stopPropagation();
                loginMenu.classList.toggle('show');
            };
            document.addEventListener('click', () => loginMenu.classList.remove('show'));
        }
    });

    fetch("footer.html").then(r => r.text()).then(d => document.getElementById("footer-container").innerHTML = d);

    // 2. LOGIC TIN TỨC (GIỮ NGUYÊN)
    fetch("tintuc.json?v=" + Date.now()).then(r => r.json()).then(d => {
        news = d.news;
        const params = new URLSearchParams(window.location.search);
        currentCategory = params.get("category") || "";
        filtered = currentCategory ? news.filter(n => n.category === currentCategory) : [...news];
        renderCategories();
        render();
    });

    function render() {
        const container = document.getElementById("news-container");
        let start = (currentPage - 1) * postsPerPage;
        let list = filtered.slice(start, start + postsPerPage);

        if (list.length === 0) {
            container.innerHTML = "<div style='grid-column: span 4; text-align: center; padding: 50px;'>Dữ liệu đang được cập nhật...</div>";
            document.getElementById("pagination").innerHTML = "";
            return;
        }

        container.innerHTML = list.map(post => `
            <a href="chitiet_tintuc.html?slug=${post.slug}" class="art-card">
                <img src="assets/images/${post.image}" class="art-img" loading="lazy">
                <div class="art-overlay">
                    <span class="art-cat">${post.category}</span>
                    <h3 class="art-title">${post.title}</h3>
                    <div style="font-size:0.75rem; opacity:0.7">
                        ${post.date} — ${post.readingTime} MIN READ
                    </div>
                </div>
            </a>
        `).join('');

        renderPagination();
    }

    function renderCategories() {
        let cats = [...new Set(news.map(n => n.category))];
        let html = `<button class="cat-btn ${currentCategory === '' ? 'active' : ''}" onclick="filterCat('')">TẤT CẢ</button>`;
        cats.forEach(c => {
            html += `<button class="cat-btn ${currentCategory === c ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>`;
        });
        document.getElementById("cat-list").innerHTML = html;
    }

    function filterCat(cat) {
        currentCategory = cat;
        filtered = cat ? news.filter(n => n.category === cat) : [...news];
        currentPage = 1;
        render();
        renderCategories();
        history.pushState({}, "", cat ? `?category=${encodeURIComponent(cat)}` : window.location.pathname);
    }

    function renderPagination() {
        let total = Math.ceil(filtered.length / postsPerPage);
        let html = "";
        for (let i = 1; i <= total; i++) {
            html += `<button class="pagin-btn ${i == currentPage ? 'active' : ''}" onclick="go(${i})">${i}</button>`;
        }
        document.getElementById("pagination").innerHTML = html;
    }

    function go(p) { currentPage = p; window.scrollTo({ top: 400, behavior: 'smooth' }); render(); }

    function toggleSearch(show) {
        document.getElementById("search-modal").style.display = show ? "flex" : "none";
        if(show) document.getElementById("search-input").focus();
    }

    function searchNow() {
        let k = document.getElementById("search-input").value.toLowerCase();
        filtered = news.filter(n => n.title.toLowerCase().includes(k) || n.category.toLowerCase().includes(k));
        currentPage = 1;
        render();
        toggleSearch(false);
    }

    document.addEventListener('keydown', e => { if(e.key === 'Escape') toggleSearch(false); });
</script>
</body>
</html>
