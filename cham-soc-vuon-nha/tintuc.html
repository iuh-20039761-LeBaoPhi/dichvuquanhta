<!DOCTYPE html>
<html lang="vi">
<head>
  <script src="/ga.js"></script>
<meta property="og:title" content="Tin tức Chăm Sóc Vườn">
<meta property="og:description" content="Tin tức làm vườn, chăm sóc cây xanh hữu ích">
<meta property="og:image" content="assets/images/logo2.jpg">

<meta name="description" content="Tin tức làm vườn, chăm sóc cây xanh, kinh nghiệm và kiến thức hữu ích cho không gian xanh của bạn.">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dịch vụ quanh ta | Chăm sóc vườn nhà</title>
<link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== SCOPE RIÊNG ===== */
#news-page{
font-family:'Poppins',sans-serif;
background:#f4fbf6;
margin:0;
}

/* ===== HERO ===== */
#news-page .hero {
  background: linear-gradient(135deg, #305b33, #2c6130);
  color: #fff;
  text-align: center;
  padding: 90px 20px 70px;
}

#news-page .hero h1 {
  font-size: clamp(30px, 5vw, 44px);
  font-weight: 700;
  margin-bottom: 10px;
}

#news-page .hero p {
  opacity: 0.9;
  font-size: 16px;
  line-height: 1.6;
}

/* SEARCH */
#news-page .search-box{
max-width:600px;
margin:30px auto;
display:flex;
background:white;
border-radius:40px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

#news-page .search-box input{
flex:1;
padding:14px;
border:none;
outline:none;
}

#news-page .search-box button{
background:#1f6f43;
color:white;
border:none;
padding:0 25px;
cursor:pointer;
}

/* LAYOUT */
#news-page .wrap{
max-width:1300px;
margin:auto;
padding:20px 15px 60px;
}

#news-page .blog-container{
display:grid;
grid-template-columns:3fr 1fr;
gap:30px;
}

/* POSTS */
#news-page .posts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

#news-page .post{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
transition:.3s;
}

#news-page .post:hover{
transform:translateY(-6px);
box-shadow:0 18px 40px rgba(0,0,0,0.12);
}

#news-page .post img{
width:100%;
height:200px;
object-fit:cover;
}

#news-page .post-content{
padding:18px;
}

#news-page .post h3{
font-size:18px;
margin-bottom:8px;
}

#news-page .post h3 a{
text-decoration:none;
color:#14532d;
}

#news-page .meta{
font-size:13px;
color:#777;
margin-bottom:10px;
}

#news-page .desc{
font-size:14px;
color:#555;
line-height:1.6;
}

#news-page .tag{
display:inline-block;
margin-top:10px;
background:#e8f5e9;
color:#2e7d32;
padding:5px 12px;
border-radius:20px;
font-size:12px;
}

/* SIDEBAR */
#news-page .sidebar{
display:flex;
flex-direction:column;
gap:20px;
}

#news-page .side-card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

#news-page .side-card h3{
margin-bottom:15px;
color:#2e7d32;
}

/* CATEGORY */
#news-page .category-item{
display:block;
padding:8px 10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
margin-bottom:6px;
transition:0.2s;
}

#news-page .category-item:hover{
background:#e8f5e9;
color:#2e7d32;
}

#news-page .category-item.active{
background:#1f6f43;
color:#fff;
font-weight:600;
}

/* LATEST */
#news-page .latest-post{
display:flex;
gap:10px;
margin-bottom:12px;
}

#news-page .latest-post img{
width:65px;
height:55px;
border-radius:8px;
object-fit:cover;
}

/* PAGINATION */
#news-page .pagination{
text-align:center;
margin-top:30px;
}

#news-page .pagination button{
width:38px;
height:38px;
margin:4px;
border:none;
border-radius:8px;
background:#eee;
cursor:pointer;
}

#news-page .pagination .active{
background:#1f6f43;
color:white;
}

/* MOBILE */
@media(max-width:900px){
#news-page .blog-container{
grid-template-columns:1fr;
}
}

#news-page .latest-post a{
  font-size:13px;
  text-decoration:none;
  color:#222;
  font-weight:600;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

#news-page .latest-meta{
  font-size:12px;
  color:#777;
  margin-top:3px;
}

.meta{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.meta-item{
  display:flex;
  align-items:center;
  gap:5px;
}

.meta svg{
  width:14px;
  height:14px;
  stroke:#1f6f43;
  fill:none;
  stroke-width:2;
}

.latest-meta svg{
  width:14px;
  height:14px;
  stroke:#1f6f43;
  fill:none;
  stroke-width:2;
}

.latest-meta{
  display:flex;
  align-items:center;
  gap:12px;
}
</style>

</head>

<body>

<div id="header"></div>

<main id="news-page">

<section class="hero">
<h1>Tin tức làm vườn</h1>
<p>Cập nhật kiến thức – chia sẻ kinh nghiệm – nâng tầm không gian xanh</p>
</section>

<div class="search-box">
<input type="text" id="search" placeholder="Tìm bài viết...">
<button onclick="searchPost()">Tìm</button>
</div>

<div class="wrap">

<section class="blog-container">

<!-- LEFT -->
<div>
<div class="posts" id="posts"></div>
<div class="pagination" id="pagination"></div>
</div>

<!-- RIGHT -->
<aside class="sidebar">

<div class="side-card">
<h3>Danh mục</h3>
<div id="categories"></div>
</div>

<div class="side-card">
<h3>Bài viết mới</h3>
<div id="latest"></div>
</div>

</aside>

</section>

</div>

</main>

<div id="footer"></div>

<script>

/* LOAD HEADER FOOTER */
fetch("header.html")
.then(r=>r.text())
.then(d=>document.getElementById("header").innerHTML=d)

fetch("footer.html")
.then(r=>r.text())
.then(d=>document.getElementById("footer").innerHTML=d)

/* BIẾN CHÍNH */
let news = []
let filtered = []
let postsPerPage = 6
let currentPage = 1
let currentCategory = ""

/* ===== LẤY CATEGORY TỪ URL (?category=...) ===== */
function getCategoryFromURL(){
  const params = new URLSearchParams(window.location.search)
  return params.get("category") || ""
}

/* LOAD DATA */
fetch("tintuc.json?v=" + Date.now())
.then(r=>r.json())
.then(d=>{

  news = d.news

  currentCategory = getCategoryFromURL()

  filtered = currentCategory 
    ? news.filter(n => n.category === currentCategory)
    : [...news]

  renderCategories()
  render()

  updateSEO()

})

/* RENDER POSTS */
function render(){
  let start = (currentPage - 1) * postsPerPage
  let list = filtered.slice(start, start + postsPerPage)

  const posts = document.getElementById("posts")
  posts.innerHTML = ""

  list.forEach(post=>{
    posts.innerHTML += `
    <article class="post">
      <img src="assets/images/${post.image}" loading="lazy">
      <div class="post-content">
        <h3><a href="chitiet_tintuc.html?slug=${post.slug}">${post.title}</a></h3>
        <div class="meta">

  <span class="meta-item">
    <svg viewBox="0 0 24 24">
      <path d="M7 2v2M17 2v2M3 8h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
    </svg>
    ${new Date(post.date).toLocaleDateString('vi-VN')}
  </span>

  <span class="meta-item">
    <svg viewBox="0 0 24 24">
      <path d="M12 6v6l4 2M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"/>
    </svg>
    ${post.readingTime} phút
  </span>

</div>
        <p class="desc">${post.content.substring(0,120)}...</p>
        <span class="tag">${post.category}</span>
      </div>
    </article>`
  })

  renderPagination()
  renderLatest()
}

/* PAGINATION */
function renderPagination(){
  let total = Math.ceil(filtered.length / postsPerPage)
  let html = ""

  for(let i=1;i<=total;i++){
    html += `<button class="${i==currentPage?'active':''}" onclick="go(${i})">${i}</button>`
  }

  document.getElementById("pagination").innerHTML = html
}

function go(p){
  currentPage = p
 document.getElementById("news-page").scrollIntoView({
  behavior:"smooth"
})
  render()
}

/* SEARCH */
function searchPost(){
  let k = document.getElementById("search").value.toLowerCase()

  filtered = news.filter(n =>
    n.title.toLowerCase().includes(k) ||
    n.category.toLowerCase().includes(k)
  )

  currentCategory = ""
  currentPage = 1

  // 👉 reset active UI
  document.querySelectorAll('.category-item').forEach(el=>{
    el.classList.remove('active')
    if(el.innerText === "Tất cả"){
      el.classList.add('active')
    }
  })

  render()
}

/* CATEGORY */
function renderCategories(){
  let cats = [...new Set(news.map(n=>n.category))]

  let html = `
  <div class="category-item ${currentCategory===''?'active':''}" onclick="filterCategory('')">Tất cả</div>
  `

  cats.forEach(c=>{
    html += `
    <div class="category-item ${currentCategory===c?'active':''}" 
         onclick="filterCategory('${c}')">
      ${c}
    </div>`
  })

  document.getElementById("categories").innerHTML = html
}

function filterCategory(cat){

  currentCategory = cat

  filtered = cat 
    ? news.filter(n=>n.category===cat)
    : [...news]

  currentPage = 1
  render()

  // ===== URL ?category= =====
  const url = cat 
    ? `?category=${encodeURIComponent(cat)}`
    : window.location.pathname

  history.pushState({}, "", url)

  // ACTIVE UI
  document.querySelectorAll('.category-item').forEach(el=>{
    el.classList.remove('active')

    if(
      (cat === "" && el.innerText === "Tất cả") ||
      el.innerText === cat
    ){
      el.classList.add('active')
    }
  })

  updateSEO()

  // SCROLL MƯỢT
  window.scrollTo({
    top: document.getElementById("news-page").offsetTop,
    behavior: "smooth"
  })
}

/* SEO */
function updateSEO(){
  document.title = currentCategory 
    ? `${currentCategory} | Tin tức Chăm Sóc Vườn`
    : "Tin tức | Chăm Sóc Vườn"

  const metaDesc = document.querySelector("meta[name='description']")

  if(metaDesc){
    metaDesc.setAttribute(
      "content",
      currentCategory
        ? `Danh mục ${currentCategory} - Tổng hợp bài viết, kinh nghiệm và kiến thức làm vườn hữu ích.`
        : "Tin tức làm vườn, chăm sóc cây xanh, kinh nghiệm và kiến thức hữu ích."
    )
  }
}

/* LATEST */
function renderLatest(){
  const latest = document.getElementById("latest")
  latest.innerHTML = ""

  // 👉 SẮP XẾP THEO NGÀY MỚI NHẤT
  const sorted = [...news].sort((a,b)=> new Date(b.date) - new Date(a.date))

  sorted.slice(0,5).forEach(p=>{
    latest.innerHTML += `
  <div class="latest-post">
    <img src="assets/images/${p.image}">
    
    <div>
      <a href="chitiet_tintuc.html?slug=${p.slug}">${p.title}</a>

      <div class="latest-meta">

        <span class="meta-item">
          <svg viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          ${p.views}
        </span>

        <span class="meta-item">
          <svg viewBox="0 0 24 24">
            <path d="M7 2v2M17 2v2M3 8h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
          </svg>
          ${new Date(p.date).toLocaleDateString('vi-VN')}
        </span>

      </div>
    </div>
  </div>
`
  })
}
let timeout;

document.addEventListener("DOMContentLoaded", () => {
  const searchInput = document.getElementById("search");

  if (searchInput) {
    searchInput.addEventListener("keyup", function(){
      clearTimeout(timeout);

      timeout = setTimeout(()=>{
        searchPost();
      },300);
    });
  }
});

</script>
</body>
</html>
