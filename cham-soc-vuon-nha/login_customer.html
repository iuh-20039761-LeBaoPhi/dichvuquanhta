<!DOCTYPE html>
<html lang="vi">
<head>
  <script src="/ga.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng nhập khách hàng</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#1f6f43,#38b46b);
}

/* CARD */
.login-box{
  width:100%;
  max-width:400px;
  background:white;
  padding:35px;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  text-align:center;
}

/* TITLE */
.login-box h2{
  margin-bottom:20px;
  color:#1f6f43;
}

/* INPUT */
.input-group{
  margin-bottom:15px;
  text-align:left;
}

.input-group label{
  font-weight:600;
  font-size:14px;
}

.input-group input{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}

.input-group input:focus{
  outline:none;
  border-color:#1f6f43;
}

/* BUTTON */
.login-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1f6f43;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.login-btn:hover{
  background:#2ea15f;
}

/* BACK */
.back{
  margin-top:15px;
  display:block;
  text-decoration:none;
  color:#555;
  font-size:14px;
}

.error{
  color:red;
  font-size:14px;
  margin-bottom:10px;
  display:none;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Đăng nhập khách hàng</h2>

<div class="error" id="error">Sai số điện thoại hoặc mật khẩu</div>

<form id="loginForm">

<div class="input-group">
<label>Số điện thoại</label>
<input type="tel" id="phone" required>
</div>

<div class="input-group">
<label>Mật khẩu</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="login-btn">Đăng nhập</button>

</form>

<a href="indexs.html" class="back">← Quay về trang chủ</a>

</div>

<script>

// 🔥 DATA DEMO (giả lập database)
const users = [
  {
    id:1,
    name:"Nguyễn Văn A",
    phone:"0123456789",
    password:"123456",
    role:"customer"
  }
];

// LOGIN
document.getElementById("loginForm").onsubmit = function(e){

  e.preventDefault();

  let phone = document.getElementById("phone").value;
  let password = document.getElementById("password").value;

  let user = users.find(u =>
    u.phone === phone && u.password === password
  );

  if(user){

    localStorage.setItem("user", JSON.stringify(user));

    alert("Đăng nhập thành công!");

    window.location.href = "indexs.html";

  }else{

    document.getElementById("error").style.display = "block";

  }

};

</script>

</body>
</html>
