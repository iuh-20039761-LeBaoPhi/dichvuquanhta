<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Khách hàng | Keri Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <style>
        :root {
            --primary: #0b4635; /* Emerald Green */
            --accent: #c5a059;  /* Gold */
            --white: #ffffff;
            --bg-overlay: rgba(11, 70, 53, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Nền ảnh thiên nhiên mờ ảo */
            background: url('https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?q=80&w=1932&auto=format&fit=crop') center/cover no-repeat;
            position: relative;
            overflow: hidden;
        }

        /* Lớp phủ màu xanh đặc trưng */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(11, 70, 53, 0.9), rgba(0, 0, 0, 0.4));
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: var(--primary);
            color: var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(11, 70, 53, 0.2);
        }

        h2 {
            font-family: 'Fraunces', serif;
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: 0.3s;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 1.5px solid #e2e8f0;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        input:focus + i {
            color: var(--accent);
        }

        .login-hint {
            background: #fff8eb;
            border: 1px dashed var(--accent);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #92400e;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background: #063024;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(11, 70, 53, 0.2);
        }

        .back-home {
            margin-top: 25px;
            display: block;
            text-decoration: none;
            color: #64748b;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-home:hover { color: var(--primary); }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="brand-logo">
                <i class="fa-solid fa-leaf"></i>
            </div>
            <h2>Chào Mừng Trở Lại</h2>
            <p class="subtitle">Dành cho Khách hàng trải nghiệm dịch vụ</p>

            <div class="login-hint">
                <i class="fa-solid fa-circle-info"></i>
                <span>Thử ngay: <b>customer</b> / <b>123456</b></span>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Tên đăng nhập" required value="customer">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Mật khẩu" required value="123456">
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit">
                    Đăng Nhập Ngay <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <a href="trangchu.html" class="back-home">
                <i class="fa-solid fa-house"></i> Quay lại trang chủ
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            
            // Logic lưu trữ giống trang cũ của bạn
            localStorage.setItem('currentUser', user);
            localStorage.setItem('userRole', 'Khách hàng');
            
            // Hiệu ứng chuyển trang mượt hơn
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                window.location.href = 'trangchu.html'; 
            }, 800);
        };
    </script>
</body>
</html>
