<!DOCTYPE html>
<html lang="vi">
<head>
  <script src="/ga.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dịch vụ quanh ta | Chăm Sóc Vườn Nhà</title>

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================================
   1. RESET & VARIABLES
   ========================================= */
:root {
  --primary: #116954;
  --primary-dark: #094a3a;
  --secondary: #e2d8c3;
  --accent: #d4a373;
  --bg-body: #fdfdfc;
  --bg-header: rgba(255, 255, 255, 0.98);
  --text-main: #1a1a1a;
  --font-heading: 'Lora', serif;
  --font-body: 'Mulish', sans-serif;
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
  --transition: all 0.4s var(--ease);
  --shadow-sm: 0 2px 4px rgba(17, 105, 84, 0.05);
  --shadow-md: 0 10px 30px -10px rgba(17, 105, 84, 0.1);
  --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

body {
  font-family: var(--font-body);
  background-color: var(--bg-body);
  color: var(--text-main);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* =========================================
   2. SITE HEADER & CONTAINER
   ========================================= */
.site-header {
  z-index: 99999;
  position: sticky;
  top: 0;
  padding: 14px 0;
  background: var(--bg-header);
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  border-bottom: 1px solid rgba(0,0,0,0.03);
}

.site-header.shrink { padding: 8px 0; box-shadow: var(--shadow-md); }

.site-container {
  max-width: 1440px;
  margin: auto;
  padding: 0 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px; /* Khoảng cách an toàn giữa các khối lớn */
}

/* =========================================
   3. LOGO (FIXED SIZE)
   ========================================= */
.site-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0; /* Không cho phép logo bị bóp méo */
}

.site-logo img {
  height: 48px;
  border-radius: 10px;
  object-fit: cover;
  border: 1px solid rgba(0,0,0,0.05);
}

.site-logo span {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  font-family: var(--font-heading);
  white-space: nowrap;
}

/* =========================================
   4. NAVIGATION PC (ÉP 1 DÒNG)
   ========================================= */
.site-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  flex: 1; /* Chiếm không gian ở giữa */
  flex-wrap: nowrap; /* TUYỆT ĐỐI KHÔNG XUỐNG DÒNG */
  overflow: hidden; 
}

.site-nav a {
  text-decoration: none;
  color: var(--text-main);
  padding: 8px 12px;
  font-weight: 700;
  font-size: 13px; /* Kích thước tối ưu cho menu dài */
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap; /* Không ngắt chữ bên trong link */
  border-radius: 6px;
  transition: var(--transition);
  position: relative;
}

.site-nav a:hover { color: var(--primary); background: rgba(17, 105, 84, 0.05); }

.site-nav a::after {
  content: "";
  position: absolute;
  bottom: 4px;
  left: 50%;
  width: 0;
  height: 2px;
  background: var(--primary);
  transition: var(--transition);
  transform: translateX(-50%);
}
.site-nav a:hover::after { width: 40%; }

/* =========================================
   5. LOGIN & MENU BUTTON
   ========================================= */
.site-login-box { position: relative; flex-shrink: 0; }

.site-login-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 12px rgba(17, 105, 84, 0.15);
  display: flex;
  align-items: center;
  gap: 8px;
}

.site-login-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

.site-login-menu {
  position: absolute;
  top: calc(100% + 15px);
  right: 0;
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  width: 220px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.05);
  z-index: 100000;
}
.site-login-menu.show { display: flex; animation: fadeIn 0.3s var(--ease); }

.site-login-menu a {
  padding: 12px 20px;
  text-decoration: none;
  color: var(--text-main);
  font-size: 14px;
  font-weight: 600;
  transition: var(--transition);
}
.site-login-menu a:hover { background: var(--secondary); padding-left: 25px; }

/* Hamburger Button */
.site-menu-btn {
  display: none;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  z-index: 100001;
}
.site-menu-btn span { width: 28px; height: 2px; background: var(--primary); transition: var(--transition); }
.site-menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); background: #fff; }
.site-menu-btn.active span:nth-child(2) { opacity: 0; }
.site-menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); background: #fff; }

/* =========================================
   6. MOBILE MENU & OVERLAY
   ========================================= */
.site-mobile-menu {
  position: fixed;
  top: 0;
  right: 0;
  transform: translateX(100%);
  width: 320px;
  height: 100%;
  background: var(--primary);
  padding: 100px 30px;
  transition: transform 0.5s var(--ease);
  z-index: 100002;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.site-mobile-menu.show { transform: translateX(0); }

.site-mobile-menu a {
  color: #fff;
  text-decoration: none;
  font-size: 18px;
  font-weight: 600;
  padding: 12px 20px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: var(--transition);
}
.site-mobile-menu a:hover { background: #fff; color: var(--primary); transform: translateX(-10px); }

.site-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
  opacity: 0;
  pointer-events: none;
  transition: var(--transition);
  z-index: 100000;
}
.site-overlay.show { opacity: 1; pointer-events: auto; }

/* =========================================
   7. RESPONSIVE OPTIMIZATION
   ========================================= */
@media (max-width: 1280px) {
  .site-nav a { font-size: 12px; padding: 8px 8px; }
  .site-logo span { font-size: 20px; }
}

@media (max-width: 1100px) {
  /* Ép chữ menu nhỏ lại nữa trước khi sang mobile để giữ 1 dòng */
  .site-nav a { font-size: 11px; padding: 6px 5px; }
  .site-container { padding: 0 15px; }
}

@media (max-width: 992px) {
  .site-nav { display: none; }
  .site-menu-btn { display: flex; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

    <nav class="site-nav">

<div class="site-mobile-menu" id="mobileMenu">
  <a href="trangchu.html">Trang chủ</a>
