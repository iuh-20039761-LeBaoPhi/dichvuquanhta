<header class="main-header" id="mainHeader">

<div class="header-container">

<!-- LOGO -->

<a href="../index.html" class="logo">
<img src="assets/images/logo.jpg" alt="Logo Chăm Sóc Vườn Nhà">
<span>Chăm Sóc Vườn Nhà</span>
</a>

<!-- MENU -->

<nav class="main-nav" id="mainNav">

<a href="indexs.html">Trang chủ</a> <a href="services.html">Dịch vụ</a> <a href="news.html">Tin tức</a>

</nav>

<!-- HAMBURGER -->

<span></span> <span></span> <span></span>

</div>

</div>

</header>

<style>

/* HEADER */

.main-header{
position:fixed;
top:0;
left:0;
width:100%;
background:#1f6f43;
padding:18px 80px;
z-index:9999;
transition:0.3s;
}

/* CONTAINER */

.header-container{
max-width:1400px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
}

/* SCROLL EFFECT */

.main-header.scrolled{
background:white;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.main-header.scrolled .main-nav a{
color:#333;
}

.main-header.scrolled .logo span{
color:#1f6f43;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:14px;
text-decoration:none;
font-size:26px;
font-weight:700;
color:white;
letter-spacing:0.5px;
}

.logo img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
}

/* MENU */

.main-nav{
display:flex;
align-items:center;
gap:34px;
}

/* MENU LINK */

.main-nav a{
text-decoration:none;
color:white;
font-size:18px;
font-weight:600;
transition:0.25s;
position:relative;
}

/* HOVER LINE EFFECT */

.main-nav a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0;
height:2px;
background:#ffd54f;
transition:0.3s;
}

.main-nav a:hover::after{
width:100%;
}

.main-nav a:hover{
color:#ffd54f;
}

/* BOOKING BUTTON */

.booking-btn{
background:#ff9800;
padding:12px 22px;
border-radius:40px;
font-weight:700;
font-size:17px;
color:white !important;
transition:0.3s;
}

.booking-btn:hover{
background:#ffb74d;
transform:translateY(-3px);
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* HAMBURGER */

.menu-toggle{
display:none;
flex-direction:column;
cursor:pointer;
gap:6px;
}

.menu-toggle span{
width:30px;
height:3px;
background:white;
display:block;
border-radius:3px;
}

/* MOBILE */

@media(max-width:900px){

.main-header{
padding:16px 30px;
}

.logo{
font-size:22px;
}

.menu-toggle{
display:flex;
}

.main-nav{
position:absolute;
top:80px;
left:0;
width:100%;
background:#1f6f43;
flex-direction:column;
align-items:center;
gap:24px;
padding:25px;
display:none;
}

.main-nav a{
font-size:19px;
}

.main-nav.active{
display:flex;
}

.booking-btn{
width:80%;
text-align:center;
}

}

</style>

<script>

/* MENU MOBILE */

const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("mainNav");

toggle.onclick = () =>{
nav.classList.toggle("active");
};


/* HEADER SCROLL */

window.addEventListener("scroll",function(){

const header = document.getElementById("mainHeader");

if(window.scrollY > 50){

header.classList.add("scrolled");

}else{

header.classList.remove("scrolled");

}

});

</script>
