<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân | Keri Garden Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <style>
        :root {
            --primary: #0b4635;      /* Emerald Green */
            --accent: #c5a059;       /* Gold */
            --bg-light: #fdfcf9;     /* Creamy White */
            --text-main: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --shadow: 0 20px 40px rgba(0,0,0,0.05);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- HEADER SECTION --- */
        .page-header {
            background: linear-gradient(rgba(11, 70, 53, 0.85), rgba(11, 70, 53, 0.85)), 
                        url('https://images.unsplash.com/photo-1558905619-171549271131?q=80&w=2000');
            background-size: cover;
            background-position: center;
            padding: 100px 20px;
            text-align: center;
            color: var(--white);
            margin-bottom: -60px;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            max-width: 1100px;
            margin: 0 auto 100px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        /* --- SIDEBAR --- */
        .profile-sidebar {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            box-shadow: var(--shadow);
            text-align: center;
            height: fit-content;
        }

        .user-avatar {
            width: 100px;
            height: 100px;
            background: #f0f4f2;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 40px;
            border: 2px solid #eee;
        }

        .profile-sidebar h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .user-role {
            font-size: 12px;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
        }

        .stat-box {
            display: flex;
            border-top: 1px solid #f1f5f9;
            padding-top: 25px;
            gap: 15px;
        }

        .stat-item { flex: 1; }
        .stat-item h4 { font-size: 20px; color: var(--primary); }
        .stat-item span { font-size: 11px; color: var(--text-light); }

        /* --- FORM PANEL --- */
        .profile-main {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 45px;
            box-shadow: var(--shadow);
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 35px;
            position: relative;
        }

        .main-title::after {
            content: '';
            position: absolute;
            left: 0; bottom: -8px;
            width: 40px; height: 3px;
            background: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 15px;
            transition: var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fcfdfd;
        }

        .input-group input:disabled {
            background: #f8fafc;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* --- BUTTONS --- */
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #f1f5f9;
        }

        .btn {
            padding: 13px 25px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            border: none;
            text-decoration: none;
        }

        .btn-home { background: #f1f5f9; color: var(--text-main); }
        .btn-home:hover { background: #e2e8f0; }

        .btn-edit { background: var(--white); color: var(--primary); border: 1px solid var(--primary); }
        .btn-edit:hover { background: var(--primary); color: white; }

        .btn-save { background: var(--primary); color: white; display: none; }
        .btn-save:hover { background: #083327; transform: translateY(-2px); }

        @media (max-width: 850px) {
            .profile-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="header"></div>

    <section class="page-header">
        <h1>Hồ Sơ Của Bạn</h1>
        <p>Kiến tạo không gian xanh vĩnh cửu</p>
    </section>

    <div class="container">
        <div class="profile-grid">
            
            <aside class="profile-sidebar">
                <div class="user-avatar">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <h2 id="card_name">Đang tải...</h2>
                <span class="user-role">Gia chủ tinh hoa</span>
                
                <div class="stat-box">
                    <div class="stat-item">
                        <h4 id="stat_total">0</h4>
                        <span>Đơn hàng</span>
                    </div>
                    <div class="stat-item">
                        <h4 id="stat_active">0</h4>
                        <span>Đang xử lý</span>
                    </div>
                </div>
            </aside>

            <main class="profile-main">
                <h2 class="main-title">Thông Tin Tài Khoản</h2>
                
                <form id="profileForm">
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label>Họ và Tên</label>
                        <input type="text" id="inp_name" disabled>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Địa chỉ Email</label>
                            <input type="email" id="inp_email" disabled>
                        </div>
                        <div class="input-group">
                            <label>Số điện thoại</label>
                            <input type="text" id="inp_phone" disabled>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Địa chỉ nhà</label>
                        <input type="text" id="inp_address" disabled>
                    </div>

                    <div class="actions">
                        <a href="trangchu.html" class="btn btn-home">
                            <i class="fa-solid fa-house"></i> Trang chủ
                        </a>
                        <button type="button" class="btn btn-edit" id="editBtn" onclick="toggleEdit(true)">
                            <i class="fa-solid fa-pen-to-square"></i> Chỉnh sửa
                        </button>
                        <button type="button" class="btn btn-save" id="saveBtn" onclick="saveData()">
                            <i class="fa-solid fa-check"></i> Lưu cập nhật
                        </button>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <div id="footer"></div>

    <script>
    // --- 1. HÀM NẠP COMPONENT & XỬ LÝ HEADER ---
    const loadComp = (id, file) => {
        fetch(file)
            .then(res => res.text())
            .then(data => {
                document.getElementById(id).innerHTML = data;
                if (id === 'header') {
                    initHeaderLogic(); // Chạy logic "Xin chào" ngay sau khi nạp xong Header
                }
            })
            .catch(err => console.error("Lỗi nạp component:", err));
    };

    // --- 2. LOGIC HIỂN THỊ "XIN CHÀO" VÀ MENU TÀI KHOẢN ---
    function initHeaderLogic() {
    const loginBtn = document.getElementById('loginBtn');
    const loginMenu = document.getElementById('loginMenu');
    const menuBtn = document.getElementById('menuBtn'); // Nút 3 gạch
    const mobileMenu = document.getElementById('mobileMenu'); // Menu trượt ra
    const overlay = document.getElementById('overlay'); // Lớp phủ mờ
    const currentUser = localStorage.getItem('currentUser');

    // 1. XỬ LÝ PHẦN ĐĂNG NHẬP / XIN CHÀO
    if (currentUser && loginBtn && loginMenu) {
        loginBtn.innerHTML = `<i class="fa-solid fa-user-check"></i> Xin chào, ${currentUser}`;
        loginMenu.innerHTML = `
            <a href="thongtin.html"><i class="fa-solid fa-address-card"></i> Hồ sơ cá nhân</a>
            <a href="lichsu.html"><i class="fa-solid fa-calendar-check"></i> Lịch sử đặt lịch</a>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">
            <a href="#" id="logoutBtn" style="color: #c0392b; font-weight: 600;">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </a>
        `;

        loginBtn.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            loginMenu.classList.toggle('active');
        };

        document.getElementById("logoutBtn").onclick = (e) => {
            e.preventDefault();
            localStorage.clear(); // Xóa sạch để bảo mật
            window.location.href = "index.html";
        };
    }

    // 2. XỬ LÝ MENU MOBILE (Đây là phần bà đang thiếu nè)
    if (menuBtn && mobileMenu && overlay) {
        menuBtn.onclick = () => {
            mobileMenu.classList.add('active');
            overlay.classList.add('active');
        };

        // Nhấn vào lớp phủ mờ thì đóng menu mobile lại
        overlay.onclick = () => {
            mobileMenu.classList.remove('active');
            overlay.classList.remove('active');
        };
    }

    // 3. CLICK RA NGOÀI ĐỂ ĐÓNG MENU TÀI KHOẢN
    document.addEventListener('click', (e) => {
        if (loginMenu && !loginBtn.contains(e.target)) {
            loginMenu.classList.remove('active');
        }
    });
}
    // --- 3. LOGIC XỬ LÝ DỮ LIỆU HỒ SƠ ---
    const userKey = localStorage.getItem('currentUser');

    function initProfile() {
        if (!userKey) {
            alert("Vui lòng đăng nhập để xem hồ sơ!");
            window.location.href = "dangnhap.html";
            return;
        }

        const savedData = JSON.parse(localStorage.getItem(`profile_${userKey}`)) || {
            name: userKey,
            email: localStorage.getItem('userEmail') || "chưa cập nhật",
            phone: "chưa cập nhật",
            address: "chưa cập nhật"
        };

        document.getElementById('card_name').innerText = savedData.name;
        document.getElementById('inp_name').value = savedData.name;
        document.getElementById('inp_email').value = savedData.email;
        document.getElementById('inp_phone').value = savedData.phone;
        document.getElementById('inp_address').value = savedData.address;

        const allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
        const myBookings = JSON.parse(localStorage.getItem('myBookings')) || [];
        const combined = [...allOrders, ...myBookings];
        const myOrders = combined.filter(o => o.customer === userKey || o.name === userKey);
        
        document.getElementById('stat_total').innerText = myOrders.length;
        document.getElementById('stat_active').innerText = myOrders.filter(o => o.status !== 'Đã hoàn thành').length;
    }

    // --- 4. CÁC HÀM TƯƠNG TÁC FORM ---
    function toggleEdit(isEditing) {
        const ids = ['inp_name', 'inp_email', 'inp_phone', 'inp_address'];
        ids.forEach(id => document.getElementById(id).disabled = !isEditing);
        
        document.getElementById('editBtn').style.display = isEditing ? 'none' : 'inline-flex';
        document.getElementById('saveBtn').style.display = isEditing ? 'inline-flex' : 'none';
        if(isEditing) document.getElementById('inp_name').focus();
    }

    function saveData() {
        const newData = {
            name: document.getElementById('inp_name').value.trim(),
            email: document.getElementById('inp_email').value.trim(),
            phone: document.getElementById('inp_phone').value.trim(),
            address: document.getElementById('inp_address').value.trim()
        };

        if(!newData.name) { alert("Tên không được để trống!"); return; }

        localStorage.setItem(`profile_${userKey}`, JSON.stringify(newData));
        localStorage.setItem('currentUser', newData.name);

        alert("Đã cập nhật thông tin thành công!");
        toggleEdit(false);
        window.location.reload(); 
    }

    // --- KHỞI CHẠY ---
    document.addEventListener('DOMContentLoaded', () => {
        loadComp("header", "header.html");
        loadComp("footer", "footer.html");
        initProfile();
    });
</script>
</body>
</html>
