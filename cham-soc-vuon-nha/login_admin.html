<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị | Keri Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    <style>
        :root { --primary: #c5a059; --bg: #1a1c1e; }
        body { font-family: 'Mulish', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); color: #fff; }
        .admin-card { background: #25282c; padding: 50px; border-radius: 20px; width: 400px; text-align: center; border: 1px solid rgba(197, 160, 89, 0.3); }
        h2 { font-family: 'Lora', serif; color: var(--primary); margin-bottom: 30px; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: #2d3135; border: 1px solid #3d4246; border-radius: 8px; color: white; }
        button { width: 100%; padding: 16px; background: var(--primary); color: #1a1c1e; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .info { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <i class="fa-solid fa-user-shield" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>QUẢN TRỊ VIÊN</h2>
        <form id="adminForm">
            <input type="text" id="user" placeholder="Tên đăng nhập (admin)" required>
            <input type="password" id="pass" placeholder="Mật khẩu (123456)" required>
            <button type="submit">XÁC THỰC TRUY CẬP</button>
        </form>
        <p class="info">Dành riêng cho nhân viên Keri Service</p>
    </div>

    <script>
        document.getElementById('adminForm').onsubmit = function(e) {
            e.preventDefault();
            if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '123456') {
                localStorage.setItem('userRole', 'Admin');
                localStorage.setItem('currentUser', 'Quản trị viên');
                window.location.href = 'index_admin.html';
            } else {
                alert('Sai thông tin đăng nhập!');
            }
        };
    </script>
</body>
</html>
