<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ quanh ta | Chăm Sóc Vườn Nhà</title>
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #12372a;
            --accent: #ad8b73;
            --bg-light: #fbf9f1;
            --text-main: #12372a;
            --transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; transition: var(--transition); }

        body {
            margin: 0;
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.7;
        }

        /* ===== BANNER ===== */
        .hero-wrap {
            height: 90vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #12372a;
        }

        .hero-img {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            opacity: 0.6;
            transform: scale(1.1);
        }

        .hero-content {
            position: relative;
            z-index: 5;
            text-align: center;
            color: #fff;
            padding: 0 20px;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 400;
            margin: 0 0 30px;
            line-height: 1.1;
        }

        .hero-content p {
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* SEARCH BOX */
        .search-wrapper {
            background: #fff;
            padding: 5px;
            border-radius: 100px;
            display: flex;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .search-wrapper input {
            flex: 1;
            border: none;
            padding: 15px 30px;
            border-radius: 100px;
            outline: none;
            font-size: 1rem;
        }

        .search-wrapper button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
        }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            position: sticky;
            top: 70px; /* Điều chỉnh tùy theo độ cao thực tế của header để không bị đè */
            z-index: 100;
            background: rgba(251, 249, 241, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            border-bottom: 1px solid rgba(18, 55, 42, 0.1);
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-tab {
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            color: #888;
            padding: 10px 0;
            position: relative;
            white-space: nowrap;
        }

        .filter-tab.active { color: var(--primary); }
        .filter-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent);
        }

        /* ===== SERVICE LAYOUT ===== */
        .content-container {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 40px;
        }

        .service-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 100px 60px;
        }

        .service-card {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .service-card:nth-child(even) { transform: translateY(60px); }

        .service-img-box {
            position: relative;
            height: 450px;
            overflow: hidden;
            border-radius: 2px;
        }

        .service-img-box img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 1.2s ease;
        }

        .service-card:hover img { transform: scale(1.1); }

        .service-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 15px;
            font-weight: 400;
        }

        .service-info p {
            color: #555;
            margin-bottom: 25px;
            font-size: 1rem;
            max-width: 90%;
        }

        .service-price-box {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .price-tag {
            font-weight: 600;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .btn-detail {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 5px;
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
            font-style: italic;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .service-list { grid-template-columns: 1fr; gap: 60px; }
            .service-card:nth-child(even) { transform: none; }
            .service-img-box { height: 350px; }
            .content-container { padding: 0 20px; }
            .filter-tabs { justify-content: flex-start; padding: 0 20px; }
        }
    </style>
</head>
<body>

<div id="header"></div>

<main>
    <section class="hero-wrap">
        <div class="hero-img"></div>
        <div class="hero-content">
            <p>Kiến tạo hơi thở tự nhiên</p>
            <h1>Nghệ Thuật Sống Xanh</h1>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Tìm kiếm dịch vụ quý khách cần...">
                <button id="searchBtn">Khám Phá</button>
            </div>
        </div>
    </section>

    <div class="filter-bar">
        <nav class="filter-tabs">
            <div class="filter-tab active" data-category="all">Tất cả dịch vụ</div>
            <div class="filter-tab" data-category="coban">Chăm sóc cơ bản</div>
            <div class="filter-tab" data-category="nangcao">Chăm sóc nâng cao</div>
            <div class="filter-tab" data-category="thietke">Thiết kế cảnh quan</div>
            <div class="filter-tab" data-category="ray">Chăm sóc rẫy</div>
            <div class="filter-tab" data-category="vesinh">Vệ sinh và cải tạo</div>
        </nav>
    </div>

    <div class="content-container">
        <div class="service-list" id="servicesContainer"></div>
    </div>
</main>

<div id="footer"></div>

<script>
let allServices = [];
const container = document.getElementById("servicesContainer");

// --- 1. LOGIC HIỂN THỊ DỊCH VỤ ---
function renderServices(list) {
    container.innerHTML = "";
    if (list.length === 0) {
        container.innerHTML = `<div class="no-data">Hiện tại không có dịch vụ nào phù hợp với yêu cầu của quý khách.</div>`;
        return;
    }
    list.forEach(service => {
        let displayPrice = service.price_m2_min ? service.price_m2_min.toLocaleString('vi-VN') + "đ / m²" : "Liên hệ báo giá";
        const card = document.createElement("div");
        card.className = "service-card";
        card.innerHTML = `
            <div class="service-img-box">
                <img src="assets/images/${service.image}" alt="${service.name}" onerror="this.src='https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?q=80&w=1000'">
            </div>
            <div class="service-info">
                <h2>${service.name}</h2>
                <p>${service.description.substring(0, 150)}...</p>
                <div class="service-price-box">
                    <span class="price-tag">${displayPrice}</span>
                    <a href="chitiet_dichvu.html?id=${service.id}" class="btn-detail">Xem chi tiết</a>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

// --- 2. FETCH DỮ LIỆU DỊCH VỤ ---
fetch("dichvu.json?v=" + Date.now())
    .then(res => res.json())
    .then(data => {
        allServices = data.services;
        renderServices(allServices);
    });

// --- 3. BỘ LỌC VÀ TÌM KIẾM ---
document.querySelectorAll(".filter-tab").forEach(tab => {
    tab.onclick = function() {
        document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
        this.classList.add("active");
        const cat = this.dataset.category;
        renderServices(cat === "all" ? allServices : allServices.filter(s => s.category === cat));
    };
});

const handleSearch = () => {
    const key = document.getElementById("searchInput").value.toLowerCase();
    renderServices(allServices.filter(s => s.name.toLowerCase().includes(key)));
};
document.getElementById("searchBtn").onclick = handleSearch;
document.getElementById("searchInput").onkeyup = (e) => { if(e.key === "Enter") handleSearch(); };

// --- 4. KẾT NỐI COMPONENT & LOGIC ĐĂNG NHẬP/MOBILE MENU ---
const loadComp = (id, file) => {
    fetch(file)
        .then(r => r.text())
        .then(html => {
            const wrapper = document.getElementById(id);
            wrapper.innerHTML = html;

            if (id === 'header') {
                const menuBtn = document.getElementById('menuBtn');
                const mobileMenu = document.getElementById('mobileMenu');
                const overlay = document.getElementById('overlay');
                const loginBtn = document.getElementById('loginBtn');
                const loginMenu = document.getElementById('loginMenu');

                // A. KIỂM TRA TRẠNG THÁI ĐĂNG NHẬP
                const currentUser = localStorage.getItem('currentUser');
                if (currentUser && loginBtn && loginMenu) {
                    // Đổi nút Đăng nhập thành Xin chào
                    loginBtn.innerHTML = `<i class="fa-solid fa-user-check"></i> Xin chào, ${currentUser}`;
                    
                    // Cập nhật nội dung Dropdown Menu
                      loginMenu.innerHTML = `
            <div class="user-greeting"></div>
            <a href="thongtin.html"><i class="fa-solid fa-address-card"></i> Hồ sơ cá nhân</a>
            <a href="lichsu.html"><i class="fa-solid fa-calendar-check"></i> Lịch sử đặt lịch</a>
            <hr style="border: 0; border-top: 1px solid #f1f1f1; margin: 8px 0;">
            <a href="#" id="logoutBtn" style="color: #c0392b; font-weight: 600;">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </a>
        `;

                    // Xử lý sự kiện Đăng xuất
                    document.getElementById("logoutBtn").onclick = (e) => {
                        e.preventDefault();
                        localStorage.removeItem('currentUser');
                        localStorage.removeItem('userRole');
                        window.location.reload();
                    };
                }

               // B. TOGGLE MOBILE MENU (Sửa lại cho khớp với CSS/JS gốc)
if (menuBtn && mobileMenu && overlay) {
    menuBtn.onclick = (e) => {
        e.preventDefault();
        // Dùng 'active' thay vì 'show' cho đồng bộ
        mobileMenu.classList.toggle('active');
        overlay.classList.toggle('active');
        
        // Chặn cuộn trang khi mở menu
        if (mobileMenu.classList.contains('active')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = '';
        }
    };

    overlay.onclick = () => {
        mobileMenu.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
    };
}

                // C. TOGGLE LOGIN DROPDOWN (Sửa logic hiển thị)
                if (loginBtn && loginMenu) {
                    loginBtn.onclick = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        const isCurrentlyActive = loginMenu.classList.contains('active');
                        
                        // Đóng mobile menu nếu đang mở để tránh chồng chéo
                        if(mobileMenu) mobileMenu.classList.remove('show'); 

                        if (!isCurrentlyActive) {
                            loginMenu.style.setProperty("display", "flex", "important");
                            setTimeout(() => loginMenu.classList.add('active'), 10);
                        } else {
                            loginMenu.classList.remove('active');
                            setTimeout(() => loginMenu.style.setProperty("display", "none", "important"), 300);
                        }
                    };

                    // Đóng khi click ra ngoài
                    document.addEventListener('click', (e) => {
                        if (!e.target.closest('.site-login-box') && !e.target.closest('#loginBtn')) {
                            loginMenu.classList.remove('active');
                            setTimeout(() => {
                                if(!loginMenu.classList.contains('active')) {
                                    loginMenu.style.setProperty("display", "none", "important");
                                }
                            }, 300);
                        }
                    });
                }
            }
        });
};

loadComp("header", "header.html");
loadComp("footer", "footer.html");
</script>

</body>
</html>
