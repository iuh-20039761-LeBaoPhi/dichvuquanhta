<!DOCTYPE html>

<html lang="vi">

<head>
    <script src="/ga.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dịch vụ quanh ta | Chăm sóc vườn nhà</title>

<meta name="description" content="Tra cứu lịch đặt dịch vụ chăm sóc vườn, cắt tỉa cây và dọn dẹp vườn tại Chăm Sóc Vườn Nhà">

<link rel="icon" href="assets/images/logo.jpg">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

/* BODY */

body{
background:#f4f7f5;
color:#333;
line-height:1.6;
}

/* HERO */

.hero{

position:relative;

height:320px;

background:url("assets/images/chamsocvuonnha.jpg") center/cover no-repeat;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

color:white;

}

/* overlay */

.hero::after{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.45);

}

/* content */

.hero-content{

position:relative;

z-index:2;

max-width:700px;

padding:20px;

}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.9;
}

/* BACK BUTTON */

.back-btn{

position:absolute;

top:20px;
left:20px;

background:#1f6f43;

color:white;

padding:10px 16px;

border-radius:8px;

text-decoration:none;

font-size:14px;

z-index:3;

transition:.3s;

}

.back-btn:hover{
background:#2ea15f;
}

/* CONTAINER */

.container{

max-width:1100px;

margin:50px auto;

padding:0 20px;

}

/* CARD */

.card{

background:white;

padding:45px;

border-radius:16px;

box-shadow:0 20px 50px rgba(0,0,0,0.08);

}

/* LOGO */

.logo{

text-align:center;

margin-bottom:30px;

}

.logo img{

width:80px;

border-radius:50%;

margin-bottom:10px;

}

.logo h2{

color:#1f6f43;

font-size:26px;

}

/* SEARCH */

.search-box{

display:flex;

gap:12px;

margin-bottom:35px;

}

.search-box input{

flex:1;

padding:14px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

.search-box input:focus{
outline:none;
border-color:#1f6f43;
}

.search-box button{

padding:14px 28px;

background:#1f6f43;

color:white;

border:none;

border-radius:10px;

font-size:15px;

cursor:pointer;

transition:.3s;

}

.search-box button:hover{
background:#2ea15f;
}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

border-radius:12px;

overflow:hidden;

}

thead{

background:#1f6f43;

color:white;

}

th,td{

padding:14px;

text-align:center;

border-bottom:1px solid #eee;

font-size:14px;

}

tbody tr:hover{
background:#f7faf8;
}

/* NO RESULT */

.no-result{

text-align:center;

color:#777;

margin-top:30px;

font-size:16px;

}

/* MOBILE */

@media(max-width:800px){

.hero{
height:260px;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:15px;
}

.search-box{
flex-direction:column;
}

th:nth-child(5),
td:nth-child(5){
display:none;
}

}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">

<a href="indexs.html" class="back-btn">← Trang chủ</a>

<div class="hero-content">

<h1>Tra cứu lịch đặt dịch vụ</h1>

<p>Nhập số điện thoại để xem lại lịch hẹn chăm sóc vườn của bạn</p>

</div>

</section>

<div class="container">

<div class="card">

<div class="logo">

<img src="assets/images/logo.jpg">

<h2>Chăm Sóc Vườn Nhà</h2>

</div>

<div class="search-box">

<input type="text" id="phoneSearch" placeholder="Nhập số điện thoại đã đặt lịch">

<button onclick="searchBooking()">Tra cứu</button>

</div>

<table id="resultTable" style="display:none">

<thead>

<tr>

<th>Mã đặt</th>
<th>Tên khách</th>
<th>SĐT</th>
<th>Dịch vụ</th>
<th>Diện tích</th>
<th>Tổng tiền</th>
<th>Ngày đặt</th>
<th>Ngày hẹn</th>

</tr>

</thead>

<tbody id="resultBody"></tbody>

</table>

<div id="noResult" class="no-result">
Nhập số điện thoại để tra cứu lịch đặt của bạn
</div>

</div>

</div>

<script>

function searchBooking(){

let phone=document.getElementById("phoneSearch").value.trim();

let bookings=JSON.parse(localStorage.getItem("bookings"))||[];

let results=bookings.filter(b=>b.phone===phone);

let table=document.getElementById("resultTable");
let body=document.getElementById("resultBody");
let noResult=document.getElementById("noResult");

body.innerHTML="";

if(results.length===0){

table.style.display="none";

noResult.style.display="block";

noResult.innerText="Không tìm thấy lịch đặt";

return;

}

noResult.style.display="none";

table.style.display="table";

results.forEach(b=>{

let row=document.createElement("tr");

row.innerHTML=`

<td>${b.id}</td>
<td>${b.name}</td>
<td>${b.phone}</td>
<td>${b.service}</td>
<td>${b.area} m²</td>
<td>${Number(b.total).toLocaleString()} VNĐ</td>
<td>${b.date}</td>
<td>${b.appointment || "Chưa chọn"}</td>

`;

body.appendChild(row);

});

}

</script>

</body>
</html>
