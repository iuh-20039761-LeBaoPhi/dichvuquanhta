<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dịch vụ chăm sóc vườn | Garden Service</title>

<meta name="description" content="Dịch vụ chăm sóc vườn chuyên nghiệp: cắt cỏ, chăm sóc cây, thiết kế cảnh quan và cải tạo vườn.">

<link rel="icon" href="assets/images/logo.jpg">

<style>

/* ===== ROOT ===== */

:root{
--green:#1f6f43;
--green-dark:#14532d;
--green-light:#eaf5ef;
--bg:#f6f9f7;
--text:#333;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}


/* ===== HERO ===== */

.hero{

height:420px;

background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("assets/images/cattianghethuat.jpg") center/cover;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

color:white;

padding:20px;

}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
opacity:.9;
margin-bottom:25px;
}

/* SEARCH */

.search-box{

max-width:520px;
margin:auto;
display:flex;
background:white;
border-radius:50px;
overflow:hidden;

}

.search-box input{

flex:1;
border:none;
padding:14px 18px;
font-size:15px;
outline:none;

}

.search-box button{

background:var(--green);
color:white;
border:none;
padding:14px 22px;
cursor:pointer;

}


/* ===== CATEGORY ===== */

.category-bar{

max-width:1200px;
margin:50px auto;

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;

padding:0 20px;

}

.category-btn{

padding:10px 18px;

border-radius:30px;

background:white;

border:1px solid #ddd;

cursor:pointer;

transition:.25s;

font-size:14px;

}

.category-btn:hover{
background:var(--green-light);
}

.category-btn.active{

background:var(--green);
color:white;
border:none;

}


/* ===== SERVICES GRID ===== */

.services-container{

max-width:1300px;
margin:auto;

padding:0 25px 80px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:28px;

}


/* ===== SERVICE CARD ===== */

.service-card{

background:white;

border-radius:18px;

overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,0.07);

transition:.35s;

display:flex;
flex-direction:column;

}

.service-card:hover{

transform:translateY(-8px);

box-shadow:0 20px 45px rgba(0,0,0,0.12);

}


/* IMAGE */

.service-image{
height:200px;
overflow:hidden;
}

.service-image img{

width:100%;
height:100%;
object-fit:cover;

transition:.4s;

}

.service-card:hover img{
transform:scale(1.08);
}


/* CONTENT */

.service-content{

padding:20px;
flex:1;

display:flex;
flex-direction:column;

}

.service-content h3{

color:var(--green);
margin-bottom:8px;
font-size:18px;

}

.service-content p{

font-size:14px;
color:#555;
line-height:1.6;

flex:1;

}


/* INFO */

.service-meta{

margin-top:10px;
font-size:13px;
color:#777;

}


/* PRICE */

.service-price{

font-size:20px;
font-weight:bold;

color:#e63946;

margin-top:10px;

}


/* BUTTON */

.service-btn{

margin-top:15px;

text-align:center;

background:var(--green);

color:white;

padding:12px;

border-radius:8px;

text-decoration:none;

font-weight:600;

transition:.25s;

}

.service-btn:hover{
background:var(--green-dark);
}


/* ===== MOBILE ===== */

@media(max-width:600px){

.hero{
height:300px;
}

.hero h1{
font-size:30px;
}

}

</style>

</head>

<body>

<div id="header"></div>

<!-- HERO -->

<section class="hero">

<div>

<h1>Dịch vụ chăm sóc vườn</h1>

<p>Giải pháp chuyên nghiệp cho khu vườn của bạn</p>

<div class="search-box">

<input type="text" id="searchInput" placeholder="Tìm dịch vụ...">

<button>Tìm</button>

</div>

</div>

</section>

<!-- CATEGORY -->

<div class="category-bar">

<button class="category-btn active" data-category="all">Tất cả</button> <button class="category-btn" data-category="coban">Chăm sóc cơ bản</button> <button class="category-btn" data-category="nangcao">Chăm sóc nâng cao</button> <button class="category-btn" data-category="thietke">Thiết kế</button> <button class="category-btn" data-category="ray">Chăm sóc rẫy</button> <button class="category-btn" data-category="vesinh">Vệ sinh vườn</button>

</div>

<!-- SERVICES -->

<div class="services-container" id="servicesContainer"></div>

<div id="footer"></div>

<script>

/* HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;
});

/* FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});


let allServices=[];
const container=document.getElementById("servicesContainer");


function renderServices(list){

container.innerHTML="";

list.forEach(service=>{

let price="Liên hệ";

if(service.price_m2_min){

price=
service.price_m2_min.toLocaleString('vi-VN')
+" VNĐ / "+
(service.area_unit || "m²");

}

const card=document.createElement("div");

card.className="service-card";

card.innerHTML=`

<div class="service-image">
<img src="assets/images/${service.image}" alt="${service.name}">
</div>

<div class="service-content">

<h3>${service.name}</h3>

<p>${service.description.substring(0,110)}...</p>

<div class="service-meta">
Khu vực: ${service.service_area || "Đang cập nhật"}
</div>

<div class="service-price">${price}</div>

<a href="service_detail.html?id=${service.id}" class="service-btn">
Xem chi tiết
</a>

</div>

`;

container.appendChild(card);

});

}


/* LOAD JSON */

fetch("services.json?v="+Date.now())
.then(res=>res.json())
.then(data=>{

allServices=data.services;

renderServices(allServices);

});


/* CATEGORY FILTER */

document.querySelectorAll(".category-btn").forEach(btn=>{

btn.onclick=function(){

document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));

this.classList.add("active");

const category=this.dataset.category;

if(category==="all"){
renderServices(allServices);
}
else{
renderServices(allServices.filter(s=>s.category===category));
}

}

});


/* SEARCH */

document.getElementById("searchInput").addEventListener("keyup",function(){

const keyword=this.value.toLowerCase();

const filtered=allServices.filter(s=>
s.name.toLowerCase().includes(keyword)
);

renderServices(filtered);

});

</script>

</body>
</html>
