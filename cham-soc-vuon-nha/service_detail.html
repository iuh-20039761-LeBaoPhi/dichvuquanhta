<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title id="seoTitle">Chi tiết dịch vụ | Garden Service</title>

<meta name="description" content="Chi tiết dịch vụ chăm sóc vườn chuyên nghiệp. Đặt lịch nhanh chóng với Garden Service.">

<link rel="icon" href="assets/images/logo.jpg">

<style>

/* ===== GLOBAL ===== */

:root{
--green:#1f6f43;
--green2:#2e8b57;
--light:#f7f8f9;
--border:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:var(--light);
color:#333;
}

/* ===== CONTAINER ===== */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* ===== HERO ===== */

.hero{
height:320px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background-size:cover;
background-position:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.hero h1{
position:relative;
font-size:40px;
}

/* ===== SERVICE BOX ===== */

.service-box{
background:white;
margin-top:-70px;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
position:relative;
z-index:2;
}

/* ===== IMAGE ===== */

.service-img img{
width:100%;
height:420px;
object-fit:cover;
border-radius:12px;
}

/* ===== INFO ===== */

.service-info h2{
color:var(--green);
font-size:28px;
margin-bottom:10px;
}

.description{
line-height:1.7;
color:#555;
margin-bottom:20px;
}

.price{
font-size:24px;
font-weight:bold;
color:#e63946;
margin-bottom:20px;
}

/* ===== CALCULATOR ===== */

.calc{
background:#f1f8f4;
padding:20px;
border-radius:10px;
}

.calc label{
font-weight:600;
}

.calc input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid var(--border);
border-radius:8px;
font-size:15px;
}

.result{
margin-top:15px;
font-weight:bold;
font-size:18px;
color:#e63946;
}

/* ===== BUTTON ===== */

.btn-book{
margin-top:18px;
width:100%;
padding:14px;
background:var(--green);
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.btn-book:hover{
background:var(--green2);
}

/* ===== RELATED ===== */

.section-title{
display:flex;
align-items:center;
gap:10px;
margin:60px 0 20px;
}

.section-title h3{
color:var(--green);
font-size:24px;
}

.section-title::after{
content:"";
flex:1;
height:2px;
background:#ddd;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.related-card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:.3s;
}

.related-card:hover{
transform:translateY(-6px);
}

.related-card img{
width:100%;
height:170px;
object-fit:cover;
}

.related-card h4{
margin:12px;
font-size:18px;
}

.related-card p{
margin:0 12px;
color:#e63946;
font-weight:bold;
}

.related-card a{
display:block;
margin:12px;
padding:10px;
background:var(--green);
color:white;
text-align:center;
border-radius:6px;
text-decoration:none;
}

/* ===== TABLET ===== */

@media(max-width:900px){

.service-box{
grid-template-columns:1fr;
}

.service-img img{
height:280px;
}

.hero{
height:260px;
}

.hero h1{
font-size:28px;
}

}

/* ===== MOBILE ===== */

@media(max-width:600px){

.container{
padding:25px 15px;
}

.service-box{
padding:20px;
}

.hero h1{
font-size:24px;
}

.price{
font-size:20px;
}

}

</style>

</head>

<body>

<div id="header"></div>

<!-- HERO -->

<section class="hero" id="hero">
<h1 id="heroTitle"></h1>
</section>

<div class="container">

<div class="service-box">

<div class="service-img">
<img id="serviceImage">
</div>

<div class="service-info">

<h2 id="serviceName"></h2>

<p class="description" id="serviceDescription"></p>

<p class="price" id="servicePrice"></p>

<div class="calc">

<label>Nhập diện tích (m²)</label>

<input type="number" id="area" placeholder="Ví dụ: 100">

<p class="result" id="total"></p>

<button class="btn-book" id="bookBtn">
Đặt lịch dịch vụ
</button>

</div>

</div>

</div>

<div class="section-title">
<h3>Dịch vụ liên quan</h3>
</div>

<div class="related-grid" id="related"></div>

</div>

<div id="footer"></div>

<script>

/* LOAD HEADER FOOTER */

function loadComponent(id,file){

fetch(file)
.then(res=>res.text())
.then(data=>{
document.getElementById(id).innerHTML=data
})

}

loadComponent("header","header.html")
loadComponent("footer","footer.html")


/* GET SERVICE ID */

const params=new URLSearchParams(window.location.search)
const serviceId=parseInt(params.get("id"))

let services=[]
let service=null


fetch("services.json")
.then(res=>res.json())
.then(data=>{

services=data.services
service=services.find(s=>s.id===serviceId)

if(!service){
document.body.innerHTML="<h2 style='padding:40px'>Không tìm thấy dịch vụ</h2>"
return
}

/* HERO */

hero.style.backgroundImage=
"url('assets/images/"+service.image+"')"

heroTitle.innerText=service.name

/* INFO */

serviceName.innerText=service.name
serviceDescription.innerText=service.description

servicePrice.innerText=
service.price_m2_min.toLocaleString('vi-VN')+
" VNĐ / "+service.area_unit

serviceImage.src="assets/images/"+service.image

/* RELATED */

service.related_services.forEach(id=>{

let s=services.find(x=>x.id===id)
if(!s) return

let card=document.createElement("div")

card.className="related-card"

card.innerHTML=`

<img src="assets/images/${s.image}">
<h4>${s.name}</h4>
<p>${s.price_m2_min.toLocaleString('vi-VN')} VNĐ / ${s.area_unit}</p>
<a href="service_detail.html?id=${s.id}">
Xem chi tiết
</a>

`

related.appendChild(card)

})

})


/* CALCULATE PRICE */

area.oninput=function(){

let a=parseFloat(this.value)

if(!a){
total.innerText=""
return
}

let serviceCost=a*service.price_m2_min
let fee=serviceCost*0.1
let final=serviceCost+fee

total.innerText=
"Tổng chi phí dự kiến: "+
final.toLocaleString('vi-VN')+
" VNĐ"

}


/* BOOKING */

bookBtn.onclick=function(){

if(!area.value){
alert("Vui lòng nhập diện tích")
return
}

window.location.href=
"booking.html?service="+service.id+
"&area="+area.value

}

</script>

</body>
</html>
