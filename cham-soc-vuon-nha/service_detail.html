<!DOCTYPE html>

<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chi tiết dịch vụ</title>

<style>

/* ================= GLOBAL ================= */

:root{
--green:#1f6f43;
--green-dark:#14532d;
--bg:#f6f7f8;
--border:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:var(--bg);
}

/* ================= CONTAINER ================= */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* ================= BANNER ================= */

.banner{
height:340px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.banner::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.banner h1{
position:relative;
color:white;
font-size:42px;
letter-spacing:1px;
}

/* ================= SERVICE LAYOUT ================= */

.service-wrapper{
background:white;
border-radius:14px;
padding:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.service-image img{
width:100%;
height:420px;
object-fit:cover;
border-radius:12px;
}

.service-info h2{
font-size:28px;
color:var(--green);
}

.description{
margin:12px 0;
line-height:1.7;
color:#555;
}

.price{
font-size:26px;
color:#e63946;
font-weight:bold;
}

/* ================= AREA BOX ================= */

.area-box{
background:#f1f8f4;
padding:18px;
border-radius:8px;
margin-top:15px;
}

.area-box input{
margin-top:8px;
padding:10px;
width:180px;
border:1px solid var(--border);
border-radius:6px;
}

.total{
margin-top:10px;
font-weight:600;
color:#e63946;
}

/* ================= BUTTON ================= */

.btn-order{
margin-top:20px;
background:var(--green);
color:white;
border:none;
padding:13px 28px;
border-radius:6px;
cursor:pointer;
font-size:15px;
transition:.3s;
}

.btn-order:hover{
background:var(--green-dark);
}

/* ================= RELATED ================= */

.section-title{
display:flex;
align-items:center;
gap:10px;
margin:50px 0 20px;
}

.section-title h3{
color:var(--green);
font-size:24px;
}

.section-title::after{
content:"";
flex:1;
height:2px;
background:#e5e7eb;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

.related-card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:.3s;
}

.related-card:hover{
transform:translateY(-6px);
}

.related-card img{
width:100%;
height:180px;
object-fit:cover;
}

.related-card h4{
margin:12px;
font-size:18px;
}

.related-card p{
margin:0 12px;
color:#e63946;
font-weight:bold;
}

.related-card a{
display:block;
margin:12px;
text-align:center;
background:var(--green);
color:white;
padding:8px;
border-radius:6px;
text-decoration:none;
}

/* ================= MODAL ================= */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(4px);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
width:500px;
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
animation:popup .3s ease;
}

@keyframes popup{
from{transform:scale(.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.modal-box h3{
font-size:24px;
color:var(--green);
margin-bottom:12px;
}

/* SERVICE INFO MODAL */

.service-info-box{
background:#f8faf9;
padding:12px;
border-radius:8px;
margin-bottom:10px;
border:1px solid #e5e7eb;
}

.service-info-box p{
margin:4px 0;
font-size:14px;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.form-grid input{
padding:10px;
border:1px solid var(--border);
border-radius:6px;
}

textarea{
width:100%;
padding:10px;
border:1px solid var(--border);
border-radius:6px;
margin-top:10px;
}

/* PRICE BOX */

.price-box{
background:#f9fafb;
padding:15px;
border-radius:10px;
margin-top:15px;
border:1px solid var(--border);
}

.price-box p{
margin:5px 0;
}

.total-final{
font-size:20px;
font-weight:bold;
color:#e63946;
}

/* BUTTONS */

.modal-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.confirm{
flex:1;
background:var(--green);
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

.cancel{
flex:1;
background:#ddd;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

/* SUCCESS */

.success{
display:none;
text-align:center;
background:#eafaf1;
padding:10px;
margin-bottom:10px;
color:#1f6f43;
border-radius:6px;
font-weight:600;
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){

.service-wrapper{
grid-template-columns:1fr;
}

.service-image img{
height:260px;
}

.form-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="header"></div>

<section class="banner" id="banner">
<h1 id="bannerTitle"></h1>
</section>

<div class="container">

<div class="service-wrapper">

<div class="service-image">
<img id="serviceImage">
</div>

<div class="service-info">

<h2 id="serviceName"></h2>

<p class="description" id="serviceDescription"></p>

<p class="price" id="servicePrice"></p>

<div class="area-box">

<label>Nhập diện tích (m²)</label><br>

<input type="number" id="area">

<p class="total" id="total"></p>

</div>

<button class="btn-order" id="openModal">
Đặt dịch vụ
</button>

</div>

</div>

<div class="section-title">
<h3>Dịch vụ liên quan</h3>
</div>

<div class="related-grid" id="related"></div>

</div>

<div id="footer"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<div class="success" id="success">
Đặt lịch thành công ✔
</div>

<h3>Đặt lịch dịch vụ</h3>

<div class="service-info-box">

<p><b>Dịch vụ:</b> <span id="modalServiceName"></span></p>

<p><b>Diện tích:</b> <span id="modalArea"></span> m²</p>

</div>

<form id="form">

<div class="form-grid">

<input type="text" placeholder="Họ tên" required>
<input type="tel" placeholder="Số điện thoại" required>

<input type="date" required>
<input type="text" placeholder="Địa chỉ" required>

</div>

<textarea placeholder="Ghi chú"></textarea>

<div class="price-box">

<p id="serviceTotal"></p>
<p id="commission"></p>
<p class="total-final" id="finalPrice"></p>

</div>

<div class="modal-buttons">

<button class="confirm">
Xác nhận đặt lịch
</button>

<button type="button" class="cancel" onclick="closeModal()">
Hủy
</button>

</div>

</form>

</div>

</div>

<script>

/* LOAD HEADER FOOTER */

function loadComponent(id,file){

fetch(file)
.then(res=>res.text())
.then(data=>{
document.getElementById(id).innerHTML=data
})

}

loadComponent("header","header.html")
loadComponent("footer","footer.html")

/* LẤY ID TỪ URL */

const params = new URLSearchParams(window.location.search);
const serviceId = parseInt(params.get("id"));

let service = null;
let services = [];

/* LOAD JSON */

fetch("services.json")
.then(res=>res.json())
.then(data=>{

services = data.services;

/* TÌM ĐÚNG DỊCH VỤ */

service = services.find(s => s.id === serviceId);

if(!service){
document.body.innerHTML="<h2 style='padding:40px'>Không tìm thấy dịch vụ</h2>";
return;
}

/* HIỂN THỊ */

banner.style.backgroundImage =
"url('assets/images/"+service.image+"')";

bannerTitle.textContent = service.name;

serviceName.textContent = service.name;

serviceDescription.textContent = service.description;

servicePrice.textContent =
service.price_m2_min.toLocaleString('vi-VN') +
" VNĐ / " + service.area_unit;

serviceImage.src =
"assets/images/"+service.image;

/* HIỂN THỊ RELATED */

service.related_services.forEach(id=>{

let s = services.find(x=>x.id===id);

if(!s) return;

let card=document.createElement("div");

card.className="related-card";

card.innerHTML=`

<img src="assets/images/${s.image}">
<h4>${s.name}</h4>
<p>${s.price_m2_min.toLocaleString('vi-VN')} VNĐ / ${s.area_unit}</p>
<a href="service_detail.html?id=${s.id}">Xem chi tiết</a>

`;

related.appendChild(card);

});

});


/* TÍNH TIỀN */

let totalService=0
let commissionValue=0
let finalPriceValue=0

area.oninput=function(){

let a=parseFloat(this.value)

if(!a){
total.innerText=""
return
}

totalService = a * service.price_m2_min
commissionValue=totalService*0.1
finalPriceValue=totalService+commissionValue

total.innerText=
"Tổng dự kiến: "+totalService.toLocaleString('vi-VN')+" VNĐ"

}


/* MODAL */

openModal.onclick=()=>{

if(!area.value){
alert("Nhập diện tích trước")
return
}

modalServiceName.innerText=service.name
modalArea.innerText=area.value

serviceTotal.innerText=
"Tiền dịch vụ: "+totalService.toLocaleString('vi-VN')+" VNĐ"

commission.innerText=
"Hoa hồng nền tảng 10%: "+commissionValue.toLocaleString('vi-VN')+" VNĐ"

finalPrice.innerText=
"Tổng thanh toán: "+finalPriceValue.toLocaleString('vi-VN')+" VNĐ"

modal.style.display="flex"

}

function closeModal(){
modal.style.display="none"
}


/* FORM */

form.onsubmit=function(e){

e.preventDefault()

success.style.display="block"

setTimeout(()=>{

window.location="services.html"

},1500)

}


/* RELATED */

service.related.forEach(id=>{

let s=services.find(x=>x.id==id)

let card=document.createElement("div")

card.className="related-card"

card.innerHTML=`

<img src="assets/images/${s.image}">
<h4>${s.name}</h4>
<p>${s.price} VNĐ / m²</p>
<a href="#">Xem chi tiết</a>

`

related.appendChild(card)

})

</script>

</body>
</html>
