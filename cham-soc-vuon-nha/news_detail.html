<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chi tiết bài viết | Chăm Sóc Vườn Nhà</title>

<meta name="description" content="Kiến thức chăm sóc cây và kinh nghiệm làm vườn">

<link rel="icon" href="assets/images/logo.jpg">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7f6;
color:#333;
padding-top:90px;
}

/* HERO */

.hero{

height:320px;

background:url("assets/images/vesinhvacaitao.jpg") center/cover no-repeat;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

color:white;

position:relative;

}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.hero-content{
position:relative;
}

.hero h1{
font-size:40px;
}

/* CONTAINER */

.container{
max-width:1250px;
margin:auto;
padding:0 20px;
}

/* BREADCRUMB */

.breadcrumb{
margin:30px 0;
font-size:14px;
}

.breadcrumb a{
text-decoration:none;
color:#1f6f43;
}

/* LAYOUT */

.layout{
display:grid;
grid-template-columns:3fr 1fr;
gap:40px;
}

/* ARTICLE */

.article{

background:white;

padding:40px;

border-radius:16px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.article-title{

font-size:34px;

font-weight:700;

color:#1f6f43;

margin-bottom:10px;

}

.meta{

font-size:14px;

color:#777;

margin-bottom:20px;

}

.meta span{
margin-right:15px;
}

.article img{

width:100%;

border-radius:10px;

margin:25px 0;

}

.content{

font-size:17px;

line-height:1.9;

color:#444;

}

/* TAGS */

.tags{

margin-top:30px;

padding-top:20px;

border-top:1px solid #eee;

}

.tag{

display:inline-block;

background:#e8f5ef;

color:#1f6f43;

padding:6px 14px;

border-radius:20px;

font-size:13px;

margin:5px;

}

/* SHARE */

.share{

margin-top:25px;

display:flex;

align-items:center;

gap:10px;

}

.share button{

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

color:white;

font-weight:600;

}

.fb{background:#1877f2;}
.tw{background:#1da1f2;}
.copy{background:#16a085;}

/* CTA */

.cta{

margin-top:40px;

background:linear-gradient(90deg,#1f6f43,#38b46b);

color:white;

padding:35px;

border-radius:18px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

}

.cta h3{
font-size:24px;
margin-bottom:6px;
}

.phone{

background:white;

color:#1f6f43;

padding:12px 22px;

border-radius:40px;

font-weight:700;

}

/* SIDEBAR */

.sidebar{
display:flex;
flex-direction:column;
gap:25px;
}

.side-card{

background:white;

padding:20px;

border-radius:14px;

box-shadow:0 6px 18px rgba(0,0,0,0.06);

}

.side-card h3{
margin-bottom:15px;
color:#1f6f43;
}

/* LATEST POST */

.latest-post{

display:flex;

gap:12px;

margin-bottom:14px;

}

.latest-post img{

width:70px;

height:55px;

object-fit:cover;

border-radius:6px;

}

.latest-post a{

text-decoration:none;

font-size:14px;

color:#333;

font-weight:600;

}

.latest-post span{

font-size:12px;

color:#888;

}

/* RELATED */

.related{

margin-top:70px;
margin-bottom:80px;

}

.related h3{

font-size:24px;

margin-bottom:25px;

}

.related-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}

.related-card{

background:white;

border-radius:14px;

overflow:hidden;

box-shadow:0 8px 20px rgba(0,0,0,0.08);

transition:0.3s;

}

.related-card:hover{

transform:translateY(-6px);

}

.related-card img{

width:100%;

height:170px;

object-fit:cover;

}

.related-card h4{

padding:15px;

font-size:16px;

}

.related-card a{
text-decoration:none;
color:#1f6f43;
}

/* MOBILE */

@media(max-width:900px){

.layout{
grid-template-columns:1fr;
}

.cta{
text-align:center;
gap:15px;
}

}

</style>

</head>

<body>

<div id="header"></div>

<section class="hero">
<div class="hero-content">
<h1>Tin Tức Làm Vườn</h1>
</div>
</section>

<div class="container">

<div class="breadcrumb">
<a href="index.html">Trang chủ</a> >
<a href="news.html">Tin tức</a> >
Chi tiết bài viết
</div>

<div class="layout">

<article class="article" id="article"></article>

<aside class="sidebar">

<div class="side-card">

<h3>Tin mới</h3>

<div id="latest"></div>

</div>

</aside>

</div>

<section class="related">

<h3>Bài viết liên quan</h3>

<div class="related-grid" id="related"></div>

</section>

</div>

<div id="footer"></div>

<script>

/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>document.getElementById("header").innerHTML=data)

/* LOAD FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>document.getElementById("footer").innerHTML=data)

/* GET SLUG */

const params=new URLSearchParams(location.search)
const slug=params.get("slug")

fetch("news.json")
.then(res=>res.json())
.then(data=>{

const news=data.news
const post=news.find(n=>n.slug===slug)

/* TAGS */

const tags=[

post.category,
"chăm sóc cây",
"kỹ thuật làm vườn",
"trồng cây",
"vườn nhà"

]

const content=post.content.replace(/\n/g,"<br><br>")

document.getElementById("article").innerHTML=`

<h2 class="article-title">${post.title}</h2>

<div class="meta">

<span>📅 ${new Date(post.date).toLocaleDateString('vi-VN')}</span>

<span>⏱ ${post.readingTime} phút đọc</span>

<span>👁 ${post.views} lượt xem</span>

</div>

<img src="assets/images/${post.image}">

<div class="content">${content}</div>

<div class="tags">

<strong>Từ khóa:</strong>

${tags.map(t=>`<span class="tag">${t}</span>`).join("")}

</div>

<div class="share">

<span>Chia sẻ:</span>

<button class="fb">Facebook</button>

<button class="tw">Twitter</button>

<button class="copy" onclick="copyLink()">Sao chép link</button>

</div>

<div class="cta">

<div>

<h3>🌿 Cần Dịch Vụ Chăm Sóc Vườn Chuyên Nghiệp?</h3>

<p>Đội ngũ chuyên gia của chúng tôi sẵn sàng hỗ trợ bạn 7 ngày / tuần.</p>

</div>

<div class="phone">📞 0775 472 347</div>

</div>

`

/* LATEST */

const latest=document.getElementById("latest")

news.slice(0,5).forEach(n=>{

latest.innerHTML+=`

<div class="latest-post">

<img src="assets/images/${n.image}">

<div>

<a href="news_detail.html?slug=${n.slug}">
${n.title}
</a>

<br>

<span>⏱ ${n.readingTime} phút</span>

</div>

</div>

`

})

/* RELATED */

const related=document.getElementById("related")

news

.filter(n=>n.slug!==slug)

.slice(0,3)

.forEach(n=>{

related.innerHTML+=`

<div class="related-card">

<a href="news_detail.html?slug=${n.slug}">

<img src="assets/images/${n.image}">

<h4>${n.title}</h4>

</a>

</div>

`

})

})

function copyLink(){

navigator.clipboard.writeText(location.href)
alert("Đã sao chép link bài viết!")

}

</script>

</body>
</html>
