<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ quanh ta | Chăm Sóc Vườn Nhà</title>
    <meta name="description" id="seoDesc" content="Dịch vụ chăm sóc vườn chuyên nghiệp, kiến tạo không gian xanh đẳng cấp cho ngôi nhà của bạn.">
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-dark: #12372a; 
            --primary-gold: #ad8b73; 
            --soft-white: #fbf9f1;
            --text-gray: #434343;
            --white: #ffffff;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; transition: var(--transition); }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--soft-white);
            color: var(--text-gray);
            margin: 0;
            overflow-x: hidden;
        }

        /* ===== LAYOUT CẤU TRÚC CHÍNH ===== */
        .master-wrapper {
            display: grid;
            grid-template-columns: 55% 45%;
            min-height: 100vh;
        }

        .visual-side {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: var(--primary-dark);
        }

        .visual-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .price-floating-circle {
            position: absolute;
            bottom: 50px;
            right: -40px;
            width: 180px;
            height: 180px;
            background: var(--primary-gold);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 8px solid var(--soft-white);
        }

        .price-floating-circle span { font-size: 0.8rem; text-transform: uppercase; }
        .price-floating-circle b { font-size: 1.2rem; margin-top: 5px; }

        /* Phía phải: Nội dung cuộn */
        .info-side {
            padding: 40px 10% 100px;
            background: var(--soft-white);
            position: relative;
        }

        /* Nút quay về mới thêm */
        .back-to-services {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        .back-to-services:hover {
            opacity: 1;
            color: var(--primary-gold);
            transform: translateX(-5px);
        }

        .service-name-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 5vw, 4.5rem);
            line-height: 1.1;
            color: var(--primary-dark);
            margin: 0 0 30px 0;
        }

        .service-desc {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-gray);
            margin-bottom: 50px;
            font-weight: 400;
        }

        /* ===== BOOKING PANEL ===== */
        .modern-calculator {
            background: var(--white);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.03);
            border-left: 4px solid var(--primary-dark);
        }

        .input-box { margin-bottom: 30px; }
        .input-box label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-dark);
        }

        .input-box input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
            font-size: 1.5rem;
            outline: none;
            background: transparent;
            font-family: 'Cormorant Garamond', serif;
        }

        .input-box input:focus { border-bottom-color: var(--primary-gold); }

        .total-display {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin: 40px 0;
        }

        .total-display .label { font-size: 0.85rem; color: #999; max-width: 60%; }
        .total-display .value { 
            font-size: 2rem; 
            font-weight: 700; 
            color: var(--primary-dark);
            font-family: 'Cormorant Garamond', serif;
        }

        .btn-premium {
            width: 100%;
            background: var(--primary-dark);
            color: var(--white);
            padding: 25px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-premium:hover { background: var(--primary-gold); letter-spacing: 6px; }

        /* ===== SIDEBAR GỢI Ý ===== */
        .related-section { margin-top: 80px; }
        .related-section h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .mini-card {
            display: flex;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 25px;
            align-items: center;
        }

        .mini-card .img-box { width: 80px; height: 80px; flex-shrink: 0; background: #eee; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .mini-card h4 { margin: 0; font-size: 0.95rem; font-weight: 600; }
        .mini-card p { margin: 5px 0 0; color: var(--primary-gold); font-size: 0.85rem; font-weight: 700; }
        .mini-card:hover h4 { color: var(--primary-gold); }

        @media (max-width: 1024px) {
            .master-wrapper { grid-template-columns: 1fr; }
            .visual-side { height: 50vh; position: relative; }
            .price-floating-circle { right: 20px; bottom: -40px; width: 120px; height: 120px; }
            .info-side { padding: 80px 5%; }
        }
    </style>
</head>
<body>

<div id="header"></div>

<main class="master-wrapper">
    <section class="visual-side">
        <img id="serviceImage" src="" alt="Dịch vụ chăm sóc vườn">
        <div class="price-floating-circle">
            <span>Chỉ từ</span>
            <b id="servicePrice">---</b>
        </div>
    </section>

    <section class="info-side">
        <a href="dichvu.html" class="back-to-services">
            <i class="fa-solid fa-arrow-left"></i> Quay lại trang dịch vụ
        </a>

        <h1 class="service-name-title" id="serviceName">Đang tải...</h1>
        
        <p class="service-desc" id="serviceDescription">
            Vui lòng chờ trong giây lát, chúng tôi đang chuẩn bị thông tin tốt nhất cho bạn.
        </p>

        <div class="modern-calculator">
            <div class="input-box">
                <label for="area">Diện tích khu vườn của bạn (m²)</label>
                <input type="number" id="area" placeholder="Nhập diện tích..." min="1">
            </div>

            <div class="total-display">
                <span class="label">Chi phí dự kiến (Đã bao gồm VAT & Phí dịch vụ)</span>
                <span class="value" id="total">0 VNĐ</span>
            </div>

            <button class="btn-premium" id="bookBtn">Đặt lịch ngay</button>
        </div>

        <div class="related-section">
            <h3>Dịch vụ khác</h3>
            <div id="related"></div>
        </div>
    </section>
</main>

<div id="footer"></div>

<script>
/* ==========================================
   1. CẤU HÌNH CHUNG & ĐƯỜNG DẪN
   ========================================== */
const IMAGE_PATH = "assets/images/";
const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1584473457406-623048ff437e?q=80&w=2000";

const el = {
    name: document.getElementById("serviceName"),
    desc: document.getElementById("serviceDescription"),
    price: document.getElementById("servicePrice"),
    image: document.getElementById("serviceImage"),
    related: document.getElementById("related"),
    areaInput: document.getElementById("area"),
    totalDisplay: document.getElementById("total"),
    bookBtn: document.getElementById("bookBtn")
};

/* ==========================================
   2. NẠP COMPONENT & LOGIC ĐĂNG NHẬP (MỚI KẾT HỢP)
   ========================================== */
const loadComponent = (id, file, callback) => {
    fetch(file)
        .then(r => r.ok ? r.text() : Promise.reject())
        .then(html => {
            document.getElementById(id).innerHTML = html;
            if (callback) callback(); // Chạy logic đăng nhập ngay sau khi Header có mặt
        })
        .catch(err => console.warn(`Lỗi nạp ${file}`));
};

// Hàm khởi tạo logic Header (đã đồng bộ với trang chủ của bà)
function initHeaderLogic() {
    const loginBtn = document.getElementById("loginBtn");
    const loginMenu = document.getElementById("loginMenu");
    const currentUser = localStorage.getItem('currentUser');

    if (currentUser && loginBtn && loginMenu) {
        // 1. Đổi chữ "Đăng nhập" thành "Xin chào"
        loginBtn.innerHTML = `<i class="fa-solid fa-user-check"></i> Xin chào, ${currentUser}`;
        
        // 2. Cập nhật menu dropdown
       loginMenu.innerHTML = `
            <div class="user-greeting"></div>
            <a href="thongtin.html"><i class="fa-solid fa-address-card"></i> Hồ sơ cá nhân</a>
            <a href="lichsu.html"><i class="fa-solid fa-calendar-check"></i> Lịch sử đặt lịch</a>
            <hr style="border: 0; border-top: 1px solid #f1f1f1; margin: 8px 0;">
            <a href="#" id="logoutBtn" style="color: #c0392b; font-weight: 600;">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </a>
        `;

        // 3. Xử lý Đăng xuất
        document.getElementById("logoutBtn").addEventListener("click", function(e) {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            localStorage.removeItem('userRole');
            window.location.reload();
        });
    }

    // Hiệu ứng Header khi cuộn trang
    window.addEventListener("scroll", function() {
        const header = document.querySelector(".site-header"); // Đảm bảo class này trùng với header.html
        if (header) {
            header.classList.toggle("scrolled", window.scrollY > 50);
        }
    });
}

// Gọi nạp Header/Footer
loadComponent("header", "header.html", initHeaderLogic);
loadComponent("footer", "footer.html");

/* ==========================================
   3. XỬ LÝ CLICK TOÀN CỤC (Event Delegation)
   ========================================== */
document.addEventListener("click", function (e) {
    const loginMenu = document.getElementById("loginMenu");
    
    // Toggle Menu khi bấm nút
    if (e.target.closest("#loginBtn")) {
        e.preventDefault();
        if (loginMenu) loginMenu.classList.toggle("active");
    }

    // Đóng menu khi click ra ngoài
    if (loginMenu && !loginMenu.contains(e.target) && !e.target.closest("#loginBtn")) {
        loginMenu.classList.remove("active");
    }
});

/* ==========================================
   4. XỬ LÝ DỮ LIỆU DỊCH VỤ DYNAMIC (GIỮ NGUYÊN)
   ========================================== */
const params = new URLSearchParams(window.location.search);
const serviceId = parseInt(params.get("id"));
let currentService = null;

fetch("dichvu.json")
    .then(r => r.json())
    .then(data => {
        const services = data.services || [];
        currentService = services.find(s => s.id === serviceId);
        
        if (!currentService) {
            el.name.innerText = "Dịch vụ không tồn tại";
            return;
        }

        renderServiceDetail(currentService, services);
        setupSEO(currentService);
    })
    .catch(err => {
        console.error("Lỗi tải dữ liệu:", err);
        el.name.innerText = "Không thể kết nối máy chủ";
    });

function renderServiceDetail(service, allServices) {
    el.name.innerText = service.name;
    el.desc.innerText = service.description || "Dịch vụ chăm sóc vườn chuyên nghiệp.";
    el.price.innerText = `${(service.price_m2_min || 0).toLocaleString("vi-VN")}đ/m²`;
    el.image.src = service.image ? (IMAGE_PATH + service.image) : DEFAULT_IMAGE;
    el.image.alt = `Dịch vụ ${service.name}`;

    el.related.innerHTML = "";
    const relatedIds = service.related_services || [];
    
    relatedIds.forEach(rid => {
        const s = allServices.find(x => x.id === rid);
        if (!s) return;

        const card = document.createElement("a");
        card.href = `chitiet_dichvu.html?id=${s.id}`;
        card.className = "mini-card";
        card.innerHTML = `
            <div class="img-box">
                <img src="${IMAGE_PATH + s.image}" alt="${s.name}" onerror="this.src='${DEFAULT_IMAGE}'">
            </div>
            <div>
                <h4>${s.name}</h4>
                <p>Giá từ: ${(s.price_m2_min || 0).toLocaleString("vi-VN")} VNĐ</p>
            </div>
        `;
        el.related.appendChild(card);
    });
}

/* ==========================================
   5. LOGIC TÍNH TOÁN & ĐẶT LỊCH (GIỮ NGUYÊN)
   ========================================== */
el.areaInput.addEventListener('input', function() {
    if (!currentService) return;
    const areaValue = parseFloat(this.value);
    if (!areaValue || areaValue <= 0) {
        el.totalDisplay.innerText = "0 VNĐ";
        return;
    }
    const basePrice = areaValue * currentService.price_m2_min;
    const finalTotal = basePrice + (basePrice * 0.1); // +10% phí
    el.totalDisplay.innerText = `${Math.round(finalTotal).toLocaleString("vi-VN")} VNĐ`;
});

el.bookBtn.onclick = function() {
    const areaVal = el.areaInput.value;
    if (!areaVal || areaVal <= 0) {
        alert("Quý khách vui lòng nhập diện tích.");
        el.areaInput.focus();
        return;
    }
    this.innerText = "ĐANG XỬ LÝ...";
    setTimeout(() => {
        window.location.href = `datlich.html?service=${currentService.id}&area=${areaVal}`;
    }, 400);
};

/* ==========================================
   6. SEO (GIỮ NGUYÊN)
   ========================================== */
function setupSEO(service) {
    document.title = `${service.name.toUpperCase()} - Dịch vụ xanh cao cấp`;
    const metaDesc = document.getElementById("seoDesc");
    if(metaDesc) metaDesc.setAttribute("content", service.description.substring(0, 160));
}
</script>

</body>
</html>
