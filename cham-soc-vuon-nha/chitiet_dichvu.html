<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ quanh ta | Chăm Sóc Vườn Nhà</title>
    <meta name="description" id="seoDesc" content="Dịch vụ chăm sóc vườn chuyên nghiệp, kiến tạo không gian xanh đẳng cấp cho ngôi nhà của bạn.">
    <link rel="icon" href="assets/images/logo2.jpg" type="image/jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-dark: #12372a; 
            --primary-gold: #ad8b73; 
            --soft-white: #fbf9f1;
            --text-gray: #434343;
            --white: #ffffff;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; transition: var(--transition); }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--soft-white);
            color: var(--text-gray);
            margin: 0;
            overflow-x: hidden;
        }

        /* ===== LAYOUT CẤU TRÚC CHÍNH ===== */
        .master-wrapper {
            display: grid;
            grid-template-columns: 55% 45%;
            min-height: 100vh;
        }

        .visual-side {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: var(--primary-dark);
        }

        .visual-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .price-floating-circle {
            position: absolute;
            bottom: 50px;
            right: -40px;
            width: 180px;
            height: 180px;
            background: var(--primary-gold);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 8px solid var(--soft-white);
        }

        .price-floating-circle span { font-size: 0.8rem; text-transform: uppercase; }
        .price-floating-circle b { font-size: 1.2rem; margin-top: 5px; }

        /* Phía phải: Nội dung cuộn */
        .info-side {
            padding: 40px 10% 100px;
            background: var(--soft-white);
            position: relative;
        }

        /* Nút quay về mới thêm */
        .back-to-services {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        .back-to-services:hover {
            opacity: 1;
            color: var(--primary-gold);
            transform: translateX(-5px);
        }

        .service-name-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 5vw, 4.5rem);
            line-height: 1.1;
            color: var(--primary-dark);
            margin: 0 0 30px 0;
        }

        .service-desc {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-gray);
            margin-bottom: 50px;
            font-weight: 400;
        }

        /* ===== BOOKING PANEL ===== */
        .modern-calculator {
            background: var(--white);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.03);
            border-left: 4px solid var(--primary-dark);
        }

        .input-box { margin-bottom: 30px; }
        .input-box label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-dark);
        }

        .input-box input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
            font-size: 1.5rem;
            outline: none;
            background: transparent;
            font-family: 'Cormorant Garamond', serif;
        }

        .input-box input:focus { border-bottom-color: var(--primary-gold); }

        .total-display {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin: 40px 0;
        }

        .total-display .label { font-size: 0.85rem; color: #999; max-width: 60%; }
        .total-display .value { 
            font-size: 2rem; 
            font-weight: 700; 
            color: var(--primary-dark);
            font-family: 'Cormorant Garamond', serif;
        }

        .btn-premium {
            width: 100%;
            background: var(--primary-dark);
            color: var(--white);
            padding: 25px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-premium:hover { background: var(--primary-gold); letter-spacing: 6px; }

        /* ===== SIDEBAR GỢI Ý ===== */
        .related-section { margin-top: 80px; }
        .related-section h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .mini-card {
            display: flex;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 25px;
            align-items: center;
        }

        .mini-card .img-box { width: 80px; height: 80px; flex-shrink: 0; background: #eee; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .mini-card h4 { margin: 0; font-size: 0.95rem; font-weight: 600; }
        .mini-card p { margin: 5px 0 0; color: var(--primary-gold); font-size: 0.85rem; font-weight: 700; }
        .mini-card:hover h4 { color: var(--primary-gold); }

        @media (max-width: 1024px) {
            .master-wrapper { grid-template-columns: 1fr; }
            .visual-side { height: 50vh; position: relative; }
            .price-floating-circle { right: 20px; bottom: -40px; width: 120px; height: 120px; }
            .info-side { padding: 80px 5%; }
        }
    </style>
</head>
<body>

<div id="header"></div>

<main class="master-wrapper">
    <section class="visual-side">
        <img id="serviceImage" src="" alt="Dịch vụ chăm sóc vườn">
        <div class="price-floating-circle">
            <span>Chỉ từ</span>
            <b id="servicePrice">---</b>
        </div>
    </section>

    <section class="info-side">
        <a href="dichvu.html" class="back-to-services">
            <i class="fa-solid fa-arrow-left"></i> Quay lại trang dịch vụ
        </a>

        <h1 class="service-name-title" id="serviceName">Đang tải...</h1>
        
        <p class="service-desc" id="serviceDescription">
            Vui lòng chờ trong giây lát, chúng tôi đang chuẩn bị thông tin tốt nhất cho bạn.
        </p>

        <div class="modern-calculator">
            <div class="input-box">
                <label for="area">Diện tích khu vườn của bạn (m²)</label>
                <input type="number" id="area" placeholder="Nhập diện tích..." min="1">
            </div>

            <div class="total-display">
                <span class="label">Chi phí dự kiến (Đã bao gồm VAT & Phí dịch vụ)</span>
                <span class="value" id="total">0 VNĐ</span>
            </div>

            <button class="btn-premium" id="bookBtn">Đặt lịch ngay</button>
        </div>

        <div class="related-section">
            <h3>Dịch vụ khác</h3>
            <div id="related"></div>
        </div>
    </section>
</main>

<div id="footer"></div>

<script>
const serviceName = document.getElementById("serviceName");
const serviceDescription = document.getElementById("serviceDescription");
const servicePrice = document.getElementById("servicePrice");
const serviceImage = document.getElementById("serviceImage");
const related = document.getElementById("related");
const area = document.getElementById("area");
const total = document.getElementById("total");
const bookBtn = document.getElementById("bookBtn");

const IMAGE_PATH = "assets/images/";
const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1584473457406-623048ff437e?q=80&w=2000";

// Load Components
function loadComponent(id, file) {
    fetch(file).then(r => r.text()).then(data => {
        document.getElementById(id).innerHTML = data;
    });
}
loadComponent("header", "header.html");
loadComponent("footer", "footer.html");

const params = new URLSearchParams(location.search);
const id = parseInt(params.get("id"));

let service = null;

// Fetch Data & SEO Optimization
fetch("dichvu.json")
    .then(r => r.json())
    .then(data => {
        const services = data.services || [];
        service = services.find(s => s.id === id);
        
        if (!service) {
            serviceName.innerText = "Dịch vụ không tồn tại";
            return;
        }

        // 1. UPDATE CONTENT
        serviceName.innerText = service.name;
        serviceDescription.innerText = service.description || "Dịch vụ chăm sóc vườn chuyên nghiệp hàng đầu.";
        servicePrice.innerText = (service.price_m2_min || 0).toLocaleString("vi-VN") + "đ/m²";
        serviceImage.src = service.image ? IMAGE_PATH + service.image : DEFAULT_IMAGE;

        // 2. SEO UPDATE (Dynamic Title, Alt, Meta)
        document.title = `${service.name} | Chăm sóc vườn nhà Keri`;
        document.getElementById("seoDesc").setAttribute("content", service.description.substring(0, 160));
        serviceImage.alt = `Dịch vụ ${service.name} chuyên nghiệp`;

        // 3. SCHEMA MARKUP (SEO Rich Snippets)
        const schemaData = {
            "@context": "https://schema.org/",
            "@type": "Service",
            "name": service.name,
            "description": service.description,
            "provider": {
                "@type": "LocalBusiness",
                "name": "Chăm sóc vườn nhà Keri"
            },
            "offers": {
                "@type": "Offer",
                "priceCurrency": "VND",
                "price": service.price_m2_min
            }
        };
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.text = JSON.stringify(schemaData);
        document.head.appendChild(script);

        // 4. RENDER RELATED
        related.innerHTML = "";
        (service.related_services || []).forEach(rid => {
            let s = services.find(x => x.id === rid);
            if (!s) return;
            const card = document.createElement("a");
            card.href = `chitiet_dichvu.html?id=${s.id}`;
            card.className = "mini-card";
            card.innerHTML = `
                <div class="img-box"><img src="${IMAGE_PATH + s.image}" alt="${s.name}" onerror="this.src='${DEFAULT_IMAGE}'"></div>
                <div>
                    <h4>${s.name}</h4>
                    <p>${(s.price_m2_min || 0).toLocaleString("vi-VN")} VNĐ</p>
                </div>
            `;
            related.appendChild(card);
        });
    });

// LOGIC TÍNH TOÁN (Giữ nguyên)
area.oninput = function () {
    if (!service) return;
    let val = parseFloat(this.value);
    if (!val || val <= 0) {
        total.innerText = "0 VNĐ";
        return;
    }
    // Logic: Giá gốc * diện tích + 10% phí dịch vụ
    let final = (val * service.price_m2_min) * 1.1;
    total.innerText = final.toLocaleString("vi-VN") + " VNĐ";
};

bookBtn.onclick = function () {
    if (!area.value || area.value <= 0) {
        alert("Vui lòng nhập diện tích!");
        return;
    }
    location.href = `datlich.html?service=${service.id}&area=${area.value}`;
};
</script>

</body>
</html>
