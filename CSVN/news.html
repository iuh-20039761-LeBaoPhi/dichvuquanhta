<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tin tức làm vườn | Garden Service</title>
<meta name="description" content="Cập nhật kiến thức làm vườn, chăm sóc cây và dịch vụ làm vườn chuyên nghiệp.">
<link rel="icon " href="assets\images\logo.jpg" type="image/x-icon">
<style>

:root{
--green:#1f6f43;
--green-dark:#14532d;
--green-light:#eaf5ef;
--bg:#f3f7f4;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--bg);
margin-top:100px; /* tránh header fixed che nội dung */
}

/* HERO */

.news-hero{
height:420px;
background:url('assets/images/tieucanh.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.news-hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.news-hero-content{
position:relative;
color:white;
max-width:700px;
}

.news-hero h1{
font-size:46px;
margin-bottom:15px;
}

.news-hero p{
font-size:20px;
}

/* NEWS SECTION */

.news-section{
padding:100px 80px;
max-width:1300px;
margin:auto;
}

.news-title{
text-align:center;
font-size:38px;
color:var(--green);
margin-bottom:60px;
}

/* GRID */

.news-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
}

/* CARD */

.news-card{
background:white;
border-radius:22px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
transition:0.4s;
}

.news-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 50px rgba(0,0,0,0.12);
}

.news-card img{
width:100%;
height:220px;
object-fit:cover;
}

.news-content{
padding:25px;
}

.news-content h3{
margin-bottom:10px;
}

.news-content h3 a{
text-decoration:none;
color:var(--green);
}

.news-content h3 a:hover{
color:#0f5132;
}

.news-date{
font-size:14px;
color:#888;
margin-bottom:12px;
}

.read-more{
display:inline-block;
margin-top:10px;
font-weight:600;
color:var(--green);
text-decoration:none;
}

/* RESPONSIVE */

@media(max-width:1000px){

.news-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.news-grid{
grid-template-columns:1fr;
}

}

</style>

</head>


<body>

<!-- HEADER -->
<div id="header"></div>


<section class="news-hero">

<div class="news-hero-content">

<h1>Tin Tức Làm Vườn</h1>

<p>
Cập nhật kiến thức chăm sóc cây trồng và xu hướng làm vườn hiện đại
</p>

</div>

</section>


<section class="news-section">

<h2 class="news-title">Kiến Thức & Tin Tức</h2>

<div class="news-grid" id="newsContainer"></div>

</section>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("header").innerHTML=data;

const current=location.pathname.split("/").pop();

document.querySelectorAll(".main-nav a").forEach(link=>{

if(link.getAttribute("href")===current){
link.classList.add("active");
}

});

});


/* LOAD FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});


/* LOAD NEWS JSON */

fetch("news.json?v="+Date.now())

.then(res => res.json())

.then(data => {

const container = document.getElementById("newsContainer");

container.innerHTML="";

data.news.forEach(news => {

const card = document.createElement("div");
card.className = "news-card";

card.innerHTML = `

<img src="assets/images/${news.image}" alt="${news.title}">

<div class="news-content">

<h3>
<a href="news_detail.html?id=${news.id}">
${news.title}
</a>
</h3>

<p class="news-date">
${new Date(news.date).toLocaleDateString('vi-VN')}
</p>

<p>
${news.content.substring(0,150)}...
</p>

<a class="read-more" href="news_detail.html?id=${news.id}">
Đọc thêm →
</a>

</div>

`;

container.appendChild(card);

});

})

.catch(error=>{
console.log("Lỗi load JSON:",error);
});

</script>

</body>
</html>
