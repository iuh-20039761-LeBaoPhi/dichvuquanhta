<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết tin tức | Garden Service</title>
<link rel="icon " href="assets\images\logo.jpg" type="image/x-icon">
<style>

:root{
--green:#1f6f43;
--green-dark:#14532d;
--bg:#f3f7f4;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--bg);
}

/* HERO */

.news-hero{
height:350px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
color:white;
}

.news-hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.news-hero-content{
position:relative;
z-index:2;
max-width:900px;
padding:20px;
}

.news-hero h1{
font-size:40px;
margin-bottom:12px;
}

.news-date{
font-size:16px;
opacity:0.9;
}

/* CONTENT */

.news-detail{
max-width:1000px;
margin:80px auto;
background:white;
padding:50px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.news-image{
width:100%;
height:420px;
margin-bottom:30px;
border-radius:15px;
overflow:hidden;
}

.news-image img{
width:100%;
height:100%;
object-fit:cover;
}

.news-content{
font-size:18px;
line-height:1.9;
color:#444;
white-space:pre-line;
}

.news-content p{
margin-bottom:18px;
}

/* BUTTON */

.back-btn{
display:inline-block;
margin-top:35px;
background:var(--green);
color:white;
padding:12px 28px;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

.back-btn:hover{
background:var(--green-dark);
}

</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- HERO -->

<section class="news-hero" id="newsHero">

<div class="news-hero-content">

<h1 id="newsTitle"></h1>

<p class="news-date" id="newsDate"></p>

</div>

</section>


<!-- CONTENT -->

<div class="news-detail">

<div class="news-image">
<img id="newsImage">
</div>

<div class="news-content" id="newsContent"></div>

<a href="news.html" class="back-btn">← Quay lại tin tức</a>

</div>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD HEADER + FOOTER */

function loadComponent(id,file){

fetch(file)

.then(res=>res.text())

.then(data=>{

document.getElementById(id).innerHTML=data

})

}

loadComponent("header","header.html")
loadComponent("footer","footer.html")



/* LẤY ID TỪ URL */

const params=new URLSearchParams(window.location.search)

const id=parseInt(params.get("id"))



fetch("news.json")

.then(res=>res.json())

.then(data=>{

const news=data.news.find(n=>n.id===id)

if(!news){

document.body.innerHTML=
"<h2 style='text-align:center;margin-top:100px'>Không tìm thấy bài viết</h2>"

return

}


/* TITLE */

document.title=news.title+" | Garden Service"

document.getElementById("newsTitle").innerText=news.title


/* DATE */

document.getElementById("newsDate").innerText=
"Ngày đăng: "+new Date(news.date).toLocaleDateString("vi-VN")


/* HERO IMAGE */

const hero=document.getElementById("newsHero")

hero.style.backgroundImage=
"url('assets/images/"+news.image+"')"

hero.style.backgroundSize="cover"
hero.style.backgroundPosition="center"


/* IMAGE */

document.getElementById("newsImage").src=
"assets/images/"+news.image


/* CONTENT */

const content=news.content.split("\n")

let html=""

content.forEach(p=>{

html+="<p>"+p+"</p>"

})

document.getElementById("newsContent").innerHTML=html

})

</script>

</body>
</html>
