<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dịch vụ | Garden Service</title>
<link rel="icon " href="assets\images\logo.jpg" type="image/x-icon">
<style>

:root{
--green:#1f6f43;
--green-dark:#14532d;
--green-light:#eaf5ef;
--bg:#f4f7f5;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--bg);
color:#333;
margin-top:100px; /* tránh header fixed đè nội dung */
}

/* HERO */

.services-hero{
height:380px;
background:url("assets/images/sanvuon2.jpg") center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.services-hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.services-hero-content{
position:relative;
z-index:2;
}

.services-hero h1{
font-size:46px;
margin-bottom:10px;
}

/* LAYOUT */

.services-layout{
display:flex;
gap:40px;
padding:80px;
max-width:1400px;
margin:auto;
}

/* SIDEBAR */

.category-sidebar{
width:260px;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
height:fit-content;
}

.category-sidebar h3{
color:var(--green);
margin-bottom:20px;
}

.category-sidebar ul{
list-style:none;
}

.category-sidebar a{
display:block;
padding:12px;
border-radius:8px;
text-decoration:none;
color:#333;
transition:0.2s;
}

.category-sidebar a:hover{
background:var(--green-light);
}

.category-sidebar a.active{
background:var(--green);
color:white;
}

/* SERVICES GRID */

.services-grid{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

/* CARD */

.service-card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.service-card:hover{
transform:translateY(-6px);
}

.service-card img{
width:100%;
height:220px;
object-fit:cover;
}

.service-card-content{
padding:20px;
}

.service-card h3{
color:var(--green);
margin-bottom:10px;
}

.service-card p{
font-size:15px;
color:#555;
line-height:1.5;
}

.detail-btn{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background:var(--green);
color:white;
text-decoration:none;
border-radius:6px;
font-weight:600;
}

.detail-btn:hover{
background:var(--green-dark);
}

/* RESPONSIVE */

@media(max-width:1000px){

.services-layout{
flex-direction:column;
}

.category-sidebar{
width:100%;
}

.services-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.services-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>


<section class="services-hero">

<div class="services-hero-content">
<h1>Các Dịch Vụ Của Chúng Tôi</h1>
<p>Giải pháp chăm sóc vườn và nông trại chuyên nghiệp</p>
</div>

</section>


<div class="services-layout">

<!-- SIDEBAR -->

<aside class="category-sidebar">

<h3>Danh mục</h3>

<ul>

<li><a href="#" data-category="all" class="active">Tất cả</a></li>

<li><a href="#" data-category="coban">Chăm sóc cơ bản</a></li>

<li><a href="#" data-category="nangcao">Chăm sóc nâng cao</a></li>

<li><a href="#" data-category="thietke">Thiết kế và thi công</a></li>

<li><a href="#" data-category="ray">Chăm sóc rẫy</a></li>

<li><a href="#" data-category="vesinh">Vệ sinh và cải tạo vườn</a></li>

</ul>

</aside>


<!-- SERVICES -->

<div class="services-grid" id="servicesContainer"></div>

</div>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("header").innerHTML=data;

const current=location.pathname.split("/").pop();

document.querySelectorAll(".main-nav a").forEach(link=>{
if(link.getAttribute("href")===current){
link.classList.add("active");
}
});

});


/* LOAD FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});


/* LOAD SERVICES JSON */

let allServices=[];
const container=document.getElementById("servicesContainer");

function renderServices(list){

container.innerHTML="";

list.forEach(service=>{

const card=document.createElement("div");

card.className="service-card";

card.innerHTML=`

<img src="assets/images/${service.image}">

<div class="service-card-content">

<h3>${service.name}</h3>

<p>${service.description.substring(0,130)}...</p>

<a href="service_detail.html?id=${service.id}" class="detail-btn">
Xem chi tiết
</a>

</div>

`;

container.appendChild(card);

});

}


/* FETCH JSON */

fetch("services.json?v="+Date.now())

.then(res=>res.json())

.then(data=>{

allServices=data.services;

renderServices(allServices);

});


/* FILTER CATEGORY */

document.querySelectorAll(".category-sidebar a").forEach(link=>{

link.addEventListener("click",function(e){

e.preventDefault();

document.querySelectorAll(".category-sidebar a").forEach(a=>{
a.classList.remove("active");
});

this.classList.add("active");

const category=this.dataset.category;

if(category==="all"){

renderServices(allServices);

}
else{

const filtered=allServices.filter(s=>s.category===category);

renderServices(filtered);

}

});

});

</script>

</body>
</html>
