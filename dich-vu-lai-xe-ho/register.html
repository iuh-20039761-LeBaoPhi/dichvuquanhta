<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Dịch Vụ Thuê Tài Xế</title>
    <meta name="description" content="Đăng ký tài khoản để đặt lịch thuê tài xế lái xe hộ nhanh chóng và tiện lợi. Nhận nhiều ưu đãi dành cho thành viên mới.">
    <meta name="keywords" content="đăng ký tài khoản, tạo tài khoản tài xế, đăng ký dịch vụ tài xế">
    <link rel="shortcut icon" type="image/x-icon" href="assets/logo_main.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e3f2fd 0%, #ffffff 50%, #fff3e0 100%);
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
        }
        .register-page { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
        .register-card { width: min(500px, 100%); }
        .register-shell {
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid #7db8e8;
            box-shadow: 0 20px 48px rgba(0, 123, 255, 0.2);
            background: white;
        }
        .register-header {
            background: linear-gradient(90deg, #007bff 0%, #00b4d8 100%);
            padding: 18px 22px;
        }
        .register-title {
            margin: 0;
            color: white;
            font-weight: 900;
            text-align: center;
            font-size: 1.8rem;
        }
        .register-body { padding: 24px; }
        .btn-register {
            background: linear-gradient(90deg, #007bff 0%, #00b4d8 100%);
            border: 0;
            color: white;
            border-radius: 999px;
            min-height: 48px;
            font-weight: 800;
        }
        .btn-register:hover { filter: brightness(1.04); color: white; }
        .btn-back {
            background: #6c757d;
            border: 0;
            color: white;
            border-radius: 999px;
            min-height: 48px;
            font-weight: 600;
        }
        .btn-back:hover { background: #5a6268; color: white; }
        .link-login { color: #e68a2e !important; text-decoration: none; font-weight: 700; }
        .link-login:hover { color: #cc7a2a !important; }
        .form-control {
            border: 2px solid #b8d9f5;
            border-radius: 12px;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s;
        }
    </style>
    <script src="/ga.js"></script>
</head>
<body data-nav-active="register">

    <!-- Header sẽ được load tự động bởi shared-layout.js -->
    <div id="site-header"></div>

    <main class="register-page">
        <div class="register-card">
            <div class="register-shell">
                <div class="register-header">
                    <h3 class="register-title">Đăng Ký Tài Khoản</h3>
                </div>
                <div class="register-body">
                    <p class="text-secondary mb-3">Tạo tài khoản để đặt lịch thuê tài xế dễ dàng</p>
                    
                    <div id="msg" class="mb-3 small"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fullname" placeholder="Nhập họ và tên" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="phone" placeholder="0xx xxx xxxx" pattern="0[0-9]{9}" required>
                            <div class="form-text text-muted small">Số điện thoại sẽ dùng để đăng nhập</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="example@gmail.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Địa chỉ</label>
                            <input type="text" class="form-control" id="address" placeholder="Nhập địa chỉ của bạn">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                                <button type="button" class="btn btn-outline-secondary" id="togglePwd">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                            <div class="password-strength" id="passwordStrength"></div>
                            <div class="form-text text-muted small">Mật khẩu tối thiểu 6 ký tự</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                                <button type="button" class="btn btn-outline-secondary" id="toggleConfirmPwd">
                                    <i class="fas fa-eye" id="eyeIconConfirm"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="button" class="btn btn-back flex-fill" onclick="window.location.href='login.html'">
                                <i class="fas fa-arrow-left me-2"></i>Quay lại
                            </button>
                            <button type="submit" class="btn btn-register flex-fill">
                                <i class="fas fa-user-plus me-2"></i>Đăng Ký
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">Đã có tài khoản? <a href="login.html" class="link-login">Đăng nhập ngay</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer sẽ được load tự động bởi shared-layout.js -->
    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script>
        // Hiển thị/ẩn mật khẩu
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        document.getElementById('toggleConfirmPwd').addEventListener('click', function() {
            const input = document.getElementById('confirmPassword');
            const icon = document.getElementById('eyeIconConfirm');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // Đánh giá độ mạnh mật khẩu
        document.getElementById('password').addEventListener('input', function() {
            const pwd = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            let strength = 0;
            let color = '#dc3545';
            let width = '20%';

            if (pwd.length >= 6) strength++;
            if (pwd.length >= 10) strength++;
            if (/[A-Z]/.test(pwd)) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            if (/[^A-Za-z0-9]/.test(pwd)) strength++;

            if (strength >= 4) { color = '#28a745'; width = '100%'; }
            else if (strength >= 3) { color = '#ffc107'; width = '75%'; }
            else if (strength >= 2) { color = '#fd7e14'; width = '50%'; }
            else if (strength >= 1) { color = '#dc3545'; width = '25%'; }

            strengthDiv.style.backgroundColor = color;
            strengthDiv.style.width = width;
        });

        // Validate số điện thoại
        document.getElementById('phone').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });

        // Xử lý đăng ký
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fullname = document.getElementById('fullname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('msg');
            const btn = document.querySelector('button[type="submit"]');

            // Validate
            if (!fullname) {
                msg.innerHTML = '<span class="text-danger">Vui lòng nhập họ và tên</span>';
                return;
            }

            if (!phone || phone.length < 10) {
                msg.innerHTML = '<span class="text-danger">Vui lòng nhập số điện thoại hợp lệ (10 số)</span>';
                return;
            }

            if (!password) {
                msg.innerHTML = '<span class="text-danger">Vui lòng nhập mật khẩu</span>';
                return;
            }

            if (password.length < 6) {
                msg.innerHTML = '<span class="text-danger">Mật khẩu phải có ít nhất 6 ký tự</span>';
                return;
            }

            if (password !== confirmPassword) {
                msg.innerHTML = '<span class="text-danger">Mật khẩu xác nhận không khớp</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng ký...';
            msg.innerHTML = '';

            try {
                // Kiểm tra số điện thoại đã tồn tại chưa
                const existing = await krud('list', 'khachhang');
                const data = Array.isArray(existing) ? existing : (existing.data || existing.rows || []);
                const phoneExists = data.find(item => item.sodienthoai === phone);

                if (phoneExists) {
                    throw new Error('Số điện thoại này đã được đăng ký');
                }

                // Tạo mới khách hàng
                const result = await krud('insert', 'khachhang', {
                    hovaten: fullname,
                    sodienthoai: phone,
                    email: email || '',
                    dia_chi: address || '',
                    matkhau: password,
                    trangthai: 'active',
                    ngaytao: new Date().toISOString().slice(0, 19).replace('T', ' ')
                });

                if (!result || result.error) {
                    throw new Error(result?.message || 'Đăng ký thất bại');
                }

                msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng ký thành công! Đang chuyển hướng...</span>';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (err) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>' + (err.message || 'Đăng ký thất bại') + '</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Đăng Ký';
            }
        });
    </script>
    
    <!-- File JS của dự án -->
    <script src="JS/shared-layout.js"></script>
    <script src="JS/user-nav-menu.js"></script>
</body>
</html>
