<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Dịch Vụ Thuê Tài Xế</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #007bff, #00b4d8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 450px;
            margin: 0 auto;
        }
        .login-header {
            background: linear-gradient(135deg, #0056b3, #007bff);
            color: #fff;
            padding: 30px;
            text-align: center;
        }
        .login-header img {
            height: 60px;
            margin-bottom: 15px;
        }
        .login-body {
            padding: 30px;
            background: #fff;
        }
        .btn-login {
            background: linear-gradient(135deg, #007bff, #00b4d8);
            border: none;
            padding: 12px;
            font-weight: 600;
            color: #fff;
            border-radius: 10px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #0056b3, #0096b8);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo_main.png" alt="Logo">
                <h3>Đăng nhập</h3>
                <p class="mb-0">Dịch Vụ Thuê Tài Xế</p>
            </div>
            <div class="login-body">
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="tel" id="phone" class="form-control" placeholder="Nhập số điện thoại" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                    </div>
                    <button type="submit" class="btn btn-login w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p>Chưa có tài khoản? <a href="register.html" class="fw-bold text-primary">Đăng ký ngay</a></p>
                    <a href="index.html" class="text-muted"><i class="bi bi-arrow-left me-1"></i>Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('d-none');
            
            if (!phone || !password) {
                errorMsg.textContent = 'Vui lòng nhập đầy đủ thông tin';
                errorMsg.classList.remove('d-none');
                return;
            }
            
          try {
    const res = await fetch('https://api.dvqt.vn/list/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ table: 'nguoidung' })
    });
    
    const data = await res.json();
    const users = data.data || data.rows || [];
    
    const user = users.find(u => {
        const userPhone = (u.sodienthoai || u.phone || '').trim();
        const userPass = (u.matkhau || u.password || '').trim();
        return userPhone === phone && userPass === password;
    });
    
    if (!user) {
        errorMsg.textContent = 'Số điện thoại hoặc mật khẩu không đúng';
        errorMsg.classList.remove('d-none');
        return;
    }
    
    // Set cookie
    document.cookie = `dvqt_u=${phone}; path=/; max-age=${30*24*60*60}`;
    document.cookie = `dvqt_p=${password}; path=/; max-age=${30*24*60*60}`;
    
    // Gọi session_user.php để tạo session
    const sessionRes = await fetch('session_user.php', { credentials: 'include' });
    const sessionData = await sessionRes.json();
    
    if (!sessionData.success) {
        errorMsg.textContent = sessionData.message || 'Không thể tạo phiên đăng nhập';
        errorMsg.classList.remove('d-none');
        return;
    }
    
    // Chuyển hướng
    const idDichvu = (user.id_dichvu || '').toString();
    const isDriver = idDichvu.includes('6') || idDichvu.includes('1');
    
    if (isDriver) {
        window.location.href = 'nhan_vien/danh-sach-don-hang.php';
    } else {
        window.location.href = 'khach_hang/danh-sach-don-hang.php';
    }
} catch (err) {
    console.error('Lỗi:', err);
    errorMsg.textContent = 'Lỗi kết nối: ' + err.message;
    errorMsg.classList.remove('d-none');
}
        });
    </script>
</body>
</html>
