<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản – Dịch Vụ Quanh Ta</title>
    <meta name="description"
        content="Đăng ký tài khoản Dịch Vụ Quanh Ta – Đặt dịch vụ nhanh hoặc trở thành nhà cung cấp dịch vụ chuyên nghiệp.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="asset/css/auth.css">
    <link rel="stylesheet" href="asset/css/registration.css">
</head>

<body>
    <div class="auth-card">
        <!-- Header -->
        <div class="brand">
            <img src="asset/image/logo-dich-vu-quanh-ta.png" alt="Dịch Vụ Quanh Ta" style="width: 80px; height: auto;">
            <span class="brand-name">Dịch Vụ <span style="color: var(--auth-primary);">Quanh Ta</span></span>
        </div>
        <p class="auth-subtitle">Gia nhập cộng đồng Dịch Vụ Quanh Ta ngay hôm nay</p>

        <div class="row g-3">
            <!-- Họ tên -->
            <div class="col-12">
                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="reg_name" class="form-control" placeholder="Nhập họ tên" autocomplete="name">
                </div>
            </div>

            <!-- SĐT + Email -->
            <div class="col-sm-6">
                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" id="reg_phone" class="form-control" placeholder="09xx xxx xxx" autocomplete="tel">
                </div>
            </div>
            <div class="col-sm-6">
                <label class="form-label">Email</label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="reg_email" class="form-control" placeholder="Nhập email"
                        autocomplete="email">
                </div>
            </div>

            <!-- Địa chỉ + Bản đồ -->
            <div class="col-12">
                <label class="form-label">Địa chỉ <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                    <input type="text" id="diachi" class="form-control" placeholder="Số nhà, đường, phường, quận..."
                        autocomplete="street-address">
                </div>
                <div class="map-area">
                    <div class="map-btns">
                        <button type="button" class="btn-map-toggle" id="btnbando" onclick="window.mapPicker.toggle()">
                            <i class="fa-solid fa-location-dot"></i> Chọn trên bản đồ
                        </button>
                        <button type="button" class="btn-gps" onclick="window.mapPicker.gps()">
                            <i class="fa-solid fa-location-arrow"></i> Vị trí hiện tại
                        </button>
                    </div>
                    <div id="mapPickerBox" style="display:none;">
                        <div id="mapPickerEl"></div>
                    </div>
                    <div class="coord-info" id="coordInfo" style="display:none;">
                        <span id="coordLat"></span>
                        <span id="coordLng"></span>
                    </div>
                </div>
                <input type="hidden" id="reg_lat" value="">
                <input type="hidden" id="reg_lng" value="">
            </div>

            <!-- Avatar -->
            <div class="col-sm-4">
                <label class="form-label" style="text-align:center; display:block;">Ảnh đại diện</label>
                <div class="avatar-upload" id="avatarZone" onclick="document.getElementById('avatarInput').click()">
                    <div class="avatar-placeholder">
                        <i class="fas fa-camera"></i>
                        <span>Tải ảnh</span>
                    </div>
                    <img id="avatarPreview" src="" alt="Avatar">
                </div>
                <input type="file" id="avatarInput" accept="image/*" style="display:none;">
            </div>

            <!-- CCCD -->
            <div class="col-sm-8">
                <label class="form-label">Căn cước công dân</label>
                <div class="cccd-grid">
                    <div class="cccd-zone" id="cccdFrontZone"
                        onclick="document.getElementById('cccdFrontInput').click()">
                        <i class="fas fa-id-card"></i>
                        <span>Mặt trước</span>
                        <img id="cccdFrontPreview" src="" alt="CCCD trước">
                        <button type="button" class="remove-btn"
                            onclick="event.stopPropagation(); regUpload.removeCccd('front')"><i
                                class="fas fa-times"></i></button>
                    </div>
                    <input type="file" id="cccdFrontInput" accept="image/*" style="display:none;">
                    <div class="cccd-zone" id="cccdBackZone" onclick="document.getElementById('cccdBackInput').click()">
                        <i class="fas fa-id-card"></i>
                        <span>Mặt sau</span>
                        <img id="cccdBackPreview" src="" alt="CCCD sau">
                        <button type="button" class="remove-btn"
                            onclick="event.stopPropagation(); regUpload.removeCccd('back')"><i
                                class="fas fa-times"></i></button>
                    </div>
                    <input type="file" id="cccdBackInput" accept="image/*" style="display:none;">
                </div>
            </div>

            <!-- Mật khẩu -->
            <div class="col-sm-6">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="reg_password" class="form-control" placeholder="Ít nhất 6 ký tự"
                        autocomplete="new-password">
                    <button class="btn toggle-pwd border" type="button" id="togglePwd">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="pwd-rules" id="pwdRules">
                    <span class="pwd-rule" data-rule="len">6+ ký tự</span>
                    <span class="pwd-rule" data-rule="upper">Chữ hoa</span>
                    <span class="pwd-rule" data-rule="num">Số</span>
                </div>
            </div>
            <div class="col-sm-6">
                <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="reg_confirm" class="form-control" placeholder="Nhập lại mật khẩu"
                        autocomplete="new-password">
                </div>
                <div id="confirmMatch" style="font-size:0.78rem; margin-top:4px;"></div>
            </div>

            <!-- Chọn dịch vụ (collapsible) -->
            <div class="col-12">
                <div class="svc-toggle-wrap">
                    <button type="button" class="svc-toggle-btn" id="svcToggleBtn" onclick="toggleServices()">
                        <span class="svc-toggle-left">
                            <i class="fas fa-briefcase"></i>
                            <span>Đăng ký cung cấp dịch vụ</span>
                        </span>
                        <span class="svc-toggle-badge" id="svcBadge"></span>
                        <i class="fas fa-chevron-down svc-toggle-arrow" id="svcArrow"></i>
                    </button>
                    <div class="svc-collapse" id="svcCollapse">
                        <p class="svc-hint" style="margin-top:0;">
                            <i class="fas fa-info-circle me-1"></i>
                            Chọn các dịch vụ bạn muốn cung cấp. Bỏ qua nếu chỉ đặt dịch vụ.
                        </p>
                        <div class="svc-grid" id="svcGrid"></div>
                        <p class="svc-hint" id="svcSelectedCount"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nút submit -->
        <button class="btn-submit mt-3" id="btnSubmit" onclick="regSubmit()">
            <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a>
            <span class="divider">|</span>
            <a href="../index.html"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="asset/js/dvqt-map.js"></script>
    <script src="asset/js/dvqt-krud.js"></script>
    <script src="asset/js/dvqt-app.js"></script>
    <script src="asset/js/registration.js"></script>
</body>

</html>
