<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập – Dịch Vụ Quanh Ta</title>
    <meta name="description"
        content="Đăng nhập tài khoản Dịch Vụ Quanh Ta – Đặt dịch vụ hoặc cung cấp dịch vụ chuyên nghiệp.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="asset/css/auth.css">
    <link rel="stylesheet" href="asset/css/login.css">
</head>

<body>
    <div class="auth-card">
        <!-- Header -->
        <div class="brand">
            <img src="asset/image/logo-dich-vu-quanh-ta.png" alt="Dịch Vụ Quanh Ta" style="width: 80px; height: auto;">
            <span class="brand-name">Dịch Vụ <span style="color: var(--auth-primary);">Quanh Ta</span></span>
        </div>
        <p class="auth-subtitle">Giải pháp tiện nghi cho cuộc sống hiện đại</p>

        <!-- Form -->
        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="tel" id="login_phone" class="form-control" placeholder="09xx xxx xxx" autocomplete="tel">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="login_password" class="form-control" placeholder="Nhập mật khẩu"
                    autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-submit" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a>
            <span class="divider">|</span>
            <a href="../index.html"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>
    </div>

    <script src="asset/js/dvqt-krud.js"></script>
    <script src="asset/js/dvqt-app.js"></script>
    <script src="asset/js/login.js"></script>
</body>

</html>
