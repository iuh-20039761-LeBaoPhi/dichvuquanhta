<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Admin - Dịch Vụ Quanh Ta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Public Sans', sans-serif;
        }

        .login-card {
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            background: #fff;
        }

        .brand-logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            background: #eff6ff;
            padding: 10px;
        }

        .btn-primary {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }

        .btn-primary:hover {
            background-color: #4338ca;
            border-color: #4338ca;
        }
    </style>
</head>

<body>
    <div class="login-card text-center">
        <!-- Có thể dùng logo thật tại đây -->
        <div class="brand-logo mx-auto d-flex align-items-center justify-content-center mb-4">
            <img src="asset/image/logo-dich-vu-quanh-ta.png" alt="Logo" style="max-width: 100%; max-height: 100%; object-fit: contain;">
        </div>
        <h3 class="fw-bold mb-4">Đăng nhập admin DVQT</h3>
        <form id="formAdminLogin">
            <div class="mb-3 text-start">
                <label class="form-label fw-semibold text-muted small text-uppercase">Email Đăng Nhập</label>
                <input type="email" id="txtEmail" class="form-control form-control-lg fs-6" required
                    placeholder="Nhập tài khoản">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-semibold text-muted small text-uppercase">Mật Khẩu</label>
                <div class="input-group">
                    <input type="password" id="txtPassword" class="form-control form-control-lg fs-6 border-end-0"
                        required placeholder="Nhập mật khẩu"
                        style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                    <button class="btn border border-start-0 bg-white text-muted" type="button" id="btnTogglePassword"
                        style="border-top-right-radius: 12px; border-bottom-right-radius: 12px;">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-6 mt-2" id="btnLogin">
                ĐĂNG NHẬP
            </button>
        </form>
        <div class="mt-4 text-muted small fw-medium" id="loginStatus"></div>

        <hr class="mt-4 opacity-5">

        <div class="text-center">
            <a href="../index.html" class="text-muted text-decoration-none small" style="transition: color 0.3s;"
                onmouseover="this.style.color='#4f46e5'" onmouseout="this.style.color='#6c757d'">
                <i class="fas fa-home me-1"></i> Quay lại trang chủ
            </a>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="asset/js/dvqt-krud.js"></script>
    <script src="asset/js/sweetalert-utils.js"></script>
    <script src="asset/js/admin-login.js"></script>
    <script>
        document.getElementById('btnTogglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('txtPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });
    </script>
</body>

</html>
