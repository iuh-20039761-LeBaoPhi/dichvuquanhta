<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Admin - Dịch Vụ Quanh Ta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        body { background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Public Sans', sans-serif;}
        .login-card { border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; padding: 2.5rem 2rem; background: #fff;}
        .brand-logo { width: 72px; height: 72px; object-fit: contain; border-radius: 12px; margin-bottom: 1.5rem; background: #eff6ff; padding: 10px;}
        .btn-primary { background-color: #4f46e5; border-color: #4f46e5; }
        .btn-primary:hover { background-color: #4338ca; border-color: #4338ca; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <!-- Có thể dùng logo thật tại đây -->
        <div class="brand-logo mx-auto text-primary d-flex align-items-center justify-content-center h2 mb-4">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h3 class="fw-bold mb-4">Quản Trị Hệ Thống</h3>
        <form id="formAdminLogin">
            <div class="mb-3 text-start">
                <label class="form-label fw-semibold text-muted small text-uppercase">Email Đăng Nhập</label>
                <input type="email" id="txtEmail" class="form-control form-control-lg fs-6" required placeholder="admin@dvqt.vn">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-semibold text-muted small text-uppercase">Mật Khẩu</label>
                <input type="password" id="txtPassword" class="form-control form-control-lg fs-6" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-6 mt-2" id="btnLogin">
                ĐĂNG NHẬP
            </button>
        </form>
        <div class="mt-4 text-muted small fw-medium" id="loginStatus"></div>
    </div>
    
    <!-- Dependencies -->
    <script src="asset/js/dvqt-krud.js"></script>
    <script src="asset/js/admin-login.js"></script>
</body>
</html>
