<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVQT - Công cụ Xóa Dữ liệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            padding: 50px 20px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .btn-danger {
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
        }

        .status-msg {
            margin-top: 20px;
            border-radius: 8px;
            padding: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 500px;">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="fas fa-trash-alt text-danger me-2"></i>Xóa Dữ liệu Hàng loạt</h3>

            <div class="mb-3">
                <label class="form-label fw-bold">Tên bảng <span class="text-danger">*</span></label>
                <input type="text" id="tableName" class="form-control" placeholder="Ví dụ: datlich_thonha">
            </div>

            <div class="row g-2 mb-4">
                <div class="col-6">
                    <label class="form-label fw-bold">Từ ID <span class="text-danger">*</span></label>
                    <input type="number" id="fromId" class="form-control" placeholder="ID bắt đầu">
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold">Đến ID <span class="text-danger">*</span></label>
                    <input type="number" id="toId" class="form-control" placeholder="ID kết thúc">
                </div>
            </div>

            <button class="btn btn-danger w-100" id="deleteBtn">
                <i class="fas fa-exclamation-triangle me-2"></i>Xác nhận Xóa Hàng loạt
            </button>

            <div id="statusMsg" class="status-msg"></div>

            <div class="mt-4 text-center small text-muted">
                <p>Lưu ý: Thao tác sẽ chạy tuần tự từ ID bắt đầu đến ID kết thúc. Chỉ xóa những ID tồn tại.</p>
                <a href="../index.html" class="text-decoration-none"><i class="fas fa-home me-1"></i>Về trang chủ</a>
            </div>
        </div>
    </div>

    <!-- DVQT Shared Helpers -->
    <script src="asset/js/dvqt-krud.js"></script>

    <script>
        const btn = document.getElementById('deleteBtn');
        const status = document.getElementById('statusMsg');

        function showMessage(text, type) {
            status.textContent = text;
            status.className = 'status-msg alert alert-' + type;
            status.style.display = 'block';
        }

        btn.addEventListener('click', async () => {
            const table = document.getElementById('tableName').value.trim();
            const from = parseInt(document.getElementById('fromId').value);
            const to = parseInt(document.getElementById('toId').value);

            if (!table || isNaN(from) || isNaN(to)) {
                return showMessage('Vui lòng nhập đầy đủ Tên bảng và dải ID.', 'warning');
            }

            if (from > to) {
                return showMessage('ID bắt đầu phải nhỏ hơn hoặc bằng ID kết thúc.', 'warning');
            }

            const count = to - from + 1;
            if (!confirm(`Bạn có chắc chắn muốn XÓA ${count} bản ghi từ ID ${from} đến ${to} trong bảng "${table}"?`)) {
                return;
            }

            btn.disabled = true;
            status.style.display = 'none';

            try {
                if (!window.DVQTKrud) throw new Error('Không nạp được thư viện DVQTKrud');

                let successCount = 0;
                let failCount = 0;

                for (let currentId = from; currentId <= to; currentId++) {
                    const pct = Math.round(((currentId - from) / count) * 100);
                    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Đang xóa ID ${currentId} (${pct}%)`;

                    try {
                        const result = await window.DVQTKrud.runAction('delete', table, {}, currentId);
                        successCount++;
                    } catch (e) {
                        console.warn(`Lỗi khi xóa ID ${currentId}:`, e.message);
                        failCount++;
                    }
                }

                showMessage(`Hoàn tất! Đã xóa xong ${successCount} bản ghi. (Thất bại: ${failCount}).`, successCount > 0 ? 'success' : 'danger');
                document.getElementById('fromId').value = '';
                document.getElementById('toId').value = '';
            } catch (err) {
                console.error('Delete Error:', err);
                showMessage('Lỗi hệ thống: ' + (err.message || 'Không thể thực hiện'), 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Xác nhận Xóa Hàng loạt';
            }
        });
    </script>
</body>

</html>
