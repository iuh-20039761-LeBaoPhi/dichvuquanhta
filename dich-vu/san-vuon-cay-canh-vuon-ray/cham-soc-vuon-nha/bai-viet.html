<!doctype html>
<html lang="vi">
<head>
  <script src="/ga.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dịch Vụ Quanh Ta - Chăm Sóc Vườn Nhà - Bài Viết</title>
  <link rel="shortcut icon" type="image/x-icon" href="assets/images/logo2.jpg" />
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root { 
      --primary-green: #1a4d2e; 
      --accent-green: #4f6f52; 
      --soft-lime: #e8f3d6; 
      --nature-white: #f9fbf9; 
      --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    body { 
      font-family: "Quicksand", sans-serif; 
      background-color: var(--nature-white); 
      padding-top: 96px; 
    }

    /* --- GIỮ NGUYÊN CSS CŨ --- */
    .hero-section {
      background: radial-gradient(circle at 80% 20%, #e8f3d6 0%, #ffffff 60%);
      padding: 160px 0 100px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .hero-section::before {
      content: "Articles";
      position: absolute;
      font-family: 'Playfair Display';
      font-size: 15vw;
      font-weight: 900;
      color: rgba(26, 77, 46, 0.03);
      top: 0; left: -2%;
      z-index: 0;
    }

    .hero-section h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--primary-green);
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.2;
      position: relative;
      z-index: 1;
    }

    .custom-underline {
      width: 120px; 
      height: 5px; 
      background: var(--primary-green); 
      margin: 20px auto 0; 
      border-radius: 50px;
    }

    .post-card { 
      border: none; 
      background: #ffffff;
      border-radius: 40px; 
      transition: var(--transition); 
      overflow: hidden; 
      height: 100%; 
      border: 1px solid rgba(26, 77, 46, 0.05);
      padding: 12px;
      cursor: pointer;
    }

    .post-card:hover { 
      transform: translateY(-12px); 
      box-shadow: 0 30px 60px rgba(26, 77, 46, 0.1) !important; 
    }

    .post-img-wrapper {
      height: 240px;
      overflow: hidden;
      border-radius: 32px;
    }

    .post-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .post-card:hover .post-img-wrapper img {
      transform: scale(1.1);
    }

    .cat-badge { 
      background: var(--soft-lime); 
      color: var(--primary-green); 
      padding: 6px 18px; 
      border-radius: 50px; 
      font-size: 0.8rem; 
      font-weight: 700;
      display: inline-block;
      margin-bottom: 15px;
    }

    .btn-filter { 
      border: 1px solid transparent; 
      background: #fff; 
      color: var(--accent-green); 
      border-radius: 50px; 
      padding: 10px 24px; 
      font-weight: 700; 
      transition: 0.3s; 
      margin: 5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .btn-filter.active, .btn-filter:hover { 
      background: var(--primary-green); 
      color: #fff; 
    }

    .sidebar-box {
      border-radius: 35px;
      background: #fff;
      padding: 30px;
      border: 1px solid rgba(0,0,0,0.03);
    }

    .search-input {
      border-radius: 20px !important;
      padding: 12px 20px;
      background: var(--nature-white);
      border: 1px solid #eee;
    }

    .search-input:focus {
      box-shadow: none;
      border-color: var(--accent-green);
    }

    /* Phân trang */
    .page-link {
        color: var(--primary-green);
        border: none;
        margin: 0 5px;
        border-radius: 10px !important;
        font-weight: 600;
    }
    .page-item.active .page-link {
        background-color: var(--primary-green);
        border-color: var(--primary-green);
    }

    @media (max-width: 991px) {
      .navbar-collapse {
        background: rgba(255, 255, 255, 0.98) !important;
        backdrop-filter: blur(15px);
        padding: 25px;
        border-radius: 20px;
        margin-top: 15px;
        box-shadow: 0 15px 35px rgba(26, 77, 46, 0.15) !important;
        position: relative;
        z-index: 2000;
        border: 1px solid rgba(26, 77, 46, 0.08);
      }
      .navbar-nav .nav-link {
        padding: 12px 15px !important;
        color: var(--primary-green) !important;
        border-radius: 12px;
        margin-bottom: 5px;
      }
      .navbar-nav .nav-link:hover {
        background: var(--soft-lime);
      }
    }

    @media (max-width: 768px) {
      .hero-section h1 { font-size: 2.6rem; }
      .hero-section { padding: 120px 0 60px; }
    }
  </style>
</head>

<body data-nav-active="blog">
  <div id="site-header"></div>

  <section class="hero-section">
    <div class="container position-relative">
      <h1>Những <span style="color: var(--accent-green)">Bài Viết</span> <br> Chia Sẻ Từ Nghệ Nhân</h1>
      <p class="lead text-muted mb-4 fw-medium fs-4">Kỹ thuật chăm sóc và bí quyết kiến tạo không gian xanh.</p>
      <div class="custom-underline"></div>
    </div>
  </section>

  <main class="py-5">
    <div class="container">
      <div class="row g-5">
        <div class="col-lg-8">
          <div class="d-flex flex-wrap justify-content-start mb-5" id="filter-bar">
            <button class="btn-filter active" onclick="filterCat('all', this)">Tất cả bài viết</button>
          </div>
          
          <div class="row g-4" id="posts-grid">
          </div>

          <nav class="mt-5">
            <ul class="pagination justify-content-center" id="pagination"></ul>
          </nav>
        </div>

        <div class="col-lg-4">
          <div class="sidebar-box shadow-sm sticky-top" style="top: 120px;">
            <h5 class="fw-bold mb-4" style="color: var(--primary-green)">Tìm kiếm bài viết</h5>
            <div class="input-group mb-5">
              <input type="text" id="search-input" class="form-control search-input" placeholder="Bạn muốn tìm gì?">
            </div>
            
            <h5 class="fw-bold mb-3" style="color: var(--primary-green)">Chuyên mục</h5>
            <div id="sb-cats" class="d-flex flex-column gap-3">
              </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="JS/api-client.js"></script>
  
  <script src="JS/shared-layout.js"></script>
  <script src="JS/user-nav-menu.js"></script>

  <script>
    $(document).ready(async function () {
      let allPosts = [];
      let filteredPosts = [];
      const postsPerPage = 6;
      let currentPage = 1;

      // 1. Kết nối Header và Footer
      if ($("#site-header").is(':empty')) {
          $("#site-header").load("header.html", function() {
              const navMenu = document.getElementById('navMenu');
              if (navMenu && typeof bootstrap !== 'undefined') {
                  new bootstrap.Collapse(navMenu, { toggle: false });
              }
          });
      }
      if ($("#site-footer").is(':empty')) $("#site-footer").load("html/shared-footer.html");

      // 2. Hàm hiển thị bài viết theo trang
      function displayPosts(page) {
          const postsGrid = $('#posts-grid');
          postsGrid.empty();

          const startIndex = (page - 1) * postsPerPage;
          const endIndex = startIndex + postsPerPage;
          const paginatedPosts = filteredPosts.slice(startIndex, endIndex);

          if (paginatedPosts.length === 0) {
              postsGrid.html('<p class="text-center w-100">Không có bài viết nào phù hợp.</p>');
              return;
          }

          paginatedPosts.forEach(post => {
              postsGrid.append(`
                <div class="col-md-6">
                  <div class="post-card shadow-sm" onclick="window.location.href='chi-tiet-bai-viet.html?id=${post.id}'">
                    <div class="post-img-wrapper">
                      <img src="assets/images/${post.image}" alt="${post.title}" onerror="this.src='https://via.placeholder.com/400x250?text=Green+Garden'">
                    </div>
                    <div class="card-body p-3">
                      <span class="cat-badge">${post.category || 'Tin tức'}</span>
                      <h4 class="fw-bold h5 mb-3" style="font-family: 'Playfair Display', serif; line-height:1.4; color: var(--primary-green)">
                        ${post.title}
                      </h4>
                      <div class="d-flex justify-content-between text-muted small mt-auto">
                        <span><i class="far fa-calendar-alt me-1"></i> ${post.date || '01/01/2024'}</span>
                        <span><i class="far fa-clock me-1"></i> ${post.readingTime || 5} phút đọc</span>
                      </div>
                    </div>
                  </div>
                </div>
              `);
          });
          renderPagination();
      }

      // 3. Hàm tạo nút phân trang
      function renderPagination() {
          const pagination = $('#pagination');
          pagination.empty();
          const totalPages = Math.ceil(filteredPosts.length / postsPerPage);

          if (totalPages <= 1) return;

          for (let i = 1; i <= totalPages; i++) {
              pagination.append(`
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                  <a class="page-link shadow-sm" href="javascript:void(0)" data-page="${i}">${i}</a>
                </li>
              `);
          }
      }

      // 4. Tải dữ liệu bài viết
      try {
        allPosts = await API.getPosts();
        
        // Xử lý khi API trả về rỗng hoặc không phải mảng
        if (!allPosts || !Array.isArray(allPosts) || allPosts.length === 0) {
          $('#posts-grid').html(`
            <div class="col-12">
              <div class="text-center py-5">
                <div style="font-size: 3rem; color: #ccc; margin-bottom: 20px;">
                  <i class="fas fa-inbox"></i>
                </div>
                <h3 class="text-muted">Chưa có bài viết nào</h3>
                <p class="text-secondary">Hệ thống hiện chưa có bài viết nào. Vui lòng quay lại sau để xem những bài viết mới nhất.</p>
              </div>
            </div>
          `);
          $('#pagination-container').html('');
          $('#filter-bar').html(`<button class="btn-filter active" data-cat="all">Tất cả</button>`);
          $('#sb-cats').html(`<p class="text-muted small px-3">Không có chuyên mục</p>`);
          return;
        }
        
        filteredPosts = [...allPosts];
        
        displayPosts(currentPage);

        // Tự động tạo Chuyên mục
        const categories = [...new Set(allPosts.map(p => p.category))];
        const filterBar = $('#filter-bar');
        const sbCats = $('#sb-cats');

        categories.forEach(cat => {
            if(cat) {
                filterBar.append(`<button class="btn-filter" data-cat="${cat}">${cat}</button>`);
                sbCats.append(`
                    <a href="#" class="text-decoration-none text-dark d-flex justify-content-between align-items-center sidebar-cat-link" data-cat="${cat}">
                        <span class="fw-medium">${cat}</span>
                        <span class="badge rounded-pill bg-light text-dark border">${allPosts.filter(p => p.category === cat).length}</span>
                    </a>
                `);
            }
        });

        // Xử lý click lọc
        $(document).on('click', '.btn-filter', function() {
            $('.btn-filter').removeClass('active');
            $(this).addClass('active');
            
            const selectedCat = $(this).data('cat');
            currentPage = 1;

            if (!selectedCat || selectedCat === 'all') {
                filteredPosts = [...allPosts];
            } else {
                filteredPosts = allPosts.filter(p => p.category === selectedCat);
            }
            displayPosts(currentPage);
        });

        $('.btn-filter:first').attr('data-cat', 'all');

        // Xử lý click chuyển trang
        $(document).on('click', '.page-link', function() {
            currentPage = parseInt($(this).data('page'));
            displayPosts(currentPage);
            window.scrollTo({ top: 400, behavior: 'smooth' });
        });

        // Sidebar click lọc
        $(document).on('click', '.sidebar-cat-link', function(e) {
            e.preventDefault();
            const cat = $(this).data('cat');
            $(`.btn-filter[data-cat="${cat}"]`).click();
        });

      } catch (e) { 
        console.error("Lỗi tải dữ liệu bài viết:", e); 
        $('#posts-grid').html(`
          <div class="col-12">
            <div class="text-center py-5">
              <div style="font-size: 3rem; color: #dc3545; margin-bottom: 20px;">
                <i class="fas fa-exclamation-triangle"></i>
              </div>
              <h3 class="text-danger">Không thể tải bài viết</h3>
              <p class="text-muted mb-4">Đã xảy ra lỗi khi tải danh sách bài viết. Vui lòng thử lại sau.</p>
              <button class="btn btn-outline-danger rounded-pill" onclick="window.location.reload()"><i class="fas fa-redo me-1"></i>Thử lại</button>
            </div>
          </div>
        `);
      }
    });
  </script>

</body>
</html>
