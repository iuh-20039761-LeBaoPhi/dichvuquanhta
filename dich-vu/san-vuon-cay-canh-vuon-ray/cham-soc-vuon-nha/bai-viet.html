<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài Viết - Chăm Sóc Vườn Nhà</title>
  <link rel="shortcut icon" type="image/x-icon" href="assets/images/logo1.jpg" />
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root { 
      --primary-green: #1a4d2e; 
      --accent-green: #4f6f52; 
      --soft-lime: #e8f3d6; 
      --nature-white: #f9fbf9; 
      --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    body { 
      font-family: "Quicksand", sans-serif; 
      background-color: var(--nature-white); 
      padding-top: 96px; 
    }

    /* --- HERO SECTION ĐỒNG NHẤT VỚI TRANG DỊCH VỤ --- */
    .hero-section {
      background: radial-gradient(circle at 80% 20%, #e8f3d6 0%, #ffffff 60%);
      padding: 160px 0 100px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .hero-section::before {
      content: "Articles";
      position: absolute;
      font-family: 'Playfair Display';
      font-size: 15vw;
      font-weight: 900;
      color: rgba(26, 77, 46, 0.03);
      top: 0; left: -2%;
      z-index: 0;
    }

    .hero-section h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--primary-green);
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.2;
      position: relative;
      z-index: 1;
    }

    .custom-underline {
      width: 120px; 
      height: 5px; 
      background: var(--primary-green); 
      margin: 20px auto 0; 
      border-radius: 50px;
    }

    /* --- POST CARD PHONG CÁCH MỚI --- */
    .post-card { 
      border: none; 
      background: #ffffff;
      border-radius: 40px; 
      transition: var(--transition); 
      overflow: hidden; 
      height: 100%; 
      border: 1px solid rgba(26, 77, 46, 0.05);
      padding: 12px;
      cursor: pointer;
    }

    .post-card:hover { 
      transform: translateY(-12px); 
      box-shadow: 0 30px 60px rgba(26, 77, 46, 0.1) !important; 
    }

    .post-img-wrapper {
      height: 240px;
      overflow: hidden;
      border-radius: 32px;
    }

    .post-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .post-card:hover .post-img-wrapper img {
      transform: scale(1.1);
    }

    .cat-badge { 
      background: var(--soft-lime); 
      color: var(--primary-green); 
      padding: 6px 18px; 
      border-radius: 50px; 
      font-size: 0.8rem; 
      font-weight: 700;
      display: inline-block;
      margin-bottom: 15px;
    }

    /* --- FILTER BUTTONS --- */
    .btn-filter { 
      border: 1px solid transparent; 
      background: #fff; 
      color: var(--accent-green); 
      border-radius: 50px; 
      padding: 10px 24px; 
      font-weight: 700; 
      transition: 0.3s; 
      margin: 5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .btn-filter.active, .btn-filter:hover { 
      background: var(--primary-green); 
      color: #fff; 
    }

    /* --- SIDEBAR SEARCH --- */
    .sidebar-box {
      border-radius: 35px;
      background: #fff;
      padding: 30px;
      border: 1px solid rgba(0,0,0,0.03);
    }

    .search-input {
      border-radius: 20px !important;
      padding: 12px 20px;
      background: var(--nature-white);
      border: 1px solid #eee;
    }

    .search-input:focus {
      box-shadow: none;
      border-color: var(--accent-green);
    }

    @media (max-width: 768px) {
      .hero-section h1 { font-size: 2.6rem; }
      .hero-section { padding: 120px 0 60px; }
    }
  </style>
</head>

<body data-nav-active="blog">
  <div id="site-header"></div>

  <section class="hero-section">
    <div class="container position-relative">
      <h1>Những <span style="color: var(--accent-green)">Bài Viết</span> <br> Chia Sẻ Từ Nghệ Nhân</h1>
      <p class="lead text-muted mb-4 fw-medium fs-4">Kỹ thuật chăm sóc và bí quyết kiến tạo không gian xanh.</p>
      <div class="custom-underline"></div>
    </div>
  </section>

  <main class="py-5">
    <div class="container">
      <div class="row g-5">
        <div class="col-lg-8">
          <div class="d-flex flex-wrap justify-content-start mb-5" id="filter-bar">
            <button class="btn-filter active" onclick="filterCat('all', this)">Tất cả bài viết</button>
          </div>
          
          <div class="row g-4" id="posts-grid">
            </div>

          <nav class="mt-5">
            <ul class="pagination justify-content-center" id="pagination"></ul>
          </nav>
        </div>

        <div class="col-lg-4">
          <div class="sidebar-box shadow-sm sticky-top" style="top: 120px;">
            <h5 class="fw-bold mb-4" style="color: var(--primary-green)">Tìm kiếm bài viết</h5>
            <div class="input-group mb-5">
              <input type="text" id="search-input" class="form-control search-input" placeholder="Bạn muốn tìm gì?">
            </div>
            
            <h5 class="fw-bold mb-3" style="color: var(--primary-green)">Chuyên mục</h5>
            <div id="sb-cats" class="d-flex flex-column gap-3">
              </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    const JSON_URL = 'bai-viet.json'; 
    const PER_PAGE = 6;
    let allPosts = [], filtered = [], curCat = 'all', curQ = '', curPage = 1;

    $(document).ready(function() {
      $.getJSON(JSON_URL)
        .done(function(data) {
          allPosts = data;
          buildFilters();
          applyFilter();
        })
        .fail(function() {
          $('#posts-grid').html('<div class="col-12 text-center py-5">Lỗi tải bài viết. Vui lòng kiểm tra file JSON.</div>');
        });

      $('#search-input').on('input', function() {
        curQ = $(this).val().toLowerCase();
        curPage = 1; 
        applyFilter();
      });
    });

    function applyFilter() {
      filtered = allPosts.filter(p => {
        const mCat = (curCat === 'all' || p.category === curCat);
        const mSearch = (p.title.toLowerCase().includes(curQ) || p.category.toLowerCase().includes(curQ));
        return mCat && mSearch;
      });
      renderGrid();
      renderPagination();
    }

    function renderGrid() {
      const grid = $('#posts-grid');
      const start = (curPage - 1) * PER_PAGE;
      const slice = filtered.slice(start, start + PER_PAGE);
      
      if (slice.length === 0) {
        grid.html('<div class="col-12 text-center py-5"><p class="text-muted">Không có bài viết nào phù hợp với tìm kiếm của bạn.</p></div>');
        return;
      }

      const html = slice.map(p => `
        <div class="col-md-6">
          <div class="post-card shadow-sm" onclick="window.location.href='chi-tiet-bai-viet.html?id=${p.id}'">
            <div class="post-img-wrapper">
              <img src="assets/images/${p.image}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/400x250?text=Green+Garden'">
            </div>
            <div class="card-body p-3">
              <span class="cat-badge">${p.category}</span>
              <h4 class="fw-bold h5 mb-3" style="font-family: 'Playfair Display', serif; line-height:1.4">${p.title}</h4>
              <div class="d-flex justify-content-between text-muted small mt-auto">
                <span><i class="far fa-calendar-alt me-1"></i> ${p.date}</span>
                <span><i class="far fa-clock me-1"></i> ${p.readingTime || 5} phút đọc</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
      
      grid.html(html);
    }

    function buildFilters() {
      const cats = [...new Set(allPosts.map(p => p.category))];
      cats.forEach(c => {
        $('#filter-bar').append(`<button class="btn-filter" onclick="filterCat('${c}', this)">${c}</button>`);
        $('#sb-cats').append(`
          <a href="javascript:void(0)" onclick="filterCatLink('${c}')" class="text-decoration-none text-dark d-flex justify-content-between align-items-center">
            <span class="fw-medium">${c}</span>
            <span class="badge rounded-pill bg-light text-dark border">${allPosts.filter(x => x.category === c).length}</span>
          </a>
        `);
      });
    }

    function filterCat(cat, btn) {
      curCat = cat; curPage = 1;
      $('.btn-filter').removeClass('active');
      if (btn) $(btn).addClass('active');
      applyFilter();
    }

    function filterCatLink(cat) {
      $(`.btn-filter:contains('${cat}')`).click();
      window.scrollTo({ top: 400, behavior: 'smooth' });
    }

    function renderPagination() {
      const total = Math.ceil(filtered.length / PER_PAGE);
      let html = '';
      if (total <= 1) { $('#pagination').html(''); return; }
      
      for(let i=1; i<=total; i++) {
        html += `<li class="page-item ${i===curPage?'active':''}">
                  <a class="page-link shadow-sm mx-1 rounded-3" href="javascript:void(0)" onclick="changePage(${i})">${i}</a>
                </li>`;
      }
      $('#pagination').html(html);
    }

    function changePage(p) { curPage = p; renderGrid(); renderPagination(); window.scrollTo({ top: 300, behavior: 'smooth' }); }
  </script>

</body>
</html>
