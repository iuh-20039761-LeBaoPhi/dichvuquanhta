<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dịch Vụ - Chăm Sóc Vườn Nhà</title>
  <link rel="shortcut icon" type="image/x-icon" href="assets/images/logo1.jpg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary-green: #1a4d2e;
      --accent-green: #4f6f52;
      --soft-lime: #e8f3d6;
      --nature-white: #f9fbf9;
      --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    body {
      font-family: "Quicksand", sans-serif;
      padding-top: 96px;
      background-color: var(--nature-white);
    }

    /* --- HERO SECTION (PHONG CÁCH TRANG GIỚI THIỆU) --- */
    .hero-section {
      background: radial-gradient(circle at 80% 20%, #e8f3d6 0%, #ffffff 60%);
      padding: 160px 0 100px;
      position: relative;
      overflow: hidden;
    }

    /* Chữ mờ chạy nền giống trang giới thiệu */
    .hero-section::before {
      content: "Services";
      position: absolute;
      font-family: 'Playfair Display';
      font-size: 15vw;
      font-weight: 900;
      color: rgba(26, 77, 46, 0.03);
      top: 0; left: -2%;
      z-index: 0;
    }

    .hero-section h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic; /* Chữ nghiêng nghệ thuật */
      color: var(--primary-green);
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
    }

    .custom-underline {
      width: 120px; 
      height: 5px; 
      background: var(--primary-green); 
      margin: 20px auto 0; 
      border-radius: 50px;
    }

    /* --- SERVICE CARD CHỈNH CHU (ĐẸP HƠN) --- */
    .service-card {
      border: none;
      background: #ffffff;
      border-radius: 45px;
      transition: var(--transition);
      overflow: hidden;
      height: 100%;
      border: 1px solid rgba(26, 77, 46, 0.05);
      padding: 15px; /* Khoảng cách tạo hiệu ứng ảnh nổi */
    }

    .service-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 40px 80px rgba(26, 77, 46, 0.12) !important;
    }

    .service-img-wrapper {
      height: 260px;
      overflow: hidden;
      border-radius: 35px;
      position: relative;
    }

    .service-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .service-card:hover .service-img-wrapper img {
      transform: scale(1.1);
    }

    .card-body {
      padding: 25px 15px !important;
    }

    .card-body h4 {
      font-family: 'Playfair Display', serif;
      color: var(--primary-green);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .description-trim {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: #636e72;
      font-size: 0.95rem;
      line-height: 1.7;
      height: 4.8rem;
    }

    .price-tag-box {
      background: var(--soft-lime);
      padding: 10px 20px;
      border-radius: 15px;
      color: var(--primary-green);
      font-weight: 700;
      display: inline-block;
      margin-bottom: 25px;
    }

    /* --- BUTTON XEM CHI TIẾT --- */
    .btn-view-detail {
      background-color: var(--primary-green);
      color: white;
      border-radius: 50px;
      padding: 14px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 2px solid var(--primary-green);
    }

    .btn-view-detail:hover {
      background-color: transparent;
      color: var(--primary-green);
    }

    @media (max-width: 768px) {
      .hero-section h1 { font-size: 2.5rem; }
    }
  </style>
</head>

<body data-nav-active="services">
  <div id="site-header"></div>

  <section class="hero-section text-center">
    <div class="container position-relative">
      <h1>Về các dịch vụ của <br> <span style="color: var(--accent-green)">Chăm Sóc Vườn Nhà</span></h1>
      <p class="lead text-muted mb-4 fw-medium fs-4">Nâng tầm giá trị mảng xanh — Khơi nguồn mạch sống tự nhiên</p>
      <div class="custom-underline"></div>
    </div>
  </section>

  <section class="py-5 mb-5">
    <div class="container">
      <div class="row g-4" id="servicesGrid">
        </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <script>
    $(document).ready(async function () {
      try {
        const response = await fetch('dich-vu.json');
        const services = await response.json();
        
        services.forEach(service => {
          const priceStr = service.price_m2_min ? 
            `${service.price_m2_min.toLocaleString()}đ - ${service.price_m2_max.toLocaleString()}đ` : 
            "Liên hệ báo giá";

          $('#servicesGrid').append(`
            <div class="col-md-6 col-lg-4">
              <div class="service-card shadow-sm d-flex flex-column">
                <div class="service-img-wrapper">
                  <img src="assets/images/${service.image}" alt="${service.name}" onerror="this.src='assets/vuon-nha-dep.png'">
                </div>
                <div class="card-body d-flex flex-column">
                  <h4>${service.name}</h4>
                  <p class="description-trim mb-4">${service.description}</p>
                  
                  <div class="price-tag-box mb-4">
                    <i class="fas fa-tag me-2 small"></i>
                    <span>${priceStr}</span>
                    <small class="text-muted fw-normal"> /${service.area_unit}</small>
                  </div>

                  <div class="mt-auto">
                    <a href="chi-tiet-dich-vu.html?id=${service.id}" class="btn-view-detail">
                       XEM CHI TIẾT <i class="fas fa-arrow-right ms-2 small"></i>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          `);
        });
      } catch (e) { 
        console.error("Lỗi tải dữ liệu:", e); 
        $('#servicesGrid').html('<p class="text-center w-100">Không thể tải dữ liệu dịch vụ. Vui lòng thử lại sau.</p>');
      }
    });
  </script>
  <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../../../public/asset/js/dvqt-map.js"></script>
    <script>window.BD_BASE = '../../';</script>
    <script src="../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../public/asset/js/dvqt-app.js"></script>
    <script src="../../../public/asset/js/driveUtil.js"></script>
    <script src="../../assets/js/public/booking-panel.js"></script>
    <script src="../../assets/js/shared/auth-nav.js"></script>
    <script src="../../assets/js/public/booking-detail-shared.js"></script>
    <script src="../../assets/js/public/booking-detail-modal.js"></script>
    <script src="../../assets/js/public/booking-detail-standalone.js"></script>
    <script src="../../assets/js/public/booking-detail.js"></script>
    <script src="../../assets/js/public/order-tracking.js"></script>
</body>

</html>
