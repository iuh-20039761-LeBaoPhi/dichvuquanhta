<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi Tiết Dịch Vụ - Chăm Sóc Vườn Nhà</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/logo2.jpg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary-green: #1a4d2e;
            --accent-green: #4f6f52;
            --soft-lime: #e8f3d6;
            --nature-white: #f9fbf9;
            --glass: rgba(255, 255, 255, 0.92);
            --shadow-sm: 0 4px 20px rgba(26, 77, 46, 0.06);
            --shadow-lg: 0 20px 50px rgba(26, 77, 46, 0.12);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: "Quicksand", sans-serif;
            background-color: var(--nature-white);
            color: #2d3436;
            overflow-x: hidden;
            padding-top: 80px;
        }

        /* ── HERO BANNER ── */
        .page-banner {
            background: radial-gradient(circle at 80% 20%, #e8f3d6 0%, #ffffff 60%);
            padding: 90px 0 55px;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(26, 77, 46, 0.06);
        }

        .page-banner::before {
            content: "Service";
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 18vw;
            font-weight: 900;
            color: rgba(26, 77, 46, 0.03);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .page-banner h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--primary-green);
            font-size: 3.2rem;
            position: relative;
            z-index: 1;
            margin: 0;
        }

        .breadcrumb-item a { color: var(--accent-green) !important; font-weight: 600; }
        .breadcrumb-item.active { color: var(--primary-green); font-weight: 700; }

        /* ── ẢNH DỊCH VỤ ── */
        .img-wrapper {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-bottom: 32px;
            background: #e8f3d6;
        }

        .service-header-img {
            width: 100%;
            height: 460px;
            object-fit: cover;
            transition: var(--transition);
            display: block;
        }

        .img-wrapper:hover .service-header-img {
            transform: scale(1.04);
        }

        /* ── META BADGES ── */
        .meta-badge {
            background: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.82rem;
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            border: 1px solid rgba(26, 77, 46, 0.1);
            color: var(--primary-green);
        }

        .meta-badge i.fa-star { color: #f59e0b; }
        .meta-badge i.fa-clock { color: var(--accent-green); }
        .meta-badge i.fa-shield-alt { color: var(--primary-green); }

        /* ── TAGS ── */
        .tag-item {
            display: inline-block;
            padding: 5px 14px;
            background: var(--soft-lime);
            color: var(--primary-green);
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.78rem;
            margin: 0 6px 8px 0;
            border: 1px solid rgba(26, 77, 46, 0.12);
        }

        /* ── SECTION TITLE ── */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            position: relative;
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: var(--primary-green);
            font-size: 1.3rem;
        }

        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0;
            width: 36px; height: 3px;
            background: var(--accent-green);
            border-radius: 2px;
        }

        /* ── INFO CARD (cột phải) ── */
        .info-card {
            background: #fff;
            border: 1px solid rgba(26, 77, 46, 0.1);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 110px;
        }

        /* ── PRICE DISPLAY ── */
        .price-display {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--accent-green) 100%);
            color: white;
            padding: 24px 20px;
            border-radius: 22px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .price-display::before {
            content: "₫";
            position: absolute;
            right: -10px; top: -10px;
            font-size: 6rem;
            font-weight: 900;
            opacity: 0.06;
            line-height: 1;
        }

        .price-display h3 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* ── SPEC LIST ── */
        .spec-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(26, 77, 46, 0.07);
            font-size: 0.9rem;
        }

        .spec-list li:last-child { border-bottom: none; }
        .spec-list .spec-label { color: #636e72; font-weight: 600; }
        .spec-list .spec-val { font-weight: 700; color: var(--primary-green); }

        /* ── PRICE NOTE ── */
        .price-note-box {
            background: var(--soft-lime);
            border: 1px solid rgba(26, 77, 46, 0.12);
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }

        /* ── BOOK BUTTON ── */
        .btn-book-now {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--accent-green) 100%);
            color: white !important;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1rem;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 8px 24px rgba(26, 77, 46, 0.25);
            letter-spacing: 0.5px;
        }

        .btn-book-now:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px rgba(26, 77, 46, 0.35);
        }

        /* ── HOTLINE BOX ── */
        .hotline-box {
            background: var(--nature-white);
            border: 1px solid rgba(26, 77, 46, 0.08);
            border-radius: 16px;
            padding: 14px 16px;
            text-align: center;
            margin-top: 16px;
        }

        /* ── INFO BOXES (khu vực / phân loại) ── */
        .info-box {
            background: #fff;
            border: 1px solid rgba(26, 77, 46, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            height: 100%;
            transition: var(--transition);
        }

        .info-box:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .info-box h5 {
            color: var(--primary-green);
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        /* ── MODAL ── */
        .modal-content {
            border-radius: 32px;
            border: none;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(26, 77, 46, 0.2);
        }

        .modal-header {
            border-bottom: 1px solid rgba(26, 77, 46, 0.08);
            padding: 18px 28px;
            background: linear-gradient(135deg, var(--soft-lime) 0%, #fff 100%);
            position: relative;
        }

        .modal-title-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
        }

        .modal-logo {
            width: 34px; height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(26, 77, 46, 0.15);
        }

        .modal-title-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--primary-green);
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .modal-header .btn-close {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            margin: 0;
        }

        #bookingFlowFrame {
            width: 100%;
            height: 75vh;
            border: 0;
            display: block;
        }

        /* ── SPINNER ── */
        .spinner-grow {
            width: 2.5rem; height: 2.5rem;
            color: var(--primary-green) !important;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 991.98px) {
            .page-banner h2 { font-size: 2.2rem; }
            .page-banner { padding: 70px 0 40px; }
            .info-card { position: static; border-radius: 24px; padding: 24px; }
            .service-header-img { height: 300px; }
        }

        @media (max-width: 575.98px) {
            .page-banner h2 { font-size: 1.8rem; }
            .img-wrapper { border-radius: 20px; }
            .service-header-img { height: 240px; }
        }
    </style>
</head>

<body>
    <div id="site-header"></div>

    <section class="page-banner">
        <div class="container position-relative">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-3">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-success fw-bold">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="dich-vu.html" class="text-decoration-none text-success fw-bold">Dịch vụ</a></li>
                    <li class="breadcrumb-item active fw-bold">Chi tiết</li>
                </ol>
            </nav>
            <h2 class="fw-bold">Thông Tin <span style="color: var(--accent-green)">Dịch Vụ</span></h2>
        </div>
    </section>

    <main class="py-5">
        <div class="container mb-5 pb-5" id="detailContainer">
            <div class="text-center py-5">
                <div class="spinner-grow" role="status"></div>
                <p class="mt-4 text-muted fw-bold">Đang tải dữ liệu từ vườn nhà...</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <div class="modal fade" id="bookingFlowModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <div class="modal-title-custom">
                        <img src="assets/images/logo1.png" alt="Logo" class="modal-logo">
                        <h5 class="modal-title-text">ĐẶT LỊCH DỊCH VỤ</h5>
                        <img src="assets/images/logo2.jpg" alt="Logo" class="modal-logo">
                    </div>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="bookingFlowFrame" src="about:blank"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/api-client.js"></script>

    <script>
        $(document).ready(async function() {
            $("#site-header").load("html/shared-header.html");
            $("#site-footer").load("html/shared-footer.html");

            const urlParams = new URLSearchParams(window.location.search);
            const serviceId = urlParams.get('id');
            const bookingModal = new bootstrap.Modal('#bookingFlowModal');

            if (!serviceId) {
                $('#detailContainer').html('<div class="text-center py-5"><h3>ID dịch vụ không hợp lệ</h3><a href="dich-vu.html" class="btn btn-success rounded-pill px-4 mt-3">Quay lại danh sách</a></div>');
                return;
            }

            try {
                const services = await API.getServices();
                const item = services.find(s => s.id == serviceId);

                if (!item) {
                    $('#detailContainer').html('<div class="text-center py-5"><h3>Rất tiếc, dịch vụ không tồn tại</h3></div>');
                    return;
                }

                const tagsHTML = item.tags.map(t => `<span class="tag-item">#${t}</span>`).join('');

                $('#detailContainer').html(`
                    <div class="row g-lg-5">
                        <div class="col-lg-8">
                            <div class="img-wrapper">
                                <img src="assets/images/${item.image}" class="service-header-img" alt="${item.name}" onerror="this.src='assets/images/vuon-nha-dep.png'">
                            </div>

                            <div class="d-flex flex-wrap gap-2 mb-4">
                                <div class="meta-badge"><i class="fas fa-star"></i> ${item.rating} <span class="text-muted fw-normal">(${item.total_reviews} đánh giá)</span></div>
                                <div class="meta-badge"><i class="fas fa-clock"></i> ${item.duration_estimate}</div>
                                <div class="meta-badge"><i class="fas fa-shield-alt"></i> Bảo hành 7 ngày</div>
                            </div>

                            <h1 class="fw-bold mb-3" style="font-family: 'Playfair Display', serif; color: var(--primary-green); font-size: clamp(1.6rem, 3vw, 2.4rem);">${item.name}</h1>

                            <div class="service-description mb-5">
                                <h4 class="section-title">Chi tiết dịch vụ</h4>
                                <div class="lh-lg" style="font-size: 1.05rem; color: #4a5568; text-align: justify;">
                                    ${item.description}
                                </div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <div class="info-box">
                                        <h5><i class="fas fa-map-marked-alt me-2" style="color:var(--accent-green)"></i>Khu vực phục vụ</h5>
                                        <p class="text-muted mb-0 small">${item.service_area || 'Toàn thành phố'}</p>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="info-box">
                                        <h5><i class="fas fa-tags me-2" style="color:var(--accent-green)"></i>Phân loại dịch vụ</h5>
                                        <div>${tagsHTML}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <div class="info-card">
                                <h5 class="fw-bold mb-4 text-center" style="font-family: 'Playfair Display', serif; color: var(--primary-green); font-size: 1.2rem;">
                                    <i class="fas fa-leaf me-2" style="color:var(--accent-green)"></i>Báo Giá Dự Kiến
                                </h5>

                                <div class="price-display shadow-sm">
                                    <p class="small mb-1 opacity-80">Đơn giá tham khảo</p>
                                    <h3>${item.price_m2_min.toLocaleString()}đ – ${item.price_m2_max.toLocaleString()}đ</h3>
                                    <p class="small mt-2 mb-0 opacity-80">Đơn vị: ${item.area_unit}</p>
                                </div>

                                <ul class="list-unstyled spec-list mb-4">
                                    <li>
                                        <span class="spec-label"><i class="fas fa-layer-group me-1"></i>Độ khó</span>
                                        <span class="spec-val">${item.difficulty_level || 'Cơ bản'}</span>
                                    </li>
                                    <li>
                                        <span class="spec-label"><i class="fas fa-clock me-1"></i>Thời gian</span>
                                        <span class="spec-val">${item.duration_estimate}</span>
                                    </li>
                                    <li>
                                        <span class="spec-label"><i class="fas fa-star me-1"></i>Đánh giá</span>
                                        <span class="spec-val">${item.rating}/5 ⭐</span>
                                    </li>
                                </ul>

                                <div class="price-note-box">
                                    <i class="fas fa-info-circle me-2"></i>${item.price_note || 'Giá thực tế dựa trên khảo sát hiện trạng.'}
                                </div>

                                <button class="btn btn-book-now" id="openBooking">
                                    <i class="fas fa-calendar-check me-2"></i>ĐẶT LỊCH NGAY
                                </button>

                                <div class="hotline-box">
                                    <p class="small text-muted mb-1">Hỗ trợ kỹ thuật 24/7</p>
                                    <p class="fw-bold mb-0" style="color: var(--primary-green); font-size: 1.15rem;">
                                        <i class="fas fa-phone-alt me-1"></i>1900 6789
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                `);

                $(document).on('click', '#openBooking', function() {
                    const frame = document.getElementById('bookingFlowFrame');
                    frame.src = `dat-lich.html?id=${item.id}&embedded=true`;
                    bookingModal.show();
                });

            } catch (error) {
                console.error("Lỗi tải dịch vụ:", error);
                $('#detailContainer').html('<div class="text-center py-5"><h2 class="text-danger">Không thể kết nối máy chủ</h2><p>Vui lòng kiểm tra lại kết nối mạng.</p></div>');
            }
        });
    </script>
</body>

</html>
