<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi Tiết Dịch Vụ - Chăm Sóc Vườn Nhà</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/logo2.jpg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary-green: #1a4d2e;
            --accent-green: #4f6f52;
            --soft-lime: #e8f3d6;
            --nature-white: #f9fbf9;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow-sm: 0 10px 30px rgba(26, 77, 46, 0.05);
            --shadow-lg: 0 20px 50px rgba(26, 77, 46, 0.12);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: "Quicksand", sans-serif;
            background-color: var(--nature-white);
            color: #333;
            overflow-x: hidden;
            padding-top: 80px;
        }

        /* --- HERO BANNER --- */
        .page-banner {
            background: radial-gradient(circle at 80% 20%, #e8f3d6 0%, #ffffff 60%);
            padding: 100px 0 60px;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(26, 77, 46, 0.05);
        }

        .page-banner::before {
            content: "Service";
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 18vw;
            font-weight: 900;
            color: rgba(26, 77, 46, 0.03);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .page-banner h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--primary-green);
            font-size: 3.5rem;
            position: relative;
            z-index: 1;
            margin: 0;
            text-shadow: 0 2px 10px rgba(255,255,255,0.5);
        }

        /* --- NỘI DUNG --- */
        .img-wrapper {
            position: relative;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-bottom: 35px;
            background: #eee;
        }

        .service-header-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            transition: var(--transition);
            display: block;
        }

        .img-wrapper:hover .service-header-img {
            transform: scale(1.05);
        }

        .info-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 35px;
            padding: 35px;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 110px;
        }

        .price-display {
            background: linear-gradient(135deg, var(--primary-green), var(--accent-green));
            color: white;
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 25px;
            text-align: center;
        }

        .price-display h3 { font-size: 1.7rem; font-weight: 700; margin: 0; }

        .meta-badge {
            background: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #f0f0f0;
        }

        .tag-item {
            display: inline-block;
            padding: 4px 12px;
            background: var(--soft-lime);
            color: var(--primary-green);
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            margin: 0 5px 8px 0;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            position: relative;
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: var(--primary-green);
        }

        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0;
            width: 40px; height: 3px;
            background: var(--accent-green);
            border-radius: 2px;
        }

        .btn-book-now {
            background: var(--primary-green);
            color: white !important;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 700;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(26, 77, 46, 0.15);
        }

        .btn-book-now:hover {
            background: #0e2b1a;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(26, 77, 46, 0.25);
        }

        /* --- MODAL --- */
        .modal-content { border-radius: 40px; border: none; overflow: hidden; }
        .modal-header {
            border-bottom: 1px solid #f0f0f0;
            padding: 20px 30px;
            background: #fff;
            position: relative;
        }
        
        /* Căn giữa toàn bộ nội dung trong header */
        .modal-title-custom { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            width: 100%;
        }

        .modal-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        
        .modal-title-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--primary-green);
            font-size: 1.4rem;
            margin: 0;
            text-transform: uppercase;
        }

        /* Đảm bảo nút đóng không làm lệch tâm tiêu đề */
        .modal-header .btn-close {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            margin: 0;
        }

        #bookingFlowFrame {
            width: 100%;
            height: 75vh;
            border: 0;
            display: block;
        }

        .spinner-grow { width: 3rem; height: 3rem; color: var(--primary-green) !important; }
    </style>
</head>

<body>
    <div id="site-header"></div>

    <section class="page-banner">
        <div class="container position-relative">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-3">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-success fw-bold">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="dich-vu.html" class="text-decoration-none text-success fw-bold">Dịch vụ</a></li>
                    <li class="breadcrumb-item active fw-bold">Chi tiết</li>
                </ol>
            </nav>
            <h2 class="fw-bold">Thông Tin <span style="color: var(--accent-green)">Dịch Vụ</span></h2>
        </div>
    </section>

    <main class="py-5">
        <div class="container mb-5 pb-5" id="detailContainer">
            <div class="text-center py-5">
                <div class="spinner-grow" role="status"></div>
                <p class="mt-4 text-muted fw-bold">Đang tải dữ liệu từ vườn nhà...</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <div class="modal fade" id="bookingFlowModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <div class="modal-title-custom">
                        <img src="assets/images/logo2.jpg" alt="Logo" class="modal-logo">
                        <h5 class="modal-title-text">ĐẶT LỊCH DỊCH VỤ</h5>
                        <img src="assets/images/logo2.jpg" alt="Logo" class="modal-logo">
                    </div>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="bookingFlowFrame" src="about:blank"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/api-client.js"></script>

    <script>
        $(document).ready(async function() {
            $("#site-header").load("html/shared-header.html");
            $("#site-footer").load("html/shared-footer.html");

            const urlParams = new URLSearchParams(window.location.search);
            const serviceId = urlParams.get('id');
            const bookingModal = new bootstrap.Modal('#bookingFlowModal');

            if (!serviceId) {
                $('#detailContainer').html('<div class="text-center py-5"><h3>ID dịch vụ không hợp lệ</h3><a href="dich-vu.html" class="btn btn-success rounded-pill px-4 mt-3">Quay lại danh sách</a></div>');
                return;
            }

            try {
                const services = await API.getServices();
                const item = services.find(s => s.id == serviceId);

                if (!item) {
                    $('#detailContainer').html('<div class="text-center py-5"><h3>Rất tiếc, dịch vụ không tồn tại</h3></div>');
                    return;
                }

                const tagsHTML = item.tags.map(t => `<span class="tag-item">#${t}</span>`).join('');

                $('#detailContainer').html(`
                    <div class="row g-lg-5">
                        <div class="col-lg-8">
                            <div class="img-wrapper">
                                <img src="assets/images/${item.image}" class="service-header-img" alt="${item.name}" onerror="this.src='assets/images/vuon-nha-dep.png'">
                            </div>

                            <div class="d-flex flex-wrap gap-3 mb-4">
                                <div class="meta-badge"><i class="fas fa-star text-warning"></i> ${item.rating} (${item.total_reviews} đánh giá)</div>
                                <div class="meta-badge"><i class="fas fa-clock text-success"></i> ${item.duration_estimate}</div>
                                <div class="meta-badge"><i class="fas fa-shield-alt text-primary"></i> Bảo hành 7 ngày</div>
                            </div>

                            <h1 class="display-5 fw-bold mb-4" style="font-family: 'Playfair Display', serif; color: var(--primary-green);">${item.name}</h1>
                            
                            <div class="service-description mb-5">
                                <h4 class="section-title">Chi tiết dịch vụ</h4>
                                <div class="lh-lg text-secondary" style="font-size: 1.1rem; text-align: justify;">
                                    ${item.description}
                                </div>
                            </div>

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <div class="p-4 rounded-4 border bg-white shadow-sm h-100">
                                        <h5 class="fw-bold text-success mb-3"><i class="fas fa-map-marked-alt me-2"></i>Khu vực</h5>
                                        <p class="text-muted mb-0">${item.service_area || 'Toàn thành phố'}</p>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-4 rounded-4 border bg-white shadow-sm h-100">
                                        <h5 class="fw-bold text-success mb-3"><i class="fas fa-tags me-2"></i>Phân loại</h5>
                                        <div>${tagsHTML}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <div class="info-card">
                                <h5 class="fw-bold mb-4 text-center" style="font-family: 'Playfair Display', serif;">Báo Giá Dự Kiến</h5>
                                
                                <div class="price-display shadow-sm">
                                    <p class="small mb-1 opacity-75">Đơn giá tham khảo</p>
                                    <h3>${item.price_m2_min.toLocaleString()}đ - ${item.price_m2_max.toLocaleString()}đ</h3>
                                    <p class="small mt-2 mb-0 fw-bold">Đơn vị: ${item.area_unit}</p>
                                </div>

                                <ul class="list-unstyled mb-4">
                                    <li class="d-flex justify-content-between mb-3 border-bottom pb-2">
                                        <span class="text-muted">Độ khó</span>
                                        <span class="fw-bold text-success">${item.difficulty_level || 'Cơ bản'}</span>
                                    </li>
                                    <li class="d-flex justify-content-between mb-3 border-bottom pb-2">
                                        <span class="text-muted">Thời gian</span>
                                        <span class="fw-bold">${item.duration_estimate}</span>
                                    </li>
                                </ul>

                                <div class="alert alert-success border-0 small mb-4" style="background: #f0f7f0; color: var(--primary-green);">
                                    <i class="fas fa-info-circle me-2"></i> ${item.price_note || 'Giá thực tế dựa trên khảo sát hiện trạng.'}
                                </div>

                                <button class="btn btn-book-now fs-5 py-3" id="openBooking">
                                    ĐẶT LỊCH NGAY
                                </button>
                                
                                <div class="text-center mt-4 p-3 rounded-4" style="background: #f8faf8;">
                                    <p class="small text-muted mb-1">Hỗ trợ kỹ thuật 24/7</p>
                                    <p class="fw-bold text-success mb-0" style="font-size: 1.2rem;">1900 6789</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `);

                $(document).on('click', '#openBooking', function() {
                    const frame = document.getElementById('bookingFlowFrame');
                    frame.src = `dat-lich.html?id=${item.id}&embedded=true`;
                    bookingModal.show();
                });

            } catch (error) {
                console.error("Lỗi tải dịch vụ:", error);
                $('#detailContainer').html('<div class="text-center py-5"><h2 class="text-danger">Không thể kết nối máy chủ</h2><p>Vui lòng kiểm tra lại kết nối mạng.</p></div>');
            }
        });
    </script>
</body>

</html>
