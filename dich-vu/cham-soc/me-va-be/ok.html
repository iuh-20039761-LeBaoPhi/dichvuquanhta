<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Test ảnh Google Drive</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding-top: 50px;
        }

        .box {
            background: white;
            width: 420px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff4da6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        iframe {
            margin-top: 20px;
            width: 100%;
            height: 250px;
            border-radius: 10px;
            border: none;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Hiển thị ảnh từ Google Drive</h2>

        <input type="text" id="fileId" placeholder="Nhập fileId">

        <br>
        <button onclick="loadImage()">Hiển thị</button>

        <div class="error" id="error"></div>

        <iframe id="frame" style="display:none;"></iframe>
    </div>

    <script>
        function loadImage() {
            const id = document.getElementById("fileId").value.trim();
            const frame = document.getElementById("frame");
            const error = document.getElementById("error");

            error.innerHTML = "";
            frame.style.display = "none";

            if (!id) {
                error.innerHTML = "❌ Vui lòng nhập fileId";
                return;
            }

            // 👉 link preview ổn định nhất
            const url = "https://drive.google.com/file/d/" + id + "/preview";

            frame.src = url;
            frame.style.display = "block";
        }
    </script>

</body>

</html>
