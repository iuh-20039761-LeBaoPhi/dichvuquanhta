<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Dịch Vụ Thuê Tài Xế</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #007bff, #00b4d8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .register-card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 600px;
            margin: 20px auto;
        }
        .register-header {
            background: linear-gradient(135deg, #0056b3, #007bff);
            color: #fff;
            padding: 25px;
            text-align: center;
        }
        .register-header img {
            height: 50px;
            margin-bottom: 10px;
        }
        .register-body {
            padding: 25px;
            background: #fff;
        }
        .btn-register {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            padding: 12px;
            font-weight: 600;
            color: #fff;
            border-radius: 10px;
        }
        .btn-register:hover {
            background: linear-gradient(135deg, #1e7e34, #1aa179);
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="register-header">
                <img src="assets/logo_main.png" alt="Logo">
                <h3>Đăng ký tài khoản</h3>
                <p class="mb-0">Dịch Vụ Thuê Tài Xế</p>
            </div>
            <div class="register-body">
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div id="successMsg" class="alert alert-success d-none"></div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                        <input type="text" id="fullname" class="form-control" placeholder="Nguyễn Văn A" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="tel" id="phone" class="form-control" placeholder="0912345678" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@gmail.com">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Địa chỉ</label>
                        <input type="text" id="address" class="form-control" placeholder="Nhập địa chỉ của bạn">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" required minlength="6">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Bạn là:</label>
                        <div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="userType" id="typeCustomer" value="customer" checked>
                                <label class="form-check-label" for="typeCustomer">Khách hàng</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="userType" id="typeDriver" value="driver">
                                <label class="form-check-label" for="typeDriver">Tài xế</label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Form dành riêng cho tài xế -->
                    <div id="driverFields" style="display: none;">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Số bằng lái <span class="text-danger">*</span></label>
                                <input type="text" id="licenseNumber" class="form-control" placeholder="VD: 790123456789">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Hạng bằng lái <span class="text-danger">*</span></label>
                                <select id="licenseClass" class="form-select">
                                    <option value="B2">B2 (xe dưới 9 chỗ)</option>
                                    <option value="C">C (xe tải)</option>
                                    <option value="D">D (xe 10-30 chỗ)</option>
                                    <option value="E">E (xe trên 30 chỗ)</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số năm kinh nghiệm</label>
                            <input type="number" id="experience" class="form-control" min="0" max="50" value="0">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-register w-100">
                        <i class="bi bi-person-plus me-2"></i>Đăng ký
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p>Đã có tài khoản? <a href="login.html" class="fw-bold text-primary">Đăng nhập</a></p>
                    <a href="index.html" class="text-muted"><i class="bi bi-arrow-left me-1"></i>Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Hiện/ẩn form tài xế khi chọn radio
        document.querySelectorAll('input[name="userType"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const driverFields = document.getElementById('driverFields');
                driverFields.style.display = this.value === 'driver' ? 'block' : 'none';
                
                const inputs = driverFields.querySelectorAll('input, select');
                inputs.forEach(input => {
                    input.required = this.value === 'driver';
                });
            });
        });
        
        // Xử lý đăng ký
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.classList.add('d-none');
            successMsg.classList.add('d-none');
            
            // Lấy dữ liệu
            const fullname = document.getElementById('fullname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const userType = document.querySelector('input[name="userType"]:checked').value;
            
            // Validate
            if (!fullname || !phone || !password) {
                errorMsg.textContent = 'Vui lòng điền đầy đủ thông tin bắt buộc';
                errorMsg.classList.remove('d-none');
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Mật khẩu xác nhận không khớp';
                errorMsg.classList.remove('d-none');
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
                errorMsg.classList.remove('d-none');
                return;
            }
            
            // Chuẩn bị dữ liệu gửi đi
            const userData = {
                hovaten: fullname,
                sodienthoai: phone,
                email: email,
                diachi: address,
                matkhau: password,
                trangthai: userType === 'driver' ? 'pending' : 'active'
            };
            
            // Nếu là tài xế, thêm thông tin bằng lái
            if (userType === 'driver') {
                userData.so_bang_lai = document.getElementById('licenseNumber').value.trim();
                userData.hang_bang_lai = document.getElementById('licenseClass').value;
                userData.kinh_nghiem_nam = document.getElementById('experience').value;
                userData.id_dichvu = '6'; // ID dịch vụ lái xe hộ
                
                if (!userData.so_bang_lai) {
                    errorMsg.textContent = 'Vui lòng nhập số bằng lái';
                    errorMsg.classList.remove('d-none');
                    return;
                }
            }
            
            try {
                // Gọi API đăng ký
                const res = await fetch('https://api.dvqt.vn/krud/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'insert',
                        table: 'nguoidung',
                        data: userData
                    })
                });
                
                const result = await res.json();
                
                if (result.error) {
                    errorMsg.textContent = result.error;
                    errorMsg.classList.remove('d-none');
                    return;
                }
                
                // Thành công
                successMsg.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
                successMsg.classList.remove('d-none');
                
                // Tự động đăng nhập
                document.cookie = `dvqt_u=${phone}; path=/; max-age=${30*24*60*60}`;
                document.cookie = `dvqt_p=${password}; path=/; max-age=${30*24*60*60}`;
                
                // Chuyển hướng sau 1.5 giây
                setTimeout(() => {
                    if (userType === 'driver') {
                        window.location.href = 'nhan_vien/danh-sach-don-hang.php';
                    } else {
                        window.location.href = 'khach_hang/danh-sach-don-hang.php';
                    }
                }, 1500);
                
            } catch (err) {
                console.error('Lỗi:', err);
                errorMsg.textContent = 'Lỗi kết nối, vui lòng thử lại sau';
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
