<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Dịch Vụ Thuê Tài Xế</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #007bff, #00b4d8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 450px;
            margin: 0 auto;
        }
        .login-header {
            background: linear-gradient(135deg, #0056b3, #007bff);
            color: #fff;
            padding: 30px;
            text-align: center;
        }
        .login-header img {
            height: 60px;
            margin-bottom: 15px;
        }
        .login-body {
            padding: 30px;
            background: #fff;
        }
        .btn-login {
            background: linear-gradient(135deg, #007bff, #00b4d8);
            border: none;
            padding: 12px;
            font-weight: 600;
            color: #fff;
            border-radius: 10px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #0056b3, #0096b8);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
        /* Trang chọn vai trò */
        .role-selection {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .role-selection.active {
            display: block;
        }
        .role-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            border: 3px solid #007bff;
            border-radius: 15px;
            background: #fff;
            text-align: left;
            transition: all 0.3s;
            cursor: pointer;
        }
        .role-btn:hover {
            background: #e3f2fd;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .role-btn .role-icon {
            font-size: 2rem;
            color: #007bff;
            margin-right: 15px;
        }
        .role-btn .role-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #007bff;
        }
        .role-btn .role-desc {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo_main.png" alt="Logo">
                <h3 id="loginTitle">Đăng nhập</h3>
                <p class="mb-0">Dịch Vụ Thuê Tài Xế</p>
            </div>
            <div class="login-body">
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                
                <!-- Form đăng nhập -->
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="tel" id="phone" class="form-control" placeholder="Nhập số điện thoại" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                    </div>
                    <button type="submit" class="btn btn-login w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                    </button>
                </form>
                
                <!-- Trang chọn vai trò (ẩn mặc định) -->
                <div id="roleSelection" class="role-selection">
                    <h5 class="fw-bold mb-4">Chọn vai trò của bạn</h5>
                    <p class="text-muted mb-4">Tài khoản của bạn có thể truy cập với nhiều vai trò. Vui lòng chọn vai trò muốn sử dụng.</p>
                    
                    <button class="role-btn" onclick="goToRole('customer')">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-person role-icon"></i>
                            <div>
                                <div class="role-title">Khách hàng</div>
                                <div class="role-desc">Đặt lịch thuê tài xế, xem đơn hàng của tôi</div>
                            </div>
                            <i class="bi bi-chevron-right ms-auto fs-4 text-muted"></i>
                        </div>
                    </button>
                    
                    <button class="role-btn" onclick="goToRole('driver')">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-car-front role-icon"></i>
                            <div>
                                <div class="role-title">Tài xế</div>
                                <div class="role-desc">Nhận đơn hàng, quản lý công việc</div>
                            </div>
                            <i class="bi bi-chevron-right ms-auto fs-4 text-muted"></i>
                        </div>
                    </button>
                    
                    <button class="btn btn-outline-secondary w-100 mt-3" onclick="goToRole('logout')">
                        <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                    </button>
                </div>
                
                <div class="text-center mt-4">
                    <p>Chưa có tài khoản? <a href="register.html" class="fw-bold text-primary">Đăng ký ngay</a></p>
                    <a href="index.html" class="text-muted"><i class="bi bi-arrow-left me-1"></i>Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lưu thông tin user sau khi đăng nhập
        let loggedInUser = null;
        
        // Hàm chuyển hướng theo vai trò
        function goToRole(role) {
            if (role === 'customer') {
                window.location.href = 'khach_hang/danh-sach-don-hang.php';
            } else if (role === 'driver') {
                window.location.href = 'nhan_vien/danh-sach-don-hang.php';
            } else if (role === 'logout') {
                // Xóa cookie và reload
                document.cookie = 'dvqt_u=; path=/; max-age=0';
                document.cookie = 'dvqt_p=; path=/; max-age=0';
                location.reload();
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('d-none');
            
            if (!phone || !password) {
                errorMsg.textContent = 'Vui lòng nhập đầy đủ thông tin';
                errorMsg.classList.remove('d-none');
                return;
            }
            
            try {
                const res = await fetch('https://api.dvqt.vn/list/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table: 'nguoidung' })
                });
                
                const data = await res.json();
                const users = data.data || data.rows || [];
                
                const user = users.find(u => {
                    const userPhone = (u.sodienthoai || u.phone || '').trim();
                    const userPass = (u.matkhau || u.password || '').trim();
                    return userPhone === phone && userPass === password;
                });
                
                if (!user) {
                    errorMsg.textContent = 'Số điện thoại hoặc mật khẩu không đúng';
                    errorMsg.classList.remove('d-none');
                    return;
                }
                
                // Lưu cookie
                document.cookie = `dvqt_u=${phone}; path=/; max-age=${30*24*60*60}`;
                document.cookie = `dvqt_p=${password}; path=/; max-age=${30*24*60*60}`;
                
                // Gọi session_user.php để tạo session
                await fetch('session_user.php', { credentials: 'include' });
                
                // Lưu thông tin user
                loggedInUser = user;
                
                // ============================================
                // KIỂM TRA VAI TRÒ
                // ============================================
                const idDichvu = (user.id_dichvu || '').toString().trim();
                const isDriver = idDichvu !== '';  // Có đăng ký dịch vụ → Tài xế
                const isCustomer = true;           // Mọi người đều là khách hàng
                
                if (isDriver && isCustomer) {
                    // CÓ CẢ 2 VAI TRÒ → Hiển thị trang chọn vai trò
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('roleSelection').classList.add('active');
                    document.getElementById('loginTitle').textContent = 'Chọn vai trò';
                } else if (isDriver) {
                    // CHỈ LÀ TÀI XẾ
                    window.location.href = 'nhan_vien/danh-sach-don-hang.php';
                } else {
                    // CHỈ LÀ KHÁCH HÀNG
                    window.location.href = 'khach_hang/danh-sach-don-hang.php';
                }
                
            } catch (err) {
                console.error('Lỗi:', err);
                errorMsg.textContent = 'Lỗi kết nối: ' + err.message;
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
