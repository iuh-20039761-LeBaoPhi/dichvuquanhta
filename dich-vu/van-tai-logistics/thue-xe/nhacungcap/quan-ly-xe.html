    <!-- 2. DANH SÁCH XE -->
    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold">Danh sách xe của tôi</h6>

<datalist id="listNames"></datalist><datalist id="listBrands"></datalist><datalist id="listModels"></datalist><datalist id="listYears"></datalist><datalist id="listTypes"></datalist><datalist id="listSeats"></datalist><datalist id="listTransmissions"></datalist><datalist id="listFuels"></datalist><datalist id="listColors"></datalist><datalist id="listFeatures"></datalist>

<style>
    .upload-box:hover { border-color: #0d6efd !important; background: #fff !important; }
    .img-preview { width: 100%; height: 50px; object-fit: cover; border-radius: 4px; }
</style>

<script>
(function() {
    'use strict';
    const TABLE = 'xethue';
    let myCarsRaw = [];
    let currentPage = 1;
    const itemsPerPage = 6;
    let currentEditId = null;

    // Toggle Form
    window.toggleRegForm = function() {
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('btnToggleForm');
        if (form.style.display === 'none') {
            form.style.display = 'block';
            btn.innerHTML = '<i class="fas fa-times me-2"></i>Đóng Form';
            btn.classList.replace('btn-primary', 'btn-light');
            form.scrollIntoView({ behavior: 'smooth' });
        } else {
            form.style.display = 'none';
            btn.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Đăng ký xe mới';
            btn.classList.replace('btn-light', 'btn-primary');
            resetForm();
        }
    };
    document.getElementById('btnToggleForm').onclick = window.toggleRegForm;

    function resetForm() {
        currentEditId = null;
        document.getElementById('btnSubmitCar').innerHTML = '<i class="fas fa-paper-plane me-2"></i> Gửi duyệt xe ngay';
        document.querySelectorAll('input:not(#btnSubmitCar), textarea').forEach(el => el.value = '');
        ['front','back','left','right','inner'].forEach(id => {
            const el = document.getElementById('prev_'+id);
            if(el) el.innerHTML = `<i class="fas fa-camera fa-2x text-muted"></i>`;
        });
        const vprev = document.getElementById('prev_video');
        if(vprev) vprev.innerHTML = `<i class="fas fa-video fa-2x text-primary"></i>`;
    }

    // Auto Suggest
    async function initAutoSuggest() {
        try {
            const allCars = await DVQTKrud.listTable(TABLE, { limit: 1000 });
            if (!allCars) return;
            const build = (lid, field) => {
                const el = document.getElementById(lid);
                if(!el) return;
                const vals = [...new Set(allCars.map(c => c[field]).filter(v => !!v))].sort();
                el.innerHTML = vals.map(v => `<option value="${v}">`).join('');
            };
            build('listNames','tenxe'); build('listBrands','hangxe'); build('listModels','dongxe');
            build('listYears','namsanxuat'); build('listTypes','loaixe'); build('listSeats','socho');
            build('listTransmissions','hopso'); build('listFuels','nhienlieu'); build('listColors','mausac');
        } catch(e) {}
    }

    // List & Render
    window.loadMyCars = async function() {
        const tbody = document.getElementById('carListBody');
        if(!tbody) return;
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>';
        try {
            const session = window._dvqt_session_cache || await DVQTApp.checkSession();
            const cars = await DVQTKrud.listTable(TABLE, { limit: 1000 });
            myCarsRaw = (cars || []).filter(c => String(c.provider_id) === String(session.id)).reverse();
            if(!myCarsRaw.length) {
                tbody.innerHTML = ''; document.getElementById('emptyCar').classList.remove('d-none');
                renderPagination(0); return;
            }
            document.getElementById('emptyCar').classList.add('d-none');
            renderPage(1); renderPagination(myCarsRaw.length);
        } catch(e) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-danger">Lỗi dữ liệu.</td></tr>'; }
    };

    function renderPage(page) {
        currentPage = page;
        const tbody = document.getElementById('carListBody');
        const items = myCarsRaw.slice((page-1)*itemsPerPage, page*itemsPerPage);
            tbody.innerHTML = items.map(c => {
            const st = String(c.trangthai || '').toLowerCase();
            let badge = `<span class="badge bg-secondary bg-opacity-10 text-secondary">N/A</span>`;
            if (st === 'pending') badge = `<span class="badge bg-warning bg-opacity-10 text-warning">Chờ duyệt</span>`;
            if (st === 'rejected') badge = `<span class="badge bg-danger bg-opacity-10 text-danger">Từ chối</span>`;
            if (st === 'hidden') badge = `<span class="badge bg-dark bg-opacity-25 text-dark">Đã ẩn</span>`;
            if (['available', 'active', 'approved', 'hot_dong', '1'].includes(st)) badge = `<span class="badge bg-success bg-opacity-10 text-success">Hoạt động</span>`;


            const isHidden = c.trangthai === 'hidden';
            return `<tr>
                <td class="ps-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-light rounded-2 p-2"><i class="fas fa-car text-primary"></i></div>
                        <div><div class="fw-bold">${c.tenxe}</div><div class="small text-muted">${c.hangxe} · ${c.namsanxuat}</div></div>
                    </div>
                </td>
                <td><div class="small">${c.loaixe} · ${c.socho} chỗ</div><div class="small text-muted">${c.hopso}</div></td>
                <td><div class="small">BS: <b>${c.bienso}</b></div></td>
                <td class="fw-bold">${Number(c.giathue).toLocaleString()}đ</td>
                <td>${badge}</td>
                <td class="pe-4 text-end">
                    <button class="btn btn-sm btn-outline-primary border-0 me-1" onclick="editCar(${c.id})" title="Sửa">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm ${isHidden ? 'btn-success' : 'btn-outline-secondary'} border-0" onclick="toggleHideCar(${c.id}, '${c.trangthai}')" title="${isHidden ? 'Hiện xe' : 'Ẩn xe'}">
                        <i class="fas ${isHidden ? 'fa-eye' : 'fa-eye-slash'}"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    function renderPagination(total) {
        const container = document.getElementById('carPagination');
        const pages = Math.ceil(total/itemsPerPage);
        if(pages<=1) { container.innerHTML=''; return; }
        let h = `<nav><ul class="pagination pagination-sm justify-content-end">`;
        for(let i=1; i<=pages; i++) h += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="event.preventDefault(); window.changeCarsPage(${i})">${i}</a></li>`;
        container.innerHTML = h + `</ul></nav>`;
    }
    window.changeCarsPage = (p) => { renderPage(p); renderPagination(myCarsRaw.length); };

    // Edit & Media
    window.editCar = function(id) {
        const car = myCarsRaw.find(c => String(c.id) === String(id));
        if(!car) return;
        currentEditId = id;
        if(document.getElementById('registerForm').style.display==='none') window.toggleRegForm();
        
        document.getElementById('carName').value = car.tenxe || '';
        document.getElementById('carBrand').value = car.hangxe || '';
        document.getElementById('carModel').value = car.dongxe || '';
        document.getElementById('carYear').value = car.namsanxuat || '';
        document.getElementById('carPlate').value = car.bienso || '';
        document.getElementById('carType').value = car.loaixe || '';
        document.getElementById('carSeats').value = car.socho || '';
        document.getElementById('carTransmission').value = car.hopso || '';
        document.getElementById('carFuel').value = car.nhienlieu || '';
        document.getElementById('carOdo').value = car.odo || '';
        document.getElementById('carPrice').value = car.giathue || '';
        document.getElementById('carFrame').value = car.sokhung || '';
        document.getElementById('carEngine').value = car.somay || '';
        document.getElementById('carColor').value = car.mausac || '';
        document.getElementById('carFeatures').value = car.features || '';
        document.getElementById('carDesc').value = car.mota || '';

        const path = '../public/assets/images/cars/';
        if(car.anhdaidien) document.getElementById('prev_front').innerHTML = `<img src="${path}${car.anhdaidien}" class="img-preview">`;
        if(car.anhsau)   document.getElementById('prev_back').innerHTML = `<img src="${path}${car.anhsau}" class="img-preview">`;
        if(car.anhtrai)   document.getElementById('prev_left').innerHTML = `<img src="${path}${car.anhtrai}" class="img-preview">`;
        if(car.anhphai)   document.getElementById('prev_right').innerHTML = `<img src="${path}${car.anhphai}" class="img-preview">`;
        if(car.anhnoithat)document.getElementById('prev_inner').innerHTML = `<img src="${path}${car.anhnoithat}" class="img-preview">`;
        if(car.videourl)  document.getElementById('prev_video').innerHTML = `<i class="fas fa-video fa-2x text-success"></i>`;
        
        document.getElementById('btnSubmitCar').innerHTML = '<i class="fas fa-save me-2"></i> Lưu thay đổi';
        document.getElementById('registerForm').scrollIntoView({ behavior: 'smooth' });
    };

    window.previewImg = (input, pid) => {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { document.getElementById(pid).innerHTML = `<img src="${e.target.result}" class="img-preview">`; };
            r.readAsDataURL(input.files[0]);
        }
    };
    window.previewVideo = (input, pid) => {
        if(input.files && input.files[0]) document.getElementById(pid).innerHTML = `<i class="fas fa-video fa-2x text-success"></i>`;
    };

    // Submit
    document.getElementById('btnSubmitCar').onclick = async function() {
        const btn = this;
        const session = await DVQTApp.checkSession();
        const data = {
            provider_id: session.id,
            tenxe: document.getElementById('carName').value.trim(),
            hangxe: document.getElementById('carBrand').value.trim(),
            dongxe: document.getElementById('carModel').value.trim(),
            namsanxuat: document.getElementById('carYear').value,
            loaixe: document.getElementById('carType').value.trim(),
            socho: document.getElementById('carSeats').value,
            hopso: document.getElementById('carTransmission').value.trim(),
            nhienlieu: document.getElementById('carFuel').value.trim(),
            giathue: document.getElementById('carPrice').value,
            bienso: document.getElementById('carPlate').value.trim(),
            mausac: document.getElementById('carColor').value,
            sokhung: document.getElementById('carFrame').value.trim().toUpperCase(),
            somay: document.getElementById('carEngine').value.trim().toUpperCase(),
            odo: document.getElementById('carOdo').value,
            mota: document.getElementById('carDesc').value.trim(),
            features: document.getElementById('carFeatures').value.trim(),
            trangthai: 'pending',
            created_date: new Date().toISOString().slice(0, 19).replace('T', ' ')
        };
        if(!data.tenxe || !data.bienso || !data.giathue) { Swal.fire('Thiếu tin','Tên, biển số, giá là bắt buộc','warning'); return; }
        btn.disabled = true; btn.innerHTML = 'Đang xử lý...';
        try {
            let carId = currentEditId;
            if(currentEditId) await DVQTKrud.updateRow(TABLE, currentEditId, data);
            else { const res = await DVQTKrud.insertRow(TABLE, data); carId = res.id || res.data?.id; }
            
            const formData = new FormData(); formData.append('car_id', carId);
            const inputs = { 'front':'file_front','back':'file_back','left':'file_left','right':'file_right','inner':'file_inner','video':'file_video' };
            let hasF = false;
            for(let a in inputs) { const el = document.getElementById(inputs[a]); if(el && el.files[0]) { formData.append(a, el.files[0]); hasF=true; } }
            
            if(hasF) {
                const up = await fetch('../public/controllers/upload-car-media.php', { method:'POST', body:formData }).then(r=>r.json());
                if(up.success) {
                    const upData = {};
                    if(up.files.front) { upData.anhdaidien=up.files.front; }
                    if(up.files.back) upData.anhsau=up.files.back;
                    if(up.files.left) upData.anhtrai=up.files.left;
                    if(up.files.right) upData.anhphai=up.files.right;
                    if(up.files.inner) upData.anhnoithat=up.files.inner;
                    if(up.files.video) upData.videourl=up.files.video;
                    await DVQTKrud.updateRow(TABLE, carId, upData);
                }
            }
            Swal.fire('Xong', currentEditId?'Cập nhật thành công':'Đã lưu xe', 'success');
            resetForm(); loadMyCars(); initAutoSuggest();
            if(typeof window.toggleRegForm==='function' && document.getElementById('registerForm').style.display!=='none') window.toggleRegForm();
        } catch(e) { Swal.fire('Lỗi', e.message, 'error'); } finally { btn.disabled = false; }
    };

    window.toggleHideCar = async function(id, currentStatus) {
        const isHidden = currentStatus === 'hidden';
        const msg = isHidden ? 'Hiện lại xe này để cho thuê?' : 'Tạm ẩn xe này (khách sẽ không thấy)?';
        const res = await Swal.fire({ 
            title: isHidden ? 'Hiện xe' : 'Ẩn xe',
            text: msg,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: isHidden ? 'Hiện ngay' : 'Ẩn ngay'
        });
        
        if (res.isConfirmed) {
            try {
                // Nếu đang ẩn thì hiện lại (cho về approved), nếu đang hiện thì cho về hidden
                const nextStatus = isHidden ? 'approved' : 'hidden';
                await DVQTKrud.updateRow(TABLE, id, { trangthai: nextStatus });
                loadMyCars();
            } catch (e) {
                Swal.fire('Lỗi', 'Không thể thay đổi trạng thái.', 'error');
            }
        }
    };

    initAutoSuggest(); loadMyCars();
})();
