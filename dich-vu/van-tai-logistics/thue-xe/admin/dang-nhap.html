<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản trị | Thuê Xe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-name {
            font-weight: 800;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .admin-tag {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            color: #fff;
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            color: #fff;
            margin-top: 24px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="../public/assets/images/thue-xe-logo-header-navigation.jpg" alt="Logo">
        </div>
        <div class="brand-name">THUÊ XE</div>
        <div class="admin-tag">Quản trị hệ thống</div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" id="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">Đăng nhập</button>
        </form>

        <a href="../../../../index.html" class="back-link"><i class="fas fa-arrow-left me-2"></i>Quay lại trang chủ</a>
    </div>

    <script src="../../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../../public/asset/js/dvqt-app.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async function (e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const emailValue = document.getElementById('username').value.trim();
            const passValue = document.getElementById('password').value.trim();

            if (!emailValue || !passValue) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Đang xác thực...';

            try {
                // 1. Kiểm tra trực tiếp bảng 'admin'
                const admins = await DVQTKrud.listTable('admin', { limit: 1000 });
                const currentAdmin = (admins || []).find(a =>
                    (a.email === emailValue) &&
                    (String(a.matkhau) === String(passValue) || String(a.password) === String(passValue))
                );

                if (currentAdmin) {
                    // 2. Nếu khớp, ép kiểu session thông qua DVQTApp
                    // Tạo payload session giả lập hoặc thông qua setSession của app
                    const sessionData = {
                        id: currentAdmin.id,
                        username: currentAdmin.email,
                        hovaten: currentAdmin.hovaten || currentAdmin.name || 'Quản trị viên',
                        role: 'admin',
                        logged_in: true
                    };

                    // Lưu vào cache session của ứng dụng
                    localStorage.setItem('_dvqt_session_cache', JSON.stringify(sessionData));

                    Swal.fire({
                        title: 'Thành công!',
                        text: 'Chào mừng quản trị viên quay trở lại.',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'quan-tri.html';
                    });
                } else {
                    throw new Error('Sai thông tin đăng nhập hoặc không có quyền quản trị.');
                }
            } catch (err) {
                Swal.fire('Thất bại', err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Đăng nhập';
            }
        };
    </script>
</body>

</html>
