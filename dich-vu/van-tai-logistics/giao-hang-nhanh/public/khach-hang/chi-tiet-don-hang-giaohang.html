<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đang chuyển hướng | Giao Hàng Nhanh</title>
    <script>
      (function () {
        const target = new URL("../../chi-tiet-don-hang-giaohang.html", window.location.href);
        const currentParams = new URLSearchParams(window.location.search);
        currentParams.forEach((value, key) => {
          target.searchParams.set(key, value);
        });
        if (!target.searchParams.has("viewer")) {
          target.searchParams.set("viewer", "customer");
        }
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body></body>
</html>
