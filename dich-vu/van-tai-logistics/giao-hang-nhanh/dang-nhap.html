<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuyển hướng đăng nhập | Giao Hàng Nhanh</title>
    <meta
      name="description"
      content="Giao Hàng Nhanh dùng chung trang đăng nhập của Dịch Vụ Quanh Ta."
    />
    <meta http-equiv="refresh" content="0;url=../public/dang-nhap.html?service=giaohangnhanh" />
    <script src="/ga.js"></script>
  </head>
  <body>
    <script>
      (function () {
        const current = new URL(window.location.href);
        const target = new URL("../public/dang-nhap.html", current);
        target.searchParams.set("service", "giaohangnhanh");

        const redirect = current.searchParams.get("redirect");
        if (redirect) {
          target.searchParams.set("redirect", redirect);
        }

        window.location.replace(target.toString());
      })();
    </script>
    <p>
      Đang chuyển sang trang đăng nhập dùng chung.
      <a href="../public/dang-nhap.html?service=giaohangnhanh">Tiếp tục</a>
    </p>
  </body>
</html>
