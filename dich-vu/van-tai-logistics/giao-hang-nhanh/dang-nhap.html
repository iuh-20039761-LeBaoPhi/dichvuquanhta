<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuyển hướng đăng nhập | Giao Hàng Nhanh</title>
    <meta
      name="description"
      content="Giao Hàng Nhanh dùng chung trang đăng nhập của Dịch Vụ Quanh Ta."
    />
    <meta
      http-equiv="refresh"
      content="0;url=../../../public/dang-nhap.html?service=giaohangnhanh&amp;redirect=..%2Fdich-vu%2Fvan-tai-logistics%2Fgiao-hang-nhanh%2Findex.html"
    />
    <script src="/ga.js"></script>
  </head>
  <body>
    <script>
      (function () {
        const current = new URL(window.location.href);
        const currentPath = String(current.pathname || "").replace(/\\/g, "/");
        const projectMarker = "/giao-hang-nhanh/";
        const projectMarkerIndex = currentPath.toLowerCase().lastIndexOf(projectMarker);
        const projectBase =
          projectMarkerIndex !== -1
            ? currentPath.slice(0, projectMarkerIndex + projectMarker.length)
            : new URL(".", current).pathname;
        const parentBase = projectBase.replace(
          /(?:dich-vu\/van-tai-logistics\/)?giao-hang-nhanh\/?$/i,
          "",
        );
        const target = new URL(`${parentBase}public/dang-nhap.html`, current.origin);
        target.searchParams.set("service", "giaohangnhanh");

        const redirect = current.searchParams.get("redirect");
        if (redirect) {
          target.searchParams.set("redirect", redirect);
        } else {
          target.searchParams.set("redirect", `${projectBase}index.html`);
        }

        window.location.replace(target.toString());
      })();
    </script>
    <p>
      Đang chuyển sang trang đăng nhập dùng chung.
      <a href="../../../public/dang-nhap.html?service=giaohangnhanh&amp;redirect=..%2Fdich-vu%2Fvan-tai-logistics%2Fgiao-hang-nhanh%2Findex.html">Tiếp tục</a>
    </p>
  </body>
</html>
