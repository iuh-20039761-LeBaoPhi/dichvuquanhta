<!doctype html>
<html lang="vi">
  <head>
    <link rel="icon" type="image/x-icon" href="public/assets/images/favicon.ico" />
    <meta charset="UTF-8" />
    <title>Cẩm nang chuyển dọn - Dịch vụ Chuyển Dọn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cẩm nang chuyển dọn với kinh nghiệm chuyển nhà, chuyển văn phòng, chuyển kho bãi và các mẹo hữu ích từ Dịch vụ Chuyển Dọn."
    />
    <!-- Canonical URL -->
    <link rel="canonical" href="cam-nang.html" />

    <!-- Open Graph / Facebook & Zalo -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="cam-nang.html" />
    <meta
      property="og:title"
      content="Cẩm nang chuyển dọn | Dịch vụ Chuyển Dọn"
    />
    <meta
      property="og:description"
      content="Cập nhật tin tức, mẹo vặt chuyển nhà, chuyển văn phòng và các ưu đãi mới nhất từ Dịch vụ Chuyển Dọn."
    />
    <meta property="og:image" content="public/assets/images/chuyendon-tron-goi.png" />
    <meta property="og:site_name" content="Dịch vụ Chuyển Dọn" />

    <link rel="stylesheet" href="public/assets/css/styles.css" />
    <link rel="stylesheet" href="public/assets/css/pages/news.css" />
    <!-- FontAwesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1B4332",
              secondary: { light: "#2D6A4F", dark: "#1B4332" },
              accent: "#FFB703",
              bgLight: "#F8F9FA",
            },
            fontFamily: { sans: ["Poppins", "Inter", "sans-serif"] },
          },
        },
        corePlugins: { preflight: false },
      };
    </script>
      <script src="/ga.js"></script>
  </head>
  <body>
    <!-- Header Placeholder (được load bởi shared-layout.js) -->
    <div id="site-header"></div>

    <main>
      <!-- Hero Section cho trang cẩm nang -->
      <section class="bg-bgLight text-primary py-16 text-center">
        <div class="container mx-auto px-6">
          <h1 class="text-4xl font-bold mb-4">Cẩm Nang Chuyển Dọn</h1>
          <p class="text-lg opacity-90 max-w-2xl mx-auto">
            Chia sẻ kinh nghiệm chuyển nhà, văn phòng và các thông tin hữu ích
            giúp hành trình di chuyển của bạn dễ dàng hơn.
          </p>
        </div>
      </section>

      <!-- Danh sách bài viết -->
      <section
        class="section-container"
        style="padding: 60px 0; background-color: #ffffff"
      >
        <div class="max-w-[1200px] mx-auto px-6">
          <!-- Filter and Sort Controls -->
          <div
            id="news-controls"
            class="mb-10 bg-bgLight p-6 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-12 gap-4 items-end"
          >
            <!-- Search Input -->
            <div class="md:col-span-6 lg:col-span-5">
              <label
                for="news-search"
                class="block text-sm font-semibold text-slate-700 mb-2"
                >Từ khóa tìm kiếm</label
              >
              <div class="relative">
                <div
                  class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                >
                  <svg
                    class="h-5 w-5 text-gray-400"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    />
                  </svg>
                </div>
                <input
                  type="text"
                  id="news-search"
                  placeholder="Tìm bài viết, kinh nghiệm..."
                  class="pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm py-2.5 transition-shadow"
                />
              </div>
            </div>
            <!-- Category Filter -->
            <div class="md:col-span-3 lg:col-span-4">
              <label
                for="news-category"
                class="block text-sm font-semibold text-slate-700 mb-2"
                >Lọc theo danh mục</label
              >
              <select
                id="news-category"
                class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm py-2.5 cursor-pointer"
              >
                <!-- Options will be populated by JS -->
              </select>
            </div>
            <!-- Sort By -->
            <div class="md:col-span-3 lg:col-span-3">
              <label
                for="news-sort"
                class="block text-sm font-semibold text-slate-700 mb-2"
                >Sắp xếp</label
              >
              <select
                id="news-sort"
                class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm py-2.5 cursor-pointer"
              >
                <option value="date-desc">Mới nhất</option>
                <option value="date-asc">Cũ nhất</option>
                <option value="title-asc">Theo tên A-Z</option>
                <option value="title-desc">Theo tên Z-A</option>
              </select>
            </div>
          </div>
          <!-- JS sẽ render các thẻ bài viết vào đây -->
          <div id="news-list-container" class="news-grid min-h-[300px]">
            <!-- State loading mặc định -->
            <div class="col-span-full text-center py-10">
              <div
                class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-primary"
              ></div>
              <p class="mt-2 text-slate-500">Đang tải danh sách cẩm nang...</p>
            </div>
          </div>

          <!-- Pagination Controls Placeholder -->
          <div
            id="news-pagination"
            class="mt-10 flex justify-center items-center space-x-2"
          >
            <!-- Pagination links will be rendered here by JS -->
          </div>
        </div>
      </section>
    </main>

    <!-- Footer Placeholder (được load bởi shared-layout.js) -->
    <div id="site-footer"></div>

    <script src="public/assets/js/shared-layout.js"></script>
    <script src="public/assets/js/modules/main-news.js"></script>
    <script type="module" src="public/assets/js/main.js"></script>

    <!-- Schema.org for Blog -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "Cẩm nang chuyển dọn",
        "description": "Cẩm nang chuyển dọn với kinh nghiệm chuyển nhà, chuyển văn phòng, chuyển kho bãi và các mẹo hữu ích từ Dịch vụ Chuyển Dọn.",
        "publisher": {
          "@type": "Organization",
          "name": "Dịch vụ Chuyển Dọn"
        }
      }
    </script>
  </body>
</html>
