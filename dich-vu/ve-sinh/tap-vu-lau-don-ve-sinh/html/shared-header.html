<script>
  (function() {
    const cb = document.getElementById('menu-cb');
    if(!cb) return;
    document.addEventListener('click', (e) => {
      if (e.target.closest('.nav-link')) cb.checked = false;
      const header = cb.closest('nav');
      if (cb.checked && !header.contains(e.target)) cb.checked = false;
    });
  })();
</script>
