<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thợ Nhà - Admin Dashboard</title>
    <!-- CSS Standard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../public/assets/css/admin-dashboard.css?v=1.4" />
    <link rel="stylesheet" href="../public/assets/css/order-panel.css?v=1.4" />
    <link rel="stylesheet" href="../public/assets/css/order-detail-custom.css?v=1.4" />
    <link rel="stylesheet" href="../public/assets/css/user-panel.css?v=1.4" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script>window.BD_BASE = '../';</script>
    <style>
      :root {
          /* Premium Neutral Palette (Slate/Blue) - Thợ Nhà Admin */
          --admin-bg: #f8fafc; 
          --admin-border: #e2e8f0;
          --admin-panel: #ffffff;
          --admin-text: #0f172a;
          --admin-muted: #64748b;
          --admin-primary: #059669; /* Branding Emerald */
          --admin-primary-2: #10b981;
          --admin-dark: #0f172a; /* Deep Navy Sidebar */
          --admin-dark-2: #1e293b;
      }
      .admin-shell { display: flex; width: 100%; min-height: 100vh; background: var(--admin-bg); }
      .sidebar-shell { flex-shrink: 0; }
      .content-shell { flex: 1; min-width: 0; }
      .topbar-actions { display: flex; align-items: center; gap: 15px; }
      .top-icon-btn { 
          width: 38px; height: 38px; display: flex; align-items: center; 
          justify-content: center; border-radius: 10px; color: var(--admin-muted); 
          background: #f1f5f9; border: 1px solid var(--admin-border); transition: 0.2s;
          text-decoration: none;
      }
      .top-icon-btn:hover { background: #e2e8f0; color: var(--admin-primary); transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <!-- Sidebar Partial Placeholder -->
      <div id="asideMount"></div>

      <main class="content-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="btn btn-sm sidebar-toggler d-lg-none"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#sidebar"
              aria-controls="sidebar"
              aria-label="Mở menu"
            >
              <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <h2 id="pageTitleDisplay">Tổng quan</h2>
          </div>

          <div class="topbar-actions">
            <a href="../index.html" target="_blank" class="btn btn-sm top-icon-btn" title="Xem website">
                <i class="fas fa-external-link-alt"></i>
            </a>
            <div class="admin-chip">
              <span class="admin-avatar" id="userAvatar">T</span>
              <span class="admin-email" id="adminUsernameDisplay">admin@thonha.vn</span>
            </div>
          </div>
        </header>

        <section class="container-fluid py-3 py-lg-4">
           <!-- Dynamic content area -->
           <div id="pageContent"></div>
        </section>
      </main>
    </div>

    <!-- Modals placeholder -->
    <div id="modalsContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../../public/asset/js/dvqt-app.js"></script>
    
    <!-- Local Admin Scripts (Shared within Thợ Nhà) -->
    <script src="../public/assets/js/shared/order-store.js"></script>
    <script src="../public/assets/js/shared/order-view-utils.js"></script>
    <script src="../public/assets/js/shared/order-service.js"></script>
    <script src="../public/assets/js/shared/order-detail-renderer.js"></script>
    <script src="../public/assets/js/shared/order-ui-composer.js"></script>
    <script src="../public/assets/js/admin/shell.js"></script>

    <script>
      // Injection for Sidebar
      fetch('aside.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('asideMount').innerHTML = html;
          // Setup navigation from shell.js
          if(typeof setupNavigation === 'function') setupNavigation();
          
          // Mark active path
          const currentPath = window.location.pathname.split('/').pop() || 'quan-tri.html';
          document.querySelectorAll('.nav-item').forEach(item => {
             if(item.getAttribute('href') === currentPath) item.classList.add('active');
          });
        });

      // Show username
      const storedUser = localStorage.getItem('admin_username') || 'Admin';
      document.getElementById('adminUsernameDisplay').textContent = storedUser;
      document.getElementById('userAvatar').textContent = storedUser.charAt(0).toUpperCase();
    </script>
  </body>
</html>
