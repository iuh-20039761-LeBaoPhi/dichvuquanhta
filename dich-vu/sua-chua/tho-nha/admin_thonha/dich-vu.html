<!-- Modal Category (Giữ nguyên cấu trúc nhưng làm đẹp hơn) -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="categoryForm" class="modal-content border-0 shadow" style="border-radius:20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold" id="categoryModalTitle">Thêm danh mục</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" name="id" id="catId">
                <div class="mb-3">

                    <input type="text" class="form-control rounded-3" name="ten_danhmuc" id="catName" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-bold">Icon (FontAwesome)</label>
                        <input type="text" class="form-control rounded-3" name="icon" id="catIcon" placeholder="fa-wind">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-bold">Thứ tự</label>
                        <input type="number" class="form-control rounded-3" name="thu_tu" id="catOrder" value="0">
                    </div>
                </div>
                <div class="mb-3">

                        <div id="catImagePreview" style="width:64px;height:64px;border-radius:12px;overflow:hidden;background:#f1f5f9;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                            <i class="fas fa-image text-muted"></i>
                        </div>
                        <label class="btn btn-sm btn-outline-primary rounded-pill px-3 mb-0" style="cursor:pointer;">
                            <i class="fas fa-upload me-1"></i>Chọn ảnh
                            <input type="file" id="catImageFile" accept="image/*" class="d-none" onchange="previewAdminImg(this, 'catImagePreview')">

                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Mô tả</label>
                    <textarea class="form-control rounded-3" name="mo_ta" id="catDesc" rows="2"></textarea>
                </div>
                <div class="mb-0">
                    <label class="form-label small fw-bold">Trạng thái</label>
                    <select class="form-select rounded-3" name="trang_thai" id="catStatus">

                        <option value="hidden">Ẩn</option>
                    </select>

            </div>
