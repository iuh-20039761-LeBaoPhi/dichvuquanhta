<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provider Dashboard - Thợ Nhà</title>
    <!-- CSS Standard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../../assets/css/admin-dashboard.css?v=1.4" />
    <link rel="stylesheet" href="../../assets/css/order-panel.css?v=1.4" />
    <link rel="stylesheet" href="../../assets/css/order-detail-custom.css?v=1.4" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      :root {
          /* Premium Neutral Palette (Slate/Blue) - Thợ Nhà Partner */
          --admin-bg: #f8fafc; 
          --admin-border: #e2e8f0;
          --admin-panel: #ffffff;
          --admin-text: #0f172a;
          --admin-muted: #64748b;
          --admin-primary: #10b981; /* Green to match customer side */
          --admin-primary-2: #059669;
          --admin-dark: #0f172a; /* Deep Navy Sidebar */
          --admin-dark-2: #1e293b;
      }
      .admin-shell { display: block; width: 100%; min-height: 100vh; background: var(--admin-bg); position: relative; }
      .sidebar-shell { 
          width: 280px !important; 
          height: 100vh !important;
          position: fixed !important;
          top: 0;
          left: 0;
          z-index: 1050;
          transition: transform 0.3s ease, visibility 0.3s ease;
      }
      .content-shell { 
          margin-left: 280px;
          min-width: 0;
          min-height: 100vh;
          transition: margin 0.3s ease;
          display: flex;
          flex-direction: column;
      }
      .nav-item { cursor: pointer; }

      /* Responsive Sidebar (Breakpoint synchronized at 1100px) */
      @media (max-width: 1100px) {
          .sidebar-shell {
              visibility: hidden;
              transform: translateX(-100%);
          }
          .sidebar-shell.show {
              visibility: visible;
              transform: translateX(0);
              box-shadow: 10px 0 50px rgba(0,0,0,0.3);
          }
          .content-shell {
              margin-left: 0;
          }
          .sidebar-toggler {
              display: block !important;
          }
      }
      @media (min-width: 1101px) {
          .sidebar-shell {
              visibility: visible !important;
              transform: none !important;
          }
          .sidebar-toggler {
              display: none !important;
          }
      }

      /* Responsive Table to Card (Breakpoint synchronized at 1200px) */
      @media (max-width: 1200px) {
          .desktop-table-wrap { display: none !important; }
          .mobile-list { display: block !important; }
      }
      @media (min-width: 1201px) {
          .mobile-list { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <!-- Sidebar Partial Placeholder -->
      <div id="sidebarMount"></div>

      <main class="content-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button class="btn btn-sm sidebar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
              <i class="fas fa-bars"></i>
            </button>
            <h2 id="pageTitleDisplay">Đối tác Thợ Nhà</h2>
          </div>

          <div class="topbar-actions">
            <div class="admin-chip">
              <span class="admin-avatar" id="userAvatar">D</span>
              <span class="admin-email" id="adminUsernameDisplay">Đối tác</span>
            </div>
          </div>
        </header>

        <section class="container-fluid py-4">
           <div id="pageContent">
              <!-- Content will be injected here -->
           </div>
        </section>
      </main>
    </div>

    <!-- Modals placeholder -->
    <div id="modalsContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../../../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../../../public/asset/js/dvqt-app.js"></script>
    <script src="../../assets/js/shared/order-store.js"></script>
    <script src="../../assets/js/shared/order-view-utils.js"></script>
    <script src="../../assets/js/shared/order-service.js"></script>
    <script src="../../assets/js/shared/order-detail-renderer.js"></script>
    <script src="../../assets/js/shared/order-actions.js"></script>
    <script src="../../assets/js/shared/order-ui-composer.js"></script>
    <script src="../../assets/js/provider/shell.js"></script>

    <script>
      // Injection for Sidebar
      fetch('partials/aside.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('sidebarMount').innerHTML = html;
          if(typeof setupNavigation === 'function') setupNavigation();
          
          // Mark active path
          const currentPath = window.location.pathname.split('/').pop() || 'trang-ca-nhan.html';
          document.querySelectorAll('.nav-item').forEach(item => {
             if(item.getAttribute('href') === currentPath) item.classList.add('active');
          });
        });
    </script>
    <!-- Pricing Modal -->
    <div class="modal fade" id="pricingModal" tabindex="-1" aria-hidden="true" style="backdrop-filter: blur(8px);">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 24px; overflow: hidden;">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="modal-title fw-800" style="background: linear-gradient(135deg, #059669 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.4rem;">
                        Nhập giá thực tế & Trợ giá
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="box-shadow: none;"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted mb-4 fw-500">Vui lòng nhập số tiền thực tế bạn đã thỏa thuận với khách hàng để hệ thống tính toán khoản trợ giá (5%).</p>
                    <div class="mb-3">
                        <label for="inputActualPriceModal" class="form-label fw-bold small text-uppercase" style="letter-spacing: 0.05em; color: #64748b;">Số tiền thực tế (VNĐ)</label>
                        <input type="number" class="form-control form-control-lg border-2 shadow-none" id="inputActualPriceModal" placeholder="VD: 500000" style="border-radius: 12px; font-weight: 700; color: #1e293b; border-color: #e2e8f0; height: 56px;">
                    </div>
                    <div class="p-3 bg-light border-radius-16" style="border-radius: 16px; border: 1.5px dashed #10b981; background-color: rgba(16, 185, 129, 0.05) !important;">
                        <div class="d-flex align-items-center gap-3">
                            <i class="fas fa-gift text-success fa-lg"></i>
                            <div>
                                <div class="fw-bold text-success">Bạn sẽ nhận được trợ giá 5%</div>
                                <div class="small text-muted">Số tiền này sẽ được trừ trực tiếp vào phí hoa hồng cần thanh toán.</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-primary w-100 py-3 fw-bold shadow-sm" id="btnSubmitPricingModal" style="border-radius: 14px; background: linear-gradient(135deg, #059669 0%, #10b981 100%); border: none;">
                        Gửi & Nhận ưu đãi
                    </button>
                </div>
            </div>
        </div>
    </div>
  </body>
</html>
