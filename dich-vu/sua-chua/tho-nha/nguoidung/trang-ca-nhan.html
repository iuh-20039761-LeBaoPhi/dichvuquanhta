<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân | Thợ Nhà</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/assets/css/user-panel.css">
    <link rel="stylesheet" href="../public/assets/css/order-detail-custom.css">
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>window.BD_BASE = '../';</script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-soft: rgba(16, 185, 129, 0.1);
            --bg: #f3f6f9;
            --sidebar-bg: #1e293b;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; font-size: 14px; overflow-x: hidden; }

        /* Sidebar Styles (matching customer design) */
        .sidebar-shell { width: 260px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; height: 100vh; z-index: 1000; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
        
        .main-wrapper { flex: 1; margin-left: 260px; min-width:0; transition: margin 0.3s ease; }
        .top-bar { 
            height: 80px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 900;
        }
        .top-h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }

        .user-pill { 
            display: flex; align-items: center; gap: 12px; padding: 6px 16px 6px 6px; 
            background: #fff; border: 1px solid var(--border); border-radius: 50px; box-shadow: var(--shadow-sm);
        }
        .user-avatar { 
            width: 36px; height: 36px; background: var(--primary); color: #fff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-size: 12px; font-weight: 700; color: var(--text-main); }

        .content-area { padding: 30px 40px; }

        /* Responsive Sidebar */
        @media (max-width: 1100px) {
            .sidebar-shell { transform: translateX(-100%); transition: transform 0.3s ease; visibility: hidden; }
            .sidebar-shell.show { transform: translateX(0); visibility: visible; }
            .main-wrapper { margin-left: 0; width: 100%; }
            .top-bar { padding: 0 15px; }
            .sidebar-toggle { display: flex !important; }
        }

        .sidebar-toggle {
            display: none; width: 40px; height: 40px;
            align-items: center; justify-content: center;
            background: #fff; border: 1px solid var(--border);
            border-radius: 10px; font-size: 1.2rem; color: var(--text-main);
            cursor: pointer;
        }

        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 999;
        }
        .sidebar-overlay.show { display: block; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <!-- Sidebar Mount Point -->
    <div id="sidebarMount"></div>

    <main class="main-wrapper">
        <header class="top-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="sidebar-toggle" id="mobileMenuBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 class="top-h1" id="pageTitleDisplay">Trang cá nhân</h1>
            </div>
            <div class="user-pill">
                <div class="user-avatar" id="accAvatarHead">U</div>
                <div class="user-name" id="accNameHead">Đang tải...</div>
            </div>
        </header>

        <div class="content-area" id="pageContent">
            <div style="text-align:center; padding:100px; color:#94a3b8;">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top:15px; font-weight:500;">Đang khởi tạo ứng dụng...</p>
            </div>
        </div>
    </main>

    <!-- Global Modals (Adapted from both sides) -->
    <div id="modalsContainer"></div>

    <!-- Scripts -->
    <script src="../../../../public/asset/js/dvqt-app.js"></script>
    <script src="../../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../public/assets/js/shared/order-view-utils.js"></script>
    <script src="../public/assets/js/shared/order-store.js"></script>
    <script src="../public/assets/js/shared/order-service.js"></script>
    <script src="../public/assets/js/shared/order-ui-composer.js"></script>
    <script src="../public/assets/js/shared/order-detail-renderer.js"></script>
    <script src="../public/assets/js/shared/order-actions.js"></script>
    <script src="../public/assets/js/user/shell.js"></script>

    <script>
        // Load Sidebar
        fetch('aside.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('sidebarMount').innerHTML = html;
                if(window.initSidebarLogic) window.initSidebarLogic();
            });

        // Mobile Sidebar Toggle Logic
        document.getElementById('mobileMenuBtn').addEventListener('click', function() {
            const sidebar = document.querySelector('.sidebar-shell');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar && overlay) {
                sidebar.classList.add('show');
                overlay.classList.add('show');
            }
        });

        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            const sidebar = document.querySelector('.sidebar-shell');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar && overlay) {
                sidebar.classList.remove('show');
                overlay.classList.remove('show');
            }
        });
    </script>
</body>
</html>
