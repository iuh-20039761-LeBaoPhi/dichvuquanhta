<div class="registration-container" style="max-width: 800px; margin: 0 auto; animation: fadeInUp 0.4s ease;">
    <div class="card border-0 shadow-sm" style="border-radius: 20px; overflow: hidden;">

                </div>
            </div>
        </div>

                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4">
                    <button id="saveCategoriesBtn" class="btn btn-primary px-4 py-2 fw-bold" style="border-radius: 10px; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); border: none; min-width: 160px;">

                    </button>
                </div>
                <div id="saveStatus" class="mt-2 text-end"></div>
            </div>
        </div>

</div>
