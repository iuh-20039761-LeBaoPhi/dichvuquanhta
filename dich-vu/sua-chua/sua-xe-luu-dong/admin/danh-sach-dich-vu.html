<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sửa Xe Lưu Động - Admin - Danh sách dịch vụ</title>
    <link rel="shortcut icon" type="image/x-icon" href="../public/asset/image/logo-sua-xe-luu-dong.png" />
    <link rel="stylesheet" href="../public/asset/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../public/asset/css/admin-dashboard.css" />
    <link rel="stylesheet" href="../public/asset/css/order-panel.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../../../public/asset/js/sweetalert-utils.js"></script>
    <style>
      .pagination {
        border-radius: 8px;
        overflow: hidden;
      }
      .pagination .page-link {
        border: 1px solid #dee2e6;
        padding: 8px 14px;
        color: #0d6efd;
        font-size: 14px;
        transition: none;
      }
      .pagination .page-item:first-child .page-link {
        background-color: #eef1f4;
        color: #333;
        border-right: 0;
      }
      .pagination .page-item.active .page-link {
        background-color: #0d6efd;
        border-color: #0d6efd;
        color: #fff;
      }
      .pagination .page-item:not(.active):not(:first-child) .page-link {
        border-left: 0;
      }
      .pagination .page-item.disabled .page-link {
        color: #999;
        pointer-events: none;
      }
      .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.15rem rgba(13, 110, 253, 0.15);
      }
      .img-preview-box {
        border: 1px dashed #ddd;
        border-radius: 8px;
        padding: 10px;
        background: #fafafa;
      }
    </style>
  </head>
  <body data-role="admin" data-page="list">
    <div class="admin-shell">
      <div
        id="asideMount"
        data-aside-src="partials/aside.html"
        data-logo-src="../public/asset/image/logo-sua-xe-luu-dong.png"
        data-logout-href="../../../../public/admin-login.html"
      ></div>
      <main class="content-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="btn btn-sm sidebar-toggler d-lg-none"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#sidebar"
            >
              <i class="fas fa-bars"></i>
            </button>
            <h2>Quản lý dịch vụ</h2>
          </div>
          <div class="topbar-actions">
            <div class="admin-chip">
              <span class="admin-avatar">A</span
              ><span class="admin-email">admin@giatuinhanh.vn</span>
            </div>
          </div>
        </header>

        <section class="container-fluid py-3 py-lg-4">
          <div class="page-heading d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div>
              <nav aria-label="breadcrumb">
                <ol class="breadcrumb panel-breadcrumb">
                  <li class="breadcrumb-item">
                    <a href="index.html">Trang quản trị</a>
                  </li>
                  <li class="breadcrumb-item active">Danh sách dịch vụ</li>
                </ol>
              </nav>
              <h1 class="page-title">Danh sách dịch vụ</h1>
            </div>
            <button
              class="btn btn-primary shadow-sm px-3"
              onclick="openServiceModal()"
            >
              <i class="fas fa-plus me-1"></i> Thêm dịch vụ
            </button>
          </div>

          <article class="panel-card mt-3">
            <div class="panel-head">
              <h3><i class="fas fa-concierge-bell"></i> Danh mục dịch vụ</h3>
              <span class="record-count" id="itemCount">0 dịch vụ</span>
            </div>
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0 service-table">
                <thead>
                  <tr>
                    <th>STT</th>
                    <th>Hình ảnh</th>
                    <th>Tên dịch vụ</th>
                    <th class="text-end">Thao tác</th>
                  </tr>
                </thead>
                <tbody id="serviceTableBody"></tbody>
              </table>
            </div>
            <div
              class="panel-foot d-flex align-items-center justify-content-between p-3 border-top"
            >
              <p class="mb-0 text-muted small" id="pageInfo">Đang tải...</p>
              <nav>
                <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
              </nav>
            </div>
          </article>
        </section>
      </main>
    </div>

    <!-- Modal Dịch vụ -->
    <div class="modal fade" id="serviceModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered modal-fullscreen-sm-down">
        <form id="serviceForm" class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="modalTitle">
              Thêm dịch vụ mới
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-md-7">
                <div class="mb-3">
                  <label class="form-label small fw-bold">Tên dịch vụ</label>
                  <input
                    type="text"
                    name="tendichvu"
                    class="form-control form-control-sm"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold">Mô tả dịch vụ</label>
                  <textarea
                    name="mota"
                    class="form-control form-control-sm"
                    rows="5"
                    required
                  ></textarea>
                </div>
              </div>
              <div class="col-md-5">
                <div class="mb-3">
                  <label class="form-label small fw-bold"
                    >Hình ảnh (.jpg duy nhất)</label
                  >
                  <input
                    type="file"
                    name="file"
                    class="form-control form-control-sm"
                    accept=".jpg,.jpeg"
                  />
                  <div class="mt-3 img-preview-box text-center position-relative overflow-hidden" style="min-height: 180px;">
                    <img
                      id="imgPreview"
                      src="#"
                      alt="Bản xem trước"
                      class="img-fluid d-none"
                      style="max-height: 200px; border-radius: 8px"
                    />
                    <iframe
                      id="iframePreview"
                      src=""
                      class="position-absolute w-100 h-100 d-none"
                      style="top:0; left:0; border:none; pointer-events:none; transform: scale(1.45); transform-origin: center;"
                      scrolling="no"
                      loading="lazy"
                    ></iframe>
                    <div id="noImg" class="py-4 text-muted small">
                      Chưa chọn ảnh
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button
              type="button"
              class="btn btn-sm btn-light"
              data-bs-dismiss="modal"
            >
              Hủy
            </button>
            <button
              type="submit"
              class="btn btn-sm btn-primary px-4"
              id="btnSave"
            >
              Lưu lại
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="../public/asset/js/bootstrap.bundle.min.js"></script>
    <script src="../public/asset/js/admin-layout.js"></script>
    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script src="../public/asset/js/shared-order-utils.js"></script>
    <script>
      const limit = 5;
      let currentPage = 1,
        currentData = [],
        editingId = null;
      const modal = new bootstrap.Modal(
        document.getElementById("serviceModal"),
      );

      async function loadData(page = 1) {
        if (page < 1) return;
        currentPage = page;
        const tbody = document.getElementById("serviceTableBody");
        tbody.innerHTML =
          '<tr><td colspan="5" class="text-center py-4">Đang tải...</td></tr>';
        try {
          const res = await window.krudList({
            table: "dichvu_suaxe",
            page,
            limit,
          });
          currentData = (res && res.data) || (Array.isArray(res) ? res : []);
          const total = (res && res.total) || currentData.length;
          const totalPages = Math.ceil(total / limit);
          document.getElementById("itemCount").textContent = `${total} dịch vụ`;
          document.getElementById("pageInfo").textContent =
            `Trang ${page}/${totalPages || 1}`;
          tbody.innerHTML = currentData
            .map(
              (s, i) => `
            <tr>
              <td data-label="STT">${(page - 1) * limit + i + 1}</td>
              <td data-label="Hình ảnh"><div class="position-relative overflow-hidden" style="width:60px;height:45px;border-radius:6px;border:1px solid #eee;"><iframe src="${s.hinhanh && (s.hinhanh.includes('.') || s.hinhanh.includes('/')) ? '../public/asset/image/' + s.hinhanh : 'https://drive.google.com/file/d/' + s.hinhanh + '/preview'}" class="position-absolute" style="width:400px;height:300px;left:50%;top:50%;border:none;pointer-events:none;transform:translate(-50%,-50%) scale(0.22);transform-origin:center;" scrolling="no" loading="lazy"></iframe></div></td>
              <td data-label="Tên dịch vụ"><strong>${s.tendichvu}</strong></td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-primary me-1" onclick="openServiceModal(${s.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteService(${s.id})"><i class="fas fa-trash"></i></button>
              </td>
            </tr>`,
            )
            .join("");
          renderPagination(totalPages);
        } catch (err) {
          tbody.innerHTML =
            '<tr><td colspan="5" class="text-center py-4 text-danger">Lỗi tải dữ liệu.</td></tr>';
          showError("Không thể tải danh sách dịch vụ.");
        }
      }

      function renderPagination(totalPages) {
        const pagin = document.getElementById("pagination");
        let html = `<li class="page-item ${currentPage === 1 ? "disabled" : ""}"><a class="page-link" href="#" onclick="loadData(${currentPage - 1});return false;">Trước</a></li>`;
        for (let i = 1; i <= totalPages; i++)
          html += `<li class="page-item ${i === currentPage ? "active" : ""}"><a class="page-link" href="#" onclick="loadData(${i});return false;">${i}</a></li>`;
        html += `<li class="page-item ${currentPage === totalPages || totalPages === 0 ? "disabled" : ""}"><a class="page-link" href="#" onclick="loadData(${currentPage + 1});return false;">Sau</a></li>`;
        pagin.innerHTML = html;
      }

      function openServiceModal(id = null) {
        editingId = id;
        const form = document.getElementById("serviceForm");
        form.reset();
        document.getElementById("noImg").classList.remove("d-none");
        document.getElementById("imgPreview").classList.add("d-none");
        document.getElementById("iframePreview").classList.add("d-none");
        document.getElementById("modalTitle").textContent = id
          ? "Chỉnh sửa dịch vụ"
          : "Thêm dịch vụ mới";
        if (id) {
          const s = currentData.find((x) => x.id == id);
          if (s) {
            form.tendichvu.value = s.tendichvu;
            form.mota.value = s.mota;
            if (s.hinhanh) {
              if (s.hinhanh.includes(".")) {
                document.getElementById("imgPreview").src = `../public/asset/image/${s.hinhanh}`;
                document.getElementById("imgPreview").classList.remove("d-none");
                document.getElementById("iframePreview").classList.add("d-none");
              } else {
                document.getElementById("iframePreview").src = `https://drive.google.com/file/d/${s.hinhanh}/preview`;
                document.getElementById("iframePreview").classList.remove("d-none");
                document.getElementById("imgPreview").classList.add("d-none");
              }
              document.getElementById("noImg").classList.add("d-none");
            }
          }
        }
        modal.show();
      }

      function deleteService(id) {
        showConfirm("Bạn có chắc chắn muốn thực hiện hành động 'Xóa dịch vụ'?", async function () {
          try {
            const res = await window.krud("delete", "dichvu_suaxe", null, id);
            if (res && res.success !== false) {
              showSuccess("Đã xóa dịch vụ thành công!");
              loadData(currentPage);
            } else {
              throw new Error(res.message || "Lỗi xóa dữ liệu.");
            }
          } catch (err) {
            showError(err.message);
          }
        });
      }

      document
        .querySelector('input[name="file"]')
        .addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file) {
            const r = new FileReader();
            r.onload = (ev) => {
              document.getElementById("imgPreview").src = ev.target.result;
              document.getElementById("imgPreview").classList.remove("d-none");
              document.getElementById("iframePreview").classList.add("d-none");
              document.getElementById("noImg").classList.add("d-none");
            };
            r.readAsDataURL(file);
          }
        });

      document
        .getElementById("serviceForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("btnSave"),
            fd = new FormData(e.target);
          btn.disabled = true;
          btn.innerHTML =
            '<span class="spinner-border spinner-border-sm"></span>...';
          try {
            let hinhanh = editingId
              ? currentData.find((x) => x.id == editingId).hinhanh
              : "";
            if (fd.get("file").name) {
              fd.append("folderKey", "8");
              const upRes = await fetch("../../../../public/upload_to_drive.php", {
                method: "POST",
                body: fd,
              }).then((r) => r.json());
              if (!upRes.success) throw new Error(upRes.message);
              hinhanh = upRes.fileId;
            } else if (!editingId) throw new Error("Vui lòng chọn ảnh!");

            const payload = {
              tendichvu: fd.get("tendichvu"),
              mota: fd.get("mota"),
              hinhanh,
            };
            const res = await window.krud(
              editingId ? "update" : "insert",
              "dichvu_suaxe",
              payload,
              editingId,
            );
            if (res && res.success !== false) {
              modal.hide();
              showSuccess(editingId ? "Cập nhật dịch vụ thành công!" : "Thêm dịch vụ thành công!");
              loadData(currentPage);
            } else throw new Error("Lỗi lưu DB");
          } catch (err) {
            showError(err.message);
          } finally {
            btn.disabled = false;
            btn.textContent = "Lưu lại";
          }
        });

      document.addEventListener("DOMContentLoaded", () => loadData(1));
    </script>
    <script src="../public/asset/js/plugin/webfont/webfont.min.js"></script>
    <script>
      WebFont.load({
        google: { families: ["Public Sans:300,400,500,600,700"] },
        custom: {
          families: [
            "Font Awesome 5 Solid",
            "Font Awesome 5 Regular",
            "Font Awesome 5 Brands",
          ],
          urls: ["../public/asset/css/fonts.min.css"],
        },
      });
    </script>
  </body>
</html>
