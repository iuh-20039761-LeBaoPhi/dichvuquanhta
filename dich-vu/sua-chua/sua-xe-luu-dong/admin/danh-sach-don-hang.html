<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sửa Xe Lưu Động - Admin - Danh sách đơn hàng</title>
    <link rel="shortcut icon" type="image/x-icon" href="../public/asset/image/logo-sua-xe-luu-dong.png" />
    <link rel="stylesheet" href="../public/asset/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../public/asset/css/admin-dashboard.css" />
    <link rel="stylesheet" href="../public/asset/css/order-panel.css" />
    <style>
      .status-filter-container {
        background: #f8fbfe;
        border: 1px solid #dce6f2;
        border-radius: 16px;
        padding: 8px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        overflow-x: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .status-filter-container::-webkit-scrollbar {
        display: none;
      }
      .status-filter-scroll {
        display: flex;
        gap: 8px;
        width: 100%;
      }
      .status-filter-btn {
        flex: 1;
        min-width: fit-content;
        border: none;
        background: transparent;
        padding: 10px 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-weight: 700;
        color: #5f7592;
        transition: all 0.2s ease;
        white-space: nowrap;
      }
      .status-filter-btn:hover {
        background: rgba(23, 57, 86, 0.05);
        color: #173956;
      }
      .status-filter-btn.active {
        background: #007bff;
        color: #ffffff !important;
        box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
      }
      .status-filter-btn .status-count {
        font-size: 0.75rem;
        padding: 4px 8px;
        border-radius: 20px;
        min-width: 28px;
        text-align: center;
      }
      .status-filter-btn.active .status-count {
        background: rgba(255, 255, 255, 0.25);
        color: #ffffff;
      }
      .status-filter-btn:not(.active) .status-count {
        background: #e9ecef;
        color: #495057;
      }
      .status-filter-btn[data-status="pending"]:not(.active) .status-count { background: #fff3cd; color: #856404; }
      .status-filter-btn[data-status="accepted"]:not(.active) .status-count { background: #e0f2fe; color: #0369a1; }
      .status-filter-btn[data-status="processing"]:not(.active) .status-count { background: #cce5ff; color: #004085; }
      .status-filter-btn[data-status="completed"]:not(.active) .status-count { background: #d4edda; color: #155724; }
      .status-filter-btn[data-status="canceled"]:not(.active) .status-count { background: #f8d7da; color: #721c24; }
    </style>
  </head>
  <body data-role="admin" data-page="list">
    <div class="admin-shell">
      <div
        id="asideMount"
        data-aside-src="partials/aside.html"
        data-logo-src="../public/asset/image/logo-sua-xe-luu-dong.png"
        data-logout-href="../../../../public/admin-login.html"
      ></div>

      <main class="content-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="btn btn-sm sidebar-toggler d-lg-none"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#sidebar"
              aria-controls="sidebar"
              aria-label="Mở menu"
            >
              <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <h2>Quản lý đơn hàng</h2>
          </div>

          <div class="topbar-actions">
            <div class="admin-chip">
              <span class="admin-avatar">A</span>
              <span class="admin-email">admin@suaxeluudong.vn</span>
            </div>
          </div>
        </header>

        <section class="container-fluid py-3 py-lg-4">
          <div class="page-heading">
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb panel-breadcrumb">
                <li class="breadcrumb-item">
                  <a href="index.html">Trang quản trị</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page">
                  Danh sách đơn hàng
                </li>
              </ol>
            </nav>
            <h1 class="page-title">Danh sách đơn hàng</h1>
            <p class="page-subtitle">
              Theo dõi trạng thái đơn hàng và tra cứu thông tin chi tiết.
            </p>
          </div>

          <!-- <div class="row g-3 stats-grid" id="statsGrid"></div> -->

          <div class="status-filter-container mt-4 shadow-sm">
            <div class="status-filter-scroll" id="statusFilterBar">
              <button class="status-filter-btn active" data-status="all">
                <span class="status-label">Tất cả</span>
                <span class="status-count" id="count-all">0</span>
              </button>
              <button class="status-filter-btn" data-status="pending">
                <span class="status-label">Chờ xác nhận</span>
                <span class="status-count" id="count-pending">0</span>
              </button>
              <button class="status-filter-btn" data-status="accepted">
                <span class="status-label">Đã xác nhận</span>
                <span class="status-count" id="count-accepted">0</span>
              </button>
              <button class="status-filter-btn" data-status="processing">
                <span class="status-label">Đang thực hiện</span>
                <span class="status-count" id="count-processing">0</span>
              </button>
              <button class="status-filter-btn" data-status="completed">
                <span class="status-label">Hoàn thành</span>
                <span class="status-count" id="count-completed">0</span>
              </button>
              <button class="status-filter-btn" data-status="canceled">
                <span class="status-label">Đã hủy</span>
                <span class="status-count" id="count-canceled">0</span>
              </button>
            </div>
          </div>

          <article class="panel-card mt-3">
            <div class="panel-head">
              <h3>
                <i class="fas fa-filter" aria-hidden="true"></i>
                Bộ lọc đơn hàng
              </h3>
              <span class="record-count" id="ordersCount">0 đơn</span>
            </div>

            <div class="p-3 border-bottom">
              <form id="orderFilterForm" class="filter-form" novalidate>
                <div class="filter-grid">
                  <div>
                    <label class="form-label" for="filterOrderCode"
                      >Mã đơn</label
                    >
                    <input
                      class="form-control"
                      id="filterOrderCode"
                      name="orderCode"
                      type="text"
                      placeholder="Ví dụ: 0000012"
                    />
                  </div>

                  <input type="hidden" id="filterStatus" name="status" value="all" />

                  <div>
                    <label class="form-label" for="filterFromDate"
                      >Từ ngày</label
                    >
                    <input
                      class="form-control"
                      id="filterFromDate"
                      name="fromDate"
                      type="date"
                    />
                  </div>

                  <div>
                    <label class="form-label" for="filterToDate"
                      >Đến ngày</label
                    >
                    <input
                      class="form-control"
                      id="filterToDate"
                      name="toDate"
                      type="date"
                    />
                  </div>
                </div>

                <div class="filter-actions mt-3">
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search" aria-hidden="true"></i>
                    Tìm kiếm
                  </button>
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    id="filterReset"
                  >
                    Đặt lại
                  </button>
                </div>
              </form>
            </div>

            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0 order-table">
                <thead>
                  <tr>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>Dịch vụ</th>
                    <th>Ngày đặt</th>
                    <th>Trạng thái</th>
                    <th>Tổng tiền</th>
                    <th>Thao tác</th>
                  </tr>
                </thead>
                <tbody id="summaryTableBody">
                  <tr class="table-light fw-bold">
                    <td colspan="5" class="text-end">Tổng cộng (<span id="totalOrdersCount">0</span>):</td>
                    <td id="totalOrdersAmount">0 đ</td>
                    <td></td>
                  </tr>
                </tbody>
                <tbody id="ordersTableBody"></tbody>
              </table>
            </div>

            <div
              class="panel-foot d-flex flex-wrap align-items-center justify-content-between gap-2"
            >
              <p class="empty-hint" id="ordersEmptyHint">Hiển thị 0/0 đơn</p>
              <nav aria-label="Phân trang đơn hàng">
                <ul class="pagination mb-0" id="ordersPagination"></ul>
              </nav>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="../public/asset/js/bootstrap.bundle.min.js"></script>
    <script src="../public/asset/js/admin-layout.js"></script>
    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <script src="../../../../public/asset/js/order-shared-utils.js"></script>
    <script src="../public/asset/js/shared-order-utils.js"></script>
    <script src="../public/asset/js/order-panel-pages.js"></script>
    <script src="../public/asset/js/plugin/webfont/webfont.min.js"></script>
    <script>
      WebFont.load({
        google: {
          families: ["Public Sans:300,400,500,600,700"],
        },
        custom: {
          families: [
            "Font Awesome 5 Solid",
            "Font Awesome 5 Regular",
            "Font Awesome 5 Brands",
            "simple-line-icons",
          ],
          urls: ["../public/asset/css/fonts.min.css"],
        },
        active: function () {
          sessionStorage.fonts = true;
        },
      });
    </script>
  </body>
</html>
