<style>
  #bookingModal .modal-dialog,
  #bookingConfirmModal .modal-dialog {
    max-width: 560px;
  }

  #bookingModal .modal-content,
  #bookingConfirmModal .modal-content {
    border: 0;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(15, 23, 42, 0.22);
  }

  #bookingModal .modal-header,
  #bookingConfirmModal .modal-header {
    background: linear-gradient(135deg, #2563eb, #0ea5e9);
    border-bottom: 0;
    padding: 16px 18px;
  }

  #bookingModal .modal-title,
  #bookingConfirmModal .modal-title {
    color: #ffffff;
    font-weight: 700;
    margin: 0;
  }

  #bookingModal .btn-close,
  #bookingConfirmModal .btn-close {
    filter: brightness(0) invert(1);
    opacity: 0.9;
  }

  #bookingModal .modal-body,
  #bookingConfirmModal .modal-body {
    padding: 16px 18px 12px;
    background: #f8fafc;
  }

  #bookingModal .modal-footer,
  #bookingConfirmModal .modal-footer {
    border-top: 1px solid #e2e8f0;
    padding: 12px 18px 16px;
    background: #ffffff;
  }

  #bookingModal .form-group {
    margin-bottom: 14px;
  }

  #bookingModal .form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #334155;
    text-transform: uppercase;
  }

  #bookingModal .form-group input:not([type="checkbox"]):not([type="radio"]),
  #bookingModal .form-group select,
  #bookingModal .form-group textarea {
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    background: #ffffff;
    padding: 12px 14px;
    font-size: 15px;
    transition:
      border-color 0.2s ease,
      box-shadow 0.2s ease;
  }

  #bookingModal
    .form-group
    input:not([type="checkbox"]):not([type="radio"]):focus,
  #bookingModal .form-group select:focus,
  #bookingModal .form-group textarea:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    outline: none;
  }

  #bookingModal #priceContact,
  #bookingModal #ship,
  #bookingModal #total {
    font-weight: 700;
    color: #0f172a;
    background: #f1f5f9;
  }

  #bookingModal #total {
    color: #0f766e;
  }

  #bookingModal .form-check {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 8px 10px;
  }

  #bookingModal .form-check-input {
    margin-top: 0.2em;
  }

  #bookingConfirmModal .table {
    margin-bottom: 0;
    border-radius: 12px;
    overflow: hidden;
  }

  #bookingConfirmModal .table th {
    width: 38%;
    white-space: nowrap;
    color: #334155;
    font-weight: 700;
  }

  #bookingConfirmModal .table td {
    color: #0f172a;
  }

  @media (max-width: 768px) {
    #bookingModal .modal-dialog,
    #bookingConfirmModal .modal-dialog {
      margin: 0;
      max-width: 100%;
      min-height: 100vh;
    }

    #bookingModal .modal-content,
    #bookingConfirmModal .modal-content {
      min-height: 100vh;
      border-radius: 18px 18px 0 0;
    }

    #bookingModal .modal-body,
    #bookingConfirmModal .modal-body {
      max-height: calc(100vh - 130px);
      overflow-y: auto;
    }

    #bookingModal .row {
      --bs-gutter-x: 10px;
    }

    #bookingModal .form-group input:not([type="checkbox"]):not([type="radio"]),
    #bookingModal .form-group select,
    #bookingModal .form-group textarea {
      font-size: 16px;
    }
  }
</style>

<div
  class="modal fade"
  id="bookingModal"
  tabindex="-1"
  aria-labelledby="bookingModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form id="contactForm" class="contactForm">
        <!-- Modal Header -->
        <div class="modal-header">
          <h4 class="modal-title">Đặt dịch vụ</h4>
          <button
            class="btn btn-success me-2 info"
            type="button"
            id="autoFillBtn"
            data-customer="Lê Bảo Phi"
            data-phone="0374360449"
            data-address="94 Trần Thị Trọng, Phường Tân Sơn, TP. Hồ Chí Minh"
          >
            <i class="fas fa-pencil-alt"></i> Tự điền thông tin
          </button>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>
        </div>

        <!-- Modal body -->
        <div class="modal-body">
          <div class="form-group">
            <label for="nameCustomer">Họ và tên *</label>
            <input type="text" id="nameCustomer" name="name" required />
          </div>

          <div class="form-group">
            <label for="phoneCustomer">Số điện thoại *</label>
            <input type="number" id="phoneCustomer" name="phone" required />
          </div>

          <div class="form-group">
            <label for="addressInput">Địa chỉ</label>
            <div class="input-group">
              <input
                type="text"
                id="addressInput"
                name="address"
                placeholder="Nhập địa chỉ của bạn"
              />
            </div>
          </div>
          <div class="form-group">
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-info" type="button" id="locateBtn">
                <i class="fas fa-location-arrow"></i> Vị trí hiện tại
              </button>
              <button
                class="btn btn-outline-info"
                type="button"
                id="toggleMapBtn"
              >
                <i class="fas fa-map-marked-alt"></i> Mở bản đồ
              </button>
            </div>
          </div>

          <div
            class="form-group map-wrapper"
            id="osmMapWrapper"
            style="display: none"
          >
            <label>Chọn vị trí trên bản đồ</label>
            <div id="osmMap" style="height: 320px; border-radius: 12px"></div>
          </div>

          <div class="row">
            <div class="col-sm-6">
              <div class="form-group">
                <label for="serviceContact">Dịch vụ quan tâm</label>
                <select
                  id="serviceContact"
                  class="service-contact"
                  name="service"
                >
                  <option value="">Chọn dịch vụ</option>
                </select>
              </div>
            </div>

            <div class="col-sm-6">
              <div class="form-group">
                <label>Hình thức nhận / giao</label>
                <select id="transportOption" name="transport_option">
                  <option value="">Chọn hình thức nhận / giao</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Công việc thực hiện</label>
                <div id="workItemsList" class="d-flex flex-column gap-2">
                  <span class="text-muted small"
                    >Chọn dịch vụ để hiển thị.</span
                  >
                </div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Hóa chất hỗ trợ</label>
                <div id="chemicalsList" class="d-flex flex-column gap-2">
                  <span class="text-muted small"
                    >Chọn dịch vụ để hiển thị.</span
                  >
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Giá dịch vụ</label>
                <input type="text" id="priceContact" readonly />
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <div id="kgBox">
                  <label>Trọng lượng (kg)</label>
                  <input type="number" id="kg" min="1" />
                </div>

                <div id="pairBox" style="display: none">
                  <label>Đôi</label>
                  <input type="number" id="pair" min="1" />
                </div>
                <input
                  type="hidden"
                  id="quantityContact"
                  name="quantity"
                  value="1"
                />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Tiền di chuyển</label>
            <input type="text" id="ship" readonly />
          </div>

          <div class="form-group">
            <label>Tổng tiền</label>
            <input type="text" id="total" readonly />
          </div>

          <div class="form-group">
            <label for="message">Ghi chú</label>
            <textarea
              id="message"
              name="message"
              placeholder="Nội dung cần tư vấn..."
            ></textarea>
          </div>

          <div class="form-group">
            <label>Hình ảnh và video</label>
            <div class="d-flex gap-2 flex-wrap">
              <button
                type="button"
                class="btn btn-outline-primary"
                id="capturePhotoBtn"
              >
                <i class="fas fa-camera"></i> Chụp ảnh
              </button>
              <button
                type="button"
                class="btn btn-outline-danger"
                id="recordVideoBtn"
              >
                <i class="fas fa-video"></i> Quay video
              </button>
            </div>
          </div>
        </div>

        <!-- Modal footer -->
        <div class="modal-footer">
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center"
          >
            <span>Đặt dịch vụ</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div
  class="modal fade"
  id="bookingConfirmModal"
  tabindex="-1"
  aria-labelledby="bookingConfirmModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="bookingConfirmModalLabel">
          Xác nhận thông tin đặt dịch vụ
        </h5>
        <button
          type="button"
          class="btn-close"
          id="confirmCloseBtn"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="table-responsive">
          <table class="table table-striped align-middle mb-0">
            <tbody>
              <tr>
                <th scope="row">Họ và tên</th>
                <td id="confirmName">-</td>
              </tr>
              <tr>
                <th scope="row">Số điện thoại</th>
                <td id="confirmPhone">-</td>
              </tr>
              <tr>
                <th scope="row">Địa chỉ</th>
                <td id="confirmAddress">-</td>
              </tr>
              <tr>
                <th scope="row">Dịch vụ quan tâm</th>
                <td id="confirmService">-</td>
              </tr>
              <tr>
                <th scope="row">Hình thức nhận / giao</th>
                <td id="confirmSubService">-</td>
              </tr>
              <tr>
                <th scope="row">Công việc thực hiện</th>
                <td id="confirmWorkItems">-</td>
              </tr>
              <tr>
                <th scope="row">Hóa chất hỗ trợ</th>
                <td id="confirmChemicals">-</td>
              </tr>
              <tr>
                <th scope="row">Số lượng</th>
                <td id="confirmQuantity">-</td>
              </tr>
              <tr>
                <th scope="row">Giá dịch vụ</th>
                <td id="confirmPrice">-</td>
              </tr>
              <tr>
                <th scope="row">Phí vận chuyển</th>
                <td id="confirmShip">-</td>
              </tr>
              <tr>
                <th scope="row">Tổng tiền</th>
                <td id="confirmTotal">-</td>
              </tr>
              <tr>
                <th scope="row">Ghi chú</th>
                <td id="confirmMessage">-</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" id="confirmBackBtn">
          Quay lại
        </button>
        <button type="button" class="btn btn-primary" id="confirmSubmitBtn">
          Xác nhận đặt lịch
        </button>
      </div>
    </div>
  </div>
</div>
