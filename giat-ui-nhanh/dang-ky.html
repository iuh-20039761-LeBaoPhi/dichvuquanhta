<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Đăng ký tài khoản Giặt Ủi Nhanh để đặt lịch nhanh, theo dõi đơn và nhận ưu đãi dịch vụ tiện lợi mỗi ngày."
    />
    <title>Đăng ký | Dịch Vụ Quanh Ta - Giặt Ủi Nhanh</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="public/asset/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      :root {
        --bg-start: #e6f6ef;
        --bg-end: #eaf3ff;
        --surface: #ffffff;
        --text-main: #132238;
        --text-sub: #597089;
        --line: #dce7f2;
        --brand-green: #0fa26d;
        --brand-blue: #1f7be8;
        --brand-orange: #ff7a1a;
        --focus-ring: rgba(31, 123, 232, 0.32);
        --shadow-soft: 0 18px 50px rgba(17, 68, 120, 0.12);
        --shadow-card: 0 10px 30px rgba(14, 55, 96, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        font-family: "Be Vietnam Pro", sans-serif;
        color: var(--text-main);
        background: linear-gradient(140deg, #4a00e0, #8e2de2);
        min-height: 100vh;
      }

      .auth-page {
        position: relative;
        min-height: 100vh;
        padding: 20px 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-shell {
        position: relative;
        z-index: 1;
        width: min(560px, 100%);
        /* border-radius: 28px; */
        overflow: hidden;
        /* background: var(--surface);
        box-shadow: var(--shadow-soft); */
        animation: enter-card 0.65s ease both;
      }

      .auth-form-wrap {
        padding: 22px 16px;
      }

      .auth-form-card {
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 22px 16px;
        box-shadow: var(--shadow-card);
        background: #fff;
      }

      .brand-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 16px;
        text-decoration: none;
      }

      .brand-logo img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .brand-logo span {
        color: var(--text-main);
        font-size: 1.05rem;
        font-weight: 800;
        line-height: 1;
      }

      .auth-title {
        margin: 0 0 6px;
        font-size: clamp(1.4rem, 1.1rem + 1.6vw, 1.9rem);
        font-weight: 800;
        text-align: center;
      }

      .auth-subtitle {
        margin: 0 0 20px;
        color: var(--text-sub);
        font-size: 0.95rem;
        text-align: center;
      }

      .form-label {
        font-weight: 600;
        font-size: 0.94rem;
      }

      .form-control {
        border-radius: 12px;
        border: 1px solid #cdddec;
        height: 46px;
      }

      .form-control:focus {
        border-color: var(--brand-blue);
        box-shadow: 0 0 0 4px var(--focus-ring);
      }

      .password-group {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        border: 0;
        background: #eef5ff;
        color: var(--brand-blue);
        font-weight: 600;
        border-radius: 8px;
        font-size: 0.8rem;
        padding: 6px 9px;
      }

      .toggle-password:hover {
        background: #ddeaff;
      }

      .toggle-password:focus-visible {
        outline: 3px solid var(--focus-ring);
        outline-offset: 2px;
      }

      .field-error {
        display: block;
        min-height: 20px;
        margin-top: 4px;
        font-size: 0.83rem;
        color: #d93025;
      }

      .agreement-wrap {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        margin-top: 8px;
        margin-bottom: 6px;
      }

      .agreement-wrap .form-check-label {
        font-size: 0.9rem;
        color: var(--text-sub);
      }

      .btn-login {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(
          135deg,
          var(--brand-green),
          var(--brand-blue)
        );
        box-shadow: 0 12px 24px rgba(15, 162, 109, 0.28);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }

      .btn-login:hover {
        transform: translateY(-1px);
        filter: saturate(1.07);
        box-shadow: 0 15px 28px rgba(31, 123, 232, 0.26);
      }

      .btn-login:focus-visible {
        outline: 3px solid var(--focus-ring);
        outline-offset: 2px;
      }

      .btn-login:disabled {
        opacity: 0.88;
        cursor: not-allowed;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #7a8ea3;
        margin: 18px 0 14px;
        font-size: 0.86rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        background: #d9e6f3;
        flex: 1;
      }

      .social-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .btn-social {
        border: 1px solid #cfe0ef;
        background: #fff;
        color: #234;
        border-radius: 12px;
        padding: 10px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-social:hover {
        background: #f5faff;
      }

      .btn-social:focus-visible {
        outline: 3px solid var(--focus-ring);
        outline-offset: 2px;
      }

      .auth-footer {
        margin-top: 15px;
        text-align: center;
        color: var(--text-sub);
        font-size: 0.9rem;
      }

      .auth-footer a {
        color: var(--brand-orange);
        font-weight: 700;
        text-decoration: none;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      .policy-links {
        margin-top: 10px;
        font-size: 0.82rem;
      }

      .policy-links a {
        color: #617d98;
        text-decoration: none;
      }

      .policy-links a:hover {
        text-decoration: underline;
      }

      .auth-alert {
        margin-top: 12px;
        border-radius: 12px;
      }

      @media (min-width: 768px) {
        .auth-page {
          padding: 34px;
        }

        .auth-form-wrap {
          padding: 30px;
        }

        .auth-form-card {
          padding: 30px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }

      @keyframes enter-card {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-shell" aria-label="Đăng ký tài khoản">
        <div class="auth-form-wrap">
          <div class="auth-form-card">
            <a
              href="index.html"
              class="brand-logo"
              aria-label="Trang chủ Giặt Ủi Nhanh"
            >
              <img
                src="public/asset/image/logo-dich-vu-quanh-ta.png"
                alt="Logo Dịch Vụ Quanh Ta"
              />
              <span>Giặt Ủi Nhanh</span>
              <img
                src="public/asset/image/logo-giat-ui-nhanh.png"
                alt="Logo Giặt Ủi Nhanh"
              />
            </a>

            <h1 class="auth-title">Đăng ký tài khoản</h1>
            <p class="auth-subtitle">
              Điền thông tin để tạo tài khoản mới nhanh chóng.
            </p>

            <form id="registerForm" novalidate>
              <div class="mb-2">
                <label for="fullName" class="form-label">Họ và tên</label>
                <input
                  id="fullName"
                  name="fullName"
                  type="text"
                  class="form-control"
                  placeholder="Nguyễn Văn A"
                  autocomplete="name"
                  aria-describedby="fullNameError"
                  required
                />
                <small
                  id="fullNameError"
                  class="field-error"
                  aria-live="polite"
                ></small>
              </div>

              <div class="mb-2">
                <label for="phone" class="form-label">Số điện thoại</label>
                <input
                  id="phone"
                  name="phone"
                  type="text"
                  class="form-control"
                  placeholder="09xxxxxxxx"
                  autocomplete="tel"
                  aria-describedby="phoneError"
                  required
                />
                <small
                  id="phoneError"
                  class="field-error"
                  aria-live="polite"
                ></small>
              </div>

              <div class="mb-2">
                <label for="email" class="form-label">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  class="form-control"
                  placeholder="tenban@email.com"
                  autocomplete="email"
                  aria-describedby="emailError"
                  required
                />
                <small
                  id="emailError"
                  class="field-error"
                  aria-live="polite"
                ></small>
              </div>

              <div class="mb-1">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="password-group">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    class="form-control pe-5"
                    placeholder="Nhập mật khẩu"
                    autocomplete="current-password"
                    aria-describedby="passwordError"
                    required
                  />
                  <button
                    type="button"
                    class="toggle-password"
                    data-toggle-password
                    data-target="password"
                    aria-label="Hiện mật khẩu"
                    aria-pressed="false"
                  >
                    Hiện
                  </button>
                </div>
                <small
                  id="passwordError"
                  class="field-error"
                  aria-live="polite"
                ></small>
              </div>

              <div class="mb-1">
                <label for="confirmPassword" class="form-label"
                  >Xác nhận mật khẩu</label
                >
                <div class="password-group">
                  <input
                    id="confirmPassword"
                    name="confirmPassword"
                    type="password"
                    class="form-control pe-5"
                    placeholder="Nhập lại mật khẩu"
                    autocomplete="new-password"
                    aria-describedby="confirmPasswordError"
                    required
                  />
                  <button
                    type="button"
                    class="toggle-password"
                    data-toggle-password
                    data-target="confirmPassword"
                    aria-label="Hiện mật khẩu"
                    aria-pressed="false"
                  >
                    Hiện
                  </button>
                </div>
                <small
                  id="confirmPasswordError"
                  class="field-error"
                  aria-live="polite"
                ></small>
              </div>

              <div class="agreement-wrap">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="agreePolicy"
                  />
                  <label class="form-check-label" for="agreePolicy">
                    Tôi đồng ý với điều khoản sử dụng và chính sách bảo mật.
                  </label>
                </div>
              </div>
              <small
                id="agreeError"
                class="field-error"
                aria-live="polite"
              ></small>

              <button id="submitBtn" type="submit" class="btn-login mt-2">
                <span class="btn-text">Tạo tài khoản</span>
              </button>

              <div
                id="loginStatus"
                class="alert alert-success auth-alert d-none"
                role="status"
                aria-live="polite"
              >
                Đăng ký thành công! Chào mừng bạn đến với Giặt Ủi Nhanh.
              </div>

              <!-- <div class="divider">Hoặc đăng nhập bằng</div>

              <div class="social-grid">
                <button
                  type="button"
                  class="btn-social"
                  aria-label="Đăng nhập nhà cung cấp"
                >
                  <i class="fas fa-user-alt"></i>
                  Nhà cung cấp
                </button>
                <button
                  type="button"
                  class="btn-social"
                  aria-label="Đăng nhập admin"
                >
                  <i class="fas fa-shield-alt"></i>
                  Admin
                </button>
              </div> -->
            </form>

            <div class="auth-footer">
              Đã có tài khoản?
              <a href="dang-nhap.html" aria-label="Đăng nhập tài khoản"
                >Đăng nhập ngay</a
              >

              <div class="policy-links">
                <a href="index.html">
                  <i class="fas fa-arrow-left me-1"></i>Trang chủ</a
                >
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="public/asset/js/bootstrap.bundle.min.js"></script>
    <script src="public/asset/js/plugin/webfont/webfont.min.js"></script>
    <script>
      WebFont.load({
        google: {
          families: ["Public Sans:300,400,500,600,700"],
        },
        custom: {
          families: [
            "Font Awesome 5 Solid",
            "Font Awesome 5 Regular",
            "Font Awesome 5 Brands",
            "simple-line-icons",
          ],
          urls: ["public/asset/css/fonts.min.css"],
        },
        active: function () {
          sessionStorage.fonts = true;
        },
      });
    </script>
    <script>
      (function () {
        var form = document.getElementById("registerForm");
        var fullNameInput = document.getElementById("fullName");
        var phoneInput = document.getElementById("phone");
        var emailInput = document.getElementById("email");
        var passwordInput = document.getElementById("password");
        var confirmPasswordInput = document.getElementById("confirmPassword");
        var agreePolicyInput = document.getElementById("agreePolicy");
        var fullNameError = document.getElementById("fullNameError");
        var phoneError = document.getElementById("phoneError");
        var emailError = document.getElementById("emailError");
        var passwordError = document.getElementById("passwordError");
        var confirmPasswordError = document.getElementById(
          "confirmPasswordError",
        );
        var agreeError = document.getElementById("agreeError");
        var togglePasswordButtons = document.querySelectorAll(
          "[data-toggle-password]",
        );
        var submitBtn = document.getElementById("submitBtn");
        var loginStatus = document.getElementById("loginStatus");

        function isPhoneVN(value) {
          return /^(?:\+84|84|0)(?:3|5|7|8|9)\d{8}$/.test(value);
        }

        function isEmail(value) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        function validateFullName() {
          var value = fullNameInput.value.trim();
          fullNameError.textContent = "";
          fullNameInput.setAttribute("aria-invalid", "false");

          if (!value) {
            fullNameError.textContent = "Vui lòng nhập họ và tên.";
            fullNameInput.setAttribute("aria-invalid", "true");
            return false;
          }

          if (value.length < 2) {
            fullNameError.textContent = "Họ tên cần từ 2 ký tự trở lên.";
            fullNameInput.setAttribute("aria-invalid", "true");
            return false;
          }

          return true;
        }

        function validatePhone() {
          var value = phoneInput.value.trim();
          phoneError.textContent = "";
          phoneInput.setAttribute("aria-invalid", "false");

          if (!value) {
            phoneError.textContent = "Vui lòng nhập số điện thoại.";
            phoneInput.setAttribute("aria-invalid", "true");
            return false;
          }

          if (!isPhoneVN(value)) {
            phoneError.textContent =
              "Định dạng chưa đúng. Hãy nhập số điện thoại hợp lệ.";
            phoneInput.setAttribute("aria-invalid", "true");
            return false;
          }

          return true;
        }

        function validateEmail() {
          var value = emailInput.value.trim();
          emailError.textContent = "";
          emailInput.setAttribute("aria-invalid", "false");

          if (!value) {
            emailError.textContent = "Vui lòng nhập email.";
            emailInput.setAttribute("aria-invalid", "true");
            return false;
          }

          if (!isEmail(value)) {
            emailError.textContent = "Định dạng email chưa hợp lệ.";
            emailInput.setAttribute("aria-invalid", "true");
            return false;
          }

          return true;
        }

        function validatePassword() {
          var value = passwordInput.value;
          passwordError.textContent = "";
          passwordInput.setAttribute("aria-invalid", "false");

          if (!value.trim()) {
            passwordError.textContent = "Vui lòng nhập mật khẩu.";
            passwordInput.setAttribute("aria-invalid", "true");
            return false;
          }

          if (value.length < 6) {
            passwordError.textContent = "Mật khẩu cần tối thiểu 6 ký tự.";
            passwordInput.setAttribute("aria-invalid", "true");
            return false;
          }

          return true;
        }

        function validateConfirmPassword() {
          var value = confirmPasswordInput.value;
          confirmPasswordError.textContent = "";
          confirmPasswordInput.setAttribute("aria-invalid", "false");

          if (!value.trim()) {
            confirmPasswordError.textContent = "Vui lòng xác nhận mật khẩu.";
            confirmPasswordInput.setAttribute("aria-invalid", "true");
            return false;
          }

          if (value !== passwordInput.value) {
            confirmPasswordError.textContent = "Mật khẩu xác nhận chưa khớp.";
            confirmPasswordInput.setAttribute("aria-invalid", "true");
            return false;
          }

          return true;
        }

        function validateAgreePolicy() {
          agreeError.textContent = "";
          agreePolicyInput.setAttribute("aria-invalid", "false");

          if (!agreePolicyInput.checked) {
            agreeError.textContent = "Bạn cần đồng ý điều khoản để tiếp tục.";
            agreePolicyInput.setAttribute("aria-invalid", "true");
            return false;
          }

          return true;
        }

        togglePasswordButtons.forEach(function (button) {
          button.addEventListener("click", function () {
            var targetId = button.getAttribute("data-target");
            var targetInput = document.getElementById(targetId);
            var isHidden = targetInput.type === "password";

            targetInput.type = isHidden ? "text" : "password";
            button.textContent = isHidden ? "Ẩn" : "Hiện";
            button.setAttribute(
              "aria-label",
              isHidden ? "Ẩn mật khẩu" : "Hiện mật khẩu",
            );
            button.setAttribute("aria-pressed", isHidden ? "true" : "false");
          });
        });

        fullNameInput.addEventListener("blur", validateFullName);
        phoneInput.addEventListener("blur", validatePhone);
        emailInput.addEventListener("blur", validateEmail);
        passwordInput.addEventListener("blur", validatePassword);
        confirmPasswordInput.addEventListener("blur", validateConfirmPassword);
        agreePolicyInput.addEventListener("change", validateAgreePolicy);

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          loginStatus.classList.add("d-none");

          var isFullNameValid = validateFullName();
          var isPhoneValid = validatePhone();
          var isEmailValid = validateEmail();
          var isPasswordValid = validatePassword();
          var isConfirmPasswordValid = validateConfirmPassword();
          var isAgreeValid = validateAgreePolicy();

          if (
            !isFullNameValid ||
            !isPhoneValid ||
            !isEmailValid ||
            !isPasswordValid ||
            !isConfirmPasswordValid ||
            !isAgreeValid
          ) {
            return;
          }

          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span><span class="btn-text">Đang xử lý...</span>';

          setTimeout(function () {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span class="btn-text">Tạo tài khoản</span>';
            loginStatus.classList.remove("d-none");
            form.reset();
            togglePasswordButtons.forEach(function (button) {
              button.textContent = "Hiện";
              button.setAttribute("aria-pressed", "false");
            });
            passwordInput.type = "password";
            confirmPasswordInput.type = "password";
          }, 1200);
        });
      })();
    </script>
  </body>
</html>
