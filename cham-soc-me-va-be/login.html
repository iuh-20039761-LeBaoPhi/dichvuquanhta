<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at 20% 15%, rgba(255, 205, 226, 0.55), transparent 40%),
                radial-gradient(circle at 75% 12%, rgba(255, 164, 201, 0.35), transparent 44%),
                linear-gradient(145deg, #fff7fb 0%, #ffeaf5 45%, #ffd8eb 100%);
            font-family: "Quicksand", "Segoe UI", sans-serif;
        }

        .modal-backdrop.show {
            opacity: 0.45;
        }

        .modal-dialog.login-dialog {
            max-width: 460px;
        }

        .modal-content.login-content {
            background: transparent;
            border: 0;
            box-shadow: none;
        }

        .login-shell {
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid rgba(255, 214, 233, 0.95);
            box-shadow: 0 20px 48px rgba(179, 80, 126, 0.2);
            backdrop-filter: blur(2px);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 245, 251, 0.94));
        }

        .login-header {
            background: linear-gradient(90deg, #ffc8e5 0%, #ff9bca 52%, #ff86c0 100%);
            padding: 18px 22px;
        }

        .login-title {
            margin: 0;
            color: #ffffff;
            letter-spacing: 1px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: clamp(1.7rem, 4.2vw, 2.35rem);
            text-align: center;
            text-shadow: 0 2px 8px rgba(141, 55, 98, 0.45);
        }

        .login-body {
            background: linear-gradient(180deg, #fff4fa 0%, #ffeaf5 100%);
            padding: 24px 24px 22px;
            color: #7d3e60;
        }

        .login-body .btn-close {
            filter: none;
            opacity: 0.9;
        }

        .login-body .text-secondary,
        .login-body .form-label,
        .login-body .form-text,
        .login-body .mb-0 {
            color: #8a4c6a !important;
            text-shadow: none;
            font-size: 1.02rem;
            font-weight: 600;
        }

        .login-body .form-label {
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .login-body .form-control {
            border: 2px solid #f7bfd8;
            min-height: 48px;
            border-radius: 14px;
            background: #ffffff;
            color: #5f3650;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95), 0 4px 10px rgba(194, 104, 145, 0.12);
            font-size: 1.02rem;
            font-weight: 600;
        }

        .login-body .form-control::placeholder {
            color: #b48aa0;
            font-weight: 500;
        }

        .login-body .form-control:focus {
            border-color: #f29cc7;
            box-shadow: 0 0 0 0.2rem rgba(242, 156, 199, 0.3), 0 6px 14px rgba(181, 90, 134, 0.16);
            background: #ffffff;
        }

        .btn-login {
            background: linear-gradient(90deg, #ff9dc9 0%, #ff7eb8 100%);
            border: 0;
            color: #ffffff;
            border-radius: 999px;
            min-height: 48px;
            font-size: 1.08rem;
            font-weight: 800;
            letter-spacing: 0.4px;
            text-shadow: 0 1px 2px rgba(125, 52, 89, 0.35);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
            color: #ffffff;
        }

        .login-body .link-warning {
            color: #d96599 !important;
            font-size: 1.15rem;
            font-weight: 900 !important;
            letter-spacing: 0.2px;
            text-shadow: none;
        }

        .login-body .link-warning:hover {
            color: #bf4d82 !important;
        }
    </style>
</head>
<body>
    <div class="container-fluid min-vh-100"></div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <style>
            #loginModal .modal-dialog.login-dialog {
                max-width: 460px;
            }

            }

                backdrop-filter: blur(2px);
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 245, 251, 0.94));
            }

            #loginModal .login-header {

            }

            #loginModal .login-body {
                background: linear-gradient(180deg, #fff4fa 0%, #ffeaf5 100%);

                color: #7d3e60;
            }

            #loginModal .login-body .btn-close {
                filter: none;
                opacity: 0.9;
            }

            #loginModal .login-body .text-secondary,
            #loginModal .login-body .form-label,
            #loginModal .login-body .form-text,
            #loginModal .login-body .mb-0 {
                color: #8a4c6a !important;
                text-shadow: none;
                font-size: 1.02rem;
                font-weight: 600;
            }

            #loginModal .login-body .form-label {
                font-weight: 700;
                letter-spacing: 0.2px;
            }

            #loginModal .login-body .form-control {
                border: 2px solid #f7bfd8;
                min-height: 48px;
                border-radius: 14px;

                color: #5f3650;
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95), 0 4px 10px rgba(194, 104, 145, 0.12);

            #loginModal .login-body .form-control:focus {
                border-color: #f29cc7;

                background: #ffffff;
            }

            #loginModal .btn-login {

                text-shadow: 0 1px 2px rgba(125, 52, 89, 0.35);

            }

            #loginModal .btn-login:hover {

            }

            #loginModal .login-body .link-warning {
                color: #d96599 !important;
                font-size: 1.15rem;
                font-weight: 900 !important;
                letter-spacing: 0.2px;
                text-shadow: none;
            }

            #loginModal .login-body .link-warning:hover {
                color: #bf4d82 !important;
            }
        </style>
        <div class="modal-dialog modal-dialog-centered login-dialog">
            <div class="modal-content login-content">
                <div class="login-shell">
                    <div class="login-header">
                        <h3 class="login-title" id="loginModalLabel">Đăng Nhập</h3>
                    </div>
                    <div class="login-body">
                        <div class="d-flex justify-content-end mb-2">
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>

                        <p class="text-secondary mb-3">Chào mừng trở lại! Vui lòng đăng nhập vào tài khoản của bạn.</p>

                        <div id="alertContainer"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên đăng nhập</label>
                                <input type="text" class="form-control form-control-lg" id="username" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" class="form-control form-control-lg" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-login btn-lg w-100">Đăng Nhập</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0 text-secondary">Chưa có tài khoản? <a href="register.html" class="link-warning fw-semibold text-decoration-none">Đăng ký ngay</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/login-modal-core.js"></script>
</body>
</html>
