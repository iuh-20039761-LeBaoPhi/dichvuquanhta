<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at 20% 15%, rgba(255, 199, 92, 0.28), transparent 38%),
                radial-gradient(circle at 75% 10%, rgba(255, 0, 153, 0.24), transparent 42%),
                linear-gradient(145deg, #51158c 0%, #6c1ca2 35%, #4f0f8f 65%, #3a0c73 100%);
            font-family: "Quicksand", "Segoe UI", sans-serif;
        }

        .modal-backdrop.show {
            opacity: 0.45;
        }

        .modal-dialog.login-dialog {
            max-width: 460px;
        }

        .modal-content.login-content {
            background: transparent;
            border: 0;
            box-shadow: none;
        }

        .login-shell {
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.26);
            box-shadow: 0 24px 55px rgba(20, 0, 46, 0.48);
            backdrop-filter: blur(2px);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
        }

        .login-header {
            background: linear-gradient(90deg, #ffcb68 0%, #ff57c4 45%, #d34dff 100%);
            padding: 18px 22px;
        }

        .login-title {
            margin: 0;
            color: #ffffff;
            letter-spacing: 1px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: clamp(1.7rem, 4.2vw, 2.35rem);
            text-align: center;
            text-shadow: 0 3px 10px rgba(124, 10, 99, 0.52);
        }

        .login-body {
            background: linear-gradient(180deg, rgba(185, 38, 204, 0.88) 0%, rgba(172, 29, 185, 0.9) 100%);
            padding: 24px 24px 22px;
            color: #f5e9ff;
        }

        .login-body .btn-close {
            filter: invert(1);
            opacity: 0.9;
        }

        .login-body .text-secondary,
        .login-body .form-label,
        .login-body .form-text,
        .login-body .mb-0 {
            color: rgba(255, 247, 255, 0.97) !important;
            text-shadow: 0 1px 3px rgba(96, 8, 76, 0.45);
            font-size: 1.02rem;
            font-weight: 600;
        }

        .login-body .form-label {
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .login-body .form-control {
            border: 2px solid rgba(255, 170, 236, 0.75);
            min-height: 48px;
            border-radius: 14px;
            background: #fff7fd;
            color: #43283f;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95), 0 4px 10px rgba(104, 12, 88, 0.14);
            font-size: 1.02rem;
            font-weight: 600;
        }

        .login-body .form-control::placeholder {
            color: #8e6f84;
            font-weight: 500;
        }

        .login-body .form-control:focus {
            border-color: #ff7fd7;
            box-shadow: 0 0 0 0.2rem rgba(255, 96, 205, 0.3), 0 6px 14px rgba(112, 14, 94, 0.2);
            background: #ffffff;
        }

        .btn-login {
            background: linear-gradient(90deg, #bb68f3 0%, #be4fff 100%);
            border: 0;
            color: #ffffff;
            border-radius: 999px;
            min-height: 48px;
            font-size: 1.08rem;
            font-weight: 800;
            letter-spacing: 0.4px;
            text-shadow: 0 1px 2px rgba(70, 7, 61, 0.45);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
            color: #ffffff;
        }

        .login-body .link-warning {
            color: #ffd7de !important;
            font-size: 1.15rem;
            font-weight: 900 !important;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 6px rgba(168, 6, 33, 0.747);
        }

        .login-body .link-warning:hover {
            color: #ee1628 !important;
        }
    </style>
</head>
<body>
    <div class="container-fluid min-vh-100"></div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <style>
            #loginModal .modal-dialog.login-dialog {
                max-width: 460px;
            }

            #loginModal .modal-content.login-content {
                background: transparent;
                border: 0;
                box-shadow: none;
            }

            #loginModal .login-shell {
                border-radius: 18px;
                overflow: hidden;
                border: 2px solid rgba(255, 255, 255, 0.26);
                box-shadow: 0 24px 55px rgba(20, 0, 46, 0.48);
                backdrop-filter: blur(2px);
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
            }

            #loginModal .login-header {
                background: linear-gradient(90deg, #ffcb68 0%, #ff57c4 45%, #d34dff 100%);
                padding: 18px 22px;
            }

            #loginModal .login-title {
                margin: 0;
                color: #ffffff;
                letter-spacing: 1px;
                font-weight: 900;
                text-transform: uppercase;
                font-size: clamp(1.7rem, 4.2vw, 2.35rem);
                text-align: center;
                text-shadow: 0 3px 10px rgba(124, 10, 99, 0.52);
            }

            #loginModal .login-body {
                background: linear-gradient(180deg, rgba(185, 38, 204, 0.88) 0%, rgba(172, 29, 185, 0.9) 100%);
                padding: 24px 24px 22px;
                color: #f5e9ff;
            }

            #loginModal .login-body .btn-close {
                filter: invert(1);
                opacity: 0.9;
            }

            #loginModal .login-body .text-secondary,
            #loginModal .login-body .form-label,
            #loginModal .login-body .form-text,
            #loginModal .login-body .mb-0 {
                color: rgba(255, 247, 255, 0.97) !important;
                text-shadow: 0 1px 3px rgba(96, 8, 62, 0.45);
                font-size: 1.02rem;
                font-weight: 600;
            }

            #loginModal .login-body .form-label {
                font-weight: 700;
                letter-spacing: 0.2px;
            }

            #loginModal .login-body .form-control {
                border: 2px solid rgba(255, 170, 236, 0.75);
                min-height: 48px;
                border-radius: 14px;
                background: #fff7fd;
                color: #43283f;
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95), 0 4px 10px rgba(104, 12, 73, 0.14);
                font-size: 1.02rem;
                font-weight: 600;
            }

            #loginModal .login-body .form-control::placeholder {
                color: #8e6f84;
                font-weight: 500;
            }

            #loginModal .login-body .form-control:focus {
                border-color: #ff7fd7;
                box-shadow: 0 0 0 0.2rem rgba(255, 96, 205, 0.3), 0 6px 14px rgba(112, 14, 94, 0.2);
                background: #ffffff;
            }

            #loginModal .btn-login {
                background: linear-gradient(90deg, #f368dc 0%, #ff4fd3 100%);
                border: 0;
                color: #ffffff;
                border-radius: 999px;
                min-height: 48px;
                font-size: 1.08rem;
                font-weight: 800;
                letter-spacing: 0.4px;
                text-shadow: 0 1px 2px rgba(70, 7, 61, 0.45);
                transition: transform 0.2s ease, filter 0.2s ease;
            }

            #loginModal .btn-login:hover {
                transform: translateY(-1px);
                filter: brightness(1.04);
                color: #ffffff;
            }

            #loginModal .login-body .link-warning {
                color: #ffd7de !important;
                font-size: 1.15rem;
                font-weight: 900 !important;
                letter-spacing: 0.2px;
                text-shadow: 0 2px 6px rgba(168, 6, 33, 0.747);
            }

            #loginModal .login-body .link-warning:hover {
                color: #ee1628 !important;
            }
        </style>
        <div class="modal-dialog modal-dialog-centered login-dialog">
            <div class="modal-content login-content">
                <div class="login-shell">
                    <div class="login-header">
                        <h3 class="login-title" id="loginModalLabel">Đăng Nhập</h3>
                    </div>
                    <div class="login-body">
                        <div class="d-flex justify-content-end mb-2">
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>

                        <p class="text-secondary mb-3">Chào mừng trở lại! Vui lòng đăng nhập vào tài khoản của bạn.</p>

                        <div id="alertContainer"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên đăng nhập</label>
                                <input type="text" class="form-control form-control-lg" id="username" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" class="form-control form-control-lg" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-login btn-lg w-100">Đăng Nhập</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0 text-secondary">Chưa có tài khoản? <a href="register.html" class="link-warning fw-semibold text-decoration-none">Đăng ký ngay</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/login-modal-core.js"></script>
</body>
</html>
