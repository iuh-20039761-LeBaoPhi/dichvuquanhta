<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Test KRUD - datlich_mebe</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
		<style>
			body {
				background: #f6f8fc;
			}
			.wrap {
				max-width: 1200px;
			}
			.mono {
				font-family: Consolas, Menlo, Monaco, monospace;
			}
			.table-responsive {
				max-height: 68vh;
			}
			.sticky-head thead th {
				position: sticky;
				top: 0;
				background: #fff;
				z-index: 1;
			}
			.small-note {
				font-size: 0.92rem;
			}
		</style>
	</head>
	<body>
		<main class="container py-4 wrap">
			<div class="card border-0 shadow-sm">
				<div class="card-body p-4">
					<h1 class="h4 mb-3">Test KRUD lấy dữ liệu đặt lịch</h1>
					<p class="text-muted mb-3 small-note">
						Trang này dùng <span class="mono">krudList</span> để đọc dữ liệu từ bảng
						<span class="mono">datlich_mebe</span> và hiển thị bản ghi mới nhất ở trên cùng.
					</p>

					<div class="row g-2 align-items-end mb-3">
						<div class="col-sm-8 col-md-6">
							<label for="tableName" class="form-label fw-semibold">Tên bảng</label>
							<input id="tableName" class="form-control mono" value="datlich_mebe" />
						</div>
						<div class="col-sm-4 col-md-3 d-grid">
							<button id="loadBtn" class="btn btn-primary">Tải dữ liệu</button>
						</div>
					</div>

					<div id="status" class="alert d-none mb-3" role="alert"></div>

					<div class="mb-3">
						<strong>Tổng bản ghi:</strong> <span id="count" class="mono">0</span>
					</div>

					<div class="table-responsive border rounded sticky-head">
						<table class="table table-sm table-hover align-middle mb-0" id="resultTable">
							<thead>
								<tr id="theadRow"></tr>
							</thead>
							<tbody id="tbodyRows">
								<tr>
									<td class="text-muted p-3">Chưa có dữ liệu. Nhấn "Tải dữ liệu" để kiểm tra.</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</main>

		<script src="https://api.dvqt.vn/js/krud.js"></script>
		<script>
			(function () {
				var statusEl = document.getElementById('status');
				var loadBtn = document.getElementById('loadBtn');
				var tableInput = document.getElementById('tableName');
				var countEl = document.getElementById('count');
				var theadRow = document.getElementById('theadRow');
				var tbodyRows = document.getElementById('tbodyRows');

				function showStatus(type, text) {
					statusEl.className = 'alert mb-3';
					statusEl.classList.add(type === 'error' ? 'alert-danger' : 'alert-success');
					statusEl.textContent = text;
					statusEl.classList.remove('d-none');
				}

				function hideStatus() {
					statusEl.classList.add('d-none');
				}

				function normalizeRows(res) {
					if (Array.isArray(res)) return res;
					if (!res || typeof res !== 'object') return [];
					if (res.error) throw new Error(res.error);
					if (res.success === false) throw new Error(res.message || 'Không lấy được dữ liệu');
					if (Array.isArray(res.data)) return res.data;
					if (Array.isArray(res.rows)) return res.rows;
					if (Array.isArray(res.items)) return res.items;
					return [];
				}

				function escapeHtml(text) {
					return String(text == null ? '' : text)
						.replace(/&/g, '&amp;')
						.replace(/</g, '&lt;')
						.replace(/>/g, '&gt;')
						.replace(/"/g, '&quot;')
						.replace(/'/g, '&#39;');
				}

				function pick(record, keys) {
					for (var i = 0; i < keys.length; i++) {
						var k = keys[i];
						if (Object.prototype.hasOwnProperty.call(record, k) && record[k] != null && record[k] !== '') {
							return record[k];
						}
					}
					return '';
				}

				function toTimeValue(value) {
					if (!value) return 0;
					var s = String(value).trim();
					var normalized = s.indexOf('T') !== -1 ? s : s.replace(' ', 'T');
					var t = Date.parse(normalized);
					return Number.isFinite(t) ? t : 0;
				}

				function sortNewestFirst(rows) {
					return rows.slice().sort(function (a, b) {
						var tb = toTimeValue(pick(b, ['created_date', 'created_at', 'ngaytao', 'updated_at']));
						var ta = toTimeValue(pick(a, ['created_date', 'created_at', 'ngaytao', 'updated_at']));
						if (tb !== ta) return tb - ta;

						var idb = Number(pick(b, ['id', '_id', 'ma', 'stt'])) || 0;
						var ida = Number(pick(a, ['id', '_id', 'ma', 'stt'])) || 0;
						return idb - ida;
					});
				}

				function buildHeaders(rows) {
					var keysMap = {};
					rows.forEach(function (row) {
						Object.keys(row || {}).forEach(function (k) {
							keysMap[k] = true;
						});
					});

					var keys = Object.keys(keysMap);
					var preferred = [
						'id',
						'hovaten',
						'sodienthoai',
						'email',
						'dichvu',
						'goidichvu',
						'congviec',
						'ngaybatdau',
						'ngayketthuc',
						'giobatdau',
						'gioketthuc',
						'tongtien',
						'created_date'
					];

					var ordered = [];
					preferred.forEach(function (k) {
						if (keysMap[k]) ordered.push(k);
					});
					keys.forEach(function (k) {
						if (ordered.indexOf(k) === -1) ordered.push(k);
					});
					return ordered;
				}

				function renderTable(rows) {
					if (!rows.length) {
						theadRow.innerHTML = '';
						tbodyRows.innerHTML = '<tr><td class="text-muted p-3">Bảng chưa có dữ liệu.</td></tr>';
						return;
					}

					var headers = buildHeaders(rows);
					theadRow.innerHTML = headers.map(function (h) {
						return '<th class="small mono">' + escapeHtml(h) + '</th>';
					}).join('');

					var bodyHtml = rows.map(function (row) {
						var tds = headers.map(function (h) {
							return '<td class="small">' + escapeHtml(row[h]) + '</td>';
						}).join('');
						return '<tr>' + tds + '</tr>';
					}).join('');

					tbodyRows.innerHTML = bodyHtml;
				}

				async function loadData() {
					hideStatus();
					countEl.textContent = '0';

					var table = String(tableInput.value || '').trim();
					if (!table) {
						showStatus('error', 'Vui lòng nhập tên bảng.');
						return;
					}

					if (typeof krudList !== 'function') {
						showStatus('error', 'Không tải được hàm krudList từ KRUD API.');
						return;
					}

					loadBtn.disabled = true;
					loadBtn.textContent = 'Đang tải...';

					try {
						var res = await krudList({ table: table });
						var rows = normalizeRows(res);
						var sortedRows = sortNewestFirst(rows);

						countEl.textContent = String(sortedRows.length);
						renderTable(sortedRows);
						showStatus('success', 'Đã tải dữ liệu thành công từ bảng "' + table + '".');
					} catch (err) {
						renderTable([]);
						showStatus('error', 'Lỗi tải dữ liệu: ' + (err && err.message ? err.message : 'Không xác định'));
					} finally {
						loadBtn.disabled = false;
						loadBtn.textContent = 'Tải dữ liệu';
					}
				}

				loadBtn.addEventListener('click', loadData);
				document.addEventListener('DOMContentLoaded', loadData);
			})();
		</script>
	</body>
</html>
