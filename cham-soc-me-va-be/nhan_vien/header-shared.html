    <style>

        .nv-admin-sidebar .list-group-item:hover { background: rgba(255, 255, 255, 0.12); color: #fff; transform: translateX(2px); }
        .nv-admin-sidebar .list-group-item.active { background: linear-gradient(90deg, #f08ab8, var(--nv-accent)); color: #fff; box-shadow: 0 8px 22px rgba(212, 109, 160, 0.42); }

            <div class="d-flex align-items-center justify-content-between mb-4">

                <button class="btn btn-outline-light d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#nvSidebarMenu">
                    <i class="bi bi-list"></i>
                </button>
            </div>

            <div id="nvSidebarMenu" class="collapse d-lg-block list-group list-group-flush">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/**
 * HÀM XỬ LÝ SPA - ĐƠN GIẢN & DỄ HIỂU
 */
async function navigateTo(url, element = null) {
    const contentArea = document.getElementById('main-content');
    const pageTitle = document.getElementById('page-title');

    // 1. Hiệu ứng loading
    contentArea.innerHTML = '<div class="text-center mt-5"><div class="spinner-border text-danger"></div></div>';

    try {
        // 2. Gọi file HTML độc lập
        const response = await fetch(url);
        if (!response.ok) throw new Error('Trang không tồn tại');
        const html = await response.text();

        // 3. Hiển thị vào vùng div
        contentArea.innerHTML = html;

        // 4. Cập nhật giao diện Menu Active
        if (element) {
            document.querySelectorAll('[data-page]').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            pageTitle.innerText = element.innerText.trim();
        }
    } catch (err) {
        contentArea.innerHTML = `<div class="alert alert-danger">Lỗi tải trang: ${err.message}</div>`;
    }
}

// Lắng nghe click vào menu
document.querySelectorAll('[data-page]').forEach(item => {
    item.addEventListener('click', function(e) {
        const page = this.getAttribute('data-page');
        navigateTo(page, this);
    });
});

// Tải trang mặc định khi mở app
window.onload = () => {
    const defaultItem = document.querySelector('[data-page]');
    navigateTo(defaultItem.getAttribute('data-page'), defaultItem);
};
</script>

</body>
