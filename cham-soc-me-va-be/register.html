<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            margin: 0 auto;
            padding: 50px;
        }
        .form-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }
        .form-subtitle {
            color: #666;
            margin-bottom: 40px;
            text-align: center;
        }
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .login-link {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }
        .login-link:hover {
            text-decoration: underline;
        }
        #employeeFields {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .image-upload-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .upload-preview {
            max-width: 200px;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2 class="form-title">Đăng Ký Tài Khoản</h2>
        <p class="form-subtitle">Tạo tài khoản mới để sử dụng hệ thống</p>
        
        <div id="alertContainer"></div>
        
        <form id="registerForm" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="phone" name="phone" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Loại tài khoản <span class="text-danger">*</span></label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="customer">Khách hàng</option>
                        <option value="employee">Nhân viên</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <textarea class="form-control" id="address" name="address" rows="2"></textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
            </div>
            
            <div class="image-upload-section">
                <h5 class="mb-3">Upload ảnh bắt buộc</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ảnh chân dung (Avatar) <span class="text-danger">*</span></label>
                        <input type="file" class="form-control" id="avatar" name="avatar" accept="image/*" required>
                        <img id="avatarPreview" class="upload-preview" style="display:none;">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ảnh CCCD <span class="text-danger">*</span></label>
                        <input type="file" class="form-control" id="cccd_image" name="cccd_image" accept="image/*" required>
                        <img id="cccdPreview" class="upload-preview" style="display:none;">
                    </div>
                </div>
            </div>
            
            <div id="employeeFields">
                <h5 class="mb-3">Thông tin nhân viên</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Số CCCD</label>
                        <input type="text" class="form-control" id="cccd_number" name="cccd_number">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Kinh nghiệm</label>
                        <textarea class="form-control" id="experience" name="experience" rows="2"></textarea>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-register w-100 mt-3">Đăng Ký</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-0">Đã có tài khoản? <a href="login.html" class="login-link">Đăng nhập ngay</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show/hide employee fields
        document.getElementById('role').addEventListener('change', (e) => {
            const employeeFields = document.getElementById('employeeFields');
            employeeFields.style.display = e.target.value === 'employee' ? 'block' : 'none';
        });

        // Preview avatar
        document.getElementById('avatar').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('avatarPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Preview CCCD
        document.getElementById('cccd_image').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('cccdPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = '';
            
            try {
                const response = await fetch('api/register.php', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alertContainer.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            } catch (error) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Lỗi kết nối. Vui lòng thử lại.</div>`;
            }
        });
    </script>
</body>
</html>
