<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Hóa Đơn - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .invoice-page-shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 12px 32px;
        }

        .invoice-mobile-list .card {
            border: 1px solid rgba(220, 53, 69, 0.2);
            box-shadow: 0 4px 14px rgba(220, 53, 69, 0.08);
        }

        .invoice-mobile-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.35rem 0;
            border-bottom: 1px dashed rgba(108, 117, 125, 0.25);
        }

        .invoice-mobile-row:last-child {
            border-bottom: 0;
        }

        .invoice-mobile-label {
            font-weight: 600;
            color: #6c757d;
            min-width: 92px;
            flex: 0 0 auto;
        }

        .invoice-mobile-value {
            text-align: right;
            min-width: 0;
            word-break: break-word;
        }

        .invoice-mobile-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        #invoiceDetailContent .invoice-info-item,
        #employeeDetailContent .invoice-info-item {
            display: grid;
            grid-template-columns: 130px minmax(0, 1fr);
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.45rem;
        }

        #invoiceDetailContent .invoice-info-label,
        #employeeDetailContent .invoice-info-label {
            font-weight: 700;
            color: #7a1f1f;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #invoiceDetailContent .invoice-info-value,
        #employeeDetailContent .invoice-info-value {
            line-height: 1.3;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #invoiceDetailContent .invoice-main-card .invoice-info-label,
        #invoiceDetailContent .invoice-main-card .invoice-info-value {
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            word-break: break-word;
        }

        #invoiceDetailContent .invoice-work-list {
            list-style: none;
            padding-left: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        #invoiceDetailContent .invoice-work-item {
            display: flex;
            align-items: flex-start;
            gap: 0.55rem;
        }

        #invoiceDetailContent .invoice-work-index {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #0d6efd;
            color: #fff;
            font-weight: 700;
            font-size: 0.78rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 24px;
            line-height: 1;
        }

        @media (max-width: 767.98px) {
            .invoice-mobile-list .card-body {
                padding: 0.75rem;
            }

            .invoice-mobile-row {
                font-size: 0.92rem;
            }

            #invoiceDetailContent .invoice-info-item,
            #employeeDetailContent .invoice-info-item {
                grid-template-columns: 112px minmax(0, 1fr);
            }
        }
    </style>
</head>
<body class="bg-body-tertiary">
    <div id="site-header"></div>

    <main class="invoice-page-shell">
        <div class="card border-0 rounded-4 shadow-lg overflow-hidden">
            <div class="card-header border-0 bg-danger-subtle px-3 px-md-4 py-3 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                <div>
                    <h4 class="mb-1 fw-bold text-danger-emphasis"><i class="bi bi-receipt-cutoff me-2"></i>Danh Sách Hóa Đơn Đã Đặt</h4>
                    <p class="text-secondary small mb-0">Theo dõi trạng thái và xem chi tiết hóa đơn của bạn</p>
                </div>
                <a href="../dat-lich.html" class="btn btn-danger rounded-3 fw-semibold">
                    <i class="bi bi-calendar-plus me-1"></i>Đặt Lịch Dịch Vụ
                </a>
            </div>

            <div class="card-body p-3 p-md-4 bg-danger-subtle">
                <div id="invoiceResultContainer">
                    <div class="d-none d-md-block">
                        <div class="card border-danger-subtle shadow-sm rounded-4">
                            <div class="card-body p-2 p-md-3">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0 table-sm" style="font-size: 14px;">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Tên khách hàng</th>
                                                <th>Gói dịch vụ</th>
                                                <th>Ngày bắt đầu</th>
                                                <th>Tổng tiền</th>
                                                <th>Trạng thái</th>
                                                <th>Tên nhân viên</th>
                                                <th>Hành động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="invoicesTable">
                                            <tr><td colspan="7" class="text-center text-muted py-4">Đang tải dữ liệu hóa đơn...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-md-none invoice-mobile-list" id="mobileInvoicesList">
                        <div class="card border-0 shadow-sm rounded-4">
                            <div class="card-body text-center text-muted py-4">Đang tải dữ liệu hóa đơn...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="employeeDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-person-badge-fill me-2"></i>Thông Tin Nhân Viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body-tertiary" id="employeeDetailContent"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="invoiceDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-file-text-fill me-2"></i>Chi Tiết Hóa Đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body-tertiary" id="invoiceDetailContent"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadMediaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-cloud-upload me-2"></i>Upload Hình Ảnh / Video</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body-tertiary">
                    <form id="uploadMediaForm">
                        <input type="hidden" id="uploadInvoiceId" name="hoa_don_id">
                        <div class="mb-3">
                            <label class="form-label">Chọn file (hình ảnh hoặc video)</label>
                            <input type="file" class="form-control" name="file" accept="image/*,video/*" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" name="mo_ta" rows="3" placeholder="Mô tả về hình ảnh/video..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 rounded-3 fw-semibold">Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="../JS/shared-layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/user-nav-menu.js"></script>
    <script src="../JS/profile-modal-loader.js"></script>
    <script>
        var invoicesById = {};

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function hasDisplayValue(value) {
            return !(value === null || value === undefined || (typeof value === 'string' && value.trim() === ''));
        }

        function formatMoney(value) {
            var numberValue = parseInt(value, 10);
            if (Number.isNaN(numberValue)) return escapeHtml(value || '0') + ' VNĐ';
            return numberValue.toLocaleString('vi-VN') + ' VNĐ';
        }

        function getStatusBadge(status) {
            var map = {
                cho_duyet: '<span class="badge rounded-pill text-bg-warning">Chờ xử lý</span>',
                da_nhan: '<span class="badge rounded-pill text-bg-info">Đã nhận</span>',
                da_duyet: '<span class="badge rounded-pill text-bg-info">Đã nhận</span>',
                dang_lam: '<span class="badge rounded-pill text-bg-primary">Đang làm</span>',
                dang_thuc_hien: '<span class="badge rounded-pill text-bg-primary">Đang làm</span>',
                hoan_thanh: '<span class="badge rounded-pill text-bg-success">Hoàn thành</span>',
                da_huy: '<span class="badge rounded-pill text-bg-danger">Đã hủy</span>',
                pending: '<span class="badge rounded-pill text-bg-warning">Chờ xử lý</span>',
                in_progress: '<span class="badge rounded-pill text-bg-primary">Đang làm</span>',
                completed: '<span class="badge rounded-pill text-bg-success">Hoàn thành</span>',
                cancelled: '<span class="badge rounded-pill text-bg-danger">Đã hủy</span>'
            };
            return map[status] || '<span class="badge rounded-pill text-bg-secondary">' + escapeHtml(status || 'N/A') + '</span>';
        }

        function rememberInvoices(invoices) {
            invoicesById = {};
            (invoices || []).forEach(function (invoice) {
                invoicesById[String(invoice.id)] = invoice;
            });
        }

        function getInvoiceFromCache(invoiceId) {
            return invoicesById[String(invoiceId)] || null;
        }

        function getMediaHtml(media) {
            if (!Array.isArray(media) || media.length === 0) {
                return '<p class="text-center text-muted mb-0">Chưa có dữ liệu media</p>';
            }

            return media.map(function (m) {
                var filePath = '../' + String(m.duong_dan_file || m.duong_dan || '').replace(/^\/+/, '');
                var mediaType = String(m.loai_file || '').toLowerCase();
                var isImage = mediaType.indexOf('hinh_anh') !== -1 || mediaType.indexOf('image') !== -1 || mediaType.indexOf('png') !== -1 || mediaType.indexOf('jpg') !== -1 || mediaType.indexOf('jpeg') !== -1 || mediaType.indexOf('gif') !== -1 || mediaType.indexOf('webp') !== -1;
                var mediaView = isImage
                    ? '<img src="' + escapeHtml(filePath) + '" class="img-fluid rounded" alt="media">'
                    : '<video src="' + escapeHtml(filePath) + '" controls class="w-100 rounded"></video>';

                return '' +
                    '<div class="col-12 col-md-6 col-lg-4">' +
                    mediaView +
                    '<p class="small mt-1 mb-0"><strong>Mô tả:</strong> ' + escapeHtml(m.mo_ta || 'N/A') + '</p>' +
                    '<p class="small text-muted mb-0">Bởi: ' + escapeHtml(m.uploader_name || 'N/A') + ' (' + escapeHtml(m.uploader_role || 'N/A') + ')</p>' +
                    '</div>';
            }).join('');
        }

        function getEmployeeMedia(media, nhanVien, invoice) {
            if (!Array.isArray(media) || media.length === 0) return [];

            var employeeId = nhanVien && nhanVien.id ? Number(nhanVien.id) : Number(invoice && invoice.nhan_vien_id);
            var employeeName = (nhanVien && nhanVien.ten) || (invoice && invoice.employee_name) || '';

            return media.filter(function (m) {
                var uploaderId = Number((m && (m.nguoi_dung_id || m.uploader_id)) || 0);
                var uploaderRole = String((m && m.uploader_role) || '').toLowerCase();
                var uploaderName = String((m && m.uploader_name) || '');

                if (employeeId && uploaderId && uploaderId === employeeId) return true;
                if (uploaderRole.indexOf('nhan_vien') !== -1 || uploaderRole.indexOf('nhân viên') !== -1) return true;
                if (employeeName && uploaderName && uploaderName === employeeName) return true;
                return false;
            });
        }

        function addInvoiceField(lines, label, value, options) {
            if (!hasDisplayValue(value)) return;

            var formatted = escapeHtml(value);
            if (options && options.badge) {
                formatted = getStatusBadge(value);
            } else if (options && options.money) {
                formatted = formatMoney(value);
            }

            lines.push(
                '<div class="invoice-info-item">' +
                '<span class="invoice-info-label">' + escapeHtml(label) + '</span>' +
                '<span class="invoice-info-value">' + formatted + '</span>' +
                '</div>'
            );
        }

        function addEmployeeField(lines, label, value, options) {
            if (!hasDisplayValue(value)) return;

            var formatted = escapeHtml(value);
            if (options && options.phone) {
                formatted = '<a class="text-decoration-none" href="tel:' + escapeHtml(value) + '">' + escapeHtml(value) + '</a>';
            }
            if (options && options.rating) {
                formatted = '<span class="badge text-bg-warning text-dark fs-6"><i class="bi bi-star-fill me-1"></i>' + escapeHtml(value) + '/5.0</span>';
            }

            lines.push(
                '<div class="invoice-info-item">' +
                '<span class="invoice-info-label">' + escapeHtml(label) + '</span>' +
                '<span class="invoice-info-value">' + formatted + '</span>' +
                '</div>'
            );
        }

        function renderEmployeeDetailContent(content, employee, media) {
            var infoLines = [];
            addEmployeeField(infoLines, 'Họ tên', employee.ten);
            addEmployeeField(infoLines, 'Số điện thoại', employee.dien_thoai, { phone: true });
            addEmployeeField(infoLines, 'Email', employee.email);
            addEmployeeField(infoLines, 'Đánh giá', employee.danh_gia, { rating: true });
            addEmployeeField(infoLines, 'Kinh nghiệm', employee.kinh_nghiem);

            content.innerHTML = '' +
                '<div class="row g-3">' +
                '  <div class="col-md-4">' +
                '    <div class="card border-0 shadow-sm h-100">' +
                '      <div class="card-header text-white" style="background: linear-gradient(135deg, #e53935, #fb8c00);">' +
                '        <h6 class="mb-0"><i class="bi bi-person-badge-fill me-2"></i>Hồ Sơ Nhân Viên</h6>' +
                '      </div>' +
                '      <div class="card-body text-center">' +
                (hasDisplayValue(employee.anh_dai_dien)
                    ? '      <img src="../' + escapeHtml(employee.anh_dai_dien) + '" class="rounded-circle border mb-3" style="width:120px;height:120px;max-width:120px;object-fit:cover;">'
                    : '      <div class="rounded-circle border d-inline-flex align-items-center justify-content-center mb-3 bg-light" style="width:120px;height:120px;"><i class="bi bi-person fs-2 text-secondary"></i></div>') +
                (hasDisplayValue(employee.ten) ? '      <h6 class="mb-1">' + escapeHtml(employee.ten) + '</h6>' : '') +
                '      </div>' +
                '    </div>' +
                '  </div>' +
                '  <div class="col-md-8">' +
                '    <div class="card border-0 shadow-sm mb-3">' +
                '      <div class="card-header bg-danger-subtle">' +
                '        <h6 class="mb-0 text-danger-emphasis"><i class="bi bi-info-circle-fill me-2"></i>Thông Tin Chi Tiết</h6>' +
                '      </div>' +
                '      <div class="card-body">' +
                (infoLines.length > 0 ? infoLines.join('') : '<p class="text-muted mb-0">Không có dữ liệu nhân viên để hiển thị.</p>') +
                '      </div>' +
                '    </div>' +
                '    <div class="card border-0 shadow-sm">' +
                '      <div class="card-header bg-warning-subtle">' +
                '        <h6 class="mb-0 text-warning-emphasis"><i class="bi bi-camera-video-fill me-2"></i>Media Liên Quan Hóa Đơn</h6>' +
                '      </div>' +
                '      <div class="card-body">' +
                '        <div class="row g-2">' +
                getMediaHtml(media) +
                '        </div>' +
                '      </div>' +
                '    </div>' +
                '  </div>' +
                '</div>';
        }

        function renderInvoiceDetailContent(content, invoice, nhanVien, media) {
            var leftInfoLines = [];
            var rightInfoLines = [];

            addInvoiceField(leftInfoLines, 'Tên khách hàng', invoice.ten_khach_hang || invoice.ten || 'Bạn');
            addInvoiceField(leftInfoLines, 'Số điện thoại', invoice.dien_thoai);
            addInvoiceField(leftInfoLines, 'Dịch vụ', invoice.dich_vu);
            addInvoiceField(leftInfoLines, 'Gói dịch vụ', invoice.goi_dich_vu);
            addInvoiceField(leftInfoLines, 'Ghi chú', invoice.ghi_chu);
            addInvoiceField(leftInfoLines, 'Yêu cầu thêm', invoice.yeu_cau_them);

            addInvoiceField(rightInfoLines, 'Ngày bắt đầu', invoice.ngay_bat_dau);
            addInvoiceField(rightInfoLines, 'Ngày kết thúc', invoice.ngay_ket_thuc);
            addInvoiceField(rightInfoLines, 'Giờ bắt đầu', invoice.gio_bat_dau);
            addInvoiceField(rightInfoLines, 'Giờ kết thúc', invoice.gio_ket_thuc);
            addInvoiceField(rightInfoLines, 'Tổng ngày', invoice.tong_ngay);
            addInvoiceField(rightInfoLines, 'Giá tiền', invoice.gia_tien || invoice.tong_tien, { money: true });
            addInvoiceField(rightInfoLines, 'Trạng thái', invoice.trang_thai, { badge: true });

            var hasWork = hasDisplayValue(invoice.cong_viec);
            var workItems = hasWork
                ? String(invoice.cong_viec)
                    .split(/\r?\n|,|;/)
                    .map(function (item) { return item.trim(); })
                    .filter(Boolean)
                : [];

            var employeeAvatar = (nhanVien && nhanVien.anh_dai_dien) || invoice.employee_avatar || '';
            var employeeName = (nhanVien && nhanVien.ten) || invoice.employee_name;
            var employeePhone = (nhanVien && nhanVien.dien_thoai) || invoice.employee_phone;
            var employeeEmail = (nhanVien && nhanVien.email) || invoice.employee_email;
            var employeeRating = (nhanVien && nhanVien.danh_gia) || invoice.employee_rating;
            var employeeExp = (nhanVien && nhanVien.kinh_nghiem) || invoice.employee_kinh_nghiem;
            var hasEmployee = hasDisplayValue(employeeName) || hasDisplayValue(employeePhone) || hasDisplayValue(employeeEmail);
            var employeeInfoLines = [];
            var employeeMedia = getEmployeeMedia(media, nhanVien, invoice);

            addEmployeeField(employeeInfoLines, 'Họ tên', employeeName);
            addEmployeeField(employeeInfoLines, 'Số điện thoại', employeePhone, { phone: true });
            addEmployeeField(employeeInfoLines, 'Email', employeeEmail);
            addEmployeeField(employeeInfoLines, 'Đánh giá', employeeRating, { rating: true });
            addEmployeeField(employeeInfoLines, 'Kinh nghiệm', employeeExp);

            content.innerHTML = '' +
                '<div class="row g-3">' +
                '  <div class="col-12 col-lg-8">' +
                '    <div class="card border-0 shadow-sm h-100 invoice-main-card">' +
                '      <div class="card-header text-white" style="background: linear-gradient(135deg, #d32f2f, #ff7043);">' +
                '        <h6 class="mb-0"><i class="bi bi-receipt-cutoff me-2"></i>Chi Tiết Hóa Đơn #' + escapeHtml(invoice.id || 'N/A') + '</h6>' +
                '      </div>' +
                '      <div class="card-body">' +
                (leftInfoLines.length > 0 || rightInfoLines.length > 0
                    ? ('<div class="row g-2">' +
                        '<div class="col-12 col-xl-6">' + leftInfoLines.join('') + '</div>' +
                        '<div class="col-12 col-xl-6">' + rightInfoLines.join('') + '</div>' +
                        '</div>')
                    : '<p class="mb-0 text-muted">Không có dữ liệu hóa đơn để hiển thị.</p>') +
                (hasWork
                    ? ('<div class="alert alert-warning-subtle border-warning mt-3 mb-0">' +
                        '<div class="fw-semibold text-warning-emphasis mb-1"><i class="bi bi-list-check me-2"></i>Công việc</div>' +
                        '<ol class="invoice-work-list">' +
                        workItems.map(function (item, index) {
                            return '<li class="invoice-work-item"><span class="invoice-work-index">' + (index + 1) + '</span><span>' + escapeHtml(item) + '</span></li>';
                        }).join('') +
                        '</ol>' +
                        '</div>')
                    : '') +
                '      </div>' +
                '    </div>' +
                '  </div>' +
                '  <div class="col-12 col-lg-4">' +
                '    <div class="card border-0 shadow-sm h-100">' +
                '      <div class="card-header bg-warning-subtle">' +
                '        <h6 class="mb-0 text-warning-emphasis"><i class="bi bi-person-vcard-fill me-2"></i>Nhân Viên Thực Hiện</h6>' +
                '      </div>' +
                '      <div class="card-body">' +
                (hasEmployee
                    ? '<div class="text-center mb-3">' +
                        (hasDisplayValue(employeeAvatar)
                            ? '<img src="../' + escapeHtml(employeeAvatar) + '" class="rounded-circle border" style="width:104px;height:104px;max-width:104px;object-fit:cover;">'
                            : '<div class="rounded-circle border d-inline-flex align-items-center justify-content-center bg-light" style="width:104px;height:104px;"><i class="bi bi-person fs-3 text-secondary"></i></div>') +
                      '</div>' +
                      (employeeInfoLines.length > 0 ? employeeInfoLines.join('') : '<p class="text-muted mb-0">Không có thông tin nhân viên.</p>') +
                      '<div class="mt-3 pt-2 border-top">' +
                        '<h6 class="mb-2 text-warning-emphasis"><i class="bi bi-camera-video-fill me-2"></i>Media Của Nhân Viên</h6>' +
                        '<div class="row g-2">' +
                        (employeeMedia.length > 0 ? getMediaHtml(employeeMedia) : '<p class="text-muted mb-0">Chưa có media của nhân viên.</p>') +
                        '</div>' +
                      '</div>'
                    : '<p class="text-muted mb-0">Chưa có nhân viên</p>') +
                '      </div>' +
                '    </div>' +
                '  </div>' +
                '</div>' +
                '<div class="card border-0 shadow-sm mt-3">' +
                '  <div class="card-header bg-danger-subtle">' +
                '    <h6 class="mb-0 text-danger-emphasis"><i class="bi bi-camera-video-fill me-2"></i>Hình Ảnh & Video Công Việc</h6>' +
                '  </div>' +
                '  <div class="card-body"><div class="row g-3">' +
                getMediaHtml(media) +
                '  </div></div>' +
                '</div>';
        }

        function renderInvoices(invoices) {
            var table = document.getElementById('invoicesTable');
            var mobileList = document.getElementById('mobileInvoicesList');

            if (!Array.isArray(invoices) || invoices.length === 0) {
                if (table) {
                    table.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Bạn chưa có hóa đơn nào.</td></tr>';
                }
                if (mobileList) {
                    mobileList.innerHTML = '<div class="card border-0 shadow-sm rounded-4"><div class="card-body text-center text-muted py-4">Bạn chưa có hóa đơn nào.</div></div>';
                }
                return;
            }

            if (table) {
                table.innerHTML = invoices.map(function (invoice) {
                    var customerName = invoice.ten_khach_hang || invoice.ten || 'Bạn';
                    var servicePackage = invoice.goi_dich_vu || invoice.dich_vu || 'N/A';
                    var totalPrice = formatMoney(invoice.tong_tien || invoice.gia_tien || 0);
                    var hasEmployee = !!invoice.employee_name;
                    var employeeCell = hasEmployee
                        ? '<div class="d-inline-flex align-items-center gap-2">' +
                            '<span>' + escapeHtml(invoice.employee_name) + '</span>' +
                            '<button class="btn btn-sm btn-outline-danger" onclick="viewEmployeeDetail(' + Number(invoice.nhan_vien_id || 0) + ', ' + Number(invoice.id) + ')" title="Xem nhân viên"><i class="bi bi-eye"></i></button>' +
                          '</div>'
                        : '<span class="text-muted">Chưa có</span>';

                    return '' +
                        '<tr>' +
                        '<td>' + escapeHtml(customerName) + '</td>' +
                        '<td>' + escapeHtml(servicePackage) + '</td>' +
                        '<td>' + escapeHtml(invoice.ngay_bat_dau || 'N/A') + '</td>' +
                        '<td>' + totalPrice + '</td>' +
                        '<td>' + getStatusBadge(invoice.trang_thai) + '</td>' +
                        '<td>' + employeeCell + '</td>' +
                        '<td>' +
                        '  <div class="d-flex flex-wrap gap-1">' +
                        '    <button class="btn btn-sm btn-outline-danger" onclick="viewInvoiceDetail(' + Number(invoice.id) + ')"><i class="bi bi-eye me-1"></i>Chi tiết</button>' +
                        '    <button class="btn btn-sm btn-outline-success" onclick="openUploadModal(' + Number(invoice.id) + ')"><i class="bi bi-cloud-upload me-1"></i>Upload</button>' +
                        '  </div>' +
                        '</td>' +
                        '</tr>';
                }).join('');
            }

            if (mobileList) {
                mobileList.innerHTML = invoices.map(function (invoice) {
                    var customerName = invoice.ten_khach_hang || invoice.ten || 'Bạn';
                    var servicePackage = invoice.goi_dich_vu || invoice.dich_vu || 'N/A';
                    var totalPrice = formatMoney(invoice.tong_tien || invoice.gia_tien || 0);
                    var employeeName = invoice.employee_name || 'Chưa có';

                    return '' +
                        '<div class="card mb-2 rounded-4 border-0 shadow-sm">' +
                        '  <div class="card-body">' +
                        '    <div class="invoice-mobile-row"><span class="invoice-mobile-label">Khách hàng</span><span class="invoice-mobile-value fw-semibold">' + escapeHtml(customerName) + '</span></div>' +
                        '    <div class="invoice-mobile-row"><span class="invoice-mobile-label">Gói dịch vụ</span><span class="invoice-mobile-value">' + escapeHtml(servicePackage) + '</span></div>' +
                        '    <div class="invoice-mobile-row"><span class="invoice-mobile-label">Ngày bắt đầu</span><span class="invoice-mobile-value">' + escapeHtml(invoice.ngay_bat_dau || 'N/A') + '</span></div>' +
                        '    <div class="invoice-mobile-row"><span class="invoice-mobile-label">Tổng tiền</span><span class="invoice-mobile-value fw-semibold text-danger-emphasis">' + totalPrice + '</span></div>' +
                        '    <div class="invoice-mobile-row"><span class="invoice-mobile-label">Trạng thái</span><span class="invoice-mobile-value">' + getStatusBadge(invoice.trang_thai) + '</span></div>' +
                        '    <div class="invoice-mobile-row"><span class="invoice-mobile-label">Nhân viên</span><span class="invoice-mobile-value">' + escapeHtml(employeeName) + '</span></div>' +
                        '    <div class="invoice-mobile-actions mt-2">' +
                        '      <button class="btn btn-sm btn-outline-danger" onclick="viewInvoiceDetail(' + Number(invoice.id) + ')"><i class="bi bi-eye me-1"></i>Chi tiết</button>' +
                        (invoice.employee_name ? '      <button class="btn btn-sm btn-outline-secondary" onclick="viewEmployeeDetail(' + Number(invoice.nhan_vien_id || 0) + ', ' + Number(invoice.id) + ')"><i class="bi bi-person me-1"></i>Nhân viên</button>' : '') +
                        '      <button class="btn btn-sm btn-outline-success" onclick="openUploadModal(' + Number(invoice.id) + ')"><i class="bi bi-cloud-upload me-1"></i>Upload</button>' +
                        '    </div>' +
                        '  </div>' +
                        '</div>';
                }).join('');
            }
        }

        async function loadInvoices() {
            try {
                var response = await fetch('../api/get_invoices.php');
                var data = await response.json();

                if (!data.success) {
                    if (data.message === 'Unauthorized') {
                        window.location.href = '../login.html';
                        return;
                    }
                    rememberInvoices([]);
                    renderInvoices([]);
                    return;
                }

                var invoices = data.invoices || [];
                rememberInvoices(invoices);
                renderInvoices(invoices);
            } catch (error) {
                rememberInvoices([]);
                document.getElementById('invoicesTable').innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">Không thể tải dữ liệu. Vui lòng thử lại.</td></tr>';
                document.getElementById('mobileInvoicesList').innerHTML = '<div class="card border-0 shadow-sm rounded-4"><div class="card-body text-center text-danger py-4">Không thể tải dữ liệu. Vui lòng thử lại.</div></div>';
            }
        }

        function openUploadModal(invoiceId) {
            document.getElementById('uploadInvoiceId').value = Number(invoiceId);
            bootstrap.Modal.getOrCreateInstance(document.getElementById('uploadMediaModal')).show();
        }

        async function viewEmployeeDetail(employeeId, invoiceId) {
            var content = document.getElementById('employeeDetailContent');

            if (!employeeId) {
                content.innerHTML = '<div class="alert alert-warning mb-0">Hóa đơn chưa có nhân viên phụ trách.</div>';
                bootstrap.Modal.getOrCreateInstance(document.getElementById('employeeDetailModal')).show();
                return;
            }

            content.innerHTML = '<div class="text-center p-4"><div class="spinner-border text-danger" role="status"></div></div>';
            bootstrap.Modal.getOrCreateInstance(document.getElementById('employeeDetailModal')).show();

            try {
                var response = await fetch('../api/get_employee_detail.php?id=' + Number(employeeId) + '&hoa_don_id=' + Number(invoiceId));
                var data = await response.json();

                if (!data.success) {
                    var cached = getInvoiceFromCache(invoiceId);
                    if (cached && Number(cached.nhan_vien_id || 0) === Number(employeeId)) {
                        renderEmployeeDetailContent(content, {
                            ten: cached.employee_name,
                            dien_thoai: cached.employee_phone,
                            email: cached.employee_email,
                            danh_gia: cached.employee_rating,
                            kinh_nghiem: cached.employee_kinh_nghiem,
                            anh_dai_dien: cached.employee_avatar
                        }, cached.media || []);
                        return;
                    }

                    content.innerHTML = '<div class="alert alert-warning mb-0">' + escapeHtml(data.message || 'Không thể tải thông tin nhân viên.') + '</div>';
                    return;
                }

                renderEmployeeDetailContent(content, data.nhan_vien || {}, data.media || []);
            } catch (error) {
                content.innerHTML = '<div class="alert alert-danger mb-0">Không thể tải thông tin nhân viên. Vui lòng thử lại.</div>';
            }
        }

        function viewInvoiceDetail(invoiceId) {
            var normalizedId = Number(invoiceId);
            var localInvoice = getInvoiceFromCache(normalizedId);
            var url = 'chi-tiet-hoa-don.html?hoa_don_id=' + normalizedId;

            if (localInvoice && hasDisplayValue(localInvoice.dien_thoai)) {
                url += '&dien_thoai=' + encodeURIComponent(String(localInvoice.dien_thoai));
            }

            if (typeof window.__markInSiteNavigation === 'function') {
                window.__markInSiteNavigation();
            }

            window.location.href = url;
        }

        document.getElementById('uploadMediaForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var formData = new FormData(e.target);
            try {
                var response = await fetch('../api/upload_media.php', {
                    method: 'POST',
                    body: formData
                });
                var data = await response.json();
                alert(data.message || 'Đã xử lý yêu cầu');

                if (data.success) {
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('uploadMediaModal')).hide();
                    e.target.reset();
                    loadInvoices();
                }
            } catch (error) {
                alert('Không thể upload lúc này. Vui lòng thử lại.');
            }
        });

        loadInvoices();
    </script>
</body>
</html>
