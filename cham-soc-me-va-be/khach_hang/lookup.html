<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Hóa Đơn - Hệ Thống Quản Lý Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        #lookupModal .modal-content {
            border-radius: 1.25rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.38);
            background:
                radial-gradient(700px 160px at 12% -30%, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0) 60%),
                linear-gradient(165deg, #ff5f99 0%, #f14f87 45%, #ec4e81 100%);
            box-shadow: 0 22px 45px rgba(200, 42, 96, 0.35);
        }

        #lookupModal .modal-header,
        #lookupModal .modal-body,
        #lookupModal .modal-footer {
            background: transparent !important;
        }

        #lookupModal .modal-header h4 {
            color: #fff;
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        #lookupModal .modal-header p {
            color: rgba(255, 255, 255, 0.85) !important;
        }

        #lookupModal .btn-close {
            filter: invert(1);
            opacity: 0.92;
        }

        #lookupModal .lookup-search-shell {
            border-radius: 1.15rem;
            border: 1px solid rgba(255, 255, 255, 0.46);
            background: rgba(255, 255, 255, 0.62);
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 22px rgba(151, 28, 70, 0.22);
        }

        #lookupModal #lookupForm .input-group {
            border-radius: 999px;
            border: 2px solid #ef7aa0;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(138, 24, 68, 0.2);
            background: #fff;
        }

        #lookupModal #lookupForm .input-group-text,
        #lookupModal #lookupForm .form-control {
            border: 0 !important;
            background: #fff;
            min-height: 56px;
            font-size: 1.05rem;
            color: #464646;
        }

        #lookupModal #lookupForm .input-group-text {
            padding-left: 1.25rem;
            color: #ee5f91 !important;
            font-size: 1.55rem;
        }

        #lookupModal #lookupForm .form-control:focus {
            box-shadow: none;
        }

        #lookupModal #lookupForm .btn {
            min-height: 56px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(145deg, #ff2f78 0%, #ff206a 100%);
            box-shadow: 0 8px 18px rgba(123, 12, 51, 0.3);
            font-size: 2rem;
            font-weight: 700;
        }

        #lookupModal #lookupForm .btn:hover {
            background: linear-gradient(145deg, #ff216d 0%, #f1125e 100%);
        }

        #lookupModal #resultContainer .card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 8px 18px rgba(151, 28, 70, 0.14);
        }

        #lookupModal .modal-footer .btn-outline-danger {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.75);
            background: rgba(255, 255, 255, 0.16);
        }

        #lookupModal .modal-footer .btn-outline-danger:hover {
            background: rgba(255, 255, 255, 0.27);
            color: #fff;
            border-color: #fff;
        }

        @media (max-width: 767.98px) {
            #lookupModal .modal-content {
                border-radius: 1rem;
            }

            #lookupModal #lookupForm .input-group-text,
            #lookupModal #lookupForm .form-control,
            #lookupModal #lookupForm .btn {
                min-height: 50px;
            }

            #lookupModal #lookupForm .btn {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body class="bg-body-tertiary">
    <div class="modal fade" id="lookupModal" tabindex="-1" aria-labelledby="lookupModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
            <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
                <div class="modal-header border-0 bg-danger-subtle px-3 px-md-4 py-3">
                    <div class="w-100 pe-2">
                        <h4 class="mb-1 fw-bold text-danger-emphasis" id="lookupModalLabel"><i class="bi bi-receipt-cutoff me-2"></i>Tra Cứu Hóa Đơn</h4>
                        <p class="text-secondary small mb-0">Nhập số điện thoại để tra cứu thông tin hóa đơn</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-3 p-md-4 bg-danger-subtle">
                    <div class="card border-0 shadow-sm rounded-4 mb-3 lookup-search-shell">
                        <div class="card-body p-3 p-md-4">
                            <form id="lookupForm">
                                <div class="row g-3">
                                    <div class="col-md-8">
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-white border-end-0 text-danger"><i class="bi bi-telephone-fill"></i></span>
                                            <input type="tel" class="form-control border-start-0" id="phone" placeholder="Nhập số điện thoại (VD: 0123456789)" required>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <button type="submit" class="btn btn-danger btn-lg w-100 rounded-3 fw-semibold">
                                            <i class="bi bi-search me-1"></i>Tra cứu
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div id="resultContainer">
                        <div class="d-none d-md-block">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body p-2 p-md-3">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0 table-sm" style="font-size: 14px;">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Tên khách hàng</th>
                                                    <th>Gói dịch vụ</th>
                                                    <th>Ngày bắt đầu</th>
                                                    <th>Tổng tiền</th>
                                                    <th>Trạng thái</th>
                                                    <th>Tên nhân viên</th>
                                                    <th>Hành động</th>
                                                </tr>
                                            </thead>
                                            <tbody id="lookupInvoicesTable">
                                                <tr><td colspan="7" class="text-center text-muted py-4">Nhập số điện thoại để tra cứu hóa đơn</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-md-none">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body text-center text-muted py-4">
                                    Nhập số điện thoại để tra cứu hóa đơn
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-0 pt-0 px-3 px-md-4 pb-3 pb-md-4 bg-danger-subtle justify-content-between">
                    <!-- <a href="dshoadon.html" class="text-danger text-decoration-none fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i>Quay lại trang chủ
                    </a> -->
                    <button type="button" class="btn btn-outline-danger rounded-pill px-4" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade lookup-detail-modal" id="lookupEmployeeDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable lookup-modal-dialog-employee">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-person-badge-fill me-2"></i>Thông Tin Nhân Viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body-tertiary" id="lookupEmployeeDetailContent"></div>
            </div>
        </div>
    </div>

    <div class="modal fade lookup-detail-modal" id="lookupInvoiceDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable lookup-modal-dialog-invoice">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header bg-danger-subtle border-0">
                    <h5 class="modal-title text-danger-emphasis"><i class="bi bi-file-text-fill me-2"></i>Chi Tiết Hóa Đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body-tertiary" id="lookupInvoiceDetailContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/lookup-modal-core.js"></script>
</body>
</html>
