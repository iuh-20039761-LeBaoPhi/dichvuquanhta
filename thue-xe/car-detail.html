<script>
// Load modal partial in background — không block việc hiển thị xe
const MODAL_PROMISE = fetch('views/partials/booking-modal.html')
    .then(r => r.text())
    .then(html => { document.getElementById('bookingModalContainer').outerHTML = html; })
    .catch(() => {});

STATIC_DATA_PROMISE.then(STATIC_DATA => {
const SITE_BASE = 'https://iuh-20039761-lebaophi.github.io/GlobalCare/thue-xe';
const fmt = n => new Intl.NumberFormat('vi-VN').format(n);
const today = () => new Date().toISOString().split('T')[0];

// Build ADDON_PRICES from static-data.json services
const ADDON_PRICES = {};
(STATIC_DATA.services || []).forEach(svc => {
    ADDON_PRICES[svc.name] = { price: Number(svc.price), unit: svc.unit || 'chuyến' };
});

// Render addon checkboxes from static-data
function renderAddonServices() {
    const UNIT_LABELS = { 'ngày': '/ngày', 'chuyến': '/chuyến' };
    const services = STATIC_DATA.services || [];
    const container = document.getElementById('addonServiceList');
    if (!container) return;
    if (!services.length) {
        container.innerHTML = '<div class="col-12 text-muted small">Không có dịch vụ đi kèm</div>';
        return;
    }
    container.innerHTML = services.map(svc => `
        <div class="col-md-6">
            <div class="form-check border rounded p-2 h-100">
                <input class="form-check-input" type="checkbox" name="addon_services"
                       value="${svc.name}" id="svc_${svc.id}">
                <label class="form-check-label w-100" for="svc_${svc.id}">
                    <i class="fas fa-${svc.icon} text-primary me-1"></i> ${svc.name}
                    <span class="float-end text-primary fw-semibold">+${fmt(svc.price)}đ${UNIT_LABELS[svc.unit] || ''}</span>
                    <small class="d-block text-muted">${svc.description || ''}</small>
                </label>
            </div>
        </div>
    `).join('');
}

function recalcAddonSummary(pricePerDay) {
    const pickup = document.getElementById('pickupDate');
    const ret    = document.getElementById('returnDate');
    const days   = (pickup.value && ret.value && ret.value > pickup.value)
        ? Math.max(1, Math.round((new Date(ret.value) - new Date(pickup.value)) / 86400000))
        : 0;
    const checked = [...document.querySelectorAll('input[name="addon_services"]:checked')];
    const summaryEl = document.getElementById('addonSummary');
    if (!days && !checked.length) { summaryEl.style.display = 'none'; return; }
    const carTotal = days * pricePerDay;
    let addonTotal = 0, addonLines = '';
    checked.forEach(cb => {
        const info = ADDON_PRICES[cb.value];
        if (!info) return;
        const cost = info.unit === 'ngày' ? info.price * days : info.price;
        addonTotal += cost;
        addonLines += `<div class="d-flex justify-content-between mb-1">
            <span class="text-muted">${cb.value}:</span>
            <span>+${fmt(cost)}đ</span>
        </div>`;
    });
    document.getElementById('summaryCarPrice').textContent = fmt(carTotal) + 'đ';
    document.getElementById('summaryAddonList').innerHTML = addonLines;
    document.getElementById('summaryTotal').textContent = fmt(carTotal + addonTotal) + 'đ';
    summaryEl.style.display = 'block';
}

// ===== Helpers =====
function updateSEO(car) {
    const carUrl = `${SITE_BASE}/car-detail.html?id=${car.id}`;
    const carImg = `${SITE_BASE}/assets/images/cars/${car.main_image}`;
    const title = `${car.name} – Thuê Xe Toàn Quốc | ${fmt(car.price_per_day)}đ/ngày`;
    const desc = `Thuê ${car.name} tại Thuê Xe trên toàn quốc. ${car.seats} chỗ, ${car.transmission}, ${car.fuel_type}. Giá ${fmt(car.price_per_day)}đ/ngày. Giao xe tận nơi, bảo hiểm đầy đủ.`;
    const keys = `thuê ${car.name.toLowerCase()}, thuê ${car.brand.toLowerCase()} toàn quốc, car rental nationwide`;

    document.title = title;
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('metaDesc').setAttribute('content', desc);
    document.getElementById('metaKeys').setAttribute('content', keys);
    document.getElementById('metaCanonical').href = carUrl;
    document.getElementById('ogUrl').setAttribute('content', carUrl);
    document.getElementById('ogTitle').setAttribute('content', title);
    document.getElementById('ogDesc').setAttribute('content', desc);
    document.getElementById('ogImage').setAttribute('content', carImg);
    document.getElementById('twTitle').setAttribute('content', title);
    document.getElementById('twDesc').setAttribute('content', desc);
    document.getElementById('twImage').setAttribute('content', carImg);

    // Update BreadcrumbList with car name
    const breadcrumbs = document.querySelectorAll('script[type="application/ld+json"]');
    breadcrumbs.forEach(s => {
        try {
            const d = JSON.parse(s.textContent);
            if (d['@type'] === 'BreadcrumbList') {
                d.itemListElement[1].name = car.name;
                d.itemListElement[1].item = carUrl;
                s.textContent = JSON.stringify(d);
            }
        } catch {}
    });

    const schema = {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": car.name,
        "description": car.description,
        "image": carImg,
        "brand": { "@type": "Brand", "name": car.brand },
        "offers": {
            "@type": "Offer",
            "priceCurrency": "VND",
            "price": car.price_per_day,
            "priceSpecification": { "@type": "UnitPriceSpecification", "unitText": "Ngày" },
            "availability": "https://schema.org/InStock",
            "seller": { "@type": "Organization", "name": "Thuê Xe" }
        }
    };
    document.getElementById('carSchema').textContent = JSON.stringify(schema, null, 2);
}

    document.getElementById('carContent').innerHTML = `

                            Có sẵn
                        </span>
                    </div>
                </div>
            </div>

            <!-- Info -->

                <div class="card-body p-4">

                        <span class="badge bg-info">${car.year}</span>
                    </div>

                    <div class="row g-3 mb-4">

                                </div>

                                    <small class="text-muted d-block">Số chỗ</small>
                                    <strong>${car.seats} chỗ</strong>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="d-flex align-items-center">
                                <div class="rounded-circle bg-secondary bg-opacity-10 p-3 me-2 flex-shrink-0">
                                    <i class="fas fa-cog text-secondary"></i>
                                </div>
                                <div>
                                    <small class="text-muted d-block">Hộp số</small>
                                    <strong>${car.transmission}</strong>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="d-flex align-items-center">
                                <div class="rounded-circle bg-success bg-opacity-10 p-3 me-2 flex-shrink-0">
                                    <i class="fas fa-gas-pump text-success"></i>
                                </div>
                                <div>
                                    <small class="text-muted d-block">Nhiên liệu</small>
                                    <strong>${car.fuel_type}</strong>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="d-flex align-items-center">
                                <div class="rounded-circle bg-warning bg-opacity-10 p-3 me-2 flex-shrink-0">
                                    <i class="fas fa-dollar-sign text-warning"></i>
                                </div>
                                <div>
                                    <small class="text-muted d-block">Giá thuê</small>
                                    <strong class="text-primary">${fmt(car.price_per_day)}đ</strong>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr />
                    <h5 class="fw-bold mb-3">Thông Tin Chi Tiết</h5>
                    <div class="row g-2 mb-3">
                        <div class="col-6 col-md-4">
                            <div class="p-3 bg-light rounded h-100">
                                <small class="text-muted d-block mb-1"><i class="fas fa-id-card me-1 text-primary"></i>Biển số</small>
                                <span class="fw-bold">${car.license_plate || '—'}</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="p-3 bg-light rounded h-100">
                                <small class="text-muted d-block mb-1"><i class="fas fa-calendar-alt me-1 text-primary"></i>Năm sản xuất</small>
                                <span class="fw-bold">${car.manufacture_year || car.year || '—'}</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="p-3 bg-light rounded h-100">
                                <small class="text-muted d-block mb-1"><i class="fas fa-tachometer-alt me-1 text-primary"></i>Quãng đường đã chạy</small>
                                <span class="fw-bold">${car.mileage != null ? Number(car.mileage).toLocaleString('vi-VN') + ' km' : '—'}</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="p-3 bg-light rounded h-100">
                                <small class="text-muted d-block mb-1"><i class="fas fa-palette me-1 text-primary"></i>Màu xe</small>

                        </div>
                        <div class="col-6 col-md-4">
                            <div class="p-3 bg-light rounded h-100">
                                <small class="text-muted d-block mb-1"><i class="fas fa-industry me-1 text-primary"></i>Hãng xe</small>
                                <span class="fw-bold">${car.brand || '—'}</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="p-3 bg-light rounded h-100">
                                <small class="text-muted d-block mb-1"><i class="fas fa-car me-1 text-primary"></i>Loại xe</small>
                                <span class="fw-bold">${car.car_type || '—'}</span>
                            </div>
                        </div>
                    </div>

                    <hr />
                    <h5 class="fw-bold mb-2">Mô Tả</h5>
                    <p class="text-muted">${car.description}</p>

                    ${features.length > 0 ? `
                    <hr />
                    <h5 class="fw-bold mb-3">Tính Năng</h5>
                    <div class="row g-2">
                        ${features.map(f => `
                            <div class="col-md-6">
                                <i class="fas fa-check-circle text-success me-2"></i><span>${f.trim()}</span>
                            </div>
                        `).join('')}
                    </div>` : ''}
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <!-- Booking sidebar -->
            <div class="card border-0 shadow-sm sticky-top" style="top:90px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Đặt Xe Ngay</h5>
                    <div class="mb-3 p-3 bg-light rounded">
                        <h6 class="fw-bold mb-1">${car.name}</h6>
                        <p class="mb-0 text-primary fw-bold">${fmt(car.price_per_day)}đ <small class="text-muted">/ ngày</small></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ngày nhận xe *</label>
                        <input type="date" class="form-control" id="pickupDate" min="${today()}" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ngày trả xe *</label>
                        <input type="date" class="form-control" id="returnDate" min="${today()}" />
                    </div>

                    <div id="priceCalc" class="mb-3 p-3 bg-light rounded" style="display:none;">
                        <div class="d-flex justify-content-between mb-1">
                            <span>Số ngày:</span><strong id="totalDays">0</strong>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Tổng tiền:</span><strong class="text-primary" id="totalPrice">0đ</strong>
                        </div>
                    </div>

                    <button class="btn btn-gradient w-100" data-bs-toggle="modal" data-bs-target="#bookingModal">
                        <i class="fas fa-calendar-check me-2"></i>Đặt xe ngay
                    </button>

                    <hr />
                    <div class="text-center">
                        <p class="mb-1"><i class="fas fa-phone text-primary me-2"></i><strong>0775 472 347</strong></p>
                        <small class="text-muted">Hỗ trợ 24/7</small>
                    </div>
                </div>
            </div>
        </div>
    `;

    // Date calculation
    const pickup = document.getElementById('pickupDate');
    const ret = document.getElementById('returnDate');
    const calcPrice = () => {
        if (pickup.value && ret.value) {
            const d = Math.max(1, Math.round((new Date(ret.value) - new Date(pickup.value)) / 86400000));
            document.getElementById('totalDays').textContent = d + ' ngày';
            document.getElementById('totalPrice').textContent = fmt(d * car.price_per_day) + 'đ';
            document.getElementById('priceCalc').style.display = 'block';
            ret.min = pickup.value;
        }
    };
    pickup.addEventListener('change', () => { calcPrice(); recalcAddonSummary(car.price_per_day); });
    ret.addEventListener('change', () => { calcPrice(); recalcAddonSummary(car.price_per_day); });

    // Addon services + booking form — chờ modal load xong mới setup
    MODAL_PROMISE.then(() => {
        renderAddonServices();
        document.querySelectorAll('input[name="addon_services"]').forEach(cb => {
            cb.addEventListener('change', () => recalcAddonSummary(car.price_per_day));
        });
        const bookingModalEl = document.getElementById('bookingModal');
        if (bookingModalEl) {
            bookingModalEl.addEventListener('show.bs.modal', () => {
                recalcAddonSummary(car.price_per_day);
                bookingAutoFill();
            });
        }
        const bookingFormEl = document.getElementById('bookingFormFull');
        if (bookingFormEl) bookingFormEl.addEventListener('submit', async e => {
        e.preventDefault();
        if (!pickup.value || !ret.value) {
            showAlert('Vui lòng chọn ngày nhận và trả xe!', 'danger');
            return;
        }
        const btn = e.target.querySelector('button[type="submit"]');
        const orig = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';

        const days = Math.max(1, Math.round((new Date(ret.value) - new Date(pickup.value)) / 86400000));
        const addonServices = [...document.querySelectorAll('input[name="addon_services"]:checked')].map(cb => cb.value);
        const addonTotal = addonServices.reduce((sum, name) => {
            const info = ADDON_PRICES[name];
            if (!info) return sum;
            return sum + (info.unit === 'ngày' ? info.price * days : info.price);
        }, 0);
        const totalPrice = days * car.price_per_day + addonTotal;
        const addonLines = addonServices.length
            ? `<br><strong>Dịch vụ đi kèm:</strong> ${addonServices.join(', ')}`
            : '';

        const IS_LOCAL = ['localhost', '127.0.0.1', ''].includes(window.location.hostname);

        if (IS_LOCAL) {
            // Real API call on localhost/XAMPP
            const form = e.target;
            const bookingData = {
                car_id:           car.id,
                car_name:         car.name,
                customer_name:    form.querySelector('[name="customer_name"]').value.trim(),
                customer_phone:   form.querySelector('[name="customer_phone"]').value.trim(),
                customer_email:   form.querySelector('[name="customer_email"]').value.trim(),
                id_number:        form.querySelector('[name="id_number"]').value.trim(),
                customer_address: form.querySelector('[name="customer_address"]') ? form.querySelector('[name="customer_address"]').value.trim() : '',
                pickup_date:      pickup.value,
                return_date:      ret.value,
                pickup_location:  form.querySelector('[name="pickup_location"]').value.trim(),
                notes:            form.querySelector('[name="notes"]') ? form.querySelector('[name="notes"]').value.trim() : '',
                addon_services:   addonServices,
                addon_total:      addonTotal,
                price_per_day:    car.price_per_day
            };
            try {
                const res = await fetch('controllers/booking-controller.php?action=create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                const result = await res.json();
                if (result.success) {
                    showAlert(`
                        <i class="fas fa-check-circle me-2"></i>
                        <strong>Đặt xe thành công!</strong><br>
                        Mã đơn: <strong>#${result.booking_id}</strong> – Xe: <strong>${car.name}</strong>.
                        ${addonLines}
                        <br><strong>Tổng tiền: ${fmt(totalPrice)}đ</strong><br>
                        Chúng tôi sẽ liên hệ xác nhận trong thời gian sớm nhất.
                    `, 'success');
                    e.target.reset();
                } else {
                    showAlert(`<i class="fas fa-times-circle me-2"></i><strong>Lỗi:</strong> ${result.message || 'Gửi đặt xe thất bại. Vui lòng thử lại!'}`, 'danger');
                }
            } catch (err) {
                showAlert('<i class="fas fa-times-circle me-2"></i>Không thể kết nối đến server! Vui lòng kiểm tra XAMPP đang chạy và thử lại.', 'danger');
            }
        } else {
            // Demo behavior for static/GitHub Pages
            await new Promise(r => setTimeout(r, 600));
            showAlert(`
                <i class="fas fa-check-circle me-2"></i>
                <strong>Đặt xe thành công! (Demo)</strong><br>
                Cảm ơn bạn đã quan tâm đến <strong>${car.name}</strong>.
                ${addonLines}
                <br><strong>Tổng tiền ước tính: ${fmt(totalPrice)}đ</strong><br>
                Để hoàn tất, vui lòng gọi hotline <strong>0775 472 347</strong> – hỗ trợ 24/7.
            `, 'success');
        }

        btn.disabled = false;
        btn.innerHTML = orig;
        }); // end bookingFormEl submit
    }); // end MODAL_PROMISE.then
}

let _session = null;
function bookingAutoFill() {
    fetch('controllers/check-session.php')
        .then(r => r.json())
        .then(data => {
            _session = data;
            const banner = document.getElementById('bookingAuthBanner');
            if (!banner) return;
            if (data.logged_in && data.role === 'customer') {
                const form = document.getElementById('bookingFormFull');
                if (form) {
                    const f = (name) => form.querySelector(`[name="${name}"]`);
                    if (data.name  && f('customer_name'))  f('customer_name').value  = data.name;
                    if (data.phone && f('customer_phone')) f('customer_phone').value = data.phone;
                    if (data.email && f('customer_email')) f('customer_email').value = data.email;
                }
                banner.innerHTML = `
                    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
                        <span style="font-size:0.83rem;color:#1e40af;"><i class="fas fa-user-check me-2"></i>Đã đăng nhập: <strong>${data.name || ''}</strong></span>
                        <button type="button" onclick="bookingAutoFillClick()"
                            style="background:linear-gradient(135deg,#3B82F6,#1E40AF);color:white;border:none;padding:5px 14px;border-radius:50px;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;">
                            <i class="fas fa-magic me-1"></i>Tự điền thông tin
                        </button>
                    </div>`;
            } else {
                banner.innerHTML = `
                    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;font-size:0.83rem;color:#92400e;">
                        <i class="fas fa-info-circle me-2"></i>
                        <a href="customer-login.html" style="color:#d97706;font-weight:600;text-decoration:none;">Đăng nhập</a>
                        để tự động điền tên, số điện thoại và email.
                    </div>`;
            }
        })
        .catch(() => {});
}

window.bookingAutoFillClick = function () {
    if (!_session?.logged_in) return;
    const form = document.getElementById('bookingFormFull');
    if (!form) return;
    const f = (name) => form.querySelector(`[name="${name}"]`);
    if (_session.name  && f('customer_name'))  f('customer_name').value  = _session.name;
    if (_session.phone && f('customer_phone')) f('customer_phone').value = _session.phone;
    if (_session.email && f('customer_email')) f('customer_email').value = _session.email;
};

function showAlert(msg, type) {
    const el = document.getElementById('bookingAlert');
    el.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">
        ${msg}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
}

function renderRelated(cars, currentId) {
    const related = cars.filter(c => c.id !== currentId).slice(0, 3);
    if (!related.length) return;
    document.getElementById('relatedSection').style.display = '';
    document.getElementById('relatedCars').innerHTML = related.map(car => `
        <div class="col-lg-4 col-md-6">
            <div class="card car-card h-100">
                <div class="position-relative">
                    <img src="assets/images/cars/${car.main_image}"
                         class="card-img-top car-card-img"
                         alt="${car.name}"
                         onerror="this.src='assets/images/cars/default.jpg'">
                    <span class="badge badge-status badge-available">Có sẵn</span>
                </div>
                <div class="card-body">
                    <h5 class="fw-bold mb-1">${car.name}</h5>
                    <p class="text-muted small mb-2">${car.brand} · ${car.seats} chỗ · ${car.transmission}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="car-price">${fmt(car.price_per_day)}đ/ngày</span>
                        <a href="car-detail.html?id=${car.id}" class="btn btn-gradient-secondary btn-sm">Chi tiết</a>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

// ===== INIT =====
(function init() {
    const params = new URLSearchParams(window.location.search);
    const carId = parseInt(params.get('id'));

    if (!carId) {
        document.getElementById('carContent').style.display = 'none';
        document.getElementById('carNotFound').style.display = '';
        return;
    }

    const car = STATIC_DATA.cars.find(c => c.id === carId);
    if (!car) {
        document.getElementById('carContent').style.display = 'none';
        document.getElementById('carNotFound').style.display = '';
        return;
    }

    updateSEO(car);
    renderCar(car);
    renderRelated(STATIC_DATA.cars, carId);
})();
}); // end STATIC_DATA_PROMISE.then
</script>
