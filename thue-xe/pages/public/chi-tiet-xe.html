<script>
// Load modal partial in background — không block việc hiển thị xe
const MODAL_PROMISE = fetch('partials/dat-lich-modal.html')

    .then(html => { document.getElementById('bookingModalContainer').outerHTML = html; })
    .catch(() => {});

STATIC_DATA_PROMISE.then(STATIC_DATA => {
const SITE_BASE = 'https://iuh-20039761-lebaophi.github.io/GlobalCare/thue-xe';
const fmt = n => new Intl.NumberFormat('vi-VN').format(n);
const today = () => new Date().toISOString().split('T')[0];

// selectedCarId: id của chiếc xe vật lý đang được chọn
let selectedCarId = null;
// _currentCarType: dùng làm fallback khi chiếc xe không có ảnh riêng
let _currentCarType = null;
// Dữ liệu đặt xe chờ xác nhận
let _pendingBooking = null;
let _galleryMode = 'image';
let _galleryVideoUrl = '';

function updateGalleryModeButtons(mode, hasVideo) {
    const imageBtn = document.getElementById('galleryModeImageBtn');
    const videoBtn = document.getElementById('galleryModeVideoBtn');
    if (!imageBtn || !videoBtn) return;

    imageBtn.classList.toggle('active', mode === 'image');
    imageBtn.setAttribute('aria-pressed', String(mode === 'image'));

    videoBtn.classList.toggle('active', mode === 'video');
    videoBtn.setAttribute('aria-pressed', String(mode === 'video'));
    videoBtn.disabled = !hasVideo;
}

window.setGalleryMode = function(mode) {
    const imgEl = document.getElementById('galleryMainImg');
    const videoEl = document.getElementById('galleryMainVideo');
    const thumbsWrap = document.getElementById('galleryThumbsWrap');
    if (!imgEl || !videoEl || !thumbsWrap) return;

    const hasVideo = !!_galleryVideoUrl;
    const targetMode = (mode === 'video' && hasVideo) ? 'video' : 'image';
    _galleryMode = targetMode;

    if (targetMode === 'video') {
        imgEl.style.display = 'none';
        imgEl.classList.remove('full-radius');
        thumbsWrap.classList.add('is-hidden');

        videoEl.style.display = 'block';
        videoEl.classList.add('full-radius');
        const sep = _galleryVideoUrl.includes('?') ? '&' : '?';
        videoEl.src = _galleryVideoUrl ? `${_galleryVideoUrl}${sep}autoplay=1&rel=0` : '';

        document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
    } else {
        videoEl.style.display = 'none';
        videoEl.classList.remove('full-radius');
        videoEl.src = '';

        imgEl.style.display = 'block';
        imgEl.classList.remove('full-radius');
        thumbsWrap.classList.remove('is-hidden');

        let activeThumb = document.querySelector('.gallery-thumb.active img');
        if (!activeThumb) {
            const frontThumb = document.querySelector('.gallery-thumb[data-angle="front"]');
            if (frontThumb) {
                frontThumb.classList.add('active');
                activeThumb = frontThumb.querySelector('img');
            }
        }
        if (activeThumb && activeThumb.getAttribute('src')) {
            imgEl.src = activeThumb.getAttribute('src');
        }
    }

    updateGalleryModeButtons(_galleryMode, hasVideo);
};

// Làm mới gallery khi chọn chiếc khác —
// ưu tiên car.images, fallback về _currentCarType.images
function refreshGallery(car) {
    const base = 'assets/images/cars/';
    const typeImgs = _currentCarType ? (_currentCarType.images || {}) : {};
    const carImgs  = (car && car.images) ? car.images : {};
    const resolve  = angle => carImgs[angle] || typeImgs[angle] || (_currentCarType && _currentCarType.main_image) || 'default.jpg';

    document.querySelectorAll('.gallery-thumb[data-angle]').forEach(thumb => {
        const angle  = thumb.dataset.angle;
        const newSrc = base + resolve(angle);
        const img = thumb.querySelector('img');
        if (img) { img.src = newSrc; img.onerror = () => { img.src = base + 'default.jpg'; }; }
        thumb.onclick = () => {
            setGalleryMode('image');
            gallerySwitch('img', newSrc, thumb);
        };
    });

    // Đổi main image nếu đang hiển thị ảnh (không phải video)
    const mainImg   = document.getElementById('galleryMainImg');
    const mainVideo = document.getElementById('galleryMainVideo');
    if (mainImg && mainVideo && _galleryMode === 'image') {
        mainImg.src = base + resolve('front');
        mainImg.onerror = () => { mainImg.src = base + 'thue-xe-xe-anh-mac-dinh-fallback.jpg'; };
        document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
        const frontThumb = document.querySelector('.gallery-thumb[data-angle="front"]');
        if (frontThumb) frontThumb.classList.add('active');
    }
}

// ===== Gallery =====
window.gallerySwitch = function(type, src, el) {
    const imgEl   = document.getElementById('galleryMainImg');
    const videoEl = document.getElementById('galleryMainVideo');
    if (type === 'video') {
        _galleryVideoUrl = src || _galleryVideoUrl;
        setGalleryMode('video');
    } else {
        setGalleryMode('image');
        imgEl.src = src;
        imgEl.onerror = () => { imgEl.src = 'assets/images/cars/thue-xe-xe-anh-mac-dinh-fallback.jpg'; };
    }
    document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
    if (el) el.classList.add('active');
};

function buildGalleryHtml(carType, hasAvailable, availCount) {
    const imgs = carType.images || {};
    const base = 'assets/images/cars/';
    const fallback = `onerror="this.src='${base}thue-xe-xe-anh-mac-dinh-fallback.jpg'"`;
    const thumbs = [
        { key: 'front',    label: 'Trước',    src: imgs.front    || carType.main_image },
        { key: 'back',     label: 'Sau',      src: imgs.back     || carType.main_image },
        { key: 'left',     label: 'Trái',     src: imgs.left     || carType.main_image },
        { key: 'right',    label: 'Phải',     src: imgs.right    || carType.main_image },
        { key: 'interior', label: 'Nội thất', src: imgs.interior || carType.main_image },
    ];
    const frontSrc = base + thumbs[0].src;

    const thumbsHtml = thumbs.map((t, i) => `
        <div class="gallery-thumb ${i === 0 ? 'active' : ''}" data-angle="${t.key}"
             onclick="gallerySwitch('img','${base + t.src}',this)" title="${t.label}">
            <img src="${base + t.src}" alt="${t.label}" ${fallback}>
            <div class="gallery-thumb-label">${t.label}</div>
        </div>`).join('');

    const badgeStyle = hasAvailable
        ? 'class="badge badge-status badge-available"'
        : 'class="badge badge-status" style="background:linear-gradient(135deg,#6c757d,#495057);"';

    return `
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="gallery-mode-toggle">
                    <button type="button" class="btn btn-outline-primary btn-sm active" id="galleryModeImageBtn" aria-pressed="true">Ảnh</button>
                    <button type="button" class="btn btn-outline-primary btn-sm" id="galleryModeVideoBtn" ${carType.video_url ? '' : 'disabled'} aria-pressed="false">Video</button>
                </div>
                <div class="position-relative">
                    <img id="galleryMainImg" class="gallery-main-img"
                         src="${frontSrc}" alt="${carType.name}" ${fallback}>
                    <iframe id="galleryMainVideo" class="gallery-main-video"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen></iframe>
                    <span ${badgeStyle} style="position:absolute;top:16px;right:16px;">
                        ${hasAvailable ? `Còn ${availCount} xe` : 'Hết xe'}
                    </span>
                </div>
                <div class="gallery-thumbs" id="galleryThumbsWrap">
                    ${thumbsHtml}
                </div>
            </div>
        </div>`;
}

// Cho phép click chọn chiếc xe từ danh sách
window.selectCarInstance = function(carId, el) {
    selectedCarId = carId;
    document.querySelectorAll('.car-instance-item').forEach(item => {
        item.classList.remove('border-primary', 'bg-primary', 'bg-opacity-5');
    });
    el.classList.add('border-primary', 'bg-primary', 'bg-opacity-5');
    const radio = el.querySelector('input[type="radio"]');
    if (radio) radio.checked = true;
    // Cập nhật gallery theo ảnh riêng của chiếc (nếu có), fallback về loại xe
    const car = (STATIC_DATA.cars || []).find(c => c.id === carId);
    refreshGallery(car);
};

// Build ADDON_PRICES from static-data.json services
const ADDON_PRICES = {};
(STATIC_DATA.services || []).forEach(svc => {
    ADDON_PRICES[svc.name] = { price: Number(svc.price), unit: svc.unit || 'chuyến' };
});

// Render addon checkboxes from static-data
function renderAddonServices() {
    const UNIT_LABELS = { 'ngày': '/ngày', 'chuyến': '/chuyến' };
    const services = STATIC_DATA.services || [];
    const container = document.getElementById('addonServiceList');
    if (!container) return;
    if (!services.length) {
        container.innerHTML = '<div class="col-12 text-muted small">Không có dịch vụ đi kèm</div>';
        return;
    }
    container.innerHTML = services.map(svc => `
        <div class="col-12 col-md-6">
            <label class="addon-service-card" for="svc_${svc.id}">
                <input class="addon-service-input" type="checkbox" name="addon_services"
                       value="${svc.name}" id="svc_${svc.id}">
                <span class="addon-service-shell">
                    <span class="addon-service-check" aria-hidden="true"><i class="fas fa-check"></i></span>
                    <span class="addon-service-main">
                        <span class="addon-service-top">
                            <span class="addon-service-name"><i class="fas fa-${svc.icon || 'circle-check'} text-primary me-1"></i>${svc.name}</span>
                            <span class="addon-service-price">+${fmt(svc.price)}đ${UNIT_LABELS[svc.unit] || ''}</span>
                        </span>
                        <small class="addon-service-desc">${svc.description || 'Dịch vụ bổ sung cho chuyến đi của bạn'}</small>
                    </span>
                </span>
            </label>
        </div>
    `).join('');
}

function recalcAddonSummary(pricePerDay) {
    const pickup = document.getElementById('pickupDate');
    const ret    = document.getElementById('returnDate');
    const days   = (pickup && ret && pickup.value && ret.value && ret.value > pickup.value)
        ? Math.max(1, Math.round((new Date(ret.value) - new Date(pickup.value)) / 86400000))
        : 0;
    const checked = [...document.querySelectorAll('input[name="addon_services"]:checked')];
    const summaryEl = document.getElementById('addonSummary');
    if (!summaryEl) return;
    if (!days && !checked.length) { summaryEl.style.display = 'none'; return; }
    const carTotal = days * pricePerDay;
    let addonTotal = 0, addonLines = '';
    checked.forEach(cb => {
        const info = ADDON_PRICES[cb.value];
        if (!info) return;
        const cost = info.unit === 'ngày' ? info.price * days : info.price;
        addonTotal += cost;
        addonLines += `<div class="d-flex justify-content-between mb-1">
            <span class="text-muted">${cb.value}:</span>
            <span>+${fmt(cost)}đ</span>
        </div>`;
    });
    document.getElementById('summaryCarPrice').textContent = fmt(carTotal) + 'đ';
    document.getElementById('summaryAddonList').innerHTML = addonLines;
    document.getElementById('summaryTotal').textContent = fmt(carTotal + addonTotal) + 'đ';
    summaryEl.style.display = 'block';
}

// ===== SEO =====
function updateSEO(carType, typeId) {
    const carUrl = `${SITE_BASE}/pages/public/chi-tiet-xe.html?type_id=${typeId}`;
    const carImg = `${SITE_BASE}/assets/images/cars/${carType.main_image}`;
    const title = `${carType.name} – Thuê Xe Toàn Quốc | ${fmt(carType.price_per_day)}đ/ngày`;
    const desc = `Thuê ${carType.name} tại Thuê Xe trên toàn quốc. ${carType.seats} chỗ, ${carType.transmission}, ${carType.fuel_type}. Giá ${fmt(carType.price_per_day)}đ/ngày. Giao xe tận nơi, bảo hiểm đầy đủ.`;
    const keys = `thuê ${carType.name.toLowerCase()}, thuê ${carType.brand.toLowerCase()} toàn quốc, car rental nationwide`;

    document.title = title;
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('metaDesc').setAttribute('content', desc);
    document.getElementById('metaKeys').setAttribute('content', keys);
    document.getElementById('metaCanonical').href = carUrl;
    document.getElementById('ogUrl').setAttribute('content', carUrl);
    document.getElementById('ogTitle').setAttribute('content', title);
    document.getElementById('ogDesc').setAttribute('content', desc);
    document.getElementById('ogImage').setAttribute('content', carImg);
    document.getElementById('twTitle').setAttribute('content', title);
    document.getElementById('twDesc').setAttribute('content', desc);
    document.getElementById('twImage').setAttribute('content', carImg);

    document.querySelectorAll('script[type="application/ld+json"]').forEach(s => {
        try {
            const d = JSON.parse(s.textContent);
            if (d['@type'] === 'BreadcrumbList') {
                d.itemListElement[1].name = carType.name;
                d.itemListElement[1].item = carUrl;
                s.textContent = JSON.stringify(d);
            }
        } catch {}
    });

    document.getElementById('carSchema').textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Product",
        "name": carType.name,
        "description": carType.description,
        "image": carImg,
        "brand": { "@type": "Brand", "name": carType.brand },
        "offers": {
            "@type": "Offer",
            "priceCurrency": "VND",
            "price": carType.price_per_day,
            "priceSpecification": { "@type": "UnitPriceSpecification", "unitText": "Ngày" },
            "availability": "https://schema.org/InStock",
            "seller": { "@type": "Organization", "name": "Thuê Xe" }
        }
    }, null, 2);
}

// ===== Render =====
function renderCarDetail(carType, availableCars) {
    // Khởi tạo selectedCarId = chiếc đầu tiên (nếu có)
    selectedCarId   = availableCars.length > 0 ? availableCars[0].id : null;
    _currentCarType = carType;  // lưu để refreshGallery dùng làm fallback
    const hasAvailable = availableCars.length > 0;

    const features = carType.features ? carType.features.split(',') : [];

    // Section chọn chiếc xe cụ thể
    const carSelectionHtml = hasAvailable

                    <hr />

                                <span class="fw-bold">${carType.year || '—'}</span>

                        <div class="col-6 col-md-4">
                            <div class="p-3 bg-light rounded h-100">
                                <small class="text-muted d-block mb-1"><i class="fas fa-check-circle me-1 text-success"></i>Xe khả dụng</small>
                                <span class="fw-bold ${hasAvailable ? 'text-success' : 'text-danger'}">${availableCars.length} chiếc</span>
                            </div>
                        </div>
                    </div>

                    <hr />
                    <h5 class="fw-bold mb-2">Mô Tả</h5>
                    <p class="text-muted">${carType.description}</p>

                    ${features.length > 0 ? `
                    <hr />
                    <h5 class="fw-bold mb-3">Tính Năng</h5>
                    <div class="row g-2">
                        ${features.map(f => `

                                <i class="fas fa-check-circle text-success me-2"></i><span>${f.trim()}</span>

                </div>
            </div>

            <!-- Chọn chiếc xe -->
            ${carSelectionHtml}
        </div>

        <div class="col-lg-4">
            <!-- Booking sidebar -->
            <div class="card border-0 shadow-sm sticky-top" style="top:90px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Đặt Xe Ngay</h5>
                    <div class="mb-3 p-3 bg-light rounded">
                        <h6 class="fw-bold mb-1">${carType.name}</h6>
                        <p class="mb-0 text-primary fw-bold">${fmt(carType.price_per_day)}đ <small class="text-muted">/ ngày</small></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ngày nhận xe *</label>
                        <input type="date" class="form-control" id="pickupDate" min="${today()}" ${!hasAvailable ? 'disabled' : ''} />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ngày trả xe *</label>
                        <input type="date" class="form-control" id="returnDate" min="${today()}" ${!hasAvailable ? 'disabled' : ''} />
                    </div>

                    <div id="priceCalc" class="mb-3 p-3 bg-light rounded" style="display:none;">
                        <div class="d-flex justify-content-between mb-1">
                            <span>Số ngày:</span><strong id="totalDays">0</strong>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Tổng tiền:</span><strong class="text-primary" id="totalPrice">0đ</strong>
                        </div>
                    </div>

                    ${bookingBtnHtml}

                    <hr />
                    <div class="text-center">
                        <p class="mb-1"><i class="fas fa-phone text-primary me-2"></i><strong>0775 472 347</strong></p>
                        <small class="text-muted">Hỗ trợ 24/7</small>
                    </div>
                </div>
            </div>
        </div>
    `;

    _galleryVideoUrl = carType.video_url || '';
    _galleryMode = 'image';

    const imageModeBtn = document.getElementById('galleryModeImageBtn');
    const videoModeBtn = document.getElementById('galleryModeVideoBtn');
    if (imageModeBtn) imageModeBtn.addEventListener('click', () => setGalleryMode('image'));
    if (videoModeBtn) videoModeBtn.addEventListener('click', () => setGalleryMode('video'));
    setGalleryMode('image');

    if (!hasAvailable) return; // Không cần setup date/booking nếu hết xe

    // Date calculation
    const pickup = document.getElementById('pickupDate');
    const ret = document.getElementById('returnDate');
    const calcPrice = () => {
        if (pickup.value && ret.value) {
            const d = Math.max(1, Math.round((new Date(ret.value) - new Date(pickup.value)) / 86400000));
            document.getElementById('totalDays').textContent = d + ' ngày';
            document.getElementById('totalPrice').textContent = fmt(d * carType.price_per_day) + 'đ';
            document.getElementById('priceCalc').style.display = 'block';
            ret.min = pickup.value;
        }
    };
    pickup.addEventListener('change', () => { calcPrice(); recalcAddonSummary(carType.price_per_day); });
    ret.addEventListener('change', () => { calcPrice(); recalcAddonSummary(carType.price_per_day); });

    // Addon services + booking form — chờ modal load xong mới setup
    MODAL_PROMISE.then(() => {
        renderAddonServices();
        document.querySelectorAll('input[name="addon_services"]').forEach(cb => {
            cb.addEventListener('change', () => recalcAddonSummary(carType.price_per_day));
        });
        const bookingModalEl = document.getElementById('bookingModal');
        if (bookingModalEl) {
            bookingModalEl.addEventListener('show.bs.modal', () => {
                recalcAddonSummary(carType.price_per_day);
                bookingAutoFill();
            });
        }
        const bookingFormEl = document.getElementById('bookingFormFull');
        if (bookingFormEl) bookingFormEl.addEventListener('submit', e => {
            e.preventDefault();
            if (!pickup.value || !ret.value) {
                showAlert('Vui lòng chọn ngày nhận và trả xe!', 'danger');
                return;
            }
            if (!selectedCarId) {
                showAlert('Vui lòng chọn chiếc xe cụ thể!', 'danger');
                return;
            }

            const form = e.target;
            const phone    = form.querySelector('[name="customer_phone"]').value.trim();
            const email    = form.querySelector('[name="customer_email"]').value.trim();
            const idNumber = form.querySelector('[name="id_number"]').value.trim();

            if (!/^0[3-9][0-9]{8}$/.test(phone)) {
                showAlert('Số điện thoại không hợp lệ! Vui lòng nhập 10 chữ số bắt đầu bằng 03x / 05x / 07x / 08x / 09x.', 'danger');
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showAlert('Email không hợp lệ!', 'danger');
                return;
            }
            if (idNumber && !/^[0-9]{9}$|^[0-9]{12}$/.test(idNumber)) {
                showAlert('CMND/CCCD không hợp lệ! Phải gồm 9 hoặc 12 chữ số.', 'danger');
                return;
            }

            const pickupTime = document.getElementById('pickupTime')?.value || '08:00';
            const returnTime = document.getElementById('returnTime')?.value || '08:00';
            if (ret.value < pickup.value || (ret.value === pickup.value && returnTime <= pickupTime)) {
                showAlert('Thời gian trả xe phải sau thời gian nhận xe!', 'danger');
                return;
            }

            const days = Math.max(1, Math.round((new Date(ret.value) - new Date(pickup.value)) / 86400000));
            const addonServices = [...document.querySelectorAll('input[name="addon_services"]:checked')].map(cb => cb.value);
            const addonTotal = addonServices.reduce((sum, name) => {
                const info = ADDON_PRICES[name];
                if (!info) return sum;
                return sum + (info.unit === 'ngày' ? info.price * days : info.price);
            }, 0);
            const rentalCost = days * carType.price_per_day;
            const totalPrice = rentalCost + addonTotal;
            const selectedCar = (STATIC_DATA.cars || []).find(c => c.id === selectedCarId);
            const frontImage = (selectedCar && selectedCar.images && selectedCar.images.front)
                || (carType.images && carType.images.front)
                || carType.main_image
                || 'thue-xe-xe-anh-mac-dinh-fallback.jpg';

            _pendingBooking = {
                car_id:           selectedCarId,
                type_id:          carType.id,
                car_name:         carType.name,
                license_plate:    selectedCar ? selectedCar.license_plate : '',
                car_front_image:  `assets/images/cars/${frontImage}`,
                customer_name:    form.querySelector('[name="customer_name"]').value.trim(),
                customer_phone:   phone,
                customer_email:   email,
                id_number:        idNumber,
                customer_address: form.querySelector('[name="customer_address"]')?.value.trim() || '',
                pickup_date:      pickup.value,
                return_date:      ret.value,
                pickup_time:      pickupTime,
                return_time:      returnTime,
                notes:            form.querySelector('[name="notes"]')?.value.trim() || '',
                addon_services:   addonServices,
                addon_total:      addonTotal,
                price_per_day:    carType.price_per_day,
                _days:            days,
                _totalPrice:      totalPrice,
            };

            // Điền vào bảng xác nhận
            document.getElementById('tx-cf-name').textContent  = _pendingBooking.customer_name;
            document.getElementById('tx-cf-phone').textContent = phone;
            document.getElementById('tx-cf-email').textContent = email;

            const idRow = document.getElementById('tx-cf-id-row');
            if (idNumber) { document.getElementById('tx-cf-id').textContent = idNumber; idRow.style.display = ''; }
            else idRow.style.display = 'none';

            const addressRow = document.getElementById('tx-cf-address-row');
            const addressEl = document.getElementById('tx-cf-address');
            if (addressRow && addressEl) {
                if (_pendingBooking.customer_address) {
                    addressEl.textContent = _pendingBooking.customer_address;
                    addressRow.style.display = '';
                } else {
                    addressRow.style.display = 'none';
                }
            }

            const carFrontRow = document.getElementById('tx-cf-car-front-row');
            const carFrontImg = document.getElementById('tx-cf-car-front-img');
            if (_pendingBooking.car_front_image && carFrontRow && carFrontImg) {
                carFrontImg.src = _pendingBooking.car_front_image;
                carFrontImg.alt = `Ảnh phía trước ${carType.name}`;
                carFrontImg.onerror = () => {
                    carFrontImg.src = 'assets/images/cars/thue-xe-xe-anh-mac-dinh-fallback.jpg';
                };
                carFrontRow.style.display = '';
            } else if (carFrontRow) {
                carFrontRow.style.display = 'none';
            }

            document.getElementById('tx-cf-pickup').textContent = `${pickup.value.split('-').reverse().join('/')} ${pickupTime}`;
            document.getElementById('tx-cf-return').textContent = `${ret.value.split('-').reverse().join('/')} ${returnTime}`;
            document.getElementById('tx-cf-days').textContent   = `${days} ngày`;
            document.getElementById('tx-cf-price-day').textContent = `${fmt(carType.price_per_day)}đ/ngày`;
            document.getElementById('tx-cf-rental-cost').textContent = `${fmt(rentalCost)}đ`;

            const addonCostRow = document.getElementById('tx-cf-addon-cost-row');
            const addonCostEl = document.getElementById('tx-cf-addon-cost');
            if (addonCostRow && addonCostEl) {
                addonCostEl.textContent = `+${fmt(addonTotal)}đ`;
                addonCostRow.style.display = '';
            }

            const summaryRow = document.getElementById('tx-cf-summary-row');
            const summaryEl = document.getElementById('tx-cf-summary');
            if (summaryRow && summaryEl) {
                const addonText = addonServices.length
                    ? addonServices.join(', ')
                    : 'Không có dịch vụ đi kèm';
                summaryEl.innerHTML = `
                    <div style="text-align:right;line-height:1.45;">
                        <div>Giá thuê xe ${days} ngày (${fmt(carType.price_per_day)}đ/ngày)</div>
                        <div>Dịch vụ đi kèm: ${addonText}</div>
                    </div>`;
                summaryRow.style.display = '';
            }

            const addonRow = document.getElementById('tx-cf-addon-row');
            if (addonServices.length) {
                const addonDetailHtml = addonServices.map(name => {
                    const info = ADDON_PRICES[name];
                    if (!info) return '';
                    const itemCost = info.unit === 'ngày' ? info.price * days : info.price;
                    const unitText = info.unit === 'ngày'
                        ? `${fmt(info.price)}đ/ngày × ${days} ngày`
                        : `${fmt(info.price)}đ/chuyến`;
                    return `<div style="margin-bottom:4px;"><strong>${name}</strong><br><small class="text-muted">${unitText}</small> <span style="font-weight:700;">(+${fmt(itemCost)}đ)</span></div>`;
                }).join('');
                document.getElementById('tx-cf-addon').innerHTML = addonDetailHtml;
                addonRow.style.display = '';
            }
            else addonRow.style.display = 'none';

            const totalRow = document.getElementById('tx-cf-total-row');
            document.getElementById('tx-cf-total').innerHTML = `${fmt(totalPrice)}đ<small class="d-block text-muted" style="font-weight:500;">= ${fmt(rentalCost)}đ + ${fmt(addonTotal)}đ</small>`;
            totalRow.style.display = '';

            const noteRow = document.getElementById('tx-cf-note-row');
            if (_pendingBooking.notes) { document.getElementById('tx-cf-note').textContent = _pendingBooking.notes; noteRow.style.display = ''; }
            else noteRow.style.display = 'none';

            document.getElementById('tx-cf-media-row').style.display = 'none';

            // Chuyển sang màn hình xác nhận
            document.getElementById('bookingFormFull').style.display  = 'none';
            document.getElementById('addonSummary').style.display     = 'none';
            document.getElementById('txBookingConfirm').style.display = '';
        }); // end bookingFormEl submit

        // Nút quay lại
        const backBtn = document.getElementById('txConfirmBackBtn');
        if (backBtn) backBtn.addEventListener('click', () => {
            document.getElementById('txBookingConfirm').style.display = 'none';
            document.getElementById('bookingFormFull').style.display  = '';
            _pendingBooking = null;
        });

        // Nút xác nhận thực sự gửi đặt xe
        const confirmBtn = document.getElementById('txConfirmSubmitBtn');
        if (confirmBtn) confirmBtn.addEventListener('click', async () => {
            if (!_pendingBooking) return;
            confirmBtn.disabled  = true;
            confirmBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';

            const resetBtn = () => {
                confirmBtn.disabled  = false;
                confirmBtn.innerHTML = '<i class="fas fa-check me-2"></i> Xác nhận đặt xe';
            };

            const { _days: days, _totalPrice: totalPrice, ...bookingData } = _pendingBooking;
            const addonLines = bookingData.addon_services.length
                ? `<br><strong>Dịch vụ đi kèm:</strong> ${bookingData.addon_services.join(', ')}`
                : '';
            const selectedCar = (STATIC_DATA.cars || []).find(c => c.id === bookingData.car_id);
            const IS_LOCAL = ['localhost', '127.0.0.1', ''].includes(window.location.hostname);

            if (IS_LOCAL) {
                try {
                    const res = await fetch('controllers/booking-controller.php?action=create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bookingData)
                    });
                    const result = await res.json();
                    document.getElementById('txBookingConfirm').style.display = 'none';
                    document.getElementById('bookingFormFull').style.display  = '';
                    if (result.success) {
                        showAlert(`
                            <i class="fas fa-check-circle me-2"></i>
                            <strong>Đặt xe thành công!</strong><br>
                            Mã đơn: <strong>#${result.booking_id}</strong> – Xe: <strong>${bookingData.car_name}</strong>
                            ${selectedCar ? ` (${selectedCar.license_plate})` : ''}.
                            ${addonLines}
                            <br><strong>Tổng tiền: ${fmt(totalPrice)}đ</strong><br>
                            Chúng tôi sẽ liên hệ xác nhận trong thời gian sớm nhất.
                        `, 'success');
                        document.getElementById('bookingFormFull').reset();
                    } else {
                        showAlert(`<i class="fas fa-times-circle me-2"></i><strong>Lỗi:</strong> ${result.message || 'Gửi đặt xe thất bại. Vui lòng thử lại!'}`, 'danger');
                    }
                } catch (err) {
                    document.getElementById('txBookingConfirm').style.display = 'none';
                    document.getElementById('bookingFormFull').style.display  = '';
                    showAlert('<i class="fas fa-times-circle me-2"></i>Không thể kết nối đến server! Vui lòng kiểm tra XAMPP đang chạy và thử lại.', 'danger');
                }
            } else {
                await new Promise(r => setTimeout(r, 600));
                document.getElementById('txBookingConfirm').style.display = 'none';
                document.getElementById('bookingFormFull').style.display  = '';
                showAlert(`
                    <i class="fas fa-check-circle me-2"></i>
                    <strong>Đặt xe thành công! (Demo)</strong><br>
                    Cảm ơn bạn đã quan tâm đến <strong>${bookingData.car_name}</strong>
                    ${selectedCar ? ` – BKS <strong>${selectedCar.license_plate}</strong>` : ''}.
                    ${addonLines}
                    <br><strong>Tổng tiền ước tính: ${fmt(totalPrice)}đ</strong><br>
                    Để hoàn tất, vui lòng gọi hotline <strong>0775 472 347</strong> – hỗ trợ 24/7.
                `, 'success');
            }

            _pendingBooking = null;
            resetBtn();
        }); // end confirmBtn click
    }); // end MODAL_PROMISE.then
}

let _session = null;
function bookingAutoFill() {
    fetch('controllers/check-session.php')
        .then(r => r.json())
        .then(data => {
            _session = data;
            const banner = document.getElementById('bookingAuthBanner');
            if (!banner) return;
            if (data.logged_in && data.role === 'customer') {
                const form = document.getElementById('bookingFormFull');
                if (form) {
                    const f = (name) => form.querySelector(`[name="${name}"]`);
                    if (data.name  && f('customer_name'))  f('customer_name').value  = data.name;
                    if (data.phone && f('customer_phone')) f('customer_phone').value = data.phone;
                    if (data.email && f('customer_email')) f('customer_email').value = data.email;
                }
                banner.innerHTML = `
                    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
                        <span style="font-size:0.83rem;color:#1e40af;"><i class="fas fa-user-check me-2"></i>Đã đăng nhập: <strong>${data.name || ''}</strong></span>
                        <button type="button" onclick="bookingAutoFillClick()"
                            style="background:linear-gradient(135deg,#3B82F6,#1E40AF);color:white;border:none;padding:5px 14px;border-radius:50px;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;">
                            <i class="fas fa-magic me-1"></i>Tự điền thông tin
                        </button>
                    </div>`;
            } else {
                banner.innerHTML = `
                    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;font-size:0.83rem;color:#92400e;">
                        <i class="fas fa-info-circle me-2"></i>
                        <a href="pages/customer/dang-nhap.html" style="color:#d97706;font-weight:600;text-decoration:none;">Đăng nhập</a>
                        để tự động điền tên, số điện thoại và email.
                    </div>`;
            }
        })
        .catch(() => {});
}

window.bookingAutoFillClick = function () {
    if (!_session?.logged_in) return;
    const form = document.getElementById('bookingFormFull');
    if (!form) return;
    const f = (name) => form.querySelector(`[name="${name}"]`);
    if (_session.name  && f('customer_name'))  f('customer_name').value  = _session.name;
    if (_session.phone && f('customer_phone')) f('customer_phone').value = _session.phone;
    if (_session.email && f('customer_email')) f('customer_email').value = _session.email;
};

function showAlert(msg, type) {
    const el = document.getElementById('bookingAlert');
    if (!el) return;
    el.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">
        ${msg}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
}

function renderRelated(carTypes, cars, currentTypeId) {
    const related = carTypes.filter(t => t.id !== currentTypeId).slice(0, 3);
    if (!related.length) return;
    document.getElementById('relatedSection').style.display = '';
    document.getElementById('relatedCars').innerHTML = related.map(type => {
        const avail = cars.filter(c => c.type_id === type.id && c.status === 'available').length;
        return `
        <div class="col-lg-4 col-md-6">
            <div class="card car-card h-100">
                <div class="position-relative">
                    <img src="assets/images/cars/${type.main_image}"
                         class="card-img-top car-card-img"
                         alt="${type.name}"
                         onerror="this.src='assets/images/cars/thue-xe-xe-anh-mac-dinh-fallback.jpg'">
                    ${avail > 0
                        ? `<span class="badge badge-status badge-available">Còn ${avail} xe</span>`
                        : `<span class="badge badge-status" style="background:linear-gradient(135deg,#6c757d,#495057);">Hết xe</span>`}
                </div>
                <div class="card-body">
                    <h5 class="fw-bold mb-1">${type.name}</h5>
                    <p class="text-muted small mb-2">${type.brand} · ${type.seats} chỗ · ${type.transmission}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="car-price">${fmt(type.price_per_day)}đ/ngày</span>
                        <a href="pages/public/chi-tiet-xe.html?type_id=${type.id}" class="btn btn-gradient-secondary btn-sm">Chi tiết</a>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ===== INIT =====
(function init() {
    const params = new URLSearchParams(window.location.search);
    // Nhận type_id, hoặc backward-compat với id cũ (id cũ == type_id trong dataset này)
    let typeId = parseInt(params.get('type_id')) || parseInt(params.get('id'));

    if (!typeId) {
        document.getElementById('carContent').style.display = 'none';
        document.getElementById('carNotFound').style.display = '';
        return;
    }

    const carType = (STATIC_DATA.car_types || []).find(t => t.id === typeId);
    if (!carType) {
        document.getElementById('carContent').style.display = 'none';
        document.getElementById('carNotFound').style.display = '';
        return;
    }

    const availableCars = (STATIC_DATA.cars || []).filter(c => c.type_id === typeId && c.status === 'available');

    updateSEO(carType, typeId);
    renderCarDetail(carType, availableCars);
    renderRelated(STATIC_DATA.car_types || [], STATIC_DATA.cars || [], typeId);
})();
}); // end STATIC_DATA_PROMISE.then
</script>
