<div class="card border-0 shadow-sm" style="border-radius: 16px;">
    <div class="card-header bg-white py-4 border-0 d-flex justify-content-between align-items-center">
        <div>
            <h5 class="fw-800 mb-1">Phê duyệt xe hệ thống</h5>
            <p class="text-muted small mb-0">Quản lý các phương tiện được đăng ký bởi đối tác</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="loadPendingCars()">
                <i class="fas fa-sync-alt me-1"></i> Làm mới
            </button>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="bg-light text-muted small uppercase">
                    <tr>
                        <th class="ps-4">Nhà cung cấp</th>
                        <th>Phương tiện</th>
                        <th>Biển số</th>
                        <th>Giá niêm yết</th>
                        <th>Trạng thái</th>
                        <th class="pe-4 text-end">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="adminCarListBody">
                    <tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                </tbody>
            </table>
        </div>
        <div id="adminEmptyCar" class="text-center py-5 d-none">
            <i class="fas fa-check-circle fa-3x text-success mb-3 opacity-20"></i>
            <p class="text-muted">Không có xe nào đang chờ duyệt.</p>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    const TABLE = 'xethue';

    window.loadPendingCars = async function() {
        const tbody = document.getElementById('adminCarListBody');
        const empty = document.getElementById('adminEmptyCar');
        if (!tbody) return;

        try {
            const cars = await DVQTKrud.listTable(TABLE, { limit: 1000 });
            if (!cars || !cars.length) {
                tbody.innerHTML = '';
                empty.classList.remove('d-none');
                return;
            }

            // Hiển thị tất cả xe, ưu tiên xe pending lên đầu
            const sortedCars = [...cars].sort((a,b) => (a.trangthai === 'pending' ? -1 : 1));
            empty.classList.add('d-none');

            tbody.innerHTML = sortedCars.map(c => {
                let statusBadge = '';
                switch(c.trangthai) {
                    case 'pending': statusBadge = '<span class="badge bg-warning text-warning bg-opacity-10">Chờ duyệt</span>'; break;
                    case 'approved': statusBadge = '<span class="badge bg-success text-success bg-opacity-10">Đã duyệt</span>'; break;
                    case 'rejected': statusBadge = '<span class="badge bg-danger text-danger bg-opacity-10">Từ chối</span>'; break;
                    default: statusBadge = '<span class="badge bg-secondary text-secondary bg-opacity-10">N/A</span>';
                }

                const actionBtns = c.trangthai === 'pending' ? `
                    <button class="btn btn-sm btn-success rounded-pill px-3 me-1" onclick="updateCarStatus(${c.id}, 'approved')">Duyệt</button>
                    <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="updateCarStatus(${c.id}, 'rejected')">Từ chối</button>
                ` : `
                    <button class="btn btn-sm btn-light" onclick="deleteCarAdmin(${c.id})"><i class="fas fa-trash"></i></button>
                `;

                return `<tr>
                    <td class="ps-4">
                        <div class="fw-bold text-dark">Đối tác #${c.provider_id}</div>
                        <div class="small text-muted">ID: ${c.provider_id}</div>
                    </td>
                    <td>
                        <div class="fw-600 text-dark">${c.tenxe}</div>
                        <div class="small text-muted">${c.hangxe}</div>
                    </td>
                    <td>
                        <div class="badge bg-light text-dark border mb-1">${c.bienso}</div>
                        <div class="text-muted" style="font-size: 10px; line-height: 1.2;">
                            SK: ${c.sokhung || 'N/A'}<br>SM: ${c.somay || 'N/A'}
                        </div>
                    </td>
                    <td class="fw-bold">${Number(c.giathue).toLocaleString()}đ</td>
                    <td>${statusBadge}</td>
                    <td class="pe-4 text-end">${actionBtns}</td>
                </tr>`;
            }).join('');
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-danger">Lỗi kết nối database</td></tr>';
        }
    };

    window.updateCarStatus = async function(id, status) {
        try {
            await DVQTKrud.updateRow(TABLE, id, { trangthai: status });
            Swal.fire('Thành công', 'Đã cập nhật trạng thái xe.', 'success');
            loadPendingCars();
        } catch (e) {
            Swal.fire('Lỗi', 'Không thể cập nhật.', 'error');
        }
    };

    window.deleteCarAdmin = async function(id) {
         if (confirm('Chắc chắn muốn xóa xe này khỏi hệ thống?')) {
             await DVQTKrud.deleteRow(TABLE, id);
             loadPendingCars();
         }
    };

    loadPendingCars();
})();
</script>
