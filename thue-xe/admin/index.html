<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Thuê Xe | Quản trị hệ thống</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --sidebar-bg: #111827;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; font-size: 14px; }

        .sidebar { width: 280px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-header { padding: 32px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand-name { font-weight: 800; font-size: 1.4rem; color: var(--primary); }

        .nav-group { padding: 20px 0; flex: 1; }
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: #94a3b8; text-decoration: none; 
            transition: 0.2s; margin: 2px 16px; border-radius: 10px;
        }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--primary); color: #fff; font-weight: 600; }

        .main-wrapper { flex: 1; margin-left: 280px; }
        .top-bar { 
            height: 70px; background: #fff; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 32px; border-bottom: 1px solid var(--border);
        }
        .user-pill { display: flex; align-items: center; gap: 10px; padding: 6px 16px; background: #f8fafc; border: 1px solid var(--border); border-radius: 50px; }
        .user-avatar { width: 32px; height: 32px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        
        .content-area { padding: 32px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="d-flex align-items-center gap-3">
                <div style="width:40px;height:40px;background:white;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
                    <img src="../assets/images/thue-xe-logo-header-navigation.jpg" alt="Logo" style="width:100%;height:100%;object-fit:cover;">
                </div>
                <div class="brand-name">ADMIN</div>
            </div>
        </div>
        <div class="nav-group" id="sidebarNav">
            <a href="#" class="nav-link" data-page="dashboard">
                <i class="fas fa-chart-pie"></i><span>Tổng quan</span>
            </a>
            <a href="#" class="nav-link" data-page="duyet-xe">
                <i class="fas fa-check-circle"></i><span>Phê duyệt xe</span>
            </a>
            <a href="#" class="nav-link" data-page="quan-ly-xe">
                <i class="fas fa-car-side"></i><span>Quản lý xe toàn sàn</span>
            </a>
            <a href="#" class="nav-item nav-link" data-page="quan-ly-don">
                <i class="fas fa-file-invoice-dollar"></i><span>Quản lý đơn thuê</span>
            </a>
            <hr class="mx-3 opacity-10">
            <a href="../index.html" class="nav-link">
                <i class="fas fa-arrow-left"></i><span>Về cửa hàng</span>
            </a>
            <a href="#" id="shellLogoutBtn" class="nav-link text-danger">
                <i class="fas fa-sign-out-alt"></i><span>Đăng xuất</span>
            </a>
        </div>
    </aside>

    <main class="main-wrapper">
        <header class="top-bar">
            <h5 class="mb-0 fw-bold" id="pageTitleDisplay">Dashboard</h5>
            <div class="user-pill">
                <div class="user-avatar" id="userAvatar">A</div>
                <span class="fw-600" id="adminUsernameDisplay">Administrator</span>
            </div>
        </header>
        <div class="content-area" id="pageContent">
             <!-- Dynamic content -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../public/asset/js/dvqt-app.js"></script>
    <script src="../assets/js/shared/shell.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ThueXeShell.init('admin', 'dashboard');
        });
    </script>
</body>
</html>
