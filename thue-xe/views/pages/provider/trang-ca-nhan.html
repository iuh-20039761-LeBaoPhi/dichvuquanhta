<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đối tác Thuê Xe | Quản lý kinh doanh</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-soft: rgba(59, 130, 246, 0.1);
            --bg: #f8fafc;
            --sidebar-bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; font-size: 14px; overflow-x: hidden; }

        /* ================= SIDEBAR ================= */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; height: 100vh; z-index: 1000; transition: 0.3s; }
        .sidebar-header { padding: 32px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand-box { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-box { width: 42px; height: 42px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; line-height: 1; }
        .brand-tag { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        .nav-group { padding: 20px 0; flex: 1; }
        .nav-label { padding: 0 24px; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: #94a3b8; text-decoration: none; 
            transition: 0.2s; margin: 2px 16px; border-radius: 10px;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--primary); color: #fff; font-weight: 600; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .nav-link i { font-size: 1.1rem; width: 20px; text-align: center; }

        .logout-area { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .logout-btn { 
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
            color: #f87171; text-decoration: none; border-radius: 10px; transition: 0.2s; font-weight: 600;
        }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1); }

        /* ================= MAIN WRAPPER ================= */
        .main-wrapper { flex: 1; margin-left: 280px; min-width:0; display: flex; flex-direction: column; }
        .top-bar { 
            height: 70px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 32px; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 900;
        }
        .page-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }

        .user-pill { 
            display: flex; align-items: center; gap: 10px; padding: 5px 12px 5px 5px; 
            background: #fff; border: 1px solid var(--border); border-radius: 50px; cursor: default;
        }
        .user-avatar { 
            width: 32px; height: 32px; background: var(--primary); color: #fff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
        }
        .user-info { display: flex; flex-direction: column; line-height: 1.2; }
        .user-name { font-size: 13px; font-weight: 700; color: var(--text-main); }
        .user-tag { font-size: 10px; color: var(--text-sub); font-weight: 600; text-transform: uppercase; }

        .content-area { padding: 32px; flex: 1; }

        @media (max-width: 1100px) {
            .sidebar { width: 80px; }
            .sidebar .brand-name, .sidebar .brand-tag, .sidebar .nav-link span, .sidebar .nav-label { display: none; }
            .sidebar .nav-link { justify-content: center; margin: 4px 10px; padding: 12px 0; }
            .sidebar .brand-box { justify-content: center; }
            .main-wrapper { margin-left: 80px; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; }
            .sidebar.mobile-open { transform: translateX(0); }
            .main-wrapper { margin-left: 0; }
            .top-bar { padding: 0 20px; }
            .content-area { padding: 20px; }
        }

        /* Mobile overlay */
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        /* Small mobile */
        @media (max-width: 480px) {
            .content-area { padding: 12px; }
            .page-title { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="../../../index.html" class="brand-box">
                <div class="logo-box">
                    <img src="../../../assets/images/thue-xe-logo-header-navigation.jpg" alt="Logo">
                </div>
                <div>
                    <div class="brand-name">Thuê Xe</div>
                    <div class="brand-tag">Đối tác kinh doanh</div>
                </div>
            </a>
        </div>

        <div class="nav-group" id="sidebarNav">
            <div class="nav-label">Quản trị</div>
            <a href="#" class="nav-link" data-page="dashboard">
                <i class="fa-solid fa-chart-line"></i>
                <span>Tổng quan</span>
            </a>
            <a href="#" class="nav-link" data-page="quan-ly-don">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Quản lý đơn thuê</span>
                <span class="badge bg-danger ms-auto rounded-pill" id="newOrderCount" style="display:none; font-size:9px;">0</span>
            </a>
            <a href="#" class="nav-link" data-page="quan-ly-xe">
                <i class="fa-solid fa-car-side"></i>
                <span>Danh mục xe cho thuê</span>
            </a>

            <div class="nav-label" style="margin-top:24px;">Hệ thống</div>
            <a href="#" class="nav-link" data-page="tai-khoan">
                <i class="fa-solid fa-user-circle"></i>
                <span>Thông tin đối tác</span>
            </a>
            <a href="../../../index.html" class="nav-link">
                <i class="fa-solid fa-house"></i>
                <span>Trang chủ Thuê Xe</span>
            </a>
        </div>

        <div class="logout-area">
            <a href="#" id="shellLogoutBtn" class="logout-btn">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Đăng xuất</span>
            </a>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <main class="main-wrapper">
        <header class="top-bar">
            <div class="d-flex align-items-center gap-3">
                <button class="btn d-md-none p-0 text-dark" onclick="toggleSidebar()"><i class="fas fa-bars fa-lg"></i></button>
                <h1 class="page-title" id="pageTitleDisplay">Bảng điều khiển</h1>
            </div>
            
            <div class="user-pill">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <span class="user-name" id="adminUsernameDisplay">Đối tác</span>
                    <span class="user-tag">Partner</span>
                </div>
            </div>
        </header>

        <div class="content-area" id="pageContent">
            <!-- Dynamic Content -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary mb-3"></div>
                <p class="text-muted fw-500">Đang khởi tạo hệ thống quản trị...</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../public/asset/js/dvqt-krud.js"></script>
    <script src="../../../../public/asset/js/dvqt-app.js"></script>
    <script src="../../../assets/js/shared/shell.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            ThueXeShell.init('provider', 'dashboard');
        });
    </script>
</body>
</html>
