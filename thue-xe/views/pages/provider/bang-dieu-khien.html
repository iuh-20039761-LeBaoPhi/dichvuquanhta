        .table { margin: 0; }

        .btn-action { padding: 4px 14px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; font-family: 'Poppins', sans-serif; }

        .btn-detail:hover { border-color: var(--primary); color: var(--primary); }

        .empty-state { padding: 3rem 1rem; text-align: center; color: #94a3b8; }

        /* MODAL */
        .modal-detail-header { background: linear-gradient(135deg, #d97706, #b45309); color: white; padding: 1.25rem 1.5rem; border-radius: 12px 12px 0 0; }

        .modal-detail-header .order-sub { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
        .detail-section { padding: 1.25rem 1.5rem; }
        .detail-section + .detail-section { border-top: 1px solid #f1f5f9; }

        .detail-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; font-size: 0.88rem; }
        .detail-row .label { color: #64748b; white-space: nowrap; }
        .detail-row .value { color: #1e293b; font-weight: 600; text-align: right; }
        .customer-info-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 1rem 1.25rem; }
        .customer-info-box .cname { font-size: 0.95rem; font-weight: 700; color: #92400e; }
        .customer-info-box .cdetail { font-size: 0.83rem; color: #475569; margin-top: 3px; }

                    <button class="filter-tab active" onclick="filterBookings('all',this)">Tất cả</button>
                    <button class="filter-tab" onclick="filterBookings('pending',this)">Chờ xác nhận</button>
                    <button class="filter-tab" onclick="filterBookings('confirmed',this)">Đã xác nhận</button>
                    <button class="filter-tab" onclick="filterBookings('completed',this)">Hoàn thành</button>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius:12px;overflow:hidden;">
            <div class="modal-detail-header">
                <h5 id="modalTitle">Chi tiết đơn thuê</h5>
                <div class="order-sub" id="modalSub"></div>
            </div>
            <div id="modalBody" style="max-height:70vh;overflow-y:auto;"></div>
            <div style="padding:1rem 1.5rem;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:8px;">
                <button type="button" id="modalActionBtn" class="btn btn-sm btn-warning fw-semibold" style="display:none;border-radius:50px;font-size:0.85rem;"></button>
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const STATUS_MAP = {
    pending:   { label: 'Chờ xác nhận', cls: 'badge-pending' },
    confirmed: { label: 'Đã xác nhận',  cls: 'badge-confirmed' },
    completed: { label: 'Hoàn thành',   cls: 'badge-completed' },
    cancelled: { label: 'Đã hủy',       cls: 'badge-cancelled' }
};
let allBookings = [];

function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
}
function fmtPrice(n) { return Number(n).toLocaleString('vi-VN') + ' đ'; }

fetch('controllers/provider/auth-controller.php?action=checkLogin')
    .then(r => r.json())
    .then(res => {
        if (!res.success) { window.location.href = 'views/pages/provider/dang-nhap.html'; return; }
        document.getElementById('welcomeName').textContent   = res.name;
        document.getElementById('sidebarName').textContent   = res.name;
        document.getElementById('sidebarAvatar').textContent = res.name.charAt(0).toUpperCase();
        if (res.company) {
            document.getElementById('sidebarCompany').textContent = res.company;
            document.getElementById('welcomeCompany').textContent = `${res.company} — Xác nhận và hoàn thành các đơn thuê xe được giao.`;
        }
        loadBookings();
    })
    .catch(() => { window.location.href = 'views/pages/provider/dang-nhap.html'; });

function loadBookings() {
    fetch('controllers/provider/bookings-controller.php?action=getMyBookings')
        .then(r => r.json())
        .then(res => {
            allBookings = res.data || [];
            document.getElementById('statTotal').textContent     = allBookings.length;
            document.getElementById('statPending').textContent   = allBookings.filter(b => b.status === 'pending').length;
            document.getElementById('statConfirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
            document.getElementById('statCompleted').textContent = allBookings.filter(b => b.status === 'completed').length;
            renderTable(allBookings);
        })
        .catch(() => {
            document.getElementById('tableWrap').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle d-block"></i><p>Không tải được dữ liệu</p></div>';
        });
}

function filterBookings(status, btn) {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all' ? allBookings : allBookings.filter(b => b.status === status);
    renderTable(filtered);
}

function renderTable(bookings) {
    if (bookings.length === 0) {
        document.getElementById('tableWrap').innerHTML = '<div class="empty-state"><i class="fas fa-inbox d-block"></i><p>Không có đơn nào</p></div>';
        return;
    }
    const rows = bookings.map(b => {
        const s = STATUS_MAP[b.status] || { label: b.status, cls: 'badge-pending' };
        let actionBtn = '';
        if (b.status === 'pending')   actionBtn = `<button class="btn-action btn-confirm"  onclick="updateStatus(${b.id},'confirmed',this)"><i class="fas fa-check"></i>Xác nhận</button>`;
        if (b.status === 'confirmed') actionBtn = `<button class="btn-action btn-complete" onclick="updateStatus(${b.id},'completed',this)"><i class="fas fa-flag-checkered"></i>Hoàn thành</button>`;
        return `<tr>
            <td style="font-weight:600;">${b.car_name}</td>
            <td><div style="font-weight:600;">${b.customer_name || '—'}</div><div style="font-size:0.8rem;color:#64748b;">${b.customer_phone || ''}</div></td>
            <td>${fmtDate(b.pickup_date)}</td>
            <td>${fmtDate(b.return_date)}</td>
            <td>${b.total_days} ngày</td>
            <td><strong>${fmtPrice(b.total_price)}</strong></td>
            <td><span class="badge-status ${s.cls}">${s.label}</span></td>
            <td style="white-space:nowrap;">${actionBtn} <button class="btn-detail" onclick='showDetail(${JSON.stringify(b).replace(/'/g,"&#39;")})'>Chi tiết</button></td>
        </tr>`;
    }).join('');

    document.getElementById('tableWrap').innerHTML = `
        <div class="table-responsive">
            <table class="table table-hover">
                <thead><tr>
                    <th>Xe</th><th>Khách hàng</th><th>Ngày nhận</th><th>Ngày trả</th>
                    <th>Số ngày</th><th>Tổng tiền</th><th>Trạng thái</th><th>Hành động</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
}

function showDetail(b) {
    const s = STATUS_MAP[b.status] || { label: b.status, cls: 'badge-pending' };
    document.getElementById('modalTitle').textContent = b.car_name;
    document.getElementById('modalSub').textContent   = `${fmtDate(b.pickup_date)} → ${fmtDate(b.return_date)} · ${b.total_days} ngày`;

    document.getElementById('modalBody').innerHTML = `
        <div class="detail-section">
            <div class="detail-section-title"><i class="fas fa-user me-1"></i>Thông tin khách đặt</div>
            <div class="customer-info-box">
                <div class="cname"><i class="fas fa-user-circle me-2"></i>${b.customer_name || '—'}</div>
                ${b.customer_phone ? `<div class="cdetail"><i class="fas fa-phone me-2 text-muted"></i>${b.customer_phone}</div>` : ''}
            </div>
        </div>
        <div class="detail-section">
            <div class="detail-section-title"><i class="fas fa-car me-1"></i>Thông tin chuyến thuê</div>
            <div class="detail-row"><span class="label">Xe</span><span class="value">${b.car_name}</span></div>
            <div class="detail-row"><span class="label">Ngày nhận xe</span><span class="value">${fmtDate(b.pickup_date)}</span></div>
            <div class="detail-row"><span class="label">Ngày trả xe</span><span class="value">${fmtDate(b.return_date)}</span></div>
            <div class="detail-row"><span class="label">Số ngày thuê</span><span class="value">${b.total_days} ngày</span></div>
            <div class="detail-row"><span class="label">Tổng tiền</span><span class="value" style="color:#d97706;font-size:1rem;">${fmtPrice(b.total_price)}</span></div>
            <div class="detail-row"><span class="label">Trạng thái</span><span class="value"><span class="badge-status ${s.cls}">${s.label}</span></span></div>
            <div class="detail-row"><span class="label">Ngày đặt</span><span class="value">${fmtDate(b.created_at)}</span></div>
        </div>
    `;

    const actionBtn = document.getElementById('modalActionBtn');
    if (b.status === 'pending') {
        actionBtn.style.display = '';
        actionBtn.textContent = '✓ Xác nhận đơn';
        actionBtn.onclick = () => { bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); updateStatusDirect(b.id, 'confirmed'); };
    } else if (b.status === 'confirmed') {
        actionBtn.style.display = '';
        actionBtn.textContent = '🏁 Đánh dấu hoàn thành';
        actionBtn.onclick = () => { bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); updateStatusDirect(b.id, 'completed'); };
    } else {
        actionBtn.style.display = 'none';
    }

    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

function updateStatus(id, status, btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    callUpdate(id, status, () => loadBookings(), () => { btn.disabled = false; });
}

function updateStatusDirect(id, status) {
    callUpdate(id, status, () => loadBookings(), null);
}

function callUpdate(id, status, onSuccess, onError) {
    fetch('controllers/provider/bookings-controller.php?action=updateStatus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ booking_id: id, status })
    })
    .then(r => r.json())
    .then(res => {
        if (res.success) { onSuccess && onSuccess(); }
        else { alert(res.message || 'Cập nhật thất bại'); onError && onError(); }
    })
    .catch(() => { alert('Lỗi kết nối'); onError && onError(); });
}

function logout() {
    fetch('controllers/provider/auth-controller.php?action=logout')
    .then(() => { window.location.href = 'views/pages/provider/dang-nhap.html'; });
}
</script>
