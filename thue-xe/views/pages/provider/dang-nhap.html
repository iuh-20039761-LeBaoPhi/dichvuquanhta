<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../../../">
    <title>Dịch Vụ Quanh Ta - Thuê Xe - Đăng Nhập Nhà Cung Cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #f59e0b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        .brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 6px; }
        .brand img { width: 48px; height: 48px; border-radius: 12px; object-fit: contain; }
        .brand-name {
            font-size: 1.6rem; font-weight: 800;
            background: linear-gradient(135deg, #3B82F6, #1E40AF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .auth-subtitle { text-align: center; font-size: 0.88rem; color: #718096; margin-bottom: 28px; }
        .role-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, #f59e0b22, #f9731622);
            border: 1px solid #f59e0b66;
            color: #d97706; font-size: 0.8rem; font-weight: 600;
            padding: 4px 14px; border-radius: 50px; margin-bottom: 24px;
        }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #4a5568; margin-bottom: 7px; }
        .input-group-text { background: #FFFBEB; border-right: none; color: #d97706; border-color: #e2e8f0; }
        .input-icon .form-control { border-left: none; border-color: #e2e8f0; padding: 11px 14px; font-size: 0.95rem; }
        .input-icon .form-control:focus { border-color: #f59e0b; box-shadow: none; }
        .input-icon:focus-within .input-group-text,
        .input-icon:focus-within .toggle-pwd { border-color: #f59e0b; }
        .toggle-pwd { border-left: none; border-color: #e2e8f0; background: white; color: #a0aec0; cursor: pointer; transition: color 0.2s; }
        .toggle-pwd:hover { color: #f59e0b; box-shadow: none; }
        .btn-submit {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white; border: none; padding: 13px; border-radius: 50px;
            font-weight: 700; font-size: 1rem; transition: all 0.3s;
            width: 100%; margin-top: 6px; cursor: pointer;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,158,11,0.45); color: white; }
        .btn-submit:disabled { opacity: 0.8; }
        #msg { font-size: 0.88rem; min-height: 22px; text-align: center; margin-top: 12px; }
        .info-box { background: #FFFBEB; border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; font-size: 0.82rem; color: #92400e; }
        .info-box i { margin-right: 6px; }
        .auth-links { text-align: center; margin-top: 22px; font-size: 0.85rem; }
        .auth-links a { color: #d97706; text-decoration: none; font-weight: 500; }
        .auth-links a:hover { text-decoration: underline; }
        .divider { color: #cbd5e0; margin: 0 8px; }
        .other-roles { background: #f7fafc; border-radius: 12px; padding: 14px; margin-top: 20px; text-align: center; }
        .other-roles p { font-size: 0.8rem; color: #718096; margin-bottom: 8px; }
        .other-roles .role-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; color: #4a5568; text-decoration: none; padding: 6px 14px; border-radius: 8px; background: white; border: 1px solid #e2e8f0; transition: all 0.2s; margin: 3px; }
        .other-roles .role-link:hover { border-color: #f59e0b; color: #d97706; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="assets/images/thue-xe-logo-header-navigation.jpg" alt="Thuê Xe" onerror="this.style.display='none'">
            <span class="brand-name">Thuê Xe</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-car"></i> Nhà cung cấp</span>
        </div>
        <p class="auth-subtitle">Đăng nhập để nhận và quản lý đơn thuê xe</p>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>Tài khoản nhà cung cấp cần được admin xét duyệt trước khi đăng nhập.
        </div>

        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="tel" id="phone" class="form-control" placeholder="0901234567" autocomplete="tel">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-submit" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Chưa có tài khoản? <a href="views/pages/provider/dang-ky.html">Đăng ký làm nhà cung cấp</a>
            <br style="margin-top:6px;">
            <a href="index.php" style="color:#718096;"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>

        <div class="other-roles">
            <p>Đăng nhập với vai trò khác</p>
            <a href="views/pages/customer/dang-nhap.html" class="role-link"><i class="fas fa-user"></i> Khách hàng</a>
            <a href="admin/index.php" class="role-link"><i class="fas fa-shield-alt"></i> Quản trị viên</a>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('phone').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('loginBtn').addEventListener('click', login);

        function login() {
            const phone    = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            if (!phone || !password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng nhập đầy đủ thông tin</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
            msg.innerHTML = '';

            fetch('controllers/provider/auth-controller.php?action=login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password })
            })
            .then(r => r.json())
            .then(res => {
                if (res.success) {
                    localStorage.setItem('provider_logged_in', 'true');
                    localStorage.setItem('provider_name', res.name);
                    localStorage.setItem('provider_company', res.company);
                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng nhập thành công!</span>';
                    setTimeout(() => window.location.href = 'views/pages/provider/bang-dieu-khien.html', 700);
                } else {
                    msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (res.message || 'Đăng nhập thất bại') + '</span>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
                }
            })
            .catch(() => {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-wifi me-1"></i>Không kết nối được server</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
            });
        }
    </script>
</body>
</html>
