<!DOCTYPE html>
<html lang="vi">
<head>
<script src="/ga.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../../../">
    <title>Dịch Vụ Quanh Ta - Thuê Xe - Đăng Nhập Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --tx-primary: #3B82F6;
            --tx-primary-dark: #1E40AF;
            --tx-primary-soft: #EFF6FF;
            --tx-border: #E2E8F0;
            --tx-text-muted: #64748B;
        }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1E3A8A 0%, #1E40AF 55%, #3B82F6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 80px rgba(30, 64, 175, 0.28);
        }
        .brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 6px; }
        .brand img { width: 48px; height: 48px; border-radius: 12px; object-fit: contain; }
        .brand-name {
            font-size: 1.6rem; font-weight: 800;
            background: linear-gradient(135deg, var(--tx-primary), var(--tx-primary-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .auth-subtitle { text-align: center; font-size: 0.88rem; color: var(--tx-text-muted); margin-bottom: 28px; }
        .role-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, #3B82F622, #1E40AF1C);
            border: 1px solid #3B82F655;
            color: var(--tx-primary-dark); font-size: 0.8rem; font-weight: 600;
            padding: 4px 14px; border-radius: 50px; margin-bottom: 24px;
        }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #334155; margin-bottom: 7px; }
        .input-group-text { background: var(--tx-primary-soft); border-right: none; color: var(--tx-primary); border-color: var(--tx-border); }
        .input-icon .form-control { border-left: none; border-color: var(--tx-border); padding: 11px 14px; font-size: 0.95rem; }
        .input-icon .form-control:focus { border-color: var(--tx-primary); box-shadow: none; }
        .input-icon:focus-within .input-group-text,
        .input-icon:focus-within .toggle-pwd { border-color: var(--tx-primary); }
        .toggle-pwd { border-left: none; border-color: var(--tx-border); background: white; color: #94A3B8; cursor: pointer; transition: color 0.2s; }
        .toggle-pwd:hover { color: var(--tx-primary); box-shadow: none; }
        .btn-submit {
            background: linear-gradient(135deg, var(--tx-primary), var(--tx-primary-dark));
            color: white; border: none; padding: 13px; border-radius: 50px;
            font-weight: 700; font-size: 1rem; transition: all 0.3s;
            width: 100%; margin-top: 6px; cursor: pointer;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(30,64,175,0.38); color: white; }
        .btn-submit:disabled { opacity: 0.8; }
        #msg { font-size: 0.88rem; min-height: 22px; text-align: center; margin-top: 12px; }
        .auth-links { text-align: center; margin-top: 22px; font-size: 0.85rem; }
        .auth-links a { color: var(--tx-primary); text-decoration: none; font-weight: 500; }
        .auth-links a:hover { text-decoration: underline; }
        .divider { color: #cbd5e0; margin: 0 8px; }
        .other-roles { background: #f7fafc; border-radius: 12px; padding: 14px; margin-top: 20px; text-align: center; }
        .other-roles p { font-size: 0.8rem; color: var(--tx-text-muted); margin-bottom: 8px; }
        .other-roles .role-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; color: #4a5568; text-decoration: none; padding: 6px 14px; border-radius: 8px; background: white; border: 1px solid #e2e8f0; transition: all 0.2s; margin: 3px; }
        .other-roles .role-link:hover { border-color: var(--tx-primary); color: var(--tx-primary); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="assets/images/thue-xe-logo-header-navigation.jpg" alt="Thuê Xe" onerror="this.style.display='none'">
            <span class="brand-name">Thuê Xe</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-user"></i> Khách hàng</span>
        </div>
        <p class="auth-subtitle">Đăng nhập để đặt xe và theo dõi đơn hàng</p>

        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="tel" id="identifier" class="form-control" placeholder="0901234567" autocomplete="tel">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group input-icon">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" autocomplete="current-password">
                <button class="btn toggle-pwd border" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-submit" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Chưa có tài khoản? <a href="views/pages/customer/dang-ky.html">Đăng ký ngay</a>
            <span class="divider">|</span>
            <a href="index.php"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>

        <div class="other-roles">
            <p>Đăng nhập với vai trò khác</p>
            <a href="views/pages/provider/dang-nhap.html" class="role-link"><i class="fas fa-car"></i> Nhà cung cấp</a>
            <a href="admin/index.php" class="role-link"><i class="fas fa-shield-alt"></i> Quản trị viên</a>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('identifier').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('loginBtn').addEventListener('click', login);

        function resolveAppBase() {
            const path = window.location.pathname || '';
            const lower = path.toLowerCase();

            const thueXeIndex = lower.indexOf('/thue-xe/');
            if (thueXeIndex !== -1) {
                const prefix = path.slice(0, thueXeIndex + '/thue-xe/'.length);
                return window.location.origin + prefix;
            }

            if (lower.startsWith('/globalcare/')) {
                return window.location.origin + '/GlobalCare/thue-xe/';
            }

            return window.location.origin + '/thue-xe/';
        }

        const APP_BASE = resolveAppBase();

        function buildApiUrl(action) {
            const endpoint = new URL('controllers/customer/auth-controller.php', APP_BASE);
            endpoint.searchParams.set('action', action);
            return endpoint.toString();
        }

        function buildRedirectUrl(rawRedirect) {
            const value = (rawRedirect || '').trim();
            if (!value) {
                return new URL('controllers/customer/dashboard-controller.php', APP_BASE).toString();
            }

            // Prevent off-site redirect, only allow local relative path.
            if (/^https?:\/\//i.test(value)) {
                return new URL('controllers/customer/dashboard-controller.php', APP_BASE).toString();
            }

            return new URL(value.replace(/^\/+/, ''), APP_BASE).toString();
        }

        function login() {
            const identifier = document.getElementById('identifier').value.trim();
            const password   = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            if (!identifier || !password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng nhập đầy đủ thông tin</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
            msg.innerHTML = '';

            fetch(buildApiUrl('login'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier, password })
            })
            .then(r => r.json())
            .then(res => {
                if (res.success) {
                    localStorage.setItem('customer_logged_in', 'true');
                    localStorage.setItem('customer_name', res.name);
                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng nhập thành công!</span>';
                    const redirect = buildRedirectUrl(new URLSearchParams(location.search).get('redirect'));
                    setTimeout(() => window.location.href = redirect, 700);
                } else {
                    msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (res.message || 'Đăng nhập thất bại') + '</span>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
                }
            })
            .catch(() => {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-wifi me-1"></i>Không kết nối được server</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
            });
        }
    </script>
</body>
</html>
