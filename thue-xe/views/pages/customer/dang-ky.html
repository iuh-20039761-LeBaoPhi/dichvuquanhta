<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- Google tag (gtag.js) -->

    <script>
      window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../../../">
    <title>Dịch Vụ Quanh Ta - Thuê Xe - Đăng Ký Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a 0%, #1E40AF 60%, #0ea5e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        .brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 6px; }
        .brand img { width: 48px; height: 48px; border-radius: 12px; object-fit: contain; }
        .brand-name {
            font-size: 1.6rem; font-weight: 800;
            background: linear-gradient(135deg, #3B82F6, #1E40AF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .auth-subtitle { text-align: center; font-size: 0.88rem; color: #718096; margin-bottom: 28px; }
        .role-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, #3B82F622, #1E40AF22);
            border: 1px solid #3B82F644;
            color: #1E40AF; font-size: 0.8rem; font-weight: 600;
            padding: 4px 14px; border-radius: 50px; margin-bottom: 24px;
        }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #4a5568; margin-bottom: 7px; }
        .input-group-text { background: #EFF6FF; border-right: none; color: #3B82F6; border-color: #e2e8f0; }
        .input-icon .form-control { border-left: none; border-color: #e2e8f0; padding: 11px 14px; font-size: 0.95rem; }
        .input-icon .form-control:focus { border-color: #3B82F6; box-shadow: none; }
        .input-icon:focus-within .input-group-text,
        .input-icon:focus-within .toggle-pwd { border-color: #3B82F6; }
        .toggle-pwd { border-left: none; border-color: #e2e8f0; background: white; color: #a0aec0; cursor: pointer; transition: color 0.2s; }
        .toggle-pwd:hover { color: #3B82F6; box-shadow: none; }
        .btn-submit {
            background: linear-gradient(135deg, #3B82F6, #1E40AF);
            color: white; border: none; padding: 13px; border-radius: 50px;
            font-weight: 700; font-size: 1rem; transition: all 0.3s;
            width: 100%; margin-top: 6px; cursor: pointer;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.45); color: white; }
        .btn-submit:disabled { opacity: 0.8; }
        .strength-bar { height: 4px; border-radius: 2px; background: #e2e8f0; margin-top: 6px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0; }
        #msg { font-size: 0.88rem; min-height: 22px; text-align: center; margin-top: 12px; }
        .auth-links { text-align: center; margin-top: 22px; font-size: 0.85rem; }
        .auth-links a { color: #3B82F6; text-decoration: none; font-weight: 500; }
        .auth-links a:hover { text-decoration: underline; }
        .divider { color: #cbd5e0; margin: 0 8px; }
        .section-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #3B82F6; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #BFDBFE; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .upload-zone {
            border: 2px dashed #93C5FD; border-radius: 12px;
            padding: 14px 8px; text-align: center; cursor: pointer;
            transition: all 0.2s; background: #EFF6FF; position: relative; overflow: hidden;
        }
        .upload-zone:hover { border-color: #3B82F6; background: #DBEAFE; }
        .upload-zone.has-file { border-color: #3B82F6; border-style: solid; }
        .upload-zone i { font-size: 1.6rem; color: #60A5FA; display: block; margin-bottom: 4px; }
        .upload-zone span { font-size: 0.75rem; color: #6b7280; font-weight: 500; line-height: 1.3; display: block; }
        .upload-zone img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; display: none; }
        .upload-zone .remove-btn {
            position: absolute; top: 4px; right: 4px;
            background: #ef4444; color: white; border: none;
            border-radius: 50%; width: 20px; height: 20px; font-size: 10px;
            cursor: pointer; display: none; align-items: center; justify-content: center; padding: 0;
        }
        .upload-note { font-size: 0.75rem; color: #9ca3af; margin-top: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <img src="assets/images/thue-xe-logo-header-navigation.jpg" alt="Thuê Xe" onerror="this.style.display='none'">
            <span class="brand-name">Thuê Xe</span>
        </div>
        <div style="text-align:center; margin-bottom:6px;">
            <span class="role-badge"><i class="fas fa-user-plus"></i> Khách hàng</span>
        </div>
        <p class="auth-subtitle">Tạo tài khoản để đặt xe nhanh hơn</p>

        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="full_name" class="form-control" placeholder="Nguyễn Văn A">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" id="phone" class="form-control" placeholder="0912 345 678">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
                    <button class="btn toggle-pwd border" type="button" id="togglePwd">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>

            <div class="col-12">
                <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group input-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
                </div>
            </div>
        </div>

        <div class="section-title">Ảnh & Giấy tờ</div>
        <div class="upload-grid">
            <div>
                <label class="form-label" style="font-size:0.8rem;">Ảnh đại diện</label>
                <div class="upload-zone" id="zone-avatar" onclick="triggerUpload('avatar')">
                    <input type="file" id="avatar" accept="image/*" style="display:none" onchange="previewImg(this,'zone-avatar','prev-avatar')">
                    <i class="fas fa-camera" id="icon-avatar"></i>
                    <span id="label-avatar">Ảnh đại diện</span>
                    <img id="prev-avatar" alt="preview">
                    <button class="remove-btn" id="rm-avatar" onclick="removeImg(event,'avatar','zone-avatar','prev-avatar','icon-avatar','label-avatar','rm-avatar')">✕</button>
                </div>
            </div>
            <div>
                <label class="form-label" style="font-size:0.8rem;">CCCD mặt trước <span class="text-danger">*</span></label>
                <div class="upload-zone" id="zone-cccd-front" onclick="triggerUpload('cccd_front')">
                    <input type="file" id="cccd_front" accept="image/*" style="display:none" onchange="previewImg(this,'zone-cccd-front','prev-cccd-front')">
                    <i class="fas fa-id-card" id="icon-cccd-front"></i>
                    <span id="label-cccd-front">Mặt trước</span>
                    <img id="prev-cccd-front" alt="preview">
                    <button class="remove-btn" id="rm-cccd-front" onclick="removeImg(event,'cccd_front','zone-cccd-front','prev-cccd-front','icon-cccd-front','label-cccd-front','rm-cccd-front')">✕</button>
                </div>
            </div>
            <div>
                <label class="form-label" style="font-size:0.8rem;">CCCD mặt sau <span class="text-danger">*</span></label>
                <div class="upload-zone" id="zone-cccd-back" onclick="triggerUpload('cccd_back')">
                    <input type="file" id="cccd_back" accept="image/*" style="display:none" onchange="previewImg(this,'zone-cccd-back','prev-cccd-back')">
                    <i class="fas fa-id-card" id="icon-cccd-back"></i>
                    <span id="label-cccd-back">Mặt sau</span>
                    <img id="prev-cccd-back" alt="preview">
                    <button class="remove-btn" id="rm-cccd-back" onclick="removeImg(event,'cccd_back','zone-cccd-back','prev-cccd-back','icon-cccd-back','label-cccd-back','rm-cccd-back')">✕</button>
                </div>
            </div>
        </div>
        <p class="upload-note"><i class="fas fa-info-circle me-1"></i>Chấp nhận JPG, PNG. Tối đa 5MB. CCCD bắt buộc để xác minh khi thuê xe.</p>

        <button class="btn-submit mt-3" id="registerBtn">
            <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
        </button>
        <div id="msg"></div>

        <div class="auth-links">
            Đã có tài khoản? <a href="views/pages/customer/dang-nhap.html">Đăng nhập</a>
            <span class="divider">|</span>
            <a href="index.php"><i class="fas fa-arrow-left me-1"></i>Trang chủ</a>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });

        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const fill = document.getElementById('strengthFill');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            const colors = ['', '#e53e3e', '#ed8936', '#48bb78', '#3B82F6'];
            const widths = ['0%', '25%', '50%', '75%', '100%'];
            fill.style.width = widths[strength];
            fill.style.background = colors[strength] || 'transparent';
        });

        function triggerUpload(id) { document.getElementById(id).click(); }

        function previewImg(input, zoneId, previewId) {
            const file = input.files[0];
            if (!file) return;
            const zone = document.getElementById(zoneId);
            const prev = document.getElementById(previewId);
            const reader = new FileReader();
            reader.onload = e => {
                prev.src = e.target.result;
                prev.style.display = 'block';
                zone.querySelector('i').style.display = 'none';
                zone.querySelector('span').style.display = 'none';
                zone.querySelector('.remove-btn').style.display = 'flex';
                zone.classList.add('has-file');
            };
            reader.readAsDataURL(file);
        }

        function removeImg(e, inputId, zoneId, previewId, iconId, labelId, rmId) {
            e.stopPropagation();
            document.getElementById(inputId).value = '';
            document.getElementById(previewId).style.display = 'none';
            document.getElementById(previewId).src = '';
            document.getElementById(iconId).style.display = '';
            document.getElementById(labelId).style.display = '';
            document.getElementById(rmId).style.display = 'none';
            document.getElementById(zoneId).classList.remove('has-file');
        }

        document.getElementById('registerBtn').addEventListener('click', register);

        function register() {
            const full_name        = document.getElementById('full_name').value.trim();
            const email            = document.getElementById('email').value.trim();
            const phone            = document.getElementById('phone').value.trim();
            const password         = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('msg');

            if (!full_name || !email || !phone || !password || !confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng điền đầy đủ thông tin</span>';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu phải có ít nhất 6 ký tự</span>';
                return;
            }
            if (password !== confirm_password) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Mật khẩu xác nhận không khớp</span>';
                return;
            }
            if (!document.getElementById('cccd_front').files[0] || !document.getElementById('cccd_back').files[0]) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Vui lòng tải lên ảnh CCCD mặt trước và mặt sau</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang tạo tài khoản...';
            msg.innerHTML = '';

            const fd = new FormData();
            fd.append('full_name', full_name);
            fd.append('email',     email);
            fd.append('phone',     phone);
            fd.append('password',  password);
            const avatarFile    = document.getElementById('avatar').files[0];
            const cccdFrontFile = document.getElementById('cccd_front').files[0];
            const cccdBackFile  = document.getElementById('cccd_back').files[0];
            if (avatarFile)    fd.append('avatar',     avatarFile);
            if (cccdFrontFile) fd.append('cccd_front', cccdFrontFile);
            if (cccdBackFile)  fd.append('cccd_back',  cccdBackFile);

            fetch('controllers/customer/auth-controller.php?action=register', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.success) {
                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Đăng ký thành công! Đang chuyển hướng...</span>';
                    setTimeout(() => window.location.href = 'views/pages/customer/bang-dieu-khien.html', 1000);
                } else {
                    msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + (res.message || 'Đăng ký thất bại') + '</span>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
                }
            })
            .catch(() => {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-wifi me-1"></i>Không kết nối được server</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản';
            });
        }
    </script>
</body>
</html>
