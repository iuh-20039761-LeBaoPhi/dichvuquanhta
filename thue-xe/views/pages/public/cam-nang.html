<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/load-template.js"></script>
<script>
// Load header/footer
window.PAGE_SEO = {
    title: 'Dịch Vụ Quanh Ta - Thuê Xe - Cẩm Nang',
    desc: '30 cẩm nang kinh nghiệm thuê xe, an toàn lái xe và du lịch từ chuyên gia Thuê Xe TP.HCM.',
    keys: 'cẩm nang thuê xe, kinh nghiệm thuê xe, hướng dẫn lái xe, du lịch bằng xe thuê',
    url: 'https://iuh-20039761-lebaophi.github.io/GlobalCare/thue-xe/views/pages/public/cam-nang.html',
    navPage: 'cam-nang'
};
loadHeader();
loadFooter();

// ===== STATE =====
const S = {
    cat: 'all',
    checked: new Set(),
    search: '',
    sort: 'default',
    page: 1,
    perPage: 9
};

document.addEventListener('DOMContentLoaded', async function() {
    try {
        const res = await fetch('assets/data/cam-nang-data.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        window.CAM_NANG_DATA = await res.json();
    } catch (e) {
        console.error('Không tải được dữ liệu cẩm nang:', e);
        document.getElementById('artGrid').innerHTML = '<div class="col-12 text-center py-5 text-muted">Không tải được dữ liệu cẩm nang. Vui lòng tải lại trang.</div>';
        return;
    }
    renderChecklist();
    renderArticles();
});

// Checklist
function renderChecklist() {
    const q = document.getElementById('sbSearch').value.toLowerCase();
    const items = window.CAM_NANG_DATA.filter(a =>
        (S.cat === 'all' || a.category === S.cat) &&
        (!q || a.title.toLowerCase().includes(q))
    );
    document.getElementById('chkList').innerHTML = items.map(a => `
        <div class="chk-item ${S.checked.has(a.id) ? 'chk-active' : ''}" id="ci${a.id}">
            <input type="checkbox" id="cb${a.id}" ${S.checked.has(a.id) ? 'checked' : ''}
                onchange="toggleChk(${a.id},this.checked)">
            <label for="cb${a.id}">${a.id}. ${a.title}</label>
        </div>`).join('');
    updateSelCount();
}

function toggleChk(id, on) {
    on ? S.checked.add(id) : S.checked.delete(id);
    document.getElementById('ci'+id)?.classList.toggle('chk-active', on);
    updateSelCount();
    S.page = 1;
    renderArticles();
}

function uncheckAll() {
    S.checked.clear();
    renderChecklist();
    renderArticles();
}

function getVisibleIds() {
    const q = document.getElementById('sbSearch').value.toLowerCase();
    return window.CAM_NANG_DATA
        .filter(a => (S.cat === 'all' || a.category === S.cat) && (!q || a.title.toLowerCase().includes(q)))
        .map(a => a.id);
}

function updateSelCount() {
    const n = S.checked.size;
    document.getElementById('selCount').textContent = n + ' đã chọn';
    const info = document.getElementById('selInfo');
    if (n > 0) { info.style.display = 'inline'; document.getElementById('selInfoTxt').textContent = n + ' cẩm nang được lọc'; }
    else info.style.display = 'none';
}

// Category
function setCat(cat, el) {
    S.cat = cat;
    S.page = 1;
    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderChecklist();
    renderArticles();
}

// Hero search
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('heroSearch').addEventListener('keydown', e => { if (e.key==='Enter') doHeroSearch(); });
});
function doHeroSearch() {
    const v = document.getElementById('heroSearch').value.trim();
    S.search = v.toLowerCase();
    S.page = 1;
    document.getElementById('sbSearch').value = v;
    renderChecklist();
    renderArticles();
}

// Sort
function doSort(v) { S.sort = v; S.page = 1; renderArticles(); }
function getSorted(arr) {
    const c = [...arr];
    if (S.sort === 'newest') return c.sort((a,b) => new Date(b.date)-new Date(a.date));
    if (S.sort === 'oldest') return c.sort((a,b) => new Date(a.date)-new Date(b.date));
    if (S.sort === 'az') return c.sort((a,b) => a.title.localeCompare(b.title,'vi'));
    if (S.sort === 'za') return c.sort((a,b) => b.title.localeCompare(a.title,'vi'));
    return c;
}

// Reset
function resetAll() {
    S.cat='all'; S.checked.clear(); S.search=''; S.sort='default'; S.page=1;
    document.getElementById('heroSearch').value='';
    document.getElementById('sbSearch').value='';
    document.getElementById('sortSel').value='default';
    document.querySelectorAll('.cat-pill').forEach((b,i) => b.classList.toggle('active',i===0));
    renderChecklist();
    renderArticles();
}

// Render articles
function renderArticles() {
    if (!window.CAM_NANG_DATA) return;
    let list = window.CAM_NANG_DATA.filter(a => {
        const catOk = S.cat==='all' || a.category===S.cat;
        const srcOk = !S.search || a.title.toLowerCase().includes(S.search) || a.description.toLowerCase().includes(S.search) || (a.tags||[]).some(t=>t.toLowerCase().includes(S.search));
        const chkOk = S.checked.size===0 || S.checked.has(a.id);
        return catOk && srcOk && chkOk;
    });
    list = getSorted(list);
    const total = list.length;
    const pages = Math.ceil(total/S.perPage) || 1;
    if (S.page > pages) S.page = pages;
    const paged = list.slice((S.page-1)*S.perPage, S.page*S.perPage);

    document.getElementById('showCount').textContent = total;
    const grid = document.getElementById('artGrid');
    const noRes = document.getElementById('noRes');

    if (!paged.length) {
        grid.innerHTML = '';
        noRes.style.display = 'block';
        document.getElementById('pager').innerHTML = '';
        return;
    }
    noRes.style.display = 'none';

    grid.innerHTML = paged.map(a => {
        const hi = S.checked.has(a.id);
        const dt = new Date(a.date).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
        return `<div class="col-md-6 col-xl-4">
            <div class="art-card ${hi?'art-highlighted':''}">
                <div class="art-thumb">
                    <img src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.src='assets/images/cars/thue-xe-xe-anh-mac-dinh-fallback.jpg'">
                    <span class="art-cat-badge">${a.categoryLabel}</span>
                    ${hi?'<span class="art-highlighted-mark"><i class="fas fa-check"></i></span>':''}
                </div>
                <div class="art-body">
                    <div class="art-meta">
                        <span><i class="fas fa-calendar-alt"></i>${dt}</span>
                        <span><i class="fas fa-clock"></i>${a.readTime}</span>
                    </div>
                    <h3 class="art-title">${a.title}</h3>
                    <p class="art-desc">${a.description}</p>
                    <div class="art-tags">${(a.tags||[]).slice(0,3).map(t=>`<span class="art-tag">${t}</span>`).join('')}</div>
                    <a href="views/pages/public/chi-tiet-cam-nang.html?slug=${a.slug}" class="btn-read">Đọc cẩm nang <i class="fas fa-arrow-right"></i></a>
                </div>
            </div>
        </div>`;
    }).join('');

    renderPager(pages);
}

function renderPager(pages) {
    const el = document.getElementById('pager');
    if (pages<=1) { el.innerHTML=''; return; }
    let h = '';
    if (S.page>1) h+=`<button class="pg-btn" onclick="goPage(${S.page-1})"><i class="fas fa-chevron-left"></i></button>`;
    for (let i=1;i<=pages;i++) h+=`<button class="pg-btn ${i===S.page?'pg-active':''}" onclick="goPage(${i})">${i}</button>`;
    if (S.page<pages) h+=`<button class="pg-btn" onclick="goPage(${S.page+1})"><i class="fas fa-chevron-right"></i></button>`;
    el.innerHTML = h;
}
function goPage(p) {
    S.page = p;
    renderArticles();
    window.scrollTo({top: document.querySelector('.blog-layout').offsetTop-70, behavior:'smooth'});
}

// ===== MOBILE SIDEBAR TOGGLE =====
function toggleSidebar() {
    if (window.innerWidth >= 992) return;
    const body = document.getElementById('sidebarBody');
    const btn  = document.getElementById('sidebarToggleBtn');
    body.classList.toggle('open');
    btn.classList.toggle('open');
}
</script>
</body>
