<!-- Admin Order Management Partial -->
<div class="card border-0 shadow-sm mb-4" style="border-radius: 20px; overflow: hidden;">
    <div class="card-header bg-white py-4 border-0 d-flex justify-content-between align-items-center">
        <div>
            <h5 class="fw-800 mb-0">Quản lý Toàn bộ Đơn hàng</h5>
            <p class="text-muted small mb-0">Theo dõi toàn diện mọi giao dịch trong hệ thống Thuê Xe</p>
        </div>
        <div class="d-flex gap-2">
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                <input type="text" class="form-control bg-light border-0" placeholder="Mã đơn / Tên khách..." id="orderSearchInput" onkeyup="filterOrders()">
            </div>
            <button class="btn btn-primary rounded-pill px-3 fw-600" onclick="loadAllOrders()"><i class="fas fa-sync-alt me-2"></i>Tải lại</button>
        </div>
    </div>

    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table align-middle mb-0" id="adminOrderTable">
                <thead class="bg-light text-muted small uppercase">
                    <tr>
                        <th class="ps-4">Mã đơn / Ngày đặt</th>
                        <th>Thông tin Khách hàng</th>
                        <th>Phương tiện / Nhà CC</th>
                        <th>Trạng thái hiện tại</th>
                        <th>Tổng chi phí</th>
                        <th class="pe-4 text-end">Chi tiết</th>
                    </tr>
                </thead>
                <tbody id="adminOrderBody">
                    <tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    const TABLE = 'datlich_thuexe';
    let allOrders = [];

    window.loadAllOrders = async function() {
        const tbody = document.getElementById('adminOrderBody');
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>';
        
        try {
            allOrders = await DVQTKrud.listTable(TABLE, { limit: 1000 });
            if(!allOrders || !allOrders.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5">Chưa có dữ liệu đơn hàng.</td></tr>';
                return;
            }

            renderOrders(allOrders);
        } catch (e) { tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Lỗi: ${e.message}</td></tr>`; }
    };

    function renderOrders(orders) {
        const tbody = document.getElementById('adminOrderBody');
        tbody.innerHTML = orders.reverse().map(o => {
            let statusBadge = '<span class="badge bg-warning text-dark bg-opacity-10 px-2 py-1 rounded-pill">Đang xác nhận</span>';
            if(o.ngayhuy) statusBadge = '<span class="badge bg-danger text-danger bg-opacity-10 px-2 py-1 rounded-pill">Đã hủy bỏ</span>';
            else if(o.ngayhoanthanhthucte) statusBadge = '<span class="badge bg-success text-success bg-opacity-10 px-2 py-1 rounded-pill">Hoàn thành</span>';
            else if(o.ngaybatdauthucte) statusBadge = '<span class="badge bg-primary text-primary bg-opacity-10 px-2 py-1 rounded-pill">Đang thuê</span>';
            else if(o.ngaynhan) statusBadge = '<span class="badge bg-info text-dark bg-opacity-10 px-2 py-1 rounded-pill">Đã nhận đơn</span>';

            return `<tr>
                <td class="ps-4">
                    <div class="fw-bold text-dark">${String(o.id).padStart(7, '0')}</div>
                    <div class="text-muted small" style="font-size:11px;">${o.ngaydat || '---'}</div>
                </td>
                <td>
                    <div class="fw-600 small text-dark">${o.tenkhachhang || 'Tên ẩn'}</div>
                    <div class="text-muted small">${o.sdtkhachhang || '---'}</div>
                </td>
                <td>
                    <div class="small fw-800 text-truncate" style="max-width:150px;">${o.ten_xe}</div>
                    <div class="text-muted small" style="font-size:11px;">NCC: ${o.tenncc || 'Chưa nhận'}</div>
                </td>
                <td>${statusBadge}</td>
                <td><div class="fw-bold text-primary">${ThueXeAdmin.formatCurrency(o.tong_tien)}</div></td>
                <td class="pe-4 text-end">
                    <button class="btn btn-sm btn-light text-primary py-1 px-3 rounded-pill" onclick="viewOrderAdmin(${o.id})">Hóa đơn</button>
                    <!-- Chức năng can thiệp đơn hàng (Hủy) đã bị vô hiệu hóa theo nguyên tắc quản trị -->
                </td>
            </tr>`;
        }).join('');
    }

    window.filterOrders = function() {
        const q = document.getElementById('orderSearchInput').value.toLowerCase().trim();
        const filtered = allOrders.filter(o => {
            const paddedId = String(o.id).padStart(7, '0');
            const fullCode = 'tx' + paddedId;
            return paddedId.includes(q) || 
                   fullCode.includes(q) ||
                   String(o.id).includes(q) || 
                   (o.tenkhachhang && o.tenkhachhang.toLowerCase().includes(q)) ||
                   (o.ten_xe && o.ten_xe.toLowerCase().includes(q));
        });
        renderOrders(filtered);
    }

    window.viewOrderAdmin = function(id) {
        window.open('../chi-tiet-thue-xe.html?id=' + id, '_blank');
    };

    window.cancelOrderAdmin = async function(id) {
        if(await ThueXeAdmin.cancelOrder(id)) loadAllOrders();
    }

    loadAllOrders();
})();
</script>
