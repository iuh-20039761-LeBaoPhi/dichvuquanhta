<!-- Admin Users & Providers Management Partial -->
<div class="row g-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm mb-4" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header bg-white py-4 border-0 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="fw-800 mb-0" id="userListTitle">Danh sách Thành viên</h5>
                    <p class="text-muted small mb-0">Quản lý tài khoản, phân quyền và trạng thái hoạt động</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary rounded-pill px-3 fw-600" id="toggleRoleBtn" onclick="toggleRoleView()">Xem Nhà cung cấp</button>
                    <button class="btn btn-primary rounded-pill px-3 fw-600" onclick="loadUserTable()"><i class="fas fa-sync-alt me-2"></i>Làm mới</button>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="bg-light text-muted small uppercase">
                            <tr>
                                <th class="ps-4">Thành viên / Liên hệ</th>
                                <th>Địa chỉ</th>
                                <th>Ngày tham gia</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th class="pe-4 text-end">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="adminUserBody">
                            <tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    const TABLE = 'nguoidung';
    let currentRoleView = 'user'; // 'user' or 'provider'

    window.loadUserTable = async function() {
        const tbody = document.getElementById('adminUserBody');
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>';
        
        try {
            const users = await DVQTKrud.listTable(TABLE, { limit: 1000 });
            if(!users || !users.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5">Chưa có người dùng nào.</td></tr>';
                return;
            }

            const filtered = users.filter(u => {
                if(currentRoleView === 'provider') return u.trangthai === 'provider';
                return u.trangthai !== 'provider';
            });

            tbody.innerHTML = filtered.reverse().map(u => {
                let roleBadge = '<span class="badge bg-secondary bg-opacity-10 text-secondary px-2 py-1 rounded-pill">Khách hàng</span>';
                if(u.trangthai === 'provider') roleBadge = '<span class="badge bg-primary bg-opacity-10 text-primary px-2 py-1 rounded-pill">Đối tác NCC</span>';
                else if(u.trangthai === 'admin') roleBadge = '<span class="badge bg-danger bg-opacity-10 text-danger px-2 py-1 rounded-pill">Quản trị viên</span>';

                return `<tr>
                    <td class="ps-4">
                        <div class="d-flex align-items-center gap-3">
                            <div class="bg-light text-primary rounded-circle" style="width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">
                                ${(u.hovaten || 'U').charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="fw-bold text-dark">${u.hovaten || u.username}</div>
                                <div class="text-muted small">${u.sodienthoai || '---'}</div>
                            </div>
                        </div>
                    </td>
                    <td><div class="small text-muted text-truncate" style="max-width:200px;">${u.diachi || '---'}</div></td>
                    <td><div class="small fw-600">${u.created_date || '---'}</div></td>
                    <td>${roleBadge}</td>
                    <td><span class="badge bg-success rounded-circle p-1 me-1"></span> <small class="fw-500">Hoạt động</small></td>
                    <td class="pe-4 text-end">
                        <button class="btn btn-sm btn-light text-primary py-1 px-3 rounded-pill" onclick="editUserAdmin(${u.id})">Chi tiết</button>
                        <button class="btn btn-sm btn-light text-danger ms-1" onclick="deleteUserAdmin(${u.id})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            }).join('') || `<tr><td colspan="6" class="text-center py-4">Không tìm thấy ${currentRoleView === 'provider' ? 'nhà cung cấp' : 'thành viên'} nào.</td></tr>`;
        } catch (e) { tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Lỗi: ${e.message}</td></tr>`; }
    };

    window.toggleRoleView = function() {
        const btn = document.getElementById('toggleRoleBtn');
        const title = document.getElementById('userListTitle');
        if (currentRoleView === 'user') {
            currentRoleView = 'provider';
            btn.textContent = 'Xem Thành viên';
            title.textContent = 'Danh sách Nhà cung cấp';
        } else {
            currentRoleView = 'user';
            btn.textContent = 'Xem Nhà cung cấp';
            title.textContent = 'Danh sách Thành viên';
        }
        loadUserTable();
    };

    window.deleteUserAdmin = async function(id) {
        const { isConfirmed } = await Swal.fire({
            title: 'Khóa tài khoản?',
            text: 'Bạn có muốn xóa hoặc khóa vĩnh viễn quyền truy cập của người dùng này?',
            icon: 'warning',
            showCancelButton: true
        });

        if (isConfirmed) {
            try {
                // Xóa Row hoặc chuyển trạng thái sang Banned
                await DVQTKrud.deleteRow(TABLE, id);
                Swal.fire('Thành công', 'Người dùng đã được xử lý.', 'success');
                loadUserTable();
            } catch (e) { Swal.fire('Lỗi', e.message, 'error'); }
        }
    }

    loadUserTable();
})();
</script>
