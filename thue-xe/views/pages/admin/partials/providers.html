<!-- Admin Providers Management Partial -->
<div class="row g-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm mb-4" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header bg-white py-4 border-0 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="fw-800 mb-0">Hệ thống Đối tác Nhà cung cấp</h5>
                    <p class="text-muted small mb-0">Giám sát và quản lý các doanh nghiệp kinh doanh vận tải trên hệ thống</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary rounded-pill px-3 fw-600" onclick="loadUserTable()"><i class="fas fa-sync-alt me-2"></i>Làm mới</button>
                    <button class="btn btn-outline-primary rounded-pill px-3 fw-600" onclick="DVQTApp.showComingSoon()">+ Thêm đối tác mới</button>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="bg-light text-muted small uppercase">
                            <tr>
                                <th class="ps-4">Tên NCC / Liên hệ</th>
                                <th>Địa chỉ đăng ký</th>
                                <th>Tổng xe</th>
                                <th>Trạng thái hợp tác</th>
                                <th class="pe-4 text-end">Chi tiết NCC</th>
                            </tr>
                        </thead>
                        <tbody id="adminUserBody">
                            <tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    const TABLE = 'nguoidung';

    window.loadUserTable = async function() {
        const tbody = document.getElementById('adminUserBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>';
        
        try {
            // Lấy tất cả và lọc nhà cung cấp (role = 'provider' hoặc tùy logic dự án)
            const allUsers = await DVQTKrud.listTable(TABLE, { limit: 1000 });
            const providers = allUsers.filter(u => u.trangthai === 'provider' || u.role === 'provider');
            
            // Đồng thời đếm số xe của mỗi NCC
            const cars = await DVQTKrud.listTable('xethue', { limit: 1000 });

            if(!providers.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5">Chưa có đối tác NCC nào đăng ký.</td></tr>';
                return;
            }

            tbody.innerHTML = providers.reverse().map(p => {
                const count = cars.filter(c => String(c.provider_id) === String(p.id)).length;
                return `<tr>
                    <td class="ps-4">
                        <div class="d-flex align-items-center gap-3">
                            <div class="bg-primary text-white rounded-3 shadow-sm" style="width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">
                                ${(p.hovaten || 'P').charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="fw-bold text-dark">${p.hovaten}</div>
                                <div class="text-muted small">${p.sodienthoai}</div>
                            </div>
                        </div>
                    </td>
                    <td><div class="small text-muted text-truncate" style="max-width:200px;">${p.diachi || '---'}</div></td>
                    <td><span class="badge bg-light text-primary border border-primary border-opacity-25 px-2 rounded-pill">${count} xe</span></td>
                    <td><span class="badge bg-success bg-opacity-10 text-success px-2 py-1 rounded-pill">Đang liên kết</span></td>
                    <td class="pe-4 text-end">
                        <button class="btn btn-sm btn-light text-primary py-1 px-3 rounded-pill" onclick="editNccAdmin(${p.id})">Tài khoản & Hồ sơ</button>
                    </td>
                </tr>`;
            }).join('');
        } catch (e) { tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">Lỗi: ${e.message}</td></tr>`; }
    };

    window.editNccAdmin = function(id) {
        Swal.fire('Tính năng mở rộng', 'Hệ thống quản lý hồ sơ chi tiết đối tác đang được cập nhật.', 'info');
    }

    loadUserTable();
})();
</script>
