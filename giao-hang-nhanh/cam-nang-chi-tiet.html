<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>
      Hướng dẫn đóng gói hàng dễ vỡ an toàn tuyệt đối | Giao Hàng Nhanh
    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="public/assets/images/favicon.ico" />
    <link rel="stylesheet" href="public/assets/css/styles.css" />
    <!-- FontAwesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <script src="/ga.js"></script>
  </head>
  <body class="article-detail-page">
    <div id="site-header"></div>

    <main class="container article-detail-main">
      <article>
        <div class="article-detail-back">
          <a href="cam-nang.html" class="back-to-list-top">
            <i class="fas fa-arrow-left"></i> Quay lại danh sách cẩm nang
          </a>
        </div>
        <header class="article-header" id="article-header-host">
          <!-- Header cẩm nang sẽ được JS chèn vào đây -->
        </header>

        <img
          src=""
          alt=""
          class="article-featured-img"
          id="article-image-host"
          style="display: none"
        />

        <div class="article-content" id="article-content-host">
          <!-- Nội dung cẩm nang sẽ được JS chèn vào đây -->
          <a href="cam-nang.html" class="back-to-news"
            >← Quay lại trang cẩm nang</a
          >
        </div>
      </article>
    </main>

    <div id="site-footer"></div>
    <script src="public/assets/js/shared-layout.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get("id"), 10);

        if (!articleId) {
          document.getElementById("article-content-host").innerHTML =
            '<h2>Mục cẩm nang không tồn tại.</h2><a href="cam-nang.html" class="back-to-news">← Quay lại trang cẩm nang</a>';
          return;
        }

        fetch("public/data/du-lieu-bai-viet.json")
          .then(function(res) { return res.json(); })
          .then(function(newsData) { renderArticle(newsData); })
          .catch(function() {
            document.getElementById("article-content-host").innerHTML =
              '<h2>Không thể tải cẩm nang.</h2><a href="cam-nang.html" class="back-to-news">← Quay lại</a>';
          });

        function resolveArticleAssetPath(path) {
          if (!path) return "";
          if (/^(?:https?:)?\/\//i.test(path)) return path;
          if (path.startsWith("public/")) return path;
          if (path.startsWith("assets/")) return `public/${path}`;
          return path;
        }

        function normalizeArticleContent(content) {
          if (!content) return "";
          return content
            .replace(/src=\\"assets\//g, 'src=\\"public/assets/')
            .replace(/src="assets\//g, 'src="public/assets/')
            .replace(/href=\\"\.\.\/index\.html\\"/g, 'href=\\"index.html\\"')
            .replace(/href="\.\.\/index\.html"/g, 'href="index.html"');
        }

        function renderArticle(newsData) {
          const article = newsData.find((p) => p.id === articleId);

          if (article) {
          document.title = `${article.title} | Giao Hàng Nhanh`;

          const headerHost = document.getElementById("article-header-host");
          headerHost.innerHTML = `
            <h1 class="article-title">${article.title}</h1>
            <div class="article-meta">
              <span>Ngày đăng: ${article.date}</span> |
              <span>Chuyên mục: ${article.category}</span>
            </div>
          `;

          const imageHost = document.getElementById("article-image-host");
          imageHost.src = resolveArticleAssetPath(article.img);
          imageHost.alt = article.title;
          imageHost.style.display = "block";

          // Xử lý hiển thị Tags
          let tagsHtml = "";
          if (article.tags && article.tags.length > 0) {
            tagsHtml = `<div class="article-tags">
              <strong>Thẻ:</strong> 
              ${article.tags.map((tag) => `<span class="tag-item">#${tag}</span>`).join(" ")}
            </div>`;
          }

          const contentHost = document.getElementById("article-content-host");
          contentHost.innerHTML =
            normalizeArticleContent(article.content) +
            tagsHtml +
            '<a href="cam-nang.html" class="back-to-news">← Quay lại trang cẩm nang</a>';

          // --- LOGIC BÀI VIẾT LIÊN QUAN NÂNG CAO (SCORING SYSTEM) ---

          // Hàm tách từ khóa đơn giản (tách dấu cách, bỏ từ ngắn < 3 ký tự)
          function getKeywords(text) {
            if (!text) return [];
            return text
              .toLowerCase()
              .split(/\s+/)
              .filter((w) => w.length > 2);
          }

          const currentKeywords = getKeywords(article.title);

          // Tính điểm cho từng mục cẩm nang
          const scoredArticles = newsData
            .filter((item) => item.id !== article.id) // Trừ bài hiện tại
            .map((item) => {
              let score = 0;

              // Tiêu chí 1: Cùng chuyên mục
              if (item.category === article.category) score += 3;

              // Tiêu chí 2: Trùng từ khóa trong tiêu đề
              const itemTitleWords = getKeywords(item.title);
              const matchedWords = itemTitleWords.filter((w) =>
                currentKeywords.includes(w),
              );
              score += matchedWords.length * 1;

              // Tiêu chí 3: Trùng tags (Ưu tiên cao nhất)
              if (
                article.tags &&
                item.tags &&
                Array.isArray(article.tags) &&
                Array.isArray(item.tags)
              ) {
                // Chuẩn hóa về chữ thường để so sánh chính xác
                const currentTags = article.tags.map((t) => t.toLowerCase());
                const checkTags = item.tags.map((t) => t.toLowerCase());

                const sharedTags = checkTags.filter((t) =>
                  currentTags.includes(t),
                );
                score += sharedTags.length * 10; // Tăng điểm mạnh cho bài có chung tag
              }

              return { item, score };
            });

          // Sắp xếp theo điểm giảm dần và lấy 3 bài đầu
          scoredArticles.sort((a, b) => b.score - a.score);
          const relatedSlice = scoredArticles
            .slice(0, 3)
            .map((entry) => entry.item);

          // 4. Render ra HTML nếu có bài liên quan
          if (relatedSlice.length > 0) {
            const relatedHtml = relatedSlice
              .map(
                (item) => `
                <div class="related-card">
                    <a href="cam-nang-chi-tiet.html?id=${item.id}">
                        <img src="${resolveArticleAssetPath(item.img)}" alt="${item.title}" class="related-img" />
                    </a>
                    <div class="related-body">
                        <div class="related-date">${item.date}</div>
                        <h4 class="related-card-title">
                            <a href="cam-nang-chi-tiet.html?id=${item.id}">${item.title}</a>
                        </h4>
                    </div>
                </div>
             `,
              )
              .join("");

            const relatedSection = document.createElement("div");
            relatedSection.className = "related-section";
            relatedSection.innerHTML = `<h3 class="related-title">Cẩm nang liên quan</h3><div class="related-grid">${relatedHtml}</div>`;

            // Chèn vào cuối thẻ <article>
            document.querySelector("article").appendChild(relatedSection);
          }
          } else {
            document.getElementById("article-content-host").innerHTML =
              '<h2>Mục cẩm nang không tồn tại.</h2><a href="cam-nang.html" class="back-to-news">← Quay lại trang cẩm nang</a>';
          }
        } // end renderArticle
      });
    </script>
  </body>
</html>
