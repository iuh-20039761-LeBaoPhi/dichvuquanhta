<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test KRUD Lists</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 24px;
    color: #0f172a;
    background: #f8fafc;
}
h1, h2 {
    margin: 0 0 12px;
}
.page-note {
    margin: 0 0 20px;
    color: #475569;
    line-height: 1.6;
}
.toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
}
.toolbar input {
    min-width: 280px;
    padding: 10px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
}
.toolbar button {
    padding: 10px 16px;
    border: 0;
    border-radius: 8px;
    background: #0f766e;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
}
.layout {
    display: grid;
    gap: 18px;
}
.panel {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
}
.panel-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    flex-wrap: wrap;
    margin-bottom: 12px;
}
.panel-subtitle {
    margin: 4px 0 0;
    color: #64748b;
    font-size: 14px;
}
.status {
    color: #475569;
    font-size: 14px;
}
.status.is-error {
    color: #b42318;
}
.table-wrap {
    overflow-x: auto;
}
table {
    border-collapse: collapse;
    width: 100%;
}
th, td {
    border: 1px solid #e2e8f0;
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
}
th {
    background: #f1f5f9;
}
.muted {
    color: #64748b;
}
</style>
</head>
<body>

<h1>Test KRUD Lists</h1>
<p class="page-note">
    Trang này dùng để kiểm tra nhanh 3 bảng KRUD hiện tại: đơn đặt lịch, khách hàng và nhà cung cấp.
    Mật khẩu không hiển thị plaintext để tránh lộ dữ liệu; chỉ hiện trạng thái đã lưu hay chưa theo dạng ẩn.
</p>

<div class="toolbar">
    <input type="text" id="keyword" placeholder="Lọc theo tên, email hoặc số điện thoại">
    <button id="btnLoad" type="button">Load Tat Ca</button>
</div>

<div class="layout" id="list-layout"></div>

<script src="https://api.dvqt.vn/js/krud.js"></script>

<script>
const TABLE_CONFIGS = [
    {
        key: "orders",
        title: "Danh sach dat lich",
        subtitle: "Bang: giaohangnhanh_dat_lich",
        table: "giaohangnhanh_dat_lich",
        emptyMessage: "Chua co don dat lich.",
        matchesKeyword(row, keyword) {
            const stack = [
                row.ma_don_hang_noi_bo,
                row.ho_ten_nguoi_gui,
                row.ho_ten_nguoi_nhan,
                row.so_dien_thoai_nguoi_gui,
                row.so_dien_thoai_nguoi_nhan
            ];
            return stack.some((value) => String(value || "").toLowerCase().includes(keyword));
        },
        columns: [
            {
                label: "Ma don",
                render: (row) => row.ma_don_hang_noi_bo || row.order_code || row.id || ""
            },
            {
                label: "Nguoi gui",
                render: (row) => row.ho_ten_nguoi_gui || row.nguoi_gui_ho_ten || ""
            },
            {
                label: "SDT gui",
                render: (row) => row.so_dien_thoai_nguoi_gui || row.nguoi_gui_so_dien_thoai || ""
            },
            {
                label: "Nguoi nhan",
                render: (row) => row.ho_ten_nguoi_nhan || row.nguoi_nhan_ho_ten || ""
            },
            {
                label: "Dich vu",
                render: (row) => row.ten_dich_vu || row.dich_vu || ""
            },
            {
                label: "Trang thai",
                render: (row) => row.trang_thai || ""
            },
            {
                label: "Ngay tao",
                render: (row) => row.created_at || row.created_date || ""
            }
        ]
    },
    {
        key: "customers",
        title: "Danh sach khach hang",
        subtitle: "Bang de xac nhan sau khi noi form dang ky. Dang de san: giaohangnhanh_customers",
        table: "giaohangnhanh_customers",
        emptyMessage: "Chua co tai khoan khach hang.",
        matchesKeyword(row, keyword) {
            const stack = [
                row.fullname,
                row.ho_ten,
                row.email,
                row.phone,
                row.so_dien_thoai,
                row.username
            ];
            return stack.some((value) => String(value || "").toLowerCase().includes(keyword));
        },
        columns: [
            {
                label: "ID",
                render: (row) => row.id || ""
            },
            {
                label: "Ho ten",
                render: (row) => row.fullname || row.ho_ten || ""
            },
            {
                label: "Email",
                render: (row) => row.email || ""
            },
            {
                label: "So dien thoai",
                render: (row) => row.phone || row.so_dien_thoai || ""
            },
            {
                label: "Tai khoan",
                render: (row) => row.username || ""
            },
            {
                label: "Mat khau (an)",
                render: (row) => maskPassword(row.password || row.mat_khau || "")
            },
            {
                label: "Ngay tao",
                render: (row) => row.created_at || ""
            }
        ]
    },
    {
        key: "shippers",
        title: "Danh sach nha cung cap",
        subtitle: "Bang de xac nhan sau khi noi form dang ky. Dang de san: giaohangnhanh_shippers",
        table: "giaohangnhanh_shippers",
        emptyMessage: "Chua co tai khoan nha cung cap.",
        matchesKeyword(row, keyword) {
            const stack = [
                row.fullname,
                row.ho_ten,
                row.email,
                row.phone,
                row.so_dien_thoai,
                row.username,
                row.so_cccd
            ];
            return stack.some((value) => String(value || "").toLowerCase().includes(keyword));
        },
        columns: [
            {
                label: "ID",
                render: (row) => row.id || ""
            },
            {
                label: "Ho ten",
                render: (row) => row.fullname || row.ho_ten || ""
            },
            {
                label: "Email",
                render: (row) => row.email || ""
            },
            {
                label: "So dien thoai",
                render: (row) => row.phone || row.so_dien_thoai || ""
            },
            {
                label: "CCCD",
                render: (row) => row.so_cccd || ""
            },
            {
                label: "Phe duyet",
                render: (row) => Number(row.is_approved || row.da_phe_duyet || 0) === 1 ? "Da phe duyet" : "Chua phe duyet"
            },
            {
                label: "Mat khau (an)",
                render: (row) => maskPassword(row.password || row.mat_khau || "")
            }
        ]
    }
];

function maskPassword(value) {
    const raw = String(value || "");
    if (!raw) return "Chua co";
    return "*".repeat(Math.max(raw.length, 8));
}

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function getListFn() {
    if (typeof window.krudList === "function") {
        return (payload) => window.krudList(payload);
    }

    if (typeof window.crud === "function") {
        return (payload) => window.crud("list", payload.table, {
            p: payload.page || 1,
            limit: payload.limit || 20
        });
    }

    if (typeof window.krud === "function") {
        return (payload) => window.krud("list", payload.table, {
            p: payload.page || 1,
            limit: payload.limit || 20
        });
    }

    return null;
}

function extractRows(payload, depth = 0) {
    if (depth > 4 || payload == null) return [];
    if (Array.isArray(payload)) return payload;
    if (typeof payload !== "object") return [];

    const candidateKeys = ["data", "items", "rows", "list", "result", "payload"];
    for (const key of candidateKeys) {
        const value = payload[key];
        if (Array.isArray(value)) return value;
        const nested = extractRows(value, depth + 1);
        if (nested.length) return nested;
    }

    return [];
}

function createPanel(config) {
    return `
        <section class="panel" data-panel="${escapeHtml(config.key)}">
            <div class="panel-head">
                <div>
                    <h2>${escapeHtml(config.title)}</h2>
                    <p class="panel-subtitle">${escapeHtml(config.subtitle)}</p>
                </div>
                <div class="status" data-status="${escapeHtml(config.key)}">Chua tai du lieu</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            ${config.columns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("")}
                        </tr>
                    </thead>
                    <tbody data-body="${escapeHtml(config.key)}">
                        <tr><td colspan="${config.columns.length}" class="muted">Chua co du lieu</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    `;
}

function setStatus(key, message, isError = false) {
    const element = document.querySelector(`[data-status="${key}"]`);
    if (!element) return;
    element.textContent = message;
    element.className = isError ? "status is-error" : "status";
}

function renderRows(config, rows) {
    const body = document.querySelector(`[data-body="${config.key}"]`);
    if (!body) return;

    if (!rows.length) {
        body.innerHTML = `<tr><td colspan="${config.columns.length}" class="muted">${escapeHtml(config.emptyMessage)}</td></tr>`;
        return;
    }

    body.innerHTML = rows
        .map((row) => `
            <tr>
                ${config.columns
                    .map((column) => `<td>${escapeHtml(column.render(row) || "")}</td>`)
                    .join("")}
            </tr>
        `)
        .join("");
}

async function loadTable(config, keyword) {
    const listFn = getListFn();
    if (!listFn) {
        setStatus(config.key, "Khong tim thay ham KRUD list.", true);
        return;
    }

    setStatus(config.key, "Dang tai...");

    try {
        const response = await listFn({
            table: config.table,
            sort: { id: "desc" },
            page: 1,
            limit: 50
        });

        const rows = extractRows(response);
        const filteredRows = keyword
            ? rows.filter((row) => config.matchesKeyword(row, keyword))
            : rows;

        renderRows(config, filteredRows);
        setStatus(config.key, `Da tai ${filteredRows.length} ban ghi.`);
    } catch (error) {
        renderRows(config, []);
        setStatus(
            config.key,
            error?.message || "Khong the load du lieu tu KRUD.",
            true,
        );
    }
}

async function loadAllTables() {
    const keyword = document.getElementById("keyword").value.trim().toLowerCase();
    await Promise.all(TABLE_CONFIGS.map((config) => loadTable(config, keyword)));
}

document.getElementById("list-layout").innerHTML = TABLE_CONFIGS.map(createPanel).join("");
document.getElementById("btnLoad").addEventListener("click", loadAllTables);
document.getElementById("keyword").addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        loadAllTables();
    }
});

loadAllTables();
</script>

</body>
</html>
