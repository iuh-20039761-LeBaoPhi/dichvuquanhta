<!-- The Modal -->
<div class="modal fade" id="bookingModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form id="bookingForm">
        <!-- Modal Header -->
        <div class="modal-header">
          <h4 class="modal-title">Đặt dịch vụ</h4>
          <button
            class="btn btn-success me-2 info"
            type="button"
            id="autoFillBtn"
            data-customer="Lê Bảo Phi"
            data-phone="0374360449"
            data-address="94 Trần Thị Trọng, Phường Tân Sơn, TP. Hồ Chí Minh"
          >
            <i class="fas fa-pencil-alt"></i> Tự điền thông tin
          </button>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>
        </div>

        <!-- Modal body -->
        <div class="modal-body">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label"
                ><i class="fas fa-user me-2"></i>Họ và tên
                <span class="text-danger">*</span></label
              >
              <input
                type="text"
                class="form-control"
                id="nameCustomer"
                placeholder="Nhập họ tên của bạn"
                required
              />
            </div>
            <div class="col-md-6">
              <label class="form-label"
                ><i class="fas fa-phone me-2"></i>Số điện thoại
                <span class="text-danger">*</span></label
              >
              <input
                type="tel"
                class="form-control"
                id="phoneCustomer"
                placeholder="Nhập số điện thoại"
                required
              />
            </div>
            <div class="col-md-12">
              <div class="row">
                <div class="col-md-6">
                  <label class="form-label"
                    ><i class="fas fa-list-ul me-2"></i>Loại dịch vụ
                    <span class="text-danger">*</span></label
                  >
                  <select class="form-select" id="serviceSelect" required>
                    <option value="">Chọn loại dịch vụ</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label"
                    ><i class="fas fa-list me-2"></i>Dịch vụ cụ thể
                    <span class="text-danger">*</span>
                  </label>
                  <select class="form-select" id="subServiceSelect" required>
                    <option value="">Chọn dịch vụ</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Loại xe *</label>
              <select class="form-select" id="vehicleType" required>
                <option value="Xe máy">Xe máy</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Hãng xe *</label>
              <select class="form-select" id="brandSelect" required>
                <option value="">Chọn hãng</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Phụ tùng / Sửa chữa *</label>
              <select class="form-select" id="itemSelect" required>
                <option value="">Chọn mục</option>
              </select>
            </div>
            <div class="col-md-12">
              <label class="form-label"
                ><i class="fas fa-clock me-2"></i>Thời gian mong muốn
                <span class="text-danger">*</span></label
              >
              <input type="datetime-local" class="form-control" />
            </div>
            <div class="col-md-12">
              <label class="form-label"
                ><i class="fas fa-map-marker-alt me-2"></i>Địa chỉ
                <span class="text-danger">*</span></label
              >
              <div class="input-group">
                <input
                  id="addressInput"
                  type="text"
                  class="form-control"
                  placeholder="Nhập địa chỉ của bạn"
                  required
                />
              </div>
              <div class="d-flex gap-2 flex-wrap mt-2">
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="locateBtn"
                >
                  <i class="fas fa-location-arrow"></i> Vị trí của tôi
                </button>
                <button
                  class="btn btn-outline-info"
                  type="button"
                  id="toggleMapBtn"
                >
                  <i class="fas fa-map-marked-alt"></i> Mở bản đồ
                </button>
              </div>
            </div>

            <div class="col-md-12" id="osmMapWrapper" style="display: none">
              <label class="form-label">Chọn vị trí trên bản đồ</label>
              <div
                id="osmMap"
                style="
                  height: 320px;
                  border: 1px solid #dee2e6;
                  border-radius: 10px;
                "
              ></div>
            </div>

            <div class="col-md-12">
              <div class="row">
                <div class="col-md-4">
                  <label class="form-label"
                    ><i class="fas fa-money-bill-wave-alt me-2"></i>Chi phí
                    <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="price-contact"
                    readonly
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label">
                    <i class="fas fa-search me-2"></i>Chi phí khảo sát
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="survey-fee"
                    readonly
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label"
                    ><i class="fas fa-shipping-fast me-2"></i>Phí di chuyển
                    <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="transport-fee"
                    readonly
                  />
                </div>
              </div>
            </div>
            <div class="col-md-12">
              <label class="form-label"
                ><i class="fas fa-map-marker-alt me-2"></i>Tổng chi phí ước tính
                <span class="text-danger">*</span></label
              >
              <input
                type="text"
                class="form-control"
                id="total-price"
                readonly
              />
            </div>
            <div class="col-md-12">
              <label class="form-label"
                ><i class="fas fa-comment me-2"></i>Mô tả vấn đề</label
              >
              <textarea
                class="form-control"
                rows="4"
                placeholder="Mô tả chi tiết vấn đề của xe bạn..."
              ></textarea>
            </div>
            <div class="col-md-12">
              <label>Hình ảnh và video</label>
              <div class="d-flex gap-2 flex-wrap">
                <button
                  type="button"
                  class="btn btn-outline-primary"
                  id="capturePhotoBtn"
                >
                  <i class="fas fa-camera"></i> Chụp ảnh
                </button>
                <button
                  type="button"
                  class="btn btn-outline-danger"
                  id="recordVideoBtn"
                >
                  <i class="fas fa-video"></i> Quay video
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Modal footer -->
        <div class="modal-footer">
          <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary-custom px-5 py-3">
              <i class="fas fa-paper-plane me-2"></i>Gửi yêu cầu
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<div
  class="modal fade"
  id="bookingConfirmModal"
  tabindex="-1"
  aria-labelledby="bookingConfirmModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="bookingConfirmModalLabel">
          Xác nhận thông tin đặt dịch vụ
        </h5>
        <button
          type="button"
          class="btn-close"
          id="confirmCloseBtn"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="table-responsive">
          <table class="table table-striped align-middle mb-0">
            <tbody>
              <tr>
                <th scope="row">Họ và tên</th>
                <td id="confirmName">-</td>
              </tr>
              <tr>
                <th scope="row">Số điện thoại</th>
                <td id="confirmPhone">-</td>
              </tr>
              <tr>
                <th scope="row">Loại dịch vụ</th>
                <td id="confirmService">-</td>
              </tr>
              <tr>
                <th scope="row">Dịch vụ cụ thể</th>
                <td id="confirmSubService">-</td>
              </tr>
              <tr>
                <th scope="row">Loại xe</th>
                <td id="confirmVehicleType">-</td>
              </tr>
              <tr>
                <th scope="row">Hãng xe</th>
                <td id="confirmBrand">-</td>
              </tr>
              <tr>
                <th scope="row">Phụ tùng / Sửa chữa</th>
                <td id="confirmItem">-</td>
              </tr>
              <tr>
                <th scope="row">Thời gian mong muốn</th>
                <td id="confirmDatetime">-</td>
              </tr>
              <tr>
                <th scope="row">Địa chỉ</th>
                <td id="confirmAddress">-</td>
              </tr>
              <tr>
                <th scope="row">Chi phí</th>
                <td id="confirmPrice">-</td>
              </tr>
              <tr>
                <th scope="row">Chi phí khảo sát</th>
                <td id="confirmSurvey">-</td>
              </tr>
              <tr>
                <th scope="row">Phí di chuyển</th>
                <td id="confirmTransport">-</td>
              </tr>
              <tr>
                <th scope="row">Tổng chi phí ước tính</th>
                <td id="confirmTotal">-</td>
              </tr>
              <tr>
                <th scope="row">Mô tả vấn đề</th>
                <td id="confirmNote">-</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="confirmBackBtn">
          Quay lại
        </button>
        <button type="button" class="btn btn-primary" id="confirmSubmitBtn">
          Xác nhận đặt lịch
        </button>
      </div>
    </div>
  </div>
</div>
