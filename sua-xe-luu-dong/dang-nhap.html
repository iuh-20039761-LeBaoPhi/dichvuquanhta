<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Đăng nhập tài khoản Sửa Xe Lưu Động để đặt lịch nhanh, theo dõi tiến độ và nhận ưu đãi dịch vụ tận nơi."
    />
    <title>Đăng nhập | Dịch Vụ Quanh Ta - Sửa Xe Lưu Động</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-start: #e8f8f1;
        --bg-end: #eaf3ff;
        --surface: #ffffff;
        --text-main: #12263a;
        --text-sub: #5e748b;
        --line: #d7e6f5;
        --green: #0fa26d;
        --blue: #2b7de9;
        --orange: #ff7a1a;
        --focus: rgba(43, 125, 233, 0.3);
        --shadow-main: 0 18px 42px rgba(17, 79, 128, 0.14);
        --shadow-soft: 0 10px 26px rgba(23, 89, 145, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        min-height: 100%;
        overflow-x: hidden;
      }

      body {
        min-height: 100dvh;
        font-family: "Be Vietnam Pro", sans-serif;
        color: var(--text-main);
        background: linear-gradient(140deg, #002e5d, #002e5d, #2774ae);
      }

      .login-page {
        position: relative;
        min-height: 100dvh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 28px 14px;
        isolation: isolate;
        overflow: hidden;
      }

      .login-page::before,
      .login-page::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        z-index: -1;
        pointer-events: none;
      }

      .login-page::before {
        width: 240px;
        height: 240px;
        left: -100px;
        top: -90px;
        background: radial-gradient(
          circle at center,
          rgba(15, 162, 109, 0.24),
          rgba(15, 162, 109, 0)
        );
      }

      .login-page::after {
        width: 300px;
        height: 300px;
        right: -130px;
        bottom: -120px;
        background: radial-gradient(
          circle at center,
          rgba(43, 125, 233, 0.2),
          rgba(43, 125, 233, 0)
        );
      }

      .login-shell {
        width: min(100%, 540px);
        margin: 0 auto;
        animation: slide-fade-in 0.55s ease both;
      }

      .login-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 22px 16px;
        box-shadow: var(--shadow-main);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        margin-bottom: 14px;
      }

      .brand img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      .brand span {
        color: var(--text-main);
        font-weight: 800;
        font-size: 1.02rem;
        line-height: 1.2;
      }

      .login-title {
        margin: 0 0 6px;
        text-align: center;
        font-size: clamp(1.38rem, 1.1rem + 1.4vw, 1.95rem);
        font-weight: 800;
        line-height: 1.2;
      }

      .login-subtitle {
        margin: 0 0 18px;
        text-align: center;
        color: var(--text-sub);
        font-size: 0.94rem;
        line-height: 1.45;
      }

      .form-label {
        font-weight: 600;
        margin-bottom: 6px;
      }

      .form-control {
        height: 46px;
        border-radius: 12px;
        border: 1px solid #cbddf0;
      }

      .form-control:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px var(--focus);
      }

      .input-password-wrap {
        position: relative;
      }

      .btn-toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        border-radius: 8px;
        background: #eef5ff;
        color: var(--blue);
        font-weight: 700;
        font-size: 0.8rem;
        padding: 5px 10px;
      }

      .btn-toggle-password:hover {
        background: #ddeaff;
      }

      .btn-toggle-password:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      .input-error {
        display: block;
        margin-top: 4px;
        min-height: 20px;
        color: #d93025;
        font-size: 0.83rem;
      }

      .row-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin: 3px 0 8px;
      }

      .row-meta .form-check-label {
        color: #3a5268;
        font-size: 0.92rem;
      }

      .row-meta a {
        color: var(--blue);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .row-meta a:hover {
        text-decoration: underline;
      }

      .btn-login {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(135deg, var(--green), var(--blue));
        box-shadow: 0 12px 24px rgba(15, 162, 109, 0.3);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }

      .btn-login:hover {
        transform: translateY(-1px);
        filter: saturate(1.08);
        box-shadow: 0 14px 28px rgba(43, 125, 233, 0.28);
      }

      .btn-login:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      .btn-login:disabled {
        opacity: 0.9;
        cursor: not-allowed;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0 14px;
        color: #7b8fa3;
        font-size: 0.86rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        flex: 1;
        background: #d8e6f3;
      }

      .social-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .btn-social {
        border: 1px solid #cfdfef;
        border-radius: 12px;
        background: #fff;
        color: #23384d;
        font-weight: 600;
        padding: 10px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease;
      }

      .btn-social:hover {
        background: #f4faff;
        border-color: #bcd5ed;
      }

      .btn-social:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      .status-message {
        margin-top: 12px;
        border-radius: 12px;
      }

      .login-footer {
        text-align: center;
        margin-top: 14px;
        color: var(--text-sub);
        font-size: 0.9rem;
      }

      .login-footer a {
        color: var(--orange);
        font-weight: 700;
        text-decoration: none;
      }

      .login-footer a:hover {
        text-decoration: underline;
      }

      .home-link {
        margin-top: 10px;
        font-size: 0.84rem;
      }

      .home-link a {
        color: #607a93;
        text-decoration: none;
      }

      .home-link a:hover {
        text-decoration: underline;
      }

      @media (min-width: 375px) {
        .login-page {
          padding: 30px 16px;
        }

        .login-card {
          padding: 24px 20px;
        }
      }

      @media (min-width: 414px) {
        .social-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (min-width: 768px) {
        .login-page {
          align-items: center;
          padding: 34px;
        }

        .login-card {
          padding: 30px;
          border-radius: 24px;
          box-shadow: 0 22px 56px rgba(17, 79, 128, 0.16);
        }
      }

      @media (min-width: 1024px) {
        .login-shell {
          width: min(540px, 100%);
        }
      }

      @media (min-width: 1280px) {
        .login-page::before {
          width: 290px;
          height: 290px;
        }

        .login-page::after {
          width: 360px;
          height: 360px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }

      @keyframes slide-fade-in {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="login-page">
      <section class="login-shell" aria-label="Đăng nhập tài khoản">
        <article class="login-card">
          <a
            href="index.html"
            class="brand"
            aria-label="Về trang chủ Sửa Xe Lưu Động"
          >
            <img
              src="public/asset/image/logo-dich-vu-quanh-ta.png"
              alt="Logo Dịch Vụ Quanh Ta"
            />
            <span>Sửa Xe Lưu Động</span>
            <img
              src="public/asset/image/logo-sua-xe-luu-dong.png"
              alt="Logo Sửa Xe Lưu Động"
            />
          </a>

          <h1 class="login-title">Đăng nhập tài khoản</h1>
          <p class="login-subtitle">
            Đăng nhập để đặt dịch vụ và theo dõi đơn nhanh hơn.
          </p>

          <form id="loginForm" novalidate>
            <div class="mb-2">
              <label for="identity" class="form-label">Số điện thoại</label>
              <input
                id="identity"
                name="identity"
                type="text"
                class="form-control"
                placeholder="09xxxxxxxx"
                autocomplete="username"
                aria-describedby="identityError"
                required
              />
              <small
                id="identityError"
                class="input-error"
                aria-live="polite"
              ></small>
            </div>

            <div class="mb-1">
              <label for="password" class="form-label">Mật khẩu</label>
              <div class="input-password-wrap">
                <input
                  id="password"
                  name="password"
                  type="password"
                  class="form-control pe-5"
                  placeholder="Nhập mật khẩu"
                  autocomplete="current-password"
                  aria-describedby="passwordError"
                  required
                />
                <button
                  type="button"
                  id="togglePassword"
                  class="btn-toggle-password"
                  aria-label="Hiện mật khẩu"
                  aria-pressed="false"
                >
                  Hiện
                </button>
              </div>
              <small
                id="passwordError"
                class="input-error"
                aria-live="polite"
              ></small>
            </div>

            <div class="row-meta">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" />
                <label class="form-check-label" for="remember"
                  >Ghi nhớ đăng nhập</label
                >
              </div>
              <a href="#" aria-label="Khôi phục mật khẩu">Quên mật khẩu?</a>
            </div>

            <button id="submitBtn" type="submit" class="btn-login mt-2">
              <span class="btn-text">Đăng nhập</span>
            </button>

            <div
              id="loginStatus"
              class="alert alert-success status-message d-none"
              role="status"
              aria-live="polite"
            >
              Đăng nhập thành công! Đang chuyển bạn đến trang chính...
            </div>

            <div class="divider">Hoặc đăng nhập bằng</div>

            <div class="social-grid">
              <button
                type="button"
                class="btn-social"
                aria-label="Đăng nhập nhà cung cấp"
              >
                <span aria-hidden="true">🏪</span>
                Nhà cung cấp
              </button>
              <button
                type="button"
                class="btn-social"
                aria-label="Đăng nhập admin"
              >
                <span aria-hidden="true">🛡️</span>
                Admin
              </button>
            </div>
          </form>

          <div class="login-footer">
            Chưa có tài khoản?
            <a href="dang-ky.html" aria-label="Đăng ký tài khoản mới"
              >Đăng ký ngay</a
            >
            <div class="home-link">
              <a href="index.html">Trang chủ</a>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script>
      (function () {
        var loginForm = document.getElementById("loginForm");
        var identityInput = document.getElementById("identity");
        var passwordInput = document.getElementById("password");
        var identityError = document.getElementById("identityError");
        var passwordError = document.getElementById("passwordError");
        var togglePassword = document.getElementById("togglePassword");
        var submitBtn = document.getElementById("submitBtn");
        var loginStatus = document.getElementById("loginStatus");

        // function isEmail(value) {
        //   return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        // }

        function isPhoneVN(value) {
          return /^(?:\+84|84|0)(?:3|5|7|8|9)\d{8}$/.test(value);
        }

        function setFieldValid(inputElement, isValid) {
          inputElement.setAttribute("aria-invalid", isValid ? "false" : "true");
        }

        function validateIdentity() {
          var value = identityInput.value.trim();
          identityError.textContent = "";
          setFieldValid(identityInput, true);

          if (!value) {
            identityError.textContent = "Vui lòng nhập số điện thoại.";
            setFieldValid(identityInput, false);
            return false;
          }

          if (!isPhoneVN(value)) {
            identityError.textContent =
              "Thông tin chưa hợp lệ. Hãy nhập số điện thoại.";
            setFieldValid(identityInput, false);
            return false;
          }

          return true;
        }

        function validatePassword() {
          var value = passwordInput.value;
          passwordError.textContent = "";
          setFieldValid(passwordInput, true);

          if (!value.trim()) {
            passwordError.textContent = "Vui lòng nhập mật khẩu.";
            setFieldValid(passwordInput, false);
            return false;
          }

          if (value.length < 6) {
            passwordError.textContent = "Mật khẩu cần tối thiểu 6 ký tự.";
            setFieldValid(passwordInput, false);
            return false;
          }

          return true;
        }

        togglePassword.addEventListener("click", function () {
          var hidden = passwordInput.type === "password";
          passwordInput.type = hidden ? "text" : "password";
          togglePassword.textContent = hidden ? "Ẩn" : "Hiện";
          togglePassword.setAttribute(
            "aria-label",
            hidden ? "Ẩn mật khẩu" : "Hiện mật khẩu",
          );
          togglePassword.setAttribute(
            "aria-pressed",
            hidden ? "true" : "false",
          );
        });

        identityInput.addEventListener("blur", validateIdentity);
        passwordInput.addEventListener("blur", validatePassword);

        loginForm.addEventListener("submit", function (event) {
          event.preventDefault();
          loginStatus.classList.add("d-none");

          var validIdentity = validateIdentity();
          var validPassword = validatePassword();

          if (!validIdentity || !validPassword) {
            return;
          }

          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span><span class="btn-text">Đang xử lý...</span>';

          setTimeout(function () {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span class="btn-text">Đăng nhập</span>';
            loginStatus.classList.remove("d-none");

            loginForm.reset();
            identityError.textContent = "";
            passwordError.textContent = "";
            setFieldValid(identityInput, true);
            setFieldValid(passwordInput, true);
            passwordInput.type = "password";
            togglePassword.textContent = "Hiện";
            togglePassword.setAttribute("aria-label", "Hiện mật khẩu");
            togglePassword.setAttribute("aria-pressed", "false");
          }, 1200);
        });
      })();
    </script>
  </body>
</html>
