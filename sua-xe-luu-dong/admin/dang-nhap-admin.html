<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="..//public/asset/image/logo-giat-ui-nhanh.png"
      type="image/x-icon"
    />
    <title>Đăng Nhập Admin</title>

    <link rel="stylesheet" href="../public/asset/css/bootstrap.min.css" />

    <link rel="stylesheet" href="../public/asset/css/login.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="container-fluid">
        <div class="row justify-content-center">
          <div class="col-12 col-md-6 col-lg-5">
            <div class="card login-card">
              <div class="card-body p-4 p-md-5">
                <!-- Header -->
                <div class="login-header">
                  <div class="icon">
                    <i class="bi bi-shield-lock-fill"></i>
                    <!-- Sử dụng Bootstrap Icons nếu có, hoặc thay bằng text -->
                  </div>
                  <h2 class="fw-bold text-dark mb-2">GIẶT ỦI NHANH</h2>
                  <p class="text-muted mb-0">
                    Đăng nhập để truy cập hệ thống quản trị
                  </p>
                </div>

                <div id="loginAlert" class="alert d-none" role="alert"></div>
                <!-- Login Form -->
                <form id="loginAdminForm">
                  <!-- Email Input -->
                  <div class="mb-3">
                    <label for="email" class="form-label fw-semibold text-dark"
                      >Email</label
                    >
                    <input
                      type="email"
                      class="form-control form-control-lg"
                      id="email"
                      placeholder="Nhập email"
                      name="email"
                      required
                    />
                  </div>

                  <!-- Password Input -->
                  <div class="mb-3">
                    <label
                      for="matkhau"
                      class="form-label fw-semibold text-dark"
                      >Mật khẩu</label
                    >
                    <input
                      type="password"
                      class="form-control form-control-lg"
                      id="matkhau"
                      placeholder="Nhập mật khẩu"
                      name="matkhau"
                      required
                    />
                  </div>

                  <!-- Submit Button -->
                  <button
                    type="submit"
                    class="btn btn-primary btn-login w-100 text-white"
                  >
                    Đăng Nhập
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../public/asset/js/bootstrap.bundle.min.js"></script>
    <script src="https://api.dvqt.vn/js/krud.js"></script>
    <!-- <script type="text/javascript" src="../public/asset/js/database.js"></script> -->
    <script>
      const loginForm = document.getElementById("loginAdminForm");
      const loginAlert = document.getElementById("loginAlert");
        function showAlert(message, type = "danger") {
          loginAlert.classList.remove("d-none", "alert-danger", "alert-success");
          loginAlert.classList.add(`alert-${type}`);
          loginAlert.textContent = message;
        }

      loginForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const email = document.getElementById("email").value.trim();
        const matkhau = document.getElementById("matkhau").value.trim();

        const payload = {
          table: "admin",
          where: [
            {
              op: "AND",
              conditions: [
                { field: "email", operator: "=", value: email },
                { field: "matkhau", operator: "=", value: matkhau },
              ],
            },
          ],
        };

          krudList(payload)
            .then(async (res) => {
              const admins = Array.isArray(res?.data) ? res.data : [];
              if (admins.length === 0) {
                showAlert("Email hoặc mật khẩu không đúng!");
                return;
              }

              // Lưu thông tin vào cookie để dùng cho các trang quản trị khác.
              document.cookie = `admin_e=${encodeURIComponent(email)}; path=/; max-age=86400`;
              document.cookie = `admin_p=${encodeURIComponent(matkhau)}; path=/; max-age=86400`;
              
              window.location.href = "index.html";
            })
            .catch(() => {
              showAlert("Không thể kết nối máy chủ. Vui lòng thử lại sau.");
            });
      });
    </script>
  </body>
</html>
